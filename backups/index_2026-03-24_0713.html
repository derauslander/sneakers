<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Vault — Sneaker Collection</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 680 680' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='680' height='680' fill='%23000000' rx='80'/%3E%3Ccircle cx='340' cy='340' r='280' fill='none' stroke='%23e63946' stroke-width='24'/%3E%3Ccircle cx='340' cy='340' r='180' fill='none' stroke='%23e63946' stroke-width='16'/%3E%3Ccircle cx='340' cy='340' r='60' fill='%23e63946'/%3E%3Cline x1='340' y1='60' x2='340' y2='160' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Cline x1='340' y1='520' x2='340' y2='620' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Cline x1='60' y1='340' x2='160' y2='340' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Cline x1='520' y1='340' x2='620' y2='340' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Cline x1='143' y1='143' x2='213' y2='213' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Cline x1='467' y1='467' x2='537' y2='537' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Cline x1='537' y1='143' x2='467' y2='213' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Cline x1='143' y1='537' x2='213' y2='467' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Ccircle cx='340' cy='340' r='24' fill='%23000000'/%3E%3Ccircle cx='340' cy='340' r='12' fill='%23e63946'/%3E%3C/svg%3E" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #ffffff; font-family: 'Aptos', 'Segoe UI', sans-serif; color: #111111; transition: background 0.3s, color 0.3s; }
    body.dark { background: #1a1a1a; color: #f0f0f0; }
    input[type=date]::-webkit-calendar-picker-indicator { filter: none; }
    body.dark input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f0f0f0; }
    body.dark ::-webkit-scrollbar-track { background: #2a2a2a; }
    ::-webkit-scrollbar-thumb { background: #ccc; }
    body.dark ::-webkit-scrollbar-thumb { background: #555; }
    select option { background: #ffffff; color: #111; }
    body.dark select option { background: #2a2a2a; color: #f0f0f0; }
    @keyframes fadeInTitle {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes saleGlow {
      0%, 100% { box-shadow: 0 0 4px rgba(230,180,0,0.4); }
      50%       { box-shadow: 0 0 14px rgba(230,180,0,0.9); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ═══════════════════════════════════════════════════════════════════════════
    // ADMIN_MODE — true for local admin app, false for public site
    // build.bat flips this to false when generating index.html
    // ═══════════════════════════════════════════════════════════════════════════
    const ADMIN_MODE = false;

    const { useState, useEffect, useRef } = React;

    const LIGHT = {
      bg: "#faf8f5", bg2: "#f5f2ee", bg3: "#ede9e3", bg4: "#e8e3dc",
      border: "#ddd8d0", border2: "#c8c2b8",
      text: "#1a1612", text2: "#2e2a24", text3: "#4a4540", text4: "#6b6560", text5: "#8c8680", text6: "#aaa49e", text7: "#c4beb8", text8: "#dedad4",
      navBg: "#f0ece6", cardBg: "#ffffff",
      inputBg: "#f0ece6", inputBorder: "#c8c2b8", inputText: "#1a1612",
      overlayText: "#fff",
      categoryBg: "#fff4f2",
    };
    const DARK = {
      bg: "#1a1a1a", bg2: "#222222", bg3: "#2a2a2a", bg4: "#2f2f2f",
      border: "#333333", border2: "#444444",
      text: "#f0f0f0", text2: "#d0d0d0", text3: "#b0b0b0", text4: "#999", text5: "#888", text6: "#777", text7: "#666", text8: "#444",
      navBg: "#111111", cardBg: "#222222",
      inputBg: "#2a2a2a", inputBorder: "#444", inputText: "#f0f0f0",
      overlayText: "#fff",
      categoryBg: "#2a1a1a",
      cardText: "#f0f0f0", cardText2: "#d0d0d0", cardText3: "#b0b0b0", cardText4: "#999999", cardText5: "#888888", cardText6: "#777777", cardText7: "#666666",
    };

    const useDarkMode = () => {
      const [dark, setDark] = useState(() => {
        try { return localStorage.getItem("vault_dark") === "true"; } catch { return false; }
      });
      useEffect(() => {
        document.body.classList.toggle("dark", dark);
        try { localStorage.setItem("vault_dark", dark); } catch {}
      }, [dark]);
      return [dark, setDark];
    };

    const useDarkModePublic = () => {
      const [dark, setDark] = useState(() => window.matchMedia("(prefers-color-scheme: dark)").matches);
      useEffect(() => {
        const mq = window.matchMedia("(prefers-color-scheme: dark)");
        const handler = e => { setDark(e.matches); document.body.classList.toggle("dark", e.matches); };
        mq.addEventListener("change", handler);
        document.body.classList.toggle("dark", dark);
        return () => mq.removeEventListener("change", handler);
      }, []);
      return [dark, () => {}];
    };

    const useIsMobile = () => {
      const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
      useEffect(() => {
        const handler = () => setIsMobile(window.innerWidth < 768);
        window.addEventListener("resize", handler);
        return () => window.removeEventListener("resize", handler);
      }, []);
      return isMobile;
    };

    // ── Anniversary check helper ─────────────────────────────────────────
    const isAnniversaryToday = (purchaseDate) => {
      if (!purchaseDate) return false;
      const todayStr = localDateStr();
      const todayMD = todayStr.slice(5);
      if (purchaseDate.slice(5) !== todayMD) return false;
      const years = parseInt(todayStr.slice(0,4)) - parseInt(purchaseDate.slice(0,4));
      return years > 0;
    };

        const COLORWAYS = {};

    const CAT_COLORS = {
      Jordan: { bg: "#fff0f0", accent: "#e63946" },
      Nike:   { bg: "#fff0f0", accent: "#e63946" },
    };

    const load = (key, fallback) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } };
    const save = (key, val) => { if (!ADMIN_MODE) return; try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) { console.error(e); } };
    const localDateStr = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
    const formatDate = (iso) => iso ? new Date(iso+"T00:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}) : null;

    function ImageSlot({ img, hoverImg, label, accent, bg, onUpload, onClear, width = 96, height = 60, wearDates = [], isGrail = false, purchaseDate = null, size = null, isBeater = false, ogYear = null, story = null, isOnIce = false, dark = false, shoeName = null }) {
      const fileRef = useRef();
      const isMobile = useIsMobile();
      const isMobilePublic = !ADMIN_MODE && isMobile;
      const [hovered, setHovered] = useState(false);
      const [showHover, setShowHover] = useState(false);
      const [beaterGlow, setBeaterGlow] = useState(false);
      const [grailReveal, setGrailReveal] = useState(false);
      const [showStory, setShowStory] = useState(false);
      const [iceGlow, setIceGlow] = useState(false);
      const overlayBg = "rgba(0,0,0,0.85)";
      const timerRef = useRef(null);
      const crossfadeRef = useRef(null);
      const beaterRef = useRef(null);
      const grailRef = useRef(null);
      const storyRef = useRef(null);
      const iceRef = useRef(null);

      // Determine if hover image should crossfade:
      // - Grails: always crossfade when hoverImg exists
      // - Non-grails: only on purchase anniversary
      const isAnniversary = isAnniversaryToday(purchaseDate);
      const shouldCrossfade = hoverImg && (isGrail || isAnniversary);
      const anniversaryGlow = !isGrail && isAnniversary && shouldCrossfade;

      const triggerOpen = () => {
        if (!img) return;
        setHovered(true);
        setShowHover(false);
        setBeaterGlow(false);
        setGrailReveal(false);
        setShowStory(false);
        setIceGlow(false);
        if (isGrail && shouldCrossfade) {
          crossfadeRef.current = setTimeout(() => { setShowHover(true); setGrailReveal(true);
            if (story) storyRef.current = setTimeout(() => setShowStory(true), 5000);
          }, 200);
        } else if (isGrail) {
          grailRef.current = setTimeout(() => { setGrailReveal(true);
            if (story) storyRef.current = setTimeout(() => setShowStory(true), 5000);
          }, 200);
        } else if (shouldCrossfade) {
          crossfadeRef.current = setTimeout(() => { setShowHover(true);
            if (story) storyRef.current = setTimeout(() => setShowStory(true), 5000);
          }, 200);
        } else if (story) {
          storyRef.current = setTimeout(() => setShowStory(true), 5000);
        }
        if (isBeater) {
          beaterRef.current = setTimeout(() => setBeaterGlow(true), 200);
        }
        if (isOnIce) {
          iceRef.current = setTimeout(() => setIceGlow(true), 200);
        }
      };
      const triggerClose = () => {
        clearTimeout(crossfadeRef.current);
        clearTimeout(beaterRef.current);
        clearTimeout(grailRef.current);
        clearTimeout(storyRef.current);
        clearTimeout(iceRef.current);
        setHovered(false);
        setShowHover(false);
        setBeaterGlow(false);
        setGrailReveal(false);
        setShowStory(false);
        setIceGlow(false);
      };
      const handleMouseEnter = () => { if (isMobilePublic) return; timerRef.current = setTimeout(triggerOpen, 500); };
      const handleMouseLeave = () => { if (isMobilePublic) return; clearTimeout(timerRef.current); triggerClose(); };
      const handleTap = (e) => { if (!isMobilePublic) return; e.stopPropagation(); hovered ? triggerClose() : triggerOpen(); };

      const sortedDates = [...wearDates].sort((a, b) => b > a ? 1 : -1);

      return (
        <div style={{ position:"relative", display:"inline-block" }}>
          {img ? (
            <div style={{ textAlign:"center" }}>
              <div style={{ position:"relative", display:"inline-block" }}>
                <img
                  src={img} alt={label}
                  onMouseEnter={handleMouseEnter}
                  onMouseLeave={handleMouseLeave}
                  onClick={handleTap}
                  style={{ width, height, objectFit:"cover", border:"none", display:"block", cursor: isMobilePublic ? "pointer" : "zoom-in", transition:"opacity 0.15s" }}
                />
                {hovered && (
                  <div onClick={triggerClose} style={{
                    position:"fixed", top:0, left:0, width:"100vw", height:"100vh",
                    background: overlayBg, display:"flex", flexDirection:"column",
                    alignItems:"center", justifyContent:"center", zIndex:9999,
                    pointerEvents: isMobilePublic ? "auto" : "none",
                  }}>
                    <div style={{ position:"relative", width: isMobilePublic ? "90vw" : "50vw", maxWidth:"600px", display:"flex", flexDirection:"column", alignItems:"center" }}>
                      {/* Image — stays fixed, never fades */}
                      <div style={{ position:"relative", width:"100%", display:"flex", justifyContent:"center" }}>
                        <img src={img} alt={label} style={{ maxWidth: isMobilePublic ? "90vw" : "50vw", maxHeight:"40vh", objectFit:"contain", filter: isBeater && beaterGlow ? "drop-shadow(0 0 30px rgba(180,80,20,0.8)) drop-shadow(0 0 8px rgba(255,255,255,0.3))" : isOnIce && iceGlow ? "drop-shadow(0 0 30px rgba(100,200,255,0.8)) drop-shadow(0 0 8px rgba(255,255,255,0.3))" : "drop-shadow(0 0 8px rgba(255,255,255,0.6))", display:"block", opacity: (shouldCrossfade && showHover) ? 0 : 1, transition:"opacity 3s ease-in-out, filter 3s ease-in-out" }} />
                        {shouldCrossfade && (
                          <img src={hoverImg} alt={label} style={{ position:"absolute", top:0, left:"50%", transform: showHover ? "translateX(-50%) scale(1)" : "translateX(-50%) scale(0.95)", maxWidth: isMobilePublic ? "90vw" : "50vw", maxHeight:"40vh", objectFit:"contain", filter:"drop-shadow(0 0 30px rgba(255,215,0,0.7)) drop-shadow(0 0 8px rgba(255,255,255,0.6))", opacity: showHover ? 1 : 0, transition:"opacity 3s ease-in-out, transform 3s ease-in-out" }} />
                        )}
                      </div>
                      {/* Text area — fixed height container, info fades out, story fades in */}
                      <div style={{ width:"100%", marginTop:"16px", textAlign:"center", position:"relative", minHeight:"80px" }}>
                        {/* Info text */}
                        <div style={{ position:"absolute", width:"100%", opacity: showStory ? 0 : 1, transition:"opacity 1s ease-in-out" }}>
                          {isGrail && <div style={{ fontSize:"11px", letterSpacing:"6px", color:"#FFD700", opacity: grailReveal ? 1 : 0, transition:"opacity 3s ease-in-out" }}>✦ GRAIL ✦</div>}
                          {isBeater && <div style={{ fontSize:"11px", letterSpacing:"6px", color:"#b45014", marginTop:"6px", opacity: beaterGlow ? 1 : 0, transition:"opacity 3s ease-in-out" }}>💀 BEATER 💀</div>}
                          {isOnIce && <div style={{ fontSize:"11px", letterSpacing:"6px", color:"#64c8ff", marginTop:"6px", opacity: iceGlow ? 1 : 0, transition:"opacity 3s ease-in-out" }}>❄️ ON ICE ❄️</div>}
                          {anniversaryGlow && <div style={{ fontSize:"11px", letterSpacing:"6px", color:"#FFD700", marginTop:"6px", opacity: showHover ? 1 : 0, transition:"opacity 3s ease-in-out" }}>✦ ANNIVERSARY ✦</div>}
                          <div style={{ marginTop:(isGrail||isBeater||isOnIce||anniversaryGlow)?"6px":"0", fontSize:"13px", letterSpacing:"3px", color: isGrail && grailReveal ? "#FFD700" : isBeater && beaterGlow ? "#b45014" : isOnIce && iceGlow ? "#64c8ff" : anniversaryGlow && showHover ? "#FFD700" : "#fff", transition:"color 3s ease-in-out" }}>
                            {shoeName ? `${shoeName} — ${label}` : label}
                          </div>
                          {ogYear && <div style={{ marginTop:"4px", fontSize:"10px", color:"#fff", letterSpacing:"1px" }}>Originally Owned in {ogYear}</div>}
                          {purchaseDate && <div style={{ marginTop:"8px", fontSize:"10px", color: dark ? "#777" : "#aaa", letterSpacing:"1px" }}>Purchase Date: {new Date(purchaseDate + "T00:00:00").toLocaleDateString("en-US", { month:"2-digit", day:"2-digit", year:"numeric" })}</div>}
                          {size && <div style={{ marginTop:"4px", fontSize:"10px", color: dark ? "#777" : "#aaa", letterSpacing:"1px" }}>Size: {size}</div>}
                          {sortedDates.length > 0 && <div style={{ marginTop:"4px", fontSize:"10px", color: dark ? "#777" : "#aaa", letterSpacing:"1px" }}>Last Worn: {new Date(sortedDates[0] + "T00:00:00").toLocaleDateString("en-US", { month:"2-digit", day:"2-digit", year:"numeric" })}</div>}
                          {isMobilePublic && <div style={{ marginTop:"16px", fontSize:"10px", color:"#666", letterSpacing:"2px" }}>TAP TO CLOSE</div>}
                        </div>
                        {/* Story text */}
                        {story && (
                          <div style={{ position:"absolute", width:"100%", opacity: showStory ? 1 : 0, transition:"opacity 2s ease-in-out" }}>
                            <div style={{ fontSize:"13px", color:"#fff", lineHeight:"1.8", letterSpacing:"0.5px" }}>{story}</div>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                )}
              </div>
              <div style={{ fontSize:"11px", color:"#666", marginTop:"4px", maxWidth:width, textAlign:"center", lineHeight:"1.3", wordBreak:"break-word" }}>{label}</div>
              
            </div>
          ) : (
            <div style={{ textAlign:"center" }}>
              <div onClick={() => fileRef.current.click()} title={`Upload: ${label}`} style={{
                width, height, background:bg, border:`1px dashed ${accent}`,
                display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                cursor:"pointer",
              }}>
                <div style={{ fontSize:"18px", color:accent, lineHeight:1 }}>+</div>
              </div>
              <div style={{ fontSize:"11px", color:"#666", marginTop:"4px", maxWidth:width, textAlign:"center", lineHeight:"1.3", wordBreak:"break-word" }}>{label}</div>
              
            </div>
          )}
          <input ref={fileRef} type="file" accept="image/*" style={{ display:"none" }}
            onChange={e => { if (e.target.files[0]) onUpload(e.target.files[0]); e.target.value = ""; }} />
        </div>
      );
    }

    function DisplayCell({ c, img, hoverImg, ri, onEdit, isEditing, isGrail, dark = false }) {
      const isMobile = useIsMobile();
      const isMobilePublic = !ADMIN_MODE && isMobile;
      const [hovered, setHovered] = useState(false);
      const [showHover, setShowHover] = useState(false);
      const timerRef = useRef(null);
      const crossfadeRef = useRef(null);

      const triggerOpen = () => {
        if (!img) return;
        setHovered(true);
        setShowHover(false);
        if (isGrail && hoverImg) {
          crossfadeRef.current = setTimeout(() => setShowHover(true), 200);
        }
      };
      const triggerClose = () => {
        clearTimeout(crossfadeRef.current);
        setHovered(false);
        setShowHover(false);
      };
      const handleMouseEnter = () => { if (isMobilePublic || !img) return; timerRef.current = setTimeout(triggerOpen, 500); };
      const handleMouseLeave = () => { if (isMobilePublic) return; clearTimeout(timerRef.current); triggerClose(); };
      const handleTap = (e) => { if (!isMobilePublic) return; e.stopPropagation(); hovered ? triggerClose() : triggerOpen(); };

      return (
        <div
          onClick={ADMIN_MODE ? onEdit : undefined}
          style={{ width:"160px", cursor: ADMIN_MODE ? "pointer" : "default" }}>
          <div
            onMouseEnter={handleMouseEnter}
            onMouseLeave={handleMouseLeave}
            onClick={handleTap}
            style={{
              width:"160px", height:"100px",
              background: c.empty ? (dark ? "#2a2a2a" : "#f5f5f5") : img ? (dark ? "#1a1a1a" : "#ffffff") : c.bg,
              border: isEditing ? "2px solid #f4a261" : "none",
              display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
              padding: img ? "0" : "6px", textAlign:"center",
              overflow:"hidden", position:"relative",
              cursor: isMobilePublic && img ? "pointer" : undefined,
            }}>
            {c.empty
              ? <span style={{color: dark ? "#555" : "#ddd",fontSize:"18px"}}>·</span>
              : img
                  ? <img src={img} alt={c.colorway} style={{ width:"100%", height:"100%", objectFit:"cover", display:"block" }} />
                  : <>
                      <div style={{fontSize:"11px",letterSpacing:"2px",color:c.accent,fontWeight:"bold"}}>{c.label}</div>
                    </>
            }
            {hovered && img && (
              <div onClick={triggerClose} style={{
                position:"fixed", top:0, left:0, width:"100vw", height:"100vh",
                background:"rgba(0,0,0,0.85)", display:"flex", flexDirection:"column",
                alignItems:"center", justifyContent:"center", zIndex:9999, pointerEvents: isMobilePublic ? "auto" : "none",
              }}>
                <div style={{ position:"relative", maxWidth: isMobilePublic ? "90vw" : "60vw", maxHeight: isMobilePublic ? "70vh" : "60vh" }}>
                  <img src={img} alt={c.colorway} style={{ maxWidth: isMobilePublic ? "90vw" : "60vw", maxHeight: isMobilePublic ? "70vh" : "60vh", objectFit:"contain", filter:"drop-shadow(0 0 8px rgba(255,255,255,0.6))", display:"block", opacity: (isGrail && hoverImg && showHover) ? 0 : 1, transition:"opacity 3s ease-in-out" }} />
                  {isGrail && hoverImg && (
                    <img src={hoverImg} alt={c.colorway} style={{ position:"absolute", top:0, left:0, maxWidth: isMobilePublic ? "90vw" : "60vw", maxHeight: isMobilePublic ? "70vh" : "60vh", objectFit:"contain", filter:"drop-shadow(0 0 30px rgba(255,215,0,0.7)) drop-shadow(0 0 8px rgba(255,255,255,0.6))", opacity: showHover ? 1 : 0, transform: showHover ? "scale(1)" : "scale(0.95)", transition:"opacity 3s ease-in-out, transform 3s ease-in-out" }} />
                  )}
                </div>
                {isGrail && <div style={{ marginTop:"12px", fontSize:"11px", letterSpacing:"6px", color:"#FFD700" }}>✦ GRAIL ✦</div>}
                <div style={{ marginTop: isGrail ? "6px" : "16px", fontSize:"13px", letterSpacing:"3px", color: isGrail ? "#FFD700" : c.accent }}>{c.colorway}</div>
                {isMobilePublic && <div style={{ marginTop:"16px", fontSize:"10px", color:"#666", letterSpacing:"2px" }}>TAP TO CLOSE</div>}
              </div>
            )}
          </div>
          {!c.empty && (
            <div style={{ textAlign:"center", marginTop:"4px" }}>
              <div style={{ fontSize:"8px", color: dark ? "#999" : "#666", letterSpacing:"0.5px", overflow:"hidden", whiteSpace:"nowrap", textOverflow:"ellipsis" }}>{c.colorway}</div>
            </div>
          )}
        </div>
      );
    }

    function GraveyardCard({ entryKey, entry, T, dark, setColorways, setGraveyardMeta }) {
      const isMobile = useIsMobile();
      const isMobilePublic = !ADMIN_MODE && isMobile;
      const [hovered,    setHovered]    = useState(false);
      const [showHover,  setShowHover]  = useState(false);
      const [glowOn,     setGlowOn]     = useState(false);
      const timerRef     = useRef(null);
      const crossfadeRef = useRef(null);
      const glowRef      = useRef(null);

      const glowColor  = entry.isGrail ? "rgba(255,215,0,0.7)" : entry.isBeater ? "rgba(180,80,20,0.8)" : "rgba(150,150,150,0.6)";
      const labelColor = entry.isGrail ? "#FFD700" : entry.isBeater ? "#b45014" : "#aaa";
      const purchaseDate = entry.purchaseDate ? new Date(entry.purchaseDate+"T00:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}) : null;
      const retireDate   = entry.retireDate   ? new Date(entry.retireDate+"T00:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}) : null;

      const triggerOpen = () => {
        if (!entry.img) return;
        setHovered(true); setShowHover(false); setGlowOn(false);
        if (entry.isGrail && entry.hoverImg) {
          crossfadeRef.current = setTimeout(() => { setShowHover(true); setGlowOn(true); }, 200);
        } else {
          glowRef.current = setTimeout(() => setGlowOn(true), 200);
        }
      };
      const triggerClose = () => {
        clearTimeout(crossfadeRef.current); clearTimeout(glowRef.current);
        setHovered(false); setShowHover(false); setGlowOn(false);
      };
      const handleMouseEnter = () => { if (isMobilePublic) return; if (!entry.img) return; timerRef.current = setTimeout(triggerOpen, 500); };
      const handleMouseLeave = () => { if (isMobilePublic) return; clearTimeout(timerRef.current); triggerClose(); };
      const handleTap = (e) => { if (!isMobilePublic) return; e.stopPropagation(); hovered ? triggerClose() : triggerOpen(); };

      const cardW = isMobilePublic ? "140px" : "200px";
      const imgW = isMobilePublic ? "108px" : "168px";
      const imgH = isMobilePublic ? "68px" : "105px";

      // CT for card text
      const CT = dark ? T : { text:"#111", text2:"#333", text3:"#555", text4:"#666", text5:"#888", text6:"#aaa", text7:"#bbb", text8:"#ddd" };

      return (
        <div style={{ background: dark ? T.cardBg : "#f9f9f9", border:`1px solid ${T.border}`, padding:"16px", width: cardW, flex:"0 0 auto" }}>
          {/* Image */}
          <div style={{ position:"relative", width: imgW, height: imgH, marginBottom:"10px" }}>
            {entry.img ? (
              <>
                <img src={entry.img} alt={entry.colorway} onMouseEnter={handleMouseEnter} onMouseLeave={handleMouseLeave} onClick={handleTap}
                  style={{ width: imgW, height: imgH, objectFit:"cover", display:"block", cursor: isMobilePublic ? "pointer" : "zoom-in",
                    filter: glowOn ? `drop-shadow(0 0 20px ${glowColor})` : "none",
                    opacity: entry.isGrail && entry.hoverImg && showHover ? 0 : 1,
                    transition:"opacity 3s ease-in-out, filter 3s ease-in-out" }} />
                {entry.isGrail && entry.hoverImg && (
                  <img src={entry.hoverImg} alt={entry.colorway} onMouseEnter={handleMouseEnter} onMouseLeave={handleMouseLeave} onClick={handleTap}
                    style={{ position:"absolute", top:0, left:0, width: imgW, height: imgH, objectFit:"cover",
                      filter:`drop-shadow(0 0 20px ${glowColor})`,
                      opacity: showHover ? 1 : 0, transform: showHover ? "scale(1)" : "scale(0.95)",
                      transition:"opacity 3s ease-in-out, transform 3s ease-in-out" }} />
                )}
              </>
            ) : (
              <div style={{ width: imgW, height: imgH, background:T.bg3, display:"flex", alignItems:"center", justifyContent:"center" }}>
                <span style={{ fontSize:"32px" }}>🪦</span>
              </div>
            )}
            {/* Hover overlay */}
            {hovered && entry.img && (
              <div onClick={triggerClose} style={{ position:"fixed", top:0, left:0, width:"100vw", height:"100vh", background:"rgba(0,0,0,0.85)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", zIndex:9999, pointerEvents: isMobilePublic ? "auto" : "none" }}>
                <div style={{ position:"relative", width: isMobilePublic ? "90vw" : "50vw", maxWidth:"600px", display:"flex", flexDirection:"column", alignItems:"center" }}>
                  {/* Image */}
                  <div style={{ position:"relative", width:"100%", display:"flex", justifyContent:"center" }}>
                    <img src={entry.img} alt={entry.colorway} style={{ maxWidth: isMobilePublic ? "90vw" : "50vw", maxHeight:"40vh", objectFit:"contain", filter:`drop-shadow(0 0 8px rgba(255,255,255,0.4))`, display:"block", opacity: entry.isGrail && entry.hoverImg && showHover ? 0 : 1, transition:"opacity 3s ease-in-out" }} />
                    {entry.isGrail && entry.hoverImg && (
                      <img src={entry.hoverImg} alt={entry.colorway} style={{ position:"absolute", top:0, left:"50%", transform: showHover ? "translateX(-50%) scale(1)" : "translateX(-50%) scale(0.95)", maxWidth: isMobilePublic ? "90vw" : "50vw", maxHeight:"40vh", objectFit:"contain", filter:`drop-shadow(0 0 20px ${glowColor})`, opacity: showHover ? 1 : 0, transition:"opacity 3s ease-in-out, transform 3s ease-in-out" }} />
                    )}
                  </div>
                  {/* Text area */}
                  <div style={{ width:"100%", marginTop:"16px", textAlign:"center" }}>
                    {entry.isGrail && <div style={{ fontSize:"11px", letterSpacing:"6px", color:"#FFD700", marginBottom:"6px", opacity: glowOn ? 1 : 0, transition:"opacity 3s ease-in-out" }}>✦ R.I.P. ✦</div>}
                    <div style={{ fontSize:"13px", letterSpacing:"3px", color: entry.isGrail && glowOn ? "#FFD700" : entry.isBeater && glowOn ? "#b45014" : "#fff", transition:"color 3s ease-in-out" }}>{entry.shoeName} — {entry.colorway}</div>
                    {(purchaseDate || retireDate) && (
                      <div style={{ marginTop:"8px", fontSize:"10px", color:"#aaa", letterSpacing:"1px" }}>
                        🪦 {purchaseDate || "?"} — {retireDate || "?"} 🪦
                      </div>
                    )}
                    {entry.story && (
                      <div style={{ marginTop:"12px", fontSize:"13px", color:"#fff", lineHeight:"1.8", letterSpacing:"0.5px" }}>{entry.story}</div>
                    )}
                    {isMobilePublic && <div style={{ marginTop:"16px", fontSize:"10px", color:"#666", letterSpacing:"2px" }}>TAP TO CLOSE</div>}
                  </div>
                </div>
              </div>
            )}
          </div>
          {/* Card text — clean, no story fade */}
          <div style={{ fontSize:"11px", fontWeight:"bold", color: CT.text, marginBottom:"2px", textAlign:"center" }}>{entry.shoeName}</div>
          <div style={{ fontSize:"10px", color: CT.text4, textAlign:"center" }}>{entry.colorway}</div>
          {ADMIN_MODE && <button onClick={() => { if (window.confirm(`Restore ${entry.shoeName} — ${entry.colorway} to your collection?`)) {
            setColorways(cws => ({ ...cws, [entry.shortName]: [...(cws[entry.shortName]||[]), entry.colorway] }));
            setGraveyardMeta(g => { const n={...g}; delete n[entryKey]; return n; });
          }}} style={{ marginTop:"10px", background:"transparent", border:`1px solid ${T.border2}`, color:T.text5, padding:"3px 8px", cursor:"pointer", fontSize:"8px", letterSpacing:"2px", fontFamily:"'Aptos','Segoe UI',sans-serif" }}>RESTORE</button>}
        </div>
      );
    }

    function App() {
      const isMobile = useIsMobile();
      const isMobilePublic = !ADMIN_MODE && isMobile;
      const [dark, setDark] = ADMIN_MODE ? useDarkMode() : useDarkModePublic();
      const T = dark ? DARK : LIGHT;
      // CT = card text colors (always dark on light cards, light on dark cards)
      const CT = dark ? T : { text:"#111", text2:"#333", text3:"#555", text4:"#666", text5:"#888", text6:"#aaa", text7:"#bbb", text8:"#ddd", border:`1px solid #e0e0e0`, border2:"#ccc" };
      // ── Public data loading ──────────────────────────────────────────────
      const [publicData, setPublicData] = useState(null);
      const [publicLoading, setPublicLoading] = useState(!ADMIN_MODE);
      const [publicError, setPublicError] = useState(null);

      useEffect(() => {
        if (ADMIN_MODE) return;
        fetch("vault-data.json")
          .then(r => { if (!r.ok) throw new Error("Could not load vault-data.json"); return r.json(); })
          .then(d => { setPublicData(d); setPublicLoading(false); })
          .catch(e => { setPublicError(e.message); setPublicLoading(false); });
      }, []);

      const [inventory,    setInventory]    = useState(() => ADMIN_MODE ? load("vault_inventory", []) : []);
      const importRef = useRef();
      const [importMsg, setImportMsg] = useState(null);
      const [wearLog,        setWearLog]        = useState(() => ADMIN_MODE ? load("vault_wearlog_v3", {}) : {});
      const [images,         setImages]         = useState(() => ADMIN_MODE ? load("vault_images", {}) : {});
      const [colorwayMeta,   setColorwayMeta]   = useState(() => ADMIN_MODE ? load("vault_colorway_meta", {}) : {});
      const [grailMeta,      setGrailMeta]      = useState(() => ADMIN_MODE ? load("vault_grail_meta", {}) : {});
      const [beaterMeta,     setBeaterMeta]     = useState(() => ADMIN_MODE ? load("vault_beater_meta", {}) : {});
      const [glowMeta,       setGlowMeta]       = useState(() => ADMIN_MODE ? load("vault_glow_meta", {}) : {});
      const [graveyardMeta,  setGraveyardMeta]  = useState(() => ADMIN_MODE ? load("vault_graveyard_meta", {}) : {});
      const [colorways,      setColorways]      = useState(() => ADMIN_MODE ? load("vault_colorways", COLORWAYS) : {});
      const [displayLayout,  setDisplayLayout]  = useState(() => ADMIN_MODE ? load("vault_display_layout", []) : []);
      const [editingCell,    setEditingCell]    = useState(null);
      const [editShoe,       setEditShoe]       = useState("");
      const [editCw,         setEditCw]         = useState("");
      const [view,           setView]           = useState("inventory");
      const [showForm,       setShowForm]       = useState(false);
      const [quickLog,       setQuickLog]       = useState(false);
      const [quickShoeId,    setQuickShoeId]    = useState("");
      const [quickColorway,  setQuickColorway]  = useState("");
      const [quickDate,      setQuickDate]      = useState(() => localDateStr());
      const [editId,         setEditId]         = useState(null);
      const [newShoe,        setNewShoe]        = useState({ name:"", shortName:"", category:"Jordan", quantity:1, wishlist:false });
      const [editColorways,  setEditColorways]  = useState([]);
      const [newColorway,    setNewColorway]    = useState("");
      const [renamingColorwayIdx, setRenamingColorwayIdx] = useState(null);
      const [retiringMeta, setRetiringMeta] = useState(null); // { shoeId, colorway }
      const [retireForm, setRetireForm] = useState({ reason:"Sold", dateRetired:"", story:"" });
      const [loggingId,      setLoggingId]      = useState(null);
      const [wearDate,       setWearDate]       = useState(() => localDateStr());
      const [wearColorway,   setWearColorway]   = useState("");
      const [sortCol,        setSortCol]        = useState("date");
      const [sortDir,        setSortDir]        = useState("desc");
      const [editingMeta,    setEditingMeta]    = useState(null);
      const [metaForm,       setMetaForm]       = useState({ purchaseDate:"", purchasePrice:"", retailer:"", size:"", notes:"", ogYear:"", story:"", saleDate:"", saleTime:"" });
      const [anniversaryDismissed, setAnniversaryDismissed] = useState(false);
      const [saleDismissed, setSaleDismissed] = useState(false);
      const [bannerShowUpNext, setBannerShowUpNext] = useState(true);

      useEffect(() => {
        const interval = setInterval(() => setBannerShowUpNext(v => !v), 5000);
        return () => clearInterval(interval);
      }, []);

      // Apply public data once loaded
      useEffect(() => {
        if (ADMIN_MODE || !publicData) return;
        setInventory(publicData.inventory || []);
        setWearLog(publicData.wearLog || {});
        setImages(publicData.images || {});
        setColorwayMeta(publicData.colorwayMeta || {});
        setGrailMeta(publicData.grailMeta || {});
        setBeaterMeta(publicData.beaterMeta || {});
        setGlowMeta(publicData.glowMeta || {});
        setGraveyardMeta(publicData.graveyardMeta || {});
        setColorways(publicData.colorways || {});
        setDisplayLayout(publicData.displayLayout || []);
      }, [publicData]);

      // Admin: persist to localStorage
      useEffect(() => save("vault_inventory",      inventory),    [inventory]);
      useEffect(() => save("vault_wearlog_v3",     wearLog),      [wearLog]);
      useEffect(() => save("vault_images",         images),       [images]);
      useEffect(() => save("vault_colorway_meta",  colorwayMeta), [colorwayMeta]);
      useEffect(() => save("vault_grail_meta",     grailMeta),    [grailMeta]);
      useEffect(() => save("vault_beater_meta",    beaterMeta),   [beaterMeta]);
      useEffect(() => save("vault_glow_meta",      glowMeta),     [glowMeta]);
      useEffect(() => save("vault_graveyard_meta", graveyardMeta),[graveyardMeta]);
      useEffect(() => save("vault_colorways",      colorways),    [colorways]);

      useEffect(() => {
        if (!ADMIN_MODE) return;
        const handler = (e) => {
          if (e.key !== "Escape") return;
          if (showForm)      { setShowForm(false); setEditId(null); setNewShoe({name:"",shortName:"",category:"Jordan",quantity:1,wishlist:false}); setEditColorways([]); setNewColorway(""); }
          if (quickLog)      { setQuickLog(false); }
          if (loggingId)     { setLoggingId(null); }
          if (editingMeta)   { setEditingMeta(null); }
          if (editingCell)   { setEditingCell(null); }
          if (importMsg)     { setImportMsg(null); }
        };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, [showForm, loggingId, editingMeta, editingCell, importMsg]);

      // Loading / error screens (public only)
      if (!ADMIN_MODE && publicLoading) return (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", flexDirection:"column", gap:"16px" }}>
          <div style={{ fontSize:"11px", letterSpacing:"4px", color:"#e63946" }}>LOADING THE VAULT...</div>
        </div>
      );
      if (!ADMIN_MODE && publicError) return (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", flexDirection:"column", gap:"16px" }}>
          <div style={{ fontSize:"11px", letterSpacing:"4px", color:"#e63946" }}>VAULT UNAVAILABLE</div>
          <div style={{ fontSize:"10px", color:"#aaa" }}>{publicError}</div>
        </div>
      );

      const owned    = inventory.filter(s => !s.wishlist);
      const wishlist = inventory.filter(s => s.wishlist);
      const total    = owned.reduce((n, s) => n + s.quantity, 0);
      const filledCells = displayLayout.flat().filter(c => c.code && c.code !== "").length;
      const empty    = 40 - filledCells;

      // Build a flat list of { shoe, colorway, lastWorn } for every owned colorway
      const allColorwayEntries = owned.flatMap(shoe => {
        const shoeColorways = colorways[shoe.shortName] || [];
        return shoeColorways
          .filter(cw => !beaterMeta[`${shoe.id}_${cw}`])
          .map(cw => {
            const entries = (wearLog[shoe.id] || []).filter(e => e.colorway === cw);
            const lastWorn = entries.length ? [...entries].sort((a,b) => a.date < b.date ? 1 : -1)[0].date : null;
            return { shoe, colorway: cw, lastWorn };
          });
      });

      const longestUnwornEntry = allColorwayEntries.reduce((pick, entry) => {
        if (!pick) return entry;
        if (!pick.lastWorn && !entry.lastWorn) return pick;
        if (!entry.lastWorn) return entry;
        if (!pick.lastWorn) return pick;
        return entry.lastWorn < pick.lastWorn ? entry : pick;
      }, null);

      const longestUnworn = longestUnwornEntry?.shoe || null;
      const longestUnwornColorway = longestUnwornEntry?.colorway || null;
      const longestUnwornLastDate = longestUnwornEntry?.lastWorn || null;

      // Most recently worn
      const mostRecentEntry = allColorwayEntries
        .filter(e => e.lastWorn)
        .reduce((pick, entry) => {
          if (!pick) return entry;
          return entry.lastWorn > pick.lastWorn ? entry : pick;
        }, null);
      const lastWornShoe = mostRecentEntry?.shoe || null;
      const lastWornColorway = mostRecentEntry?.colorway || null;
      const lastWornDate = mostRecentEntry?.lastWorn || null;

      // Anniversary computation — find colorways purchased on today's month/day in past years
      const todayStr = localDateStr(); // YYYY-MM-DD
      const todayMD = todayStr.slice(5); // MM-DD
      const anniversaries = [];
      Object.entries(colorwayMeta).forEach(([key, meta]) => {
        if (!meta.purchaseDate) return;
        const pd = meta.purchaseDate;
        if (pd.slice(5) !== todayMD) return;
        const purchaseYear = parseInt(pd.slice(0, 4));
        const todayYear = parseInt(todayStr.slice(0, 4));
        const years = todayYear - purchaseYear;
        if (years <= 0) return;
        // Find shoe name from key (shoeId_colorway)
        const underIdx = key.indexOf("_");
        const shoeId = parseInt(key.slice(0, underIdx));
        const colorway = key.slice(underIdx + 1);
        const shoe = inventory.find(s => s.id === shoeId);
        if (!shoe) return;
        anniversaries.push({ shoe, colorway, years });
      });

      // Sale alerts — wishlist colorways with a sale within the next 24 hours
      const nowMs = Date.now();
      const saleAlerts = [];
      const saleGlowKeys = new Set(); // colorway keys with sale within 7 days
      wishlist.forEach(shoe => {
        const shoeColorways = colorways[shoe.shortName] || [];
        shoeColorways.forEach(cw => {
          const meta = colorwayMeta[`${shoe.id}_${cw}`] || {};
          if (!meta.saleDate) return;
          const saleDateTime = new Date(`${meta.saleDate}T${meta.saleTime || "00:00"}`).getTime();
          const hoursUntil = (saleDateTime - nowMs) / (1000 * 60 * 60);
          if (hoursUntil >= 0 && hoursUntil <= 168) { // 7 days
            saleGlowKeys.add(`${shoe.id}_${cw}`);
          }
          if (hoursUntil >= 0 && hoursUntil <= 24) {
            const img = images[`${shoe.id}_${cw}`] || null;
            saleAlerts.push({ shoe, colorway: cw, saleDateTime, hoursUntil, img });
          }
        });
      });
      const wishlistHasSale = saleGlowKeys.size > 0;

      const openLogForm = (shoe) => {
        setLoggingId(shoe.id);
        setWearDate(localDateStr());
        const cw = colorways[shoe.shortName];
        setWearColorway(cw ? cw[0] : "");
      };

      const logWear = () => {
        if (!wearColorway || wearColorway === "__custom") return;
        const entry = { date: wearDate, colorway: wearColorway };
        setWearLog(log => ({ ...log, [loggingId]: [...(log[loggingId] || []), entry] }));
        setLoggingId(null);
      };

      const handleSaveColorways = (shortName) => {
        setColorways(cws => ({ ...cws, [shortName]: editColorways }));
      };

      const handleImageUpload = (shoeId, colorway, file, kind = "main") => {
        const key = `${shoeId}_${colorway}`;
        const storageKey = kind === "hover" ? `${key}_hover` : key;
        const arrayBuffer = file.arrayBuffer().then(buffer => {
          fetch(`/upload?key=${encodeURIComponent(key)}&type=${kind}`, {
            method: "POST",
            headers: { "Content-Type": file.type || "image/png" },
            body: buffer,
          })
          .then(r => r.json())
          .then(data => {
            if (data.path) {
              setImages(imgs => ({ ...imgs, [storageKey]: data.path }));
            }
          })
          .catch(() => {
            // Fallback to base64 if server not available
            const reader = new FileReader();
            reader.onload = (e) => setImages(imgs => ({ ...imgs, [storageKey]: e.target.result }));
            reader.readAsDataURL(file);
          });
        });
      };

      const handleAdd = () => {
        if (!newShoe.name || !newShoe.shortName) return;
        if (editId !== null) {
          setInventory(inv => inv.map(s => s.id === editId ? { ...s, ...newShoe } : s));
          setEditId(null);
        } else {
          setInventory(inv => [...inv, { ...newShoe, id: Date.now() }]);
        }
        handleSaveColorways(newShoe.shortName);
        setNewShoe({ name:"", shortName:"", category:"Jordan", quantity:1, wishlist:false });
        setEditColorways([]);
        setNewColorway("");
        setShowForm(false);
      };

      const reorderShoe = (id, dir) => {
        setInventory(inv => {
          const idx = inv.findIndex(s => s.id === id);
          const newIdx = idx + dir;
          if (newIdx < 0 || newIdx >= inv.length) return inv;
          const n = [...inv];
          [n[idx], n[newIdx]] = [n[newIdx], n[idx]];
          return n;
        });
      };

      const handleEdit = (shoe) => {
        setNewShoe({ name:shoe.name, shortName:shoe.shortName, category:shoe.category, quantity:shoe.quantity, wishlist:shoe.wishlist });
        setEditColorways([...(colorways[shoe.shortName] || [])]);
        setNewColorway("");
        setEditId(shoe.id);
        setShowForm(true);
      };

      const handleDeleteColorway = (shoe, cw) => {
        const hasWear = (wearLog[shoe.id] || []).some(e => e.colorway === cw);
        const hasImage = !!images[`${shoe.id}_${cw}`];
        const hasMeta = !!colorwayMeta[`${shoe.id}_${cw}`];
        if (hasWear || hasImage || hasMeta) {
          const msg = [hasWear && "wear history", hasImage && "an image", hasMeta && "details"].filter(Boolean).join(", ");
          if (!window.confirm(`"${cw}" has ${msg} attached. Deleting it will remove all of that data. Are you sure?`)) return;
          if (hasWear) setWearLog(log => ({ ...log, [shoe.id]: (log[shoe.id] || []).filter(e => e.colorway !== cw) }));
          if (hasImage) setImages(imgs => { const n = {...imgs}; delete n[`${shoe.id}_${cw}`]; return n; });
          if (hasMeta) setColorwayMeta(m => { const n = {...m}; delete n[`${shoe.id}_${cw}`]; return n; });
        }
        setEditColorways(cws => cws.filter(c => c !== cw));
      };

      const exportJSON = () => {
        const data = { inventory, wearLog, images, colorwayMeta, grailMeta, beaterMeta, glowMeta, graveyardMeta, colorways, displayLayout, exportedAt: new Date().toISOString() };
        const json = JSON.stringify(data, null, 2);
        if (ADMIN_MODE) {
          // Save via server — backs up old vault-data.json, writes new one
          fetch("/backup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: json,
          })
          .then(r => r.json())
          .then(result => {
            if (result.success) {
              setImportMsg({ type:"success", text: result.message || "Backup saved!" });
            } else {
              setImportMsg({ type:"error", text: result.error || "Backup failed." });
            }
            setTimeout(() => setImportMsg(null), 4000);
          })
          .catch(() => {
            // Fallback to browser download if server unavailable
            const blob = new Blob([json], { type:"application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = `sneaker-vault-backup-${localDateStr()}.json`;
            a.click(); URL.revokeObjectURL(url);
          });
        } else {
          const blob = new Blob([json], { type:"application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url; a.download = `sneaker-vault-backup-${localDateStr()}.json`;
          a.click(); URL.revokeObjectURL(url);
        }
      };

      const importJSON = (file) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            if (data.inventory)     { setInventory(data.inventory);         save("vault_inventory",       data.inventory); }
            if (data.wearLog)       { setWearLog(data.wearLog);             save("vault_wearlog_v3",      data.wearLog); }
            if (data.images)        { setImages(data.images);               save("vault_images",          data.images); }
            if (data.colorwayMeta)  { setColorwayMeta(data.colorwayMeta);   save("vault_colorway_meta",   data.colorwayMeta); }
            if (data.grailMeta)     { setGrailMeta(data.grailMeta);         save("vault_grail_meta",      data.grailMeta); }
            if (data.beaterMeta)    { setBeaterMeta(data.beaterMeta);       save("vault_beater_meta",     data.beaterMeta); }
            if (data.glowMeta)      { setGlowMeta(data.glowMeta);           save("vault_glow_meta",       data.glowMeta); }
            if (data.graveyardMeta) { setGraveyardMeta(data.graveyardMeta); save("vault_graveyard_meta",  data.graveyardMeta); }
            if (data.colorways)     { setColorways(data.colorways);         save("vault_colorways",       data.colorways); }
            if (data.displayLayout) { setDisplayLayout(data.displayLayout); save("vault_display_layout",  data.displayLayout); }
            setImportMsg({ type:"success", text:"Backup restored successfully!" });
          } catch {
            setImportMsg({ type:"error", text:"Invalid backup file. Please use a Vault JSON backup." });
          }
          setTimeout(() => setImportMsg(null), 4000);
        };
        reader.readAsText(file);
      };

      const getCellStyle = (cell) => {
        if (!cell.code || cell.code === "") return { empty: true };
        if (cell.code === "--") return { empty: true };
        const col = CAT_COLORS[inventory.find(s => s.shortName === cell.code)?.category] || CAT_COLORS.Jordan;
        return { bg: col.bg, accent: col.accent, label: cell.code, colorway: cell.colorway };
      };

      const IS = { background: T.inputBg, border:`1px solid ${T.inputBorder}`, color: T.inputText, padding:"8px", fontFamily:"'Aptos','Segoe UI',sans-serif", fontSize:"13px", width:"100%" };

                  const match = entry.shoe.match(/(\d+)/);

                return 9999;
              };

              const sorted = [...allEntries].sort((a, b) => {
                let av, bv;
                if (sortCol === "shoe") {
                  av = getShoeSortKey(a);
                  bv = getShoeSortKey(b);
                  if (av !== bv) return sortDir === "asc" ? av - bv : bv - av;
                  av = a.shoe; bv = b.shoe;
                } else {
                  av = a[sortCol] || ""; bv = b[sortCol] || "";
                }
                if (av < bv) return sortDir === "asc" ? -1 : 1;
                if (av > bv) return sortDir === "asc" ? 1 : -1;
                return 0;
              });

              const handleSort = (col) => {
                if (sortCol === col) setSortDir(d => d === "asc" ? "desc" : "asc");
                else { setSortCol(col); setSortDir("asc"); }
              };

              const exportCSV = () => {
                const header = "Date,Shoe,Colorway,Category";
                const rows = sorted.map(e => `${e.date},"${e.shoe}","${e.colorway}",${e.category}`);
                const csv = [header, ...rows].join("\n");
                const blob = new Blob([csv], { type:"text/csv" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url; a.download = "sneaker-wear-history.csv";
                a.click(); URL.revokeObjectURL(url);
              };

              const colStyle = (col) => ({
                padding:"10px 16px", fontSize:"10px", letterSpacing:"3px", color: sortCol===col ? "#e63946" : T.text,
                cursor:"pointer", userSelect:"none", textAlign:"left", background:"transparent",
                border:"none", fontFamily:"'Aptos','Segoe UI',sans-serif", borderBottom: sortCol===col ? "2px solid #e63946" : "2px solid transparent",

                <div onClick={e => e.stopPropagation()} style={{

                        setQuickLog(false);
                      }} style={{ background:"#e63946", color:"#fff", border:"none", padding:"10px 20px", cursor:"pointer", fontSize:"10px", letterSpacing:"2px", fontFamily:"'Aptos','Segoe UI',sans-serif", flex:1 }}>CONFIRM</button>
                      <button onClick={() => setQuickLog(false)} style={{ background:"transparent", border:`1px solid ${T.border}`, color: T.text4, padding:"10px 20px", cursor:"pointer", fontSize:"10px", letterSpacing:"2px", fontFamily:"'Aptos','Segoe UI',sans-serif" }}>CANCEL</button>
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}</>}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
