<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Vault — VR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #status {
      position: fixed; top: 16px; left: 16px; right: 16px;
      font-size: 13px; line-height: 1.6; color: #aaa;
      pointer-events: none; user-select: none;
      white-space: pre-line; max-height: 50vh; overflow: hidden;
    }
    #status .err { color: #ff6b6b; }
    #status .ok  { color: #6bff8e; }
    #status .dim { color: #666; }
    #back-link {
      position: fixed; bottom: 16px; left: 20px;
      font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
      color: rgba(255,255,255,0.35); text-decoration: none;
      transition: opacity 0.3s; z-index: 10;
    }
    #back-link:hover { opacity: 0.8; }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three":         "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="status">The Vault — VR
Loading…</div>
  <a id="back-link" href="../">Back to The Vault</a>

  <script type="module">
    import * as THREE from "three";
    import { VRButton } from "three/addons/webxr/VRButton.js";
    import { PointerLockControls } from "three/addons/controls/PointerLockControls.js";

    // ════════════════════════════════════════════════════════════════════
    //  TEST MODE — ?test in the URL enables desktop preview with
    //  WASD + mouse look (FPS-style) and click-to-interact, skipping
    //  WebXR entirely. Same scene, same interactions.
    // ════════════════════════════════════════════════════════════════════
    const TEST_MODE = new URLSearchParams(window.location.search).has("test");

    // ════════════════════════════════════════════════════════════════════
    //  SETUP & STATUS LOGGING
    // ════════════════════════════════════════════════════════════════════
    const statusEl = document.getElementById("status");
    const log = (msg, cls = "") => {
      const line = cls ? `<span class="${cls}">${msg}</span>` : msg;
      statusEl.innerHTML += "\n" + line;
      console.log("[VR]", msg);
    };
    const fail = (msg) => { log(msg, "err"); throw new Error(msg); };

    // ════════════════════════════════════════════════════════════════════
    //  DATA LOAD
    // ════════════════════════════════════════════════════════════════════
    let data;
    try {
      const resp = await fetch("../public-data.json", { cache: "no-store" });
      if (!resp.ok) fail(`public-data.json fetch returned ${resp.status}`);
      data = await resp.json();
      log("Loaded public-data.json", "ok");
    } catch (e) {
      fail(`Could not load public-data.json: ${e.message}`);
    }

    const inventory      = data.inventory || [];
    const colorwayMeta   = data.colorwayMeta || {};
    const tierMeta       = data.tierMeta || {};
    const images         = data.images || {};
    const displayLayout  = data.displayLayout || [];
    const dreamLayout    = data.dreamLayout || [];
    const colorwayOwned  = data.colorwayOwned || {};

    if (displayLayout.length === 0) fail("displayLayout is empty in public-data.json");

    // shortName → shoe lookup (layout cells reference shoes by code/shortName)
    const shoeByShortName = {};
    for (const shoe of inventory) shoeByShortName[shoe.shortName] = shoe;

    // Ownership set: a colorway is "owned" if it appears as a filled cell
    // anywhere in displayLayout. Used by the dream wall to decide which
    // entries pulse (the unowned ones, signalling "still on the wishlist").
    const ownedKeys = new Set();
    for (const row of displayLayout) {
      for (const cell of row || []) {
        if (!cell?.code || !cell?.colorway) continue;
        const shoe = shoeByShortName[cell.code];
        if (shoe) ownedKeys.add(`${shoe.id}_${cell.colorway}`);
      }
    }

    // ════════════════════════════════════════════════════════════════════
    //  BANNER DATA — "LAST WORN" + "UP NEXT" (precomputed by build.py)
    // ════════════════════════════════════════════════════════════════════
    // build.py computes these once using the same logic as the main site
    // and writes them into public-data.json. The VR scene just reads the
    // result and wires it into the championship banners.

    const formatMMDDYYYY = (iso) => {
      const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso || "");
      if (!m) return iso || "";
      return `${m[2]}/${m[3]}/${m[1]}`;
    };

    const bannerEntry = (precomp, label) => {
      if (!precomp) return null;
      const imagePath = images[precomp.key];
      if (!imagePath) return null;
      return {
        key: precomp.key, label,
        dateStr: precomp.date ? formatMMDDYYYY(precomp.date) : "Never worn",
        shoeName: precomp.shoeName,
        colorway: precomp.colorway,
        imagePath: "../" + imagePath,
      };
    };

    const lastWornEntry = bannerEntry(data.precomputedLastWorn, "LAST WORN");
    const upNextEntry   = bannerEntry(data.precomputedUpNext,   "UP NEXT");

    if (lastWornEntry) log(`Last worn: ${lastWornEntry.shoeName} — ${lastWornEntry.colorway}`, "ok");
    if (upNextEntry)   log(`Up next:   ${upNextEntry.shoeName} — ${upNextEntry.colorway}`, "ok");

    // ════════════════════════════════════════════════════════════════════
    //  WHICH CELLS GO IN EACH WALL
    // ════════════════════════════════════════════════════════════════════
    // Each layout is an 8×5 grid where each cell is either:
    //   { code: "AJ1", colorway: "Royal Reimagined" }   — filled
    //   { code: "", colorway: "" } or {}                — empty
    // buildCells() flattens a layout into a list of cell records: filled
    // cells carry their entry data, empty cells are just position markers.
    const ROWS = displayLayout.length;
    const COLS = Math.max(...displayLayout.map((r) => r.length));

    const buildCells = (layout, label) => {
      const out = [];
      let filled = 0, empty = 0;
      for (let r = 0; r < ROWS; r++) {
        const row = layout[r] || [];
        for (let c = 0; c < COLS; c++) {
          const raw = row[c] || {};
          const code = raw.code;
          const cw   = raw.colorway;
          if (!code || !cw) {
            out.push({ row: r, col: c, empty: true });
            empty++;
            continue;
          }
          const shoe = shoeByShortName[code];
          if (!shoe) {
            log(`${label}: skipping [${r},${c}] — unknown code "${code}"`, "dim");
            out.push({ row: r, col: c, empty: true });
            empty++;
            continue;
          }
          const key = `${shoe.id}_${cw}`;
          const imagePath = images[key];
          if (!imagePath) {
            log(`${label}: skipping [${r},${c}] — no image for ${key}`, "dim");
            out.push({ row: r, col: c, empty: true });
            empty++;
            continue;
          }
          // Image 2 (_hover) is shown when a case is pulled forward; image 3
          // (_hover2) is the resting image on the wall. Fall back down the
          // chain (img3→img2→base, img2→base) so a missing variant can never
          // leave a case without a texture.
          const rawHover  = images[`${key}_hover`];
          const rawHover2 = images[`${key}_hover2`];
          const hoverPath  = "../" + (rawHover  || imagePath);
          const hover2Path = "../" + (rawHover2 || rawHover || imagePath);
          out.push({
            row: r, col: c, empty: false,
            entry: {
              key,
              shoeId: shoe.id,
              shoeName: shoe.name,
              shortName: shoe.shortName,
              colorway: cw,
              tier: tierMeta[key] || "silver",
              imagePath: "../" + imagePath,
              hoverPath,
              hover2Path,
              story: colorwayMeta[key]?.story || "",
              notes: colorwayMeta[key]?.notes || "",
              owned: ownedKeys.has(key),
            },
          });
          filled++;
        }
      }
      log(`${label}: ${filled} filled, ${empty} empty`, "ok");
      return out;
    };

    const displayCells = buildCells(displayLayout, "Office Display");
    const dreamCells   = dreamLayout.length > 0
      ? buildCells(dreamLayout, "Dream Display")
      : [];

    // ════════════════════════════════════════════════════════════════════
    //  SCENE
    // ════════════════════════════════════════════════════════════════════
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    // ════════════════════════════════════════════════════════════════════
    //  FLOOR — regulation NBA half-court hardwood
    // ════════════════════════════════════════════════════════════════════
    // Procedural CanvasTexture: light-maple planks running down-court with the
    // NBA half-court markings drawn at true scale (in metres, mapped onto the
    // 18 m floor). The basket end is toward −Z (canvas top after the −90° X
    // rotation); the baseline sits at z = −7, the half-court line at z ≈ +7.3.
    // Picks up the ambient + directional rig for a soft polished-gym sheen.
    const FLOOR_SIZE = 18; // metres square; floor reaches the gym walls (±9)
    const makeCourtTexture = () => {
      const C  = 2048;
      const cv = document.createElement("canvas");
      cv.width = cv.height = C;
      const g = cv.getContext("2d");

      // metres → canvas helpers (floor spans ±9 m → 0..C)
      const px = (m)  => (m / FLOOR_SIZE) * C;
      const fx = (xw) => ((xw + FLOOR_SIZE / 2) / FLOOR_SIZE) * C;
      const fy = (zw) => ((zw + FLOOR_SIZE / 2) / FLOOR_SIZE) * C;

      // — Hardwood planks: vertical bands (run down-court along Z) —
      const plankW = C / 90;
      for (let x = 0; x < C; x += plankW) {
        const v  = 0.92 + Math.random() * 0.16;            // per-plank lightness
        const rr = Math.round(196 * v), gg = Math.round(150 * v), bb = Math.round(96 * v);
        g.fillStyle = `rgb(${rr},${gg},${bb})`;
        g.fillRect(x, 0, plankW + 1, C);
        g.fillStyle = "rgba(90,55,25,0.35)";               // seam between planks
        g.fillRect(x, 0, 1.5, C);
        g.strokeStyle = "rgba(110,70,35,0.10)";            // faint grain streaks
        g.lineWidth = 1;
        for (let s = 0; s < 3; s++) {
          const gx = x + 3 + Math.random() * (plankW - 6);
          g.beginPath();
          g.moveTo(gx, 0);
          g.bezierCurveTo(gx + 6, C * 0.33, gx - 6, C * 0.66, gx, C);
          g.stroke();
        }
      }

      // — Court markings (white), NBA dimensions in metres —
      const SIDE = 7.62, BASE_Z = -7.0, HALF_Z = 7.33, LANE_HALF = 2.44,
            FT_Z = -1.21, CIRC_R = 1.83, BASKET_Z = -5.40,
            TP_R = 7.24, TP_X = 6.71, TP_END_Z = -2.68;
      g.strokeStyle = "#f2efe9";
      g.lineWidth   = px(0.06);
      g.lineCap     = "round";
      g.lineJoin    = "round";

      // court rectangle (sidelines + baseline + half-court line)
      g.strokeRect(fx(-SIDE), fy(BASE_Z), fx(SIDE) - fx(-SIDE), fy(HALF_Z) - fy(BASE_Z));

      // the lane / paint, with a faint vault-red wash
      g.fillStyle = "rgba(230,57,70,0.18)";
      g.fillRect(fx(-LANE_HALF), fy(BASE_Z), fx(LANE_HALF) - fx(-LANE_HALF), fy(FT_Z) - fy(BASE_Z));
      g.strokeRect(fx(-LANE_HALF), fy(BASE_Z), fx(LANE_HALF) - fx(-LANE_HALF), fy(FT_Z) - fy(BASE_Z));

      // free-throw circle
      g.beginPath(); g.arc(fx(0), fy(FT_Z), px(CIRC_R), 0, Math.PI * 2); g.stroke();

      // three-point line: corner straights + arc centred on the basket
      g.beginPath();
      g.moveTo(fx(-TP_X), fy(BASE_Z)); g.lineTo(fx(-TP_X), fy(TP_END_Z));
      g.moveTo(fx(TP_X),  fy(BASE_Z)); g.lineTo(fx(TP_X),  fy(TP_END_Z));
      g.stroke();
      const bcx = fx(0), bcy = fy(BASKET_Z);
      const theta = Math.atan2(fy(TP_END_Z) - bcy, fx(TP_X) - bcx);
      g.beginPath(); g.arc(bcx, bcy, px(TP_R), theta, Math.PI - theta); g.stroke();

      // centre circle — only the half that falls inside the half court
      g.beginPath(); g.arc(fx(0), fy(HALF_Z), px(CIRC_R), Math.PI, Math.PI * 2); g.stroke();

      const tex = new THREE.CanvasTexture(cv);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = 8; // crisp lines at glancing angles; driver clamps to its max
      return tex;
    };

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(FLOOR_SIZE, FLOOR_SIZE),
      new THREE.MeshStandardMaterial({ map: makeCourtTexture(), roughness: 0.5, metalness: 0.0 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.002; // a hair below 0 to avoid z-fighting with anything resting on the floor
    scene.add(floor);

    // Lights — drive the polished sheen on the court floor, and ready for any
    // other lit elements we add later (display case backing, frame moldings).
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const keyLight = new THREE.DirectionalLight(0xffffff, 0.6);
    keyLight.position.set(0, 4, 2);
    scene.add(keyLight);

    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 100);
    camera.position.set(0, 1.6, 0); // standing eye height (desktop test mode; ignored in XR)

    // Locomotion rig: the camera (and, in VR, the controllers) live inside this
    // group. Thumbstick movement/turning moves the player group, which offsets
    // the XR head pose — so real headset floor-relative height tracking still
    // works on top of wherever you've roamed to.
    const player = new THREE.Group();
    player.add(camera);
    scene.add(player);

    // ════════════════════════════════════════════════════════════════════
    //  GEOMETRY CONSTANTS
    // ════════════════════════════════════════════════════════════════════
    // Wall: 8 rows × 5 cols of real-scale shoeboxes. Box dimensions:
    //   34cm wide × 22.225cm tall × 14cm deep (side-out orientation —
    //   the long side faces the user so the sneaker photo fits naturally).
    // 8 3/4" tall is the real shoebox dimension provided by the owner.
    // 1cm gaps between boxes (thin shelf-line look, not airy spacing).
    // Bottom row sits 0.5m off the floor (knee-height shelf), top row at
    // ~2.35m — comfortable look-up/down range at 2.5m viewing distance.
    const BOX_W      = 0.34;
    const BOX_H      = 0.22225;     // 8 3/4 inches exactly
    const BOX_D      = 0.14;
    const INNER_W    = BOX_W * 0.9; // photo plane fits inside the box face
    const INNER_H    = BOX_H * 0.9;
    const GAP_X      = 0.01;
    const GAP_Y      = 0.01;
    const PITCH_X    = BOX_W + GAP_X;
    const PITCH_Y    = BOX_H + GAP_Y;
    const CASE_Z     = -7.0;         // both cases sit on the −Z baseline (basket end)
    const CASE_X     = 3.4;          // lateral offset: office at −CASE_X, dream at +CASE_X, hoop centred between
    const BOTTOM_Y   = BOX_H / 2;    // lowest row rests on the floor (centre = half-height up)
    const TOP_Y      = BOTTOM_Y + (ROWS - 1) * PITCH_Y;
    const LEFT_X     = -((COLS - 1) / 2) * PITCH_X;

    // Pedestal: a stage centred under the hoop on the baseline, where a clicked
    // office-wall shoe flies out of its case to be shown beneath the basket.
    const PED_X       = 0;           // centred under the rim
    const PED_Z       = -7.0;        // back on the baseline, under the backboard
    const PED_COL_H   = 1.05;        // column height (floor up)
    const PED_CAP_TOP = PED_COL_H + 0.04;  // top surface of the cap (shoes sit here)
    const PED_SIT_SINK = 0.02;       // tuck the shoe's base slightly into the cap so it reads as resting
    const PED_FIT_W   = 0.55;        // hero shoe fit box on the pedestal
    const PED_FIT_H   = 0.45;
    const STAGE_START_SCALE = 0.5;   // stage shoe starts ~cell-sized at the source

    const cellPosition = (row, col) => {
      // Returns local coordinates inside a wallGroup, which carries the
      // wall's CASE_Z (and lateral xOffset) itself. z=0 here means "on the
      // wall plane"; adding the offset here too would double the distance.
      // displayLayout row 0 is the top shelf; +Y is up, so invert.
      const x = LEFT_X + col * PITCH_X;
      const y = TOP_Y - row * PITCH_Y;
      return new THREE.Vector3(x, y, 0);
    };

    // ════════════════════════════════════════════════════════════════════
    //  TEXTURE LOADER
    // ════════════════════════════════════════════════════════════════════
    const loader = new THREE.TextureLoader();
    loader.setCrossOrigin("anonymous");
    let texturesLoaded = 0;
    const texturesTotal =
      displayCells.filter((c) => !c.empty).length +
      dreamCells.filter((c) => !c.empty).length +
      (lastWornEntry ? 1 : 0) +
      (upNextEntry ? 1 : 0);

    const loadTextureFor = (path, plane, onSized) => {
      loader.load(
        path,
        (texture) => {
          texture.colorSpace = THREE.SRGBColorSpace;
          texture.anisotropy = 8;
          plane.material.map = texture;
          plane.material.color.set(0xffffff);
          plane.material.needsUpdate = true;
          const aspect = texture.image.width / texture.image.height;
          if (onSized) onSized(aspect);
          texturesLoaded++;
          if (texturesLoaded === texturesTotal) {
            log(`All ${texturesTotal} textures loaded`, "ok");
          }
        },
        undefined,
        (err) => {
          log(`Failed to load ${path}: ${err?.message || err}`, "err");
          texturesLoaded++;
        }
      );
    };

    // Resize a photo plane to fit (w × h) while preserving the texture's
    // aspect ratio (letterbox fit). Shared by the initial load and by the
    // image swap on pull-forward so sizing has one source of truth.
    const fitPlaneToBox = (plane, aspect, w, h) => {
      plane.geometry.dispose();
      const boxAspect = w / h;
      let pw, ph;
      if (aspect >= boxAspect) { pw = w; ph = w / aspect; }
      else                     { ph = h; pw = h * aspect; }
      plane.geometry = new THREE.PlaneGeometry(pw, ph);
    };

    // ════════════════════════════════════════════════════════════════════
    //  CELLS — 3D transparent shoeboxes with photos on the back wall
    // ════════════════════════════════════════════════════════════════════
    // Each cell — filled or empty — gets a real 3D box on the wall.
    // Filled cells additionally contain a photo plane centred inside the
    // box. Empty cells are visually identical empty boxes — "this shelf
    // slot is here but has nothing in it." The whole per-cell Group is
    // what gets translated/scaled/rotated during pull-forward, so the box
    // and its photo move as one object.
    const allCases = [];

    // Shared geometries and materials — every box uses these.
    // Shared materials too: every filled box gets the same shell material
    // (clear plastic), every empty cell the same wireframe.
    const sharedBoxGeometry = new THREE.BoxGeometry(BOX_W, BOX_H, BOX_D);
    // Clear-plastic look: very low opacity gives the "barely there"
    // visibility of a transparent shoebox. MeshBasicMaterial keeps it
    // simple and fast on Quest — MeshPhysicalMaterial with transmission
    // would be more photorealistic but heavier and prone to artifacts.
    // The faint white tint with low opacity reads as glassy edges.
    const sharedShellMaterial = new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.1,
      side: THREE.DoubleSide,
      depthWrite: false,    // don't occlude the photo behind during transparent sort
    });

    // Also draw visible edges on each box so the shell reads as a real
    // object even when its faces are nearly invisible. Edges are a separate
    // LineSegments overlay using the same geometry's edge map.
    const sharedEdgesGeometry = new THREE.EdgesGeometry(sharedBoxGeometry);
    const sharedEdgesMaterial = new THREE.LineBasicMaterial({
      color: 0x888888,
      transparent: true,
      opacity: 0.6,
    });

    // makeTitlePanel: a placard that floats above a case — a dark rounded
    // plaque with a vault-red border and white lettering, so the OFFICE /
    // DREAM labels read clearly against the off-white walls from across court.
    // 2048×512 canvas → 2.0m × 0.5m plane.
    const makeTitlePanel = (text) => {
      const W = 2048, H = 512;
      const canvas = document.createElement("canvas");
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, W, H);

      // rounded plaque: dark fill + vault-red border, inset from the edges
      const m = 28, rad = 56;
      ctx.beginPath();
      ctx.moveTo(m + rad, m);
      ctx.arcTo(W - m, m, W - m, H - m, rad);
      ctx.arcTo(W - m, H - m, m, H - m, rad);
      ctx.arcTo(m, H - m, m, m, rad);
      ctx.arcTo(m, m, W - m, m, rad);
      ctx.closePath();
      ctx.fillStyle = "#0f0f0f"; ctx.fill();
      ctx.lineWidth = 16; ctx.strokeStyle = "#e63946"; ctx.stroke();

      // white letterspaced lettering
      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 200px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.textBaseline = "middle";
      ctx.textAlign = "center";
      const spacing = 24; // px between letters
      const chars = text.split("");
      let totalW = 0;
      for (const ch of chars) totalW += ctx.measureText(ch).width + spacing;
      totalW -= spacing;
      let x = (W - totalW) / 2;
      for (const ch of chars) {
        const charW = ctx.measureText(ch).width;
        ctx.fillText(ch, x + charW / 2, H / 2);
        x += charW + spacing;
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      const material = new THREE.MeshBasicMaterial({
        map: texture, transparent: true, side: THREE.DoubleSide,
      });
      const panelH = 0.5;
      const panelW = panelH * (W / H);
      return new THREE.Mesh(new THREE.PlaneGeometry(panelW, panelH), material);
    };

    // Build a wall from a cells array. wallZ positions the wall in world
    // space. If rotateY180 is true, the wall is flipped 180° around the
    // vertical axis so the box fronts face the opposite direction —
    // used for the dream wall, which sits behind the user. Note: this
    // means column 0 of the data ends up on the user's right when they
    // turn around to face the dream wall (a side-effect of the rotation).
    //
    // Each wall has its own world-space view position for pull-forward:
    // a point 1.5m in front of the user when they're facing this wall,
    // half a metre to the user's left so the story panel fits on the right.
    // (For the dream wall, "user's left" is mirrored vs the display wall
    // because the user has turned around.)
    const buildWall = (cellArr, wallZ, rotateY180, title, usePedestal, xOffset = 0) => {
      const wallGroup = new THREE.Group();
      wallGroup.position.set(xOffset, 0, wallZ);
      if (rotateY180) wallGroup.rotation.y = Math.PI;
      scene.add(wallGroup);

      // World-space view position for pulling cases off this wall. Both walls
      // now stand on the −Z baseline (office left, dream right) facing the
      // user, so a pulled case lifts toward the user (+Z) and drifts halfway
      // in toward centre from the wall's lateral offset.
      const wallToUserSign = wallZ < 0 ? 1 : -1;
      const viewPosWorld = new THREE.Vector3(
        xOffset * 0.5,
        1.6,
        wallZ + wallToUserSign * 1.6
      );

      // Title panel — floats above the wall, faces the same direction as
      // the box fronts. Because it lives inside wallGroup, the dream wall's
      // 180° rotation carries it along automatically.
      if (title) {
        const titlePanel = makeTitlePanel(title);
        // Plaque floats just above the top of the grid, facing the user.
        titlePanel.position.set(0, TOP_Y + BOX_H + 0.4, 0);
        wallGroup.add(titlePanel);
      }

      for (const cell of cellArr) {
        const pos = cellPosition(cell.row, cell.col); // local coords, z=0

        // Every cell — filled or empty — gets a real box. Empty boxes have
        // no photo inside, but the shell + edges are identical to filled
        // ones. This makes the wall read as a complete shelf, with the
        // gaps being "an empty shoebox," not "missing data."
        const group = new THREE.Group();
        group.position.copy(pos);
        wallGroup.add(group);

        const shell = new THREE.Mesh(sharedBoxGeometry, sharedShellMaterial);
        group.add(shell);

        const edges = new THREE.LineSegments(sharedEdgesGeometry, sharedEdgesMaterial);
        group.add(edges);

        if (cell.empty) {
          // No photo, no caseRef — just a visible empty box. Done.
          continue;
        }

        // Filled cell: photo plane inside the box, centred (per the
        // owner's preference) rather than against the back wall.
        const photoGeometry = new THREE.PlaneGeometry(BOX_W * 0.9, BOX_H * 0.9);
        const photoMaterial = new THREE.MeshBasicMaterial({
          color: 0x222222,
          side: THREE.DoubleSide,
          transparent: true,
          alphaTest: 0.01,
        });
        const plane = new THREE.Mesh(photoGeometry, photoMaterial);
        plane.position.set(0, 0, 0); // centre of box
        group.add(plane);

        const caseRef = {
          entry: cell.entry, plane, group, shell,
          homePosition: pos.clone(),       // local to wallGroup
          homeRotation: group.rotation.clone(),
          viewPosWorld,                    // world-space target for this wall's pulls
          state: "home",
          stateStart: 0,
          // Pulse flag: only unowned entries on the dream wall pulse.
          // Owned entries (whether on display or dream wall) stay steady.
          pulse: !cell.entry.owned,
          // Image swap (option A): rest = image 3 on the wall, pop = image 2
          // when pulled forward. Textures cache on first use; see swapCaseImage.
          restPath: cell.entry.hover2Path,
          popPath:  cell.entry.hoverPath,
          restTexture: null, restAspect: null,
          popTexture: null,  popAspect: null,
          showing: "rest",
          // Cases send their shoe to the pedestal on click — both walls now,
          // dream included, rather than pulling the whole case forward.
          usePedestal: !!usePedestal,
        };
        shell.userData.caseRef = caseRef;
        allCases.push(caseRef);

        // Resting image on the wall is image 3 (_hover2). Cache its texture +
        // aspect on the case so returning from the popped image 2 is instant
        // (no reload).
        loadTextureFor(cell.entry.hover2Path, plane, (aspect) => {
          fitPlaneToBox(plane, aspect, INNER_W, INNER_H);
          caseRef.restTexture = plane.material.map;
          caseRef.restAspect  = aspect;
        });
      }
    };

    // Both cases now stand on the −Z baseline flanking the hoop: office to the
    // left, dream to the right, both facing the user. (Previously the dream
    // wall sat behind the user at +Z, rotated 180°.)
    buildWall(displayCells, CASE_Z, false, "OFFICE DISPLAY", true,  -CASE_X);
    if (dreamCells.length > 0) buildWall(dreamCells, CASE_Z, false, "DREAM DISPLAY", true, CASE_X);

    // ════════════════════════════════════════════════════════════════════
    //  HOOP — regulation dimensions, centred on the baseline
    // ════════════════════════════════════════════════════════════════════
    // Rim top at 3.05 m (10 ft), 0.46 m rim diameter, 1.83 × 1.07 m backboard
    // with the bottom edge at 2.90 m, mounted on a pole standing just behind
    // the baseline. The pedestal sits directly beneath, so a hero shoe is
    // displayed under the basket. Lit by the same ambient + directional rig
    // as the floor.
    {
      const RIM_Y       = 3.05;
      const RIM_R       = 0.2286;                 // 18" rim diameter
      const BOARD_W     = 1.83, BOARD_H = 1.07, BOARD_T = 0.04;
      const BOARD_Z     = -5.70;                  // ~1.3 m in front of the baseline (NBA overhang)
      const BOARD_Y     = 2.90 + BOARD_H / 2;     // bottom edge at 2.90 m
      const BOARD_FACE  = BOARD_Z + BOARD_T / 2;  // court-facing side (+Z)
      const RIM_Z       = BOARD_FACE + RIM_R + 0.05;
      const ORANGE      = 0xe8662a;
      const METAL       = 0x555555;

      // Backboard — frosted-glass panel with a bright edge frame.
      const board = new THREE.Mesh(
        new THREE.BoxGeometry(BOARD_W, BOARD_H, BOARD_T),
        new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.16, roughness: 0.1, metalness: 0.0 })
      );
      board.position.set(0, BOARD_Y, BOARD_Z);
      scene.add(board);
      const boardFrame = new THREE.LineSegments(
        new THREE.EdgesGeometry(new THREE.BoxGeometry(BOARD_W, BOARD_H, BOARD_T)),
        new THREE.LineBasicMaterial({ color: 0xf2efe9 })
      );
      boardFrame.position.copy(board.position);
      scene.add(boardFrame);

      // Shooter's square (24 × 18"), bottom edge at rim height, on the face.
      const sqW = 0.59, sqH = 0.45;
      const sqPts = [[-sqW/2,-sqH/2],[sqW/2,-sqH/2],[sqW/2,sqH/2],[-sqW/2,sqH/2],[-sqW/2,-sqH/2]]
        .map(([x,y]) => new THREE.Vector3(x, y, 0));
      const square = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(sqPts),
        new THREE.LineBasicMaterial({ color: ORANGE })
      );
      square.position.set(0, RIM_Y + sqH / 2, BOARD_FACE + 0.006);
      scene.add(square);

      // Rim — horizontal torus, with a short bracket back to the board.
      const rim = new THREE.Mesh(
        new THREE.TorusGeometry(RIM_R, 0.018, 12, 32),
        new THREE.MeshStandardMaterial({ color: ORANGE, roughness: 0.4, metalness: 0.2 })
      );
      rim.rotation.x = Math.PI / 2;
      rim.position.set(0, RIM_Y, RIM_Z);
      scene.add(rim);
      const bracket = new THREE.Mesh(
        new THREE.BoxGeometry(0.10, 0.025, (RIM_Z - RIM_R) - BOARD_FACE),
        new THREE.MeshStandardMaterial({ color: ORANGE, roughness: 0.4, metalness: 0.2 })
      );
      bracket.position.set(0, RIM_Y, (BOARD_FACE + (RIM_Z - RIM_R)) / 2);
      scene.add(bracket);

      // Net — stylized tapered open cylinder, semi-transparent white.
      const net = new THREE.Mesh(
        new THREE.CylinderGeometry(RIM_R * 0.95, RIM_R * 0.45, 0.45, 16, 1, true),
        new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.35, side: THREE.DoubleSide, roughness: 1.0 })
      );
      net.position.set(0, RIM_Y - 0.225, RIM_Z);
      scene.add(net);

      // Pole + arm — the standard, set behind the baseline on the wood margin.
      const POLE_Z   = -7.45;
      const poleTopY = BOARD_Y + BOARD_H / 2;     // up to the top of the board
      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.06, 0.06, poleTopY, 24),
        new THREE.MeshStandardMaterial({ color: METAL, roughness: 0.6, metalness: 0.1 })
      );
      pole.position.set(0, poleTopY / 2, POLE_Z);
      scene.add(pole);
      const armLen = (BOARD_Z - BOARD_T / 2) - POLE_Z;
      const arm = new THREE.Mesh(
        new THREE.BoxGeometry(0.08, 0.08, armLen),
        new THREE.MeshStandardMaterial({ color: METAL, roughness: 0.6, metalness: 0.1 })
      );
      arm.position.set(0, poleTopY - 0.10, POLE_Z + armLen / 2);
      scene.add(arm);
    }

    // ════════════════════════════════════════════════════════════════════
    //  GYM ROOM — four walls + ceiling, rebranded in the site palette
    // ════════════════════════════════════════════════════════════════════
    // Off-white cinderblock above, a vault-red accent stripe, black wall
    // padding along the base, and a bright clerestory window band near the
    // top — same procedural-canvas approach as the floor. Walls are unlit
    // (MeshBasic) so the painted look stays flat and evenly bright like a gym.
    // The site wordmark (assets/title2.png — DerAusländer in red, The Vault
    // layered on top) hangs on the back wall behind the hoop, and a live
    // scoreboard hangs on the wall behind the user.
    {
      const ROOM   = 18;     // interior matches the floor footprint (±9 m)
      const ROOM_H = 7.0;    // ceiling height (gym-scale)
      const HALF   = ROOM / 2;

      // — Wall textures: cinderblock + red stripe + black pad. The glass-brick
      //   band is drawn only on the two sideline (±X) walls, like the real gym;
      //   the baseline and mid-court (±Z) walls stay plain. —
      const makeWallTexture = (withBand) => {
        const W = 1200, H = 500;       // 2.4 : 1, matches an 18 × 7 m wall
        const cv = document.createElement("canvas");
        cv.width = W; cv.height = H;
        const g = cv.getContext("2d");
        g.fillStyle = "#e9e5db"; g.fillRect(0, 0, W, H);              // warm off-white cinderblock
        g.strokeStyle = "rgba(0,0,0,0.04)"; g.lineWidth = 1;          // faint block courses
        for (let y = 0; y < H * 0.64; y += 18) { g.beginPath(); g.moveTo(0, y); g.lineTo(W, y); g.stroke(); }

        if (withBand) {
          // glass-block band near the top — a grid of frosted blocks set in grout
          const bandY = H * 0.05, bandH = H * 0.13, x0 = W * 0.05, bandW = W * 0.90;
          g.fillStyle = "#9fb0b8"; g.fillRect(x0 - 4, bandY - 4, bandW + 8, bandH + 8); // grout frame
          const rows = 3, blockH = bandH / rows;
          const cols = Math.max(1, Math.round(bandW / blockH));
          const blockW = bandW / cols, gap = Math.max(2, blockH * 0.14);
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              const bx = x0 + c * blockW + gap / 2, by = bandY + r * blockH + gap / 2;
              const bw = blockW - gap, bh = blockH - gap;
              g.fillStyle = "#e6f1f8"; g.fillRect(bx, by, bw, bh);                // frosted glass
              g.fillStyle = "rgba(255,255,255,0.30)";                            // corner glint
              g.beginPath(); g.moveTo(bx, by); g.lineTo(bx + bw * 0.55, by); g.lineTo(bx, by + bh * 0.55); g.closePath(); g.fill();
            }
          }
        }

        // vault-red accent stripe just above the pad
        const padTop = H * 0.65;
        g.fillStyle = "#e63946"; g.fillRect(0, padTop - H * 0.025, W, H * 0.025);
        // black padding along the base, vertical seams
        g.fillStyle = "#111111"; g.fillRect(0, padTop, W, H - padTop);
        g.fillStyle = "#333333"; g.fillRect(0, padTop, W, 3);
        g.strokeStyle = "#262626"; g.lineWidth = 2;
        for (let x = 0; x <= W; x += W / 16) { g.beginPath(); g.moveTo(x, padTop + 4); g.lineTo(x, H); g.stroke(); }
        const tex = new THREE.CanvasTexture(cv);
        tex.colorSpace = THREE.SRGBColorSpace;
        return tex;
      };
      const wallMatBand  = new THREE.MeshBasicMaterial({ map: makeWallTexture(true),  side: THREE.DoubleSide });
      const wallMatPlain = new THREE.MeshBasicMaterial({ map: makeWallTexture(false), side: THREE.DoubleSide });
      const midY = ROOM_H / 2;
      const addWall = (mat, x, y, z, rotY) => {
        const m = new THREE.Mesh(new THREE.PlaneGeometry(ROOM, ROOM_H), mat);
        m.position.set(x, y, z); m.rotation.y = rotY; scene.add(m);
      };
      addWall(wallMatPlain, 0, midY, -HALF, 0);            // back  (−Z, behind hoop) — plain
      addWall(wallMatPlain, 0, midY,  HALF, Math.PI);      // front (+Z, behind user) — plain
      addWall(wallMatBand, -HALF, midY, 0,  Math.PI / 2);  // left sideline (−X) — glass brick
      addWall(wallMatBand,  HALF, midY, 0, -Math.PI / 2);  // right sideline (+X) — glass brick

      // — Ceiling — drop-grid acoustic tiles (~2 ft), tiled via texture repeat —
      const makeCeilingTexture = () => {
        const S = 128;
        const cv = document.createElement("canvas"); cv.width = cv.height = S;
        const g = cv.getContext("2d");
        g.fillStyle = "#e9e9e9"; g.fillRect(0, 0, S, S);             // tile face
        g.fillStyle = "rgba(0,0,0,0.03)";                            // faint acoustic speckle
        for (let i = 0; i < 110; i++) g.fillRect(Math.random() * S, Math.random() * S, 1, 1);
        g.fillStyle = "#c4c4c4";                                     // grid rails on two edges
        g.fillRect(0, 0, S, 3); g.fillRect(0, 0, 3, S);
        const tex = new THREE.CanvasTexture(cv);
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
        const tiles = Math.round(ROOM / 0.61);                       // ~2 ft tiles
        tex.repeat.set(tiles, tiles);
        return tex;
      };
      const ceiling = new THREE.Mesh(
        new THREE.PlaneGeometry(ROOM, ROOM),
        new THREE.MeshBasicMaterial({ map: makeCeilingTexture(), side: THREE.DoubleSide })
      );
      ceiling.position.set(0, ROOM_H, 0);
      ceiling.rotation.x = Math.PI / 2;
      scene.add(ceiling);

      // — Site wordmark on the back wall (assets/title2.png → ../ from vr/) —
      {
        const TARGET_W = 9.0, TARGET_H = 1.7, WORD_Y = 4.6, WORD_Z = -HALF + 0.05;
        const wordmark = new THREE.Mesh(
          new THREE.PlaneGeometry(TARGET_W, TARGET_H),
          new THREE.MeshBasicMaterial({ transparent: true, side: THREE.DoubleSide, opacity: 0 })
        );
        wordmark.position.set(0, WORD_Y, WORD_Z);   // faces +Z, toward the user
        scene.add(wordmark);
        loader.load("../assets/title2.png", (texture) => {
          texture.colorSpace = THREE.SRGBColorSpace;
          const aspect = texture.image.width / texture.image.height;
          let w = TARGET_W, h = TARGET_W / aspect;
          if (h > TARGET_H) { h = TARGET_H; w = TARGET_H * aspect; }
          wordmark.geometry.dispose();
          wordmark.geometry = new THREE.PlaneGeometry(w, h);
          wordmark.material.map = texture;
          wordmark.material.opacity = 1;
          wordmark.material.needsUpdate = true;
        }, undefined, (err) => log(`Wordmark ../assets/title2.png failed to load: ${err?.message || err}`, "err"));
      }

      // — Live scoreboard on the wall behind the user —
      // HOME = pairs in the vault, GUEST = pairs still on the wishlist; home
      // stays higher by nature. (Swap guestScore to the graveyard count for a
      // 41–0 shutout instead.)
      {
        const totalColorways = inventory.reduce((n, s) => n + ((data.colorways || {})[s.shortName] || []).length, 0);
        const unowned    = Object.values(colorwayOwned).filter((v) => v === false).length;
        const homeScore  = totalColorways - unowned;
        const guestScore = (data.wishlistOrder || []).length;

        const W = 1024, H = 512;
        const cv = document.createElement("canvas");
        cv.width = W; cv.height = H;
        const g = cv.getContext("2d");
        g.fillStyle = "#0a0a0a"; g.fillRect(0, 0, W, H);
        g.strokeStyle = "#e63946"; g.lineWidth = 10; g.strokeRect(8, 8, W - 16, H - 16);
        g.textAlign = "center";
        g.fillStyle = "#e63946"; g.font = "bold 70px -apple-system, BlinkMacSystemFont, sans-serif";
        g.fillText("THE VAULT", W / 2, 95);
        g.fillStyle = "#e8e8e8"; g.font = "bold 54px -apple-system, BlinkMacSystemFont, sans-serif";
        g.fillText("HOME", W * 0.27, 200);
        g.fillText("GUEST", W * 0.73, 200);
        g.fillStyle = "#ffcc00"; g.font = "bold 180px 'Courier New', monospace";
        g.fillText(String(homeScore), W * 0.27, 430);
        g.fillText(String(guestScore), W * 0.73, 430);
        g.strokeStyle = "#333333"; g.lineWidth = 4;
        g.beginPath(); g.moveTo(W / 2, 150); g.lineTo(W / 2, H - 40); g.stroke();

        const tex = new THREE.CanvasTexture(cv);
        tex.colorSpace = THREE.SRGBColorSpace;
        const board = new THREE.Mesh(
          new THREE.PlaneGeometry(3.6, 1.8),
          new THREE.MeshBasicMaterial({ map: tex })
        );
        board.position.set(0, 4.3, HALF - 0.05);   // front wall, faces −Z (toward the court)
        board.rotation.y = Math.PI;
        scene.add(board);
      }
    }

    // ════════════════════════════════════════════════════════════════════
    //  PEDESTAL + STAGE SHOE (office wall)
    // ════════════════════════════════════════════════════════════════════
    // A column the user's clicked shoe flies onto. Kept understated (same
    // wireframe-edge vocabulary as the boxes) so the shoe is the focus.
    const pedestalGroup = new THREE.Group();
    pedestalGroup.position.set(PED_X, 0, PED_Z);
    {
      const colGeom = new THREE.CylinderGeometry(0.16, 0.20, PED_COL_H, 32);
      const colMat  = new THREE.MeshBasicMaterial({
        color: 0x111111, transparent: true, opacity: 0.55,
      });
      const column = new THREE.Mesh(colGeom, colMat);
      column.position.y = PED_COL_H / 2;
      pedestalGroup.add(column);
      const colEdges = new THREE.LineSegments(
        new THREE.EdgesGeometry(colGeom),
        new THREE.LineBasicMaterial({ color: 0x888888, transparent: true, opacity: 0.5 })
      );
      colEdges.position.y = PED_COL_H / 2;
      pedestalGroup.add(colEdges);
      // Thin top cap so the silhouette reads as a plinth.
      const capGeom = new THREE.CylinderGeometry(0.24, 0.24, 0.04, 32);
      const cap = new THREE.Mesh(capGeom, colMat);
      cap.position.y = PED_COL_H + 0.02;
      pedestalGroup.add(cap);
    }
    scene.add(pedestalGroup);

    // One reusable mesh for the flying / staged shoe. Retextured and resized
    // per click; hidden when idle. Same cutout material as the cell photos.
    const stageShoe = new THREE.Mesh(
      new THREE.PlaneGeometry(PED_FIT_W, PED_FIT_H),
      new THREE.MeshBasicMaterial({
        color: 0xffffff, side: THREE.DoubleSide, transparent: true, alphaTest: 0.01,
      })
    );
    stageShoe.visible = false;
    scene.add(stageShoe);

    // Contact shadow — a soft dark ellipse on the cap, under the staged shoe.
    // This is the strongest "it's resting on the surface" cue. One reusable
    // mesh, lying flat, scaled to the shoe's width and faded in/out with the
    // travel. Built from a radial-gradient canvas so the edge is soft.
    const shadowCanvas = document.createElement("canvas");
    shadowCanvas.width = shadowCanvas.height = 128;
    {
      const sctx = shadowCanvas.getContext("2d");
      const g = sctx.createRadialGradient(64, 64, 0, 64, 64, 64);
      g.addColorStop(0,   "rgba(0,0,0,0.55)");
      g.addColorStop(0.6, "rgba(0,0,0,0.30)");
      g.addColorStop(1,   "rgba(0,0,0,0)");
      sctx.fillStyle = g;
      sctx.fillRect(0, 0, 128, 128);
    }
    const shadowTex = new THREE.CanvasTexture(shadowCanvas);
    shadowTex.colorSpace = THREE.SRGBColorSpace;
    const contactShadow = new THREE.Mesh(
      new THREE.PlaneGeometry(1, 1),
      new THREE.MeshBasicMaterial({
        map: shadowTex, transparent: true, depthWrite: false, opacity: 0,
      })
    );
    contactShadow.rotation.x = -Math.PI / 2;            // lie flat, facing up
    contactShadow.position.set(PED_X, PED_CAP_TOP + 0.003, PED_Z);
    contactShadow.visible = false;
    scene.add(contactShadow);

    // Stage state machine, independent of the dream wall's pull-forward.
    //   phase "out"  — travelling from the cell to the pedestal
    //   phase "settled" — resting on the pedestal
    //   phase "back" — travelling back to the cell
    const stage = {
      active: false, caseRef: null, phase: "idle",
      t0: 0, fromPos: new THREE.Vector3(), fromScale: STAGE_START_SCALE,
      sourceWorld: new THREE.Vector3(),   // cell world pos, target for the trip back
      restPos: new THREE.Vector3(),       // resting pos on the cap (bottom-anchored, per shoe)
      shadowW: 0.4,                       // shadow width, set from the fitted shoe width
    };

    // ════════════════════════════════════════════════════════════════════
    //  SKY BANNERS — floating cards high overhead
    // ════════════════════════════════════════════════════════════════════
    //  CHAMPIONSHIP BANNERS — "LAST WORN" + "UP NEXT"
    // ════════════════════════════════════════════════════════════════════
    // Vertical felt banners hung on the back wall flanking the wordmark, in the
    // style of a gym's championship banners: deep-red felt, a gold border, a
    // wooden top rod with end knobs, and a swallowtail bottom. Each carries its
    // title, a photo of the shoe, the name + colorway, and the date — live from
    // the wear log. The felt body (everything but the photo) is one canvas with
    // transparency outside the banner silhouette; the shoe photo is layered as
    // its own plane so it can load async and keep its aspect.

    const buildBanner = (entry, x, yCenter, z) => {
      if (!entry) return;
      const group = new THREE.Group();
      group.position.set(x, yCenter, z);
      scene.add(group);

      const BW = 1.32, BH = 2.4;          // banner plane size (metres)

      // — Felt body drawn on a canvas (transparent outside the swallowtail) —
      const W = 768, H = 1400;
      const cv = document.createElement("canvas");
      cv.width = W; cv.height = H;
      const g = cv.getContext("2d");
      g.clearRect(0, 0, W, H);

      const notch = H * 0.12;             // depth of the swallowtail V
      const outline = (i) => {
        g.beginPath();
        g.moveTo(i, i);
        g.lineTo(W - i, i);
        g.lineTo(W - i, H - i);
        g.lineTo(W / 2, H - notch + i * 1.5);
        g.lineTo(i, H - i);
        g.closePath();
      };

      outline(0);
      g.fillStyle = "#a4121f"; g.fill();                       // deep vault-red felt
      g.save(); outline(0); g.clip();                          // felt shading + threads
      const grad = g.createLinearGradient(0, 0, W, 0);
      grad.addColorStop(0,   "rgba(0,0,0,0.18)");
      grad.addColorStop(0.5, "rgba(255,255,255,0.06)");
      grad.addColorStop(1,   "rgba(0,0,0,0.18)");
      g.fillStyle = grad; g.fillRect(0, 0, W, H);
      g.fillStyle = "rgba(0,0,0,0.05)";
      for (let i = 0; i < 380; i++) g.fillRect(Math.random() * W, Math.random() * H, 1, 6);
      g.restore();

      outline(26);                                             // gold border
      g.lineJoin = "round"; g.lineWidth = 14; g.strokeStyle = "#d9b44a"; g.stroke();

      const line = (txt, font, fill, yy, sw) => {
        g.font = font; g.textAlign = "center"; g.textBaseline = "middle";
        g.lineJoin = "round"; g.lineWidth = sw;
        g.strokeStyle = "rgba(0,0,0,0.5)"; g.strokeText(txt, W / 2, yy);
        g.fillStyle = fill; g.fillText(txt, W / 2, yy);
      };
      const titleSpaced = entry.label.split("").join("\u2009"); // thin-spaced title
      line(titleSpaced,    "bold 92px -apple-system, BlinkMacSystemFont, sans-serif",  "#FFD700", H * 0.075, 6);
      line(entry.shoeName, "bold 70px -apple-system, BlinkMacSystemFont, sans-serif",  "#ffffff", H * 0.595, 6);
      line(entry.colorway, "52px -apple-system, BlinkMacSystemFont, sans-serif",       "#f0e6c8", H * 0.660, 5);
      line(entry.dateStr,  "italic 50px -apple-system, BlinkMacSystemFont, sans-serif","#e9dcc0", H * 0.735, 5);

      const tex = new THREE.CanvasTexture(cv);
      tex.colorSpace = THREE.SRGBColorSpace;
      const felt = new THREE.Mesh(
        new THREE.PlaneGeometry(BW, BH),
        new THREE.MeshBasicMaterial({ map: tex, transparent: true, alphaTest: 0.02, side: THREE.DoubleSide })
      );
      group.add(felt);

      // — Shoe photo, layered over the upper-middle of the felt —
      const BOX_W = 1.0, BOX_H = 0.92;
      const photo = new THREE.Mesh(
        new THREE.PlaneGeometry(BOX_W, BOX_H),
        new THREE.MeshBasicMaterial({ color: 0x111111, transparent: true, alphaTest: 0.5, side: THREE.DoubleSide })
      );
      photo.position.set(0, BH * 0.16, 0.02);                 // slightly proud of the felt
      group.add(photo);
      loadTextureFor(entry.imagePath, photo, (aspect) => {
        photo.geometry.dispose();
        let w, h; const inner = BOX_W / BOX_H;
        if (aspect >= inner) { w = BOX_W; h = BOX_W / aspect; }
        else                 { h = BOX_H; w = BOX_H * aspect; }
        photo.geometry = new THREE.PlaneGeometry(w, h);
      });

      // — Wooden top rod with end knobs —
      const rod = new THREE.Mesh(
        new THREE.CylinderGeometry(0.035, 0.035, BW + 0.18, 16),
        new THREE.MeshStandardMaterial({ color: 0x6b4a2a, roughness: 0.7 })
      );
      rod.rotation.z = Math.PI / 2;
      rod.position.set(0, BH / 2 + 0.02, 0.03);
      group.add(rod);
      const knobGeo = new THREE.SphereGeometry(0.055, 16, 12);
      const knobMat = new THREE.MeshStandardMaterial({ color: 0x5a3d22, roughness: 0.6 });
      for (const sx of [-1, 1]) {
        const k = new THREE.Mesh(knobGeo, knobMat);
        k.position.set(sx * (BW / 2 + 0.09), BH / 2 + 0.02, 0.03);
        group.add(k);
      }
    };

    // Hang the two banners on the back wall, flanking the wordmark up high.
    // User faces −Z, so their left is −X (LAST WORN) and right is +X (UP NEXT),
    // matching where the floor mats used to sit.
    const BANNER_X = 6.0, BANNER_Y = 5.0, BANNER_Z = -8.9;
    buildBanner(lastWornEntry, -BANNER_X, BANNER_Y, BANNER_Z); // LAST WORN — left of wordmark
    buildBanner(upNextEntry,    BANNER_X, BANNER_Y, BANNER_Z); // UP NEXT  — right of wordmark

    // ════════════════════════════════════════════════════════════════════
    //  STORY PANEL (canvas-rendered text for the pulled-forward case)
    // ════════════════════════════════════════════════════════════════════
    // Text rendered into a 1024×768 canvas, used as a texture on a 1.2m ×
    // 0.9m plane. Roughly double the previous font sizes; brighter colors
    // for VR readability. Story text wraps at canvas width minus padding.
    const TIER_GLYPH = { diamond: "◆", platinum: "▲", gold: "●", silver: "■" };

    const makeTextPanel = (headline, subhead, story) => {
      const W = 1024;
      const MPP = 0.9 / 768;          // metres per pixel — keeps the prior text scale
      const padX = 60;
      const headY = 90, subY = 195, storyTop = 310;
      const lineHeight = 68, bottomPad = 60;
      const maxWidth = W - 2 * padX;

      // Pre-wrap the story into lines so the canvas can be sized to fit.
      const scratch = document.createElement("canvas").getContext("2d");
      scratch.font = "italic 48px -apple-system, BlinkMacSystemFont, sans-serif";
      const lines = [];
      if (story) {
        let line = "";
        for (const word of story.split(/\s+/)) {
          const test = line ? line + " " + word : word;
          if (scratch.measureText(test).width > maxWidth && line) { lines.push(line); line = word; }
          else { line = test; }
        }
        if (line) lines.push(line);
      }

      const contentBottom = lines.length ? storyTop + lines.length * lineHeight : subY + 80;
      const H = Math.max(300, Math.ceil(contentBottom + bottomPad));

      const canvas = document.createElement("canvas");
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, W, H);

      // Dark rounded-rect plaque with vault-red border
      const m = 16, rad = 32;
      ctx.beginPath();
      ctx.moveTo(m + rad, m);
      ctx.arcTo(W - m, m, W - m, H - m, rad);
      ctx.arcTo(W - m, H - m, m, H - m, rad);
      ctx.arcTo(m, H - m, m, m, rad);
      ctx.arcTo(m, m, W - m, m, rad);
      ctx.closePath();
      ctx.fillStyle = "rgba(10, 10, 10, 0.88)"; ctx.fill();
      ctx.lineWidth = 8; ctx.strokeStyle = "#e63946"; ctx.stroke();

      // Headline — centred, white, bold
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 82px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.fillText(headline, W / 2, headY);

      // Thin accent line under the headline
      ctx.strokeStyle = "rgba(230, 57, 70, 0.5)";
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(padX + 40, headY + 52); ctx.lineTo(W - padX - 40, headY + 52); ctx.stroke();

      // Subhead — centred, warm cream
      ctx.fillStyle = "#f0e6c8";
      ctx.font = "56px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.fillText(subhead, W / 2, subY);

      // Story — centred, near-white, italic
      ctx.fillStyle = "#e0e0e0";
      ctx.font = "italic 48px -apple-system, BlinkMacSystemFont, sans-serif";
      let y = storyTop;
      for (const ln of lines) { ctx.fillText(ln, W / 2, y); y += lineHeight; }

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;

      const material = new THREE.MeshBasicMaterial({
        map: texture, transparent: true, side: THREE.DoubleSide,
      });

      const geometry = new THREE.PlaneGeometry(W * MPP, H * MPP);
      return new THREE.Mesh(geometry, material);
    };

    let storyPanel = null;
    const showStoryFor = (caseRef) => {
      hideStory();
      const entry = caseRef.entry;
      const headline = entry.shoeName;
      const subhead  = `${entry.colorway}   ${TIER_GLYPH[entry.tier] || ""}`;
      const text     = entry.story || entry.notes || "";
      storyPanel = makeTextPanel(headline, subhead, text);

      // Office cases stage on the pedestal — float the panel directly above
      // the shoe, anchored by its bottom edge so longer stories grow upward
      // and never crowd the shoe. Uses the actual rest position and shoe
      // height computed in ensurePopTexture (which runs before this call).
      if (caseRef.usePedestal) {
        const panelH  = storyPanel.geometry.parameters.height;
        const shoeTop = stage.restPos.y + stageShoe.geometry.parameters.height / 2;
        const bottomY = shoeTop + 0.12;              // small gap above the shoe
        storyPanel.position.set(PED_X, bottomY + panelH / 2, PED_Z + 0.45);
        faceUserUpright(storyPanel);
        scene.add(storyPanel);
        return;
      }

      // Place the panel beside the pulled-forward case (which lands at
      // caseRef.viewPosWorld). "Beside" means offset to the user's right —
      // mirror direction depends on which wall the user is facing. The
      // viewPosWorld already has a 0.5m left-offset baked in; we use its
      // sign to determine the panel's offset direction.
      const viewP = caseRef.viewPosWorld;
      // If viewPosWorld.x is negative (display wall), put panel at +1.2 x.
      // If positive (dream wall), put panel at -1.2 x. Same offset magnitude.
      const panelX = viewP.x < 0 ? 1.2 : -1.2;
      storyPanel.position.set(panelX, 1.6, viewP.z);
      faceUserUpright(storyPanel);
      scene.add(storyPanel);
    };
    const hideStory = () => {
      if (!storyPanel) return;
      scene.remove(storyPanel);
      storyPanel.material.map.dispose();
      storyPanel.material.dispose();
      storyPanel.geometry.dispose();
      storyPanel = null;
    };

    // ════════════════════════════════════════════════════════════════════
    //  RENDERER + WEBXR
    // ════════════════════════════════════════════════════════════════════
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    if (!TEST_MODE) renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);
    if (!TEST_MODE) document.body.appendChild(VRButton.createButton(renderer));

    // ── Test-mode FPS controls ──────────────────────────────────────────
    let fpsControls = null;
    const fpsKeys = {};
    const FPS_SPEED = 2.5;           // metres per second
    const fpsDir = new THREE.Vector3();
    const fpsSide = new THREE.Vector3();

    if (TEST_MODE) {
      fpsControls = new PointerLockControls(camera, renderer.domElement);

      // Crosshair — thin + centred on screen, only visible when locked.
      const crosshair = document.createElement("div");
      crosshair.id = "crosshair";
      Object.assign(crosshair.style, {
        position: "fixed", top: "50%", left: "50%",
        width: "20px", height: "20px",
        marginTop: "-10px", marginLeft: "-10px",
        pointerEvents: "none", display: "none", zIndex: "100",
      });
      crosshair.innerHTML = `
        <div style="position:absolute;width:2px;height:20px;left:9px;top:0;background:rgba(255,255,255,0.5)"></div>
        <div style="position:absolute;width:20px;height:2px;left:0;top:9px;background:rgba(255,255,255,0.5)"></div>`;
      document.body.appendChild(crosshair);

      // Banner with instructions (fades out after lock).
      const banner = document.createElement("div");
      Object.assign(banner.style, {
        position: "fixed", bottom: "24px", left: "50%", transform: "translateX(-50%)",
        padding: "10px 20px", background: "rgba(0,0,0,0.7)", border: "1px solid #444",
        color: "#ccc", fontSize: "13px", fontFamily: "-apple-system, sans-serif",
        letterSpacing: "1px", zIndex: "100", whiteSpace: "nowrap",
      });
      banner.textContent = "TEST MODE — Click to start · WASD move · Mouse look · Click to interact · ESC release";
      document.body.appendChild(banner);

      fpsControls.addEventListener("lock", () => { crosshair.style.display = "block"; banner.style.display = "none"; });
      fpsControls.addEventListener("unlock", () => { crosshair.style.display = "none"; banner.style.display = "block"; });

      document.addEventListener("keydown", (e) => { fpsKeys[e.code] = true; });
      document.addEventListener("keyup",   (e) => { fpsKeys[e.code] = false; });

      log("Test mode enabled — click the canvas to start", "ok");
    }

    // Per-frame WASD movement (test mode only). Projects the camera's
    // forward vector onto XZ so WASD never causes vertical drift.
    let lastFpsTime = performance.now();
    const updateFpsMovement = (now) => {
      if (!fpsControls || !fpsControls.isLocked) return;
      const dt = Math.min((now - lastFpsTime) / 1000, 0.1); // cap to avoid jumps
      lastFpsTime = now;
      camera.getWorldDirection(fpsDir);
      fpsDir.y = 0; fpsDir.normalize();
      fpsSide.crossVectors(camera.up, fpsDir).normalize();
      let dx = 0, dz = 0;
      if (fpsKeys["KeyW"]) { dx += fpsDir.x; dz += fpsDir.z; }
      if (fpsKeys["KeyS"]) { dx -= fpsDir.x; dz -= fpsDir.z; }
      if (fpsKeys["KeyA"]) { dx += fpsSide.x; dz += fpsSide.z; }
      if (fpsKeys["KeyD"]) { dx -= fpsSide.x; dz -= fpsSide.z; }
      if (dx || dz) {
        const len = Math.sqrt(dx * dx + dz * dz);
        camera.position.x += (dx / len) * FPS_SPEED * dt;
        camera.position.z += (dz / len) * FPS_SPEED * dt;
      }
    };

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ════════════════════════════════════════════════════════════════════
    //  ON FEET TODAY — shared state (display + animation built later)
    // ════════════════════════════════════════════════════════════════════
    let ofdDisplay = null, ofdClickTarget = null;
    const ofd = { phase: "idle", trigger: () => {}, update: () => {}, exitCard: () => {} };

    // ════════════════════════════════════════════════════════════════════
    //  CONTROLLERS — raycaster + trigger select
    // ════════════════════════════════════════════════════════════════════
    const raycaster = new THREE.Raycaster();
    const tempMatrix = new THREE.Matrix4();
    const pointerGeometry = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(0, 0, -5),
    ]);

    let focusedCase = null;

    // beginReturn captures the case's current position/scale before kicking
    // off the return animation, so the lerp starts from where the case
    // actually is — not from where it would have been at end-of-pull.
    // Without this, interrupting a pull mid-flight (rapid clicks) causes a
    // teleport to the forward position before the return begins.
    const beginReturn = (c, now) => {
      c.returnStart = c.group.position.clone();
      c.returnStartScale = c.group.scale.x;
      c.state = "returning";
      c.stateStart = now;
    };

    // Swap a case between its resting image (image 3, on the wall) and its
    // popped image (image 2, shown pulled forward). The resting texture is
    // cached at build; image 2 is lazy-loaded on first pull (deliberately not
    // counted in the initial "all textures loaded" tally). The showing-guard
    // stops a slow load from applying after the user has moved on.
    const swapCaseImage = (caseRef, which) => {
      caseRef.showing = which;
      const apply = (texture, aspect) => {
        if (caseRef.showing !== which) return;
        caseRef.plane.material.map = texture;
        caseRef.plane.material.color.set(0xffffff);
        caseRef.plane.material.needsUpdate = true;
        fitPlaneToBox(caseRef.plane, aspect, INNER_W, INNER_H);
      };
      const cached = which === "rest" ? caseRef.restTexture : caseRef.popTexture;
      if (cached) {
        apply(cached, which === "rest" ? caseRef.restAspect : caseRef.popAspect);
        return;
      }
      const path = which === "rest" ? caseRef.restPath : caseRef.popPath;
      loader.load(path, (texture) => {
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.anisotropy = 8;
        const aspect = texture.image.width / texture.image.height;
        if (which === "rest") { caseRef.restTexture = texture; caseRef.restAspect = aspect; }
        else                  { caseRef.popTexture  = texture; caseRef.popAspect  = aspect; }
        apply(texture, aspect);
      }, undefined, (err) => log(`Failed to load ${path}: ${err?.message || err}`, "err"));
    };

    // ── Pedestal staging (office wall) ──────────────────────────────────
    // Ensure image 2 is loaded for a case, then run cb(texture, aspect).
    // Caches on the caseRef (same field swapCaseImage uses, though a given
    // case is only ever office or dream, never both).
    const ensurePopTexture = (caseRef, cb) => {
      if (caseRef.popTexture) { cb(caseRef.popTexture, caseRef.popAspect); return; }
      loader.load(caseRef.popPath, (texture) => {
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.anisotropy = 8;
        caseRef.popTexture = texture;
        caseRef.popAspect  = texture.image.width / texture.image.height;
        cb(texture, caseRef.popAspect);
      }, undefined, (err) => log(`Failed to load ${caseRef.popPath}: ${err?.message || err}`, "err"));
    };

    const tmpWorld = new THREE.Vector3();

    // Face the user but stay vertical: aim at the camera's XZ at the mesh's
    // own height so there's no backward pitch. Uses the camera's live world
    // position so the shoe and story panel track the user under locomotion.
    const _faceTarget = new THREE.Vector3();
    const faceUserUpright = (mesh) => {
      camera.getWorldPosition(_faceTarget);
      mesh.lookAt(_faceTarget.x, mesh.position.y, _faceTarget.z);
    };

    // Put a staged case back instantly (no animation): re-show its image-3
    // plane, hide the stage shoe. Used when one click supersedes another.
    const restoreStageInstant = () => {
      if (!stage.active) return;
      if (stage.caseRef) stage.caseRef.plane.visible = true;
      stageShoe.visible = false;
      contactShadow.visible = false;
      stage.active = false;
      stage.caseRef = null;
      stage.phase = "idle";
    };

    // Fly a clicked office case's shoe (image 2) out to the pedestal.
    const launchToPedestal = (caseRef, now) => {
      restoreStageInstant();                  // clear any shoe already out
      // Source = the cell's world position (the photo plane sits at the cell
      // group's origin, so the group's world position is the cell centre).
      caseRef.group.getWorldPosition(tmpWorld);
      const source = tmpWorld.clone();
      stage.active = true;
      stage.caseRef = caseRef;
      stage.phase = "out";
      stage.t0 = now;
      stage.sourceWorld.copy(source);
      stage.fromPos.copy(source);
      stage.fromScale = STAGE_START_SCALE;
      // Texture + size the stage shoe, then reveal it and hide the cell's
      // image-3 plane. Doing the hide at texture-ready (not on click) avoids a
      // brief empty beat the first time a case is opened.
      ensurePopTexture(caseRef, (texture, aspect) => {
        if (!stage.active || stage.caseRef !== caseRef || stage.phase !== "out") return; // superseded/dismissed
        stageShoe.material.map = texture;
        stageShoe.material.color.set(0xffffff);
        stageShoe.material.needsUpdate = true;
        fitPlaneToBox(stageShoe, aspect, PED_FIT_W, PED_FIT_H);
        // Sit the shoe's base on the cap: anchor by the bottom edge (at full
        // scale) so wide and tall shoes share a ground line, tucked slightly
        // into the cap. Resting pos is per-shoe; the travel lerps toward it.
        const ph = stageShoe.geometry.parameters.height;
        const pw = stageShoe.geometry.parameters.width;
        stage.restPos.set(PED_X, PED_CAP_TOP + ph / 2 - PED_SIT_SINK, PED_Z);
        stage.shadowW = pw;
        stageShoe.position.copy(source);
        stageShoe.scale.setScalar(STAGE_START_SCALE);
        faceUserUpright(stageShoe);             // stand upright, yaw to face the user
        stageShoe.visible = true;
        caseRef.plane.visible = false;
        stage.t0 = performance.now();          // start travel from actual reveal
        showStoryFor(caseRef);                 // after restPos is set so the panel anchors to the real shoe top
      });
    };

    // Send the staged shoe back to its cell.
    const dismissPedestal = (now) => {
      if (!stage.active) return;
      stage.phase = "back";
      stage.t0 = now;
      stage.fromPos.copy(stageShoe.position);
      stage.fromScale = stageShoe.scale.x;
      hideStory();
    };

    // Per-frame travel for the stage shoe. Reuses the pull-forward easing.
    const updateStage = (now) => {
      if (!stage.active || stage.phase === "idle") return;
      const sw = stage.shadowW;
      contactShadow.scale.set(sw * 1.25, sw * 0.5, 1);   // elliptical, shoe-width
      if (stage.phase === "settled") {
        faceUserUpright(stageShoe);
        contactShadow.visible = true;
        contactShadow.material.opacity = 1;
        return;
      }
      const t = Math.min((now - stage.t0) / PULL_DURATION_MS, 1);
      const e = easeOutCubic(t);
      if (stage.phase === "out") {
        stageShoe.position.lerpVectors(stage.fromPos, stage.restPos, e);
        stageShoe.scale.setScalar(stage.fromScale + (1 - stage.fromScale) * e);
        faceUserUpright(stageShoe);
        contactShadow.visible = stageShoe.visible;       // only once the shoe is revealed
        contactShadow.material.opacity = stageShoe.visible ? e : 0;
        if (t >= 1) stage.phase = "settled";
      } else if (stage.phase === "back") {
        stageShoe.position.lerpVectors(stage.fromPos, stage.sourceWorld, e);
        stageShoe.scale.setScalar(stage.fromScale + (STAGE_START_SCALE - stage.fromScale) * e);
        faceUserUpright(stageShoe);
        contactShadow.material.opacity = 1 - e;          // fade out as it leaves
        if (t >= 1) {
          stageShoe.visible = false;
          contactShadow.visible = false;
          if (stage.caseRef) stage.caseRef.plane.visible = true;
          stage.active = false;
          stage.caseRef = null;
          stage.phase = "idle";
        }
      }
    };

    const onSelect = (event) => {
      const controller = event.target;
      tempMatrix.identity().extractRotation(controller.matrixWorld);
      raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
      raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
      handleRayHit();
    };

    // Shared hit-test + interaction logic. The raycaster must already be
    // aimed before calling this (by onSelect for VR, by the test-mode
    // click handler for desktop).
    const handleRayHit = () => {
      const now = performance.now();

      // During OFD animation, block all interactions (except card phase exit).
      if (ofd.phase === "card") { ofd.exitCard(now); return; }
      if (ofd.phase !== "idle" && ofd.phase !== "done") return;

      // Check OFD display first.
      if (ofdClickTarget && (ofd.phase === "idle" || ofd.phase === "done")) {
        const ofdHits = raycaster.intersectObject(ofdClickTarget, false);
        if (ofdHits.length > 0) {
          ofd.trigger(now);
          return;
        }
      }

      // Hit-test the box shells, not the inner photo planes — the shell
      // is the visible "object" the user is pointing at, and the photo
      // sits inside (partially obscured by the shell). userData.caseRef
      // is now set on shell, not plane.
      const targets = allCases.map((c) => c.shell);
      const intersects = raycaster.intersectObjects(targets, false);

      // Clear an active dream-wall pull (return the case + restore image 3).
      const clearDreamFocus = () => {
        if (focusedCase) {
          beginReturn(focusedCase, now);
          swapCaseImage(focusedCase, "rest");
          focusedCase = null;
        }
      };

      if (intersects.length === 0) {
        // Empty space — dismiss whatever is active (at most one of these).
        if (stage.active) dismissPedestal(now);
        if (focusedCase) { clearDreamFocus(); hideStory(); }
        return;
      }

      const caseRef = intersects[0].object.userData.caseRef;
      if (!caseRef) return;

      if (caseRef.usePedestal) {
        // Office wall → pedestal.
        if (stage.active && stage.caseRef === caseRef) { dismissPedestal(now); return; } // toggle off
        clearDreamFocus();                 // a dream pull, if any, returns
        launchToPedestal(caseRef, now);    // supersedes any other staged shoe
        return;
      }

      // Dream wall → pull-forward (unchanged behaviour).
      if (stage.active) dismissPedestal(now);   // a staged office shoe goes home
      if (focusedCase === caseRef) {
        beginReturn(caseRef, now);
        swapCaseImage(caseRef, "rest");
        hideStory();
        focusedCase = null;
        return;
      }
      if (focusedCase) {
        beginReturn(focusedCase, now);
        swapCaseImage(focusedCase, "rest");
      }

      caseRef.state = "pulling";
      caseRef.stateStart = now;
      // Per-wall world-space view target → local to this case's parent.
      // Computed at build time per wall so display/dream pull-forward
      // targets are each in front of the user when facing that wall.
      caseRef.viewPositionLocal = caseRef.group.parent.worldToLocal(caseRef.viewPosWorld.clone());
      focusedCase = caseRef;
      swapCaseImage(caseRef, "pop");
      showStoryFor(caseRef);
    };

    if (TEST_MODE) {
      // Test mode: click to lock pointer (FPS-style), then subsequent
      // clicks raycast from screen centre (crosshair) for interaction.
      document.addEventListener("click", () => {
        if (!fpsControls.isLocked) { fpsControls.lock(); return; }
        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
        handleRayHit();
      });
    } else {
      // VR mode: controllers + laser pointers.
      for (let i = 0; i < 2; i++) {
        const controller = renderer.xr.getController(i);
        controller.addEventListener("select", onSelect);
        const pointer = new THREE.Line(
          pointerGeometry,
          new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.5, transparent: true })
        );
        controller.add(pointer);
        player.add(controller);   // ride with locomotion so the ray stays aligned to your hand
      }
    }

    // ════════════════════════════════════════════════════════════════════
    //  ANIMATION (pull-forward / return)
    // ════════════════════════════════════════════════════════════════════
    const PULL_DURATION_MS = 400;
    // Pull-forward target is computed per-wall (see buildWall) — each wall
    // has its own world-space view position so a case is always pulled
    // toward where the user is standing relative to that wall.
    const VIEW_SCALE = 1.5;
    const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);

    const updateCases = (now) => {
      for (const c of allCases) {
        if (c.state === "home") continue;
        const elapsed = now - c.stateStart;
        const t = Math.min(elapsed / PULL_DURATION_MS, 1);
        const e = easeOutCubic(t);

        if (c.state === "pulling") {
          c.group.position.lerpVectors(c.homePosition, c.viewPositionLocal, e);
          c.group.scale.setScalar(1 + (VIEW_SCALE - 1) * e);
          // lookAt takes a world-space target, so (0, 1.6, 0) is correct
          // regardless of which wall the case lives on.
          c.group.lookAt(0, 1.6, 0);
          if (t >= 1) c.state = "forward";
        } else if (c.state === "returning") {
          // Lerp from the position recorded when "returning" began (which
          // may be mid-pull) back to home. returnStart is set in onSelect.
          c.group.position.lerpVectors(c.returnStart, c.homePosition, e);
          // Same for scale — return from whatever scale the case was at.
          const startScale = c.returnStartScale;
          c.group.scale.setScalar(startScale + (1 - startScale) * e);
          if (t >= 1) {
            c.group.position.copy(c.homePosition);
            c.group.rotation.copy(c.homeRotation);
            c.group.scale.setScalar(1);
            c.state = "home";
          } else {
            c.group.lookAt(0, 1.6, 0);
          }
        }
      }
    };

    // Pulse animation: unowned dream-wall entries fade between low and
    // full opacity on a slow cycle, signalling "still on the wishlist."
    // Only active when the case is at rest (state="home") — during pull-
    // forward we want full opacity so the user can see the shoe clearly.
    const PULSE_PERIOD_MS = 3000;
    const PULSE_MIN = 0.6;
    const PULSE_MAX = 1.0;
    const updatePulse = (now) => {
      // Sin-based oscillation between MIN and MAX over PULSE_PERIOD_MS.
      const phase = (now % PULSE_PERIOD_MS) / PULSE_PERIOD_MS;
      const t = (Math.sin(phase * Math.PI * 2) + 1) / 2; // 0→1
      const opacity = PULSE_MIN + (PULSE_MAX - PULSE_MIN) * t;
      for (const c of allCases) {
        if (!c.pulse) continue;
        if (c.state !== "home") {
          c.plane.material.opacity = 1.0;
          continue;
        }
        c.plane.material.opacity = opacity;
      }
    };

    // ════════════════════════════════════════════════════════════════════
    //  VR LOCOMOTION (thumbsticks) — smooth move + smooth turn
    // ════════════════════════════════════════════════════════════════════
    // Left stick glides along the floor relative to where you're looking; right
    // stick turns smoothly, rotating the player around your head so you pivot in
    // place. Speed is analog — partial deflection moves/turns proportionally.
    const MOVE_SPEED     = 2.5;                            // metres / second
    const TURN_SPEED     = THREE.MathUtils.degToRad(90);   // degrees / second
    const STICK_DEADZONE = 0.15;
    const _locForward = new THREE.Vector3();
    const _locRight   = new THREE.Vector3();
    const _locMove    = new THREE.Vector3();
    const _locHead    = new THREE.Vector3();
    const _locUp      = new THREE.Vector3(0, 1, 0);

    const updateLocomotion = (dt) => {
      const session = renderer.xr.getSession();
      if (!session) return;
      let moveX = 0, moveY = 0, turnX = 0;
      for (const src of session.inputSources) {
        const gp = src.gamepad;
        if (!gp || !gp.axes) continue;
        const ax = gp.axes;
        const sx = ax.length > 2 ? ax[2] : (ax[0] || 0);   // thumbstick X (xr-standard)
        const sy = ax.length > 3 ? ax[3] : (ax[1] || 0);   // thumbstick Y
        if (src.handedness === "right") {
          if (Math.abs(sx) > STICK_DEADZONE) turnX += sx;
        } else {                                           // left (or unknown) → movement
          if (Math.abs(sx) > STICK_DEADZONE) moveX += sx;
          if (Math.abs(sy) > STICK_DEADZONE) moveY += sy;
        }
      }

      // Smooth turn — rotate the player about the head so you pivot in place.
      if (turnX !== 0) {
        const angle = -turnX * TURN_SPEED * dt;            // push right → turn right
        camera.getWorldPosition(_locHead);
        player.position.sub(_locHead);
        player.position.applyAxisAngle(_locUp, angle);
        player.position.add(_locHead);
        player.rotation.y += angle;
      }

      // Smooth move — head-relative, projected flat onto the floor.
      if (moveX !== 0 || moveY !== 0) {
        camera.getWorldDirection(_locForward);
        _locForward.y = 0;
        if (_locForward.lengthSq() < 1e-6) return;         // looking straight up/down
        _locForward.normalize();
        _locRight.crossVectors(_locForward, _locUp).normalize();
        _locMove.set(0, 0, 0)
          .addScaledVector(_locRight, moveX)
          .addScaledVector(_locForward, -moveY);           // stick up (−Y) = forward
        _locMove.y = 0;
        const mag = Math.min(1, Math.hypot(moveX, moveY)); // analog speed, clamped
        if (_locMove.lengthSq() > 1e-6) {
          _locMove.normalize().multiplyScalar(mag * MOVE_SPEED * dt);
          player.position.add(_locMove);
        }
      }
    };

    // ════════════════════════════════════════════════════════════════════
    //  ROOM BOUNDS — keep the user inside the gym walls
    // ════════════════════════════════════════════════════════════════════
    const ROOM_BOUND = 8.7;              // walls at ±9, 0.3m buffer so you don't clip
    const _clampHead = new THREE.Vector3();
    const clampToRoom = () => {
      camera.getWorldPosition(_clampHead);
      let dx = 0, dz = 0;
      if (_clampHead.x >  ROOM_BOUND) dx =  ROOM_BOUND - _clampHead.x;
      if (_clampHead.x < -ROOM_BOUND) dx = -ROOM_BOUND - _clampHead.x;
      if (_clampHead.z >  ROOM_BOUND) dz =  ROOM_BOUND - _clampHead.z;
      if (_clampHead.z < -ROOM_BOUND) dz = -ROOM_BOUND - _clampHead.z;
      if (dx || dz) {
        // In VR, offset the player group; in test mode camera.position
        // is local to the player group, so shifting player works either way.
        player.position.x += dx;
        player.position.z += dz;
      }
    };

    // ════════════════════════════════════════════════════════════════════
    //  ON FEET TODAY — display in the key + starfield animation
    // ════════════════════════════════════════════════════════════════════
    // A panel in the painted lane shows today's shoe. Clicking it triggers
    // a starfield + flythrough intro (same image order as the main site:
    // main → hover2 → hover). After the sequence the display clears out.
    {
      const precomp = data.precomputedLastWorn;
      // Only show On Feet Today if the last-worn date is actually today.
      const todayISO = new Date().toISOString().slice(0, 10);
      const isToday = precomp && precomp.date === todayISO;
      const imgPaths = [];
      if (isToday) {
        for (const sfx of ["", "_hover2", "_hover"]) {
          const p = images[precomp.key + sfx];
          if (p) imgPaths.push("../" + p);
        }
      }

      if (isToday && imgPaths.length > 0) {
