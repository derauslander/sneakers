        skyCeil.position.set(SKY_CX, SKY_TOP, GY_Z_CENTRE);
        scene.add(skyCeil);

        // Gym-side sky wall - single plane with the doorway cut out via
        // transparent alpha. Custom canvas draws the same sky gradient rotated
        // to match the side walls' visual appearance, then clears the door rect.
        {
          const GW = 1024, GH = Math.round(1024 * (SKY_H / SKY_WZ));
          const gcv = document.createElement("canvas");
          gcv.width = GW; gcv.height = GH;
          const gg = gcv.getContext("2d");
          // Same gradient as the side/back walls, top-to-bottom
          const gGrad = gg.createLinearGradient(0, 0, 0, GH);
          gGrad.addColorStop(0, "#0a0a1a");
          gGrad.addColorStop(0.6, "#0d0d2b");
          gGrad.addColorStop(1, "#1a1a2e");
          gg.fillStyle = gGrad;
          gg.fillRect(0, 0, GW, GH);
          // Stars
          gg.fillStyle = "#ffffff";
          for (let i = 0; i < 200; i++) {
            const sz = Math.random() * 2 + 0.5;
            gg.globalAlpha = Math.random() * 0.7 + 0.3;
            gg.fillRect(Math.random() * GW, Math.random() * (GH * 0.78), sz, sz);
          }
          gg.globalAlpha = 1.0;
          // Cut out the doorway - map door position to canvas coordinates.
          // Plane spans z = -SKY_HW to +SKY_HW (width) and y = 0 to SKY_H (height).
          // Canvas x maps to z (left = -SKY_HW), canvas y maps to height (top = SKY_H).
          const doorCxL = ((- DOOR_W / 2) + SKY_HW) / (SKY_HW * 2) * GW;
          const doorCxR = ((+ DOOR_W / 2) + SKY_HW) / (SKY_HW * 2) * GW;
          const doorCyTop = (1 - DOOR_H / SKY_H) * GH;
          gg.clearRect(doorCxL, doorCyTop, doorCxR - doorCxL, GH - doorCyTop);

          const gymTex = new THREE.CanvasTexture(gcv);
          gymTex.colorSpace = THREE.SRGBColorSpace;
          const skyGymWall = new THREE.Mesh(
            new THREE.PlaneGeometry(SKY_WZ + SKY_PAD * 2, SKY_H + SKY_PAD),
            new THREE.MeshBasicMaterial({ map: gymTex, transparent: true, alphaTest: 0.02, side: THREE.FrontSide })
          );
          skyGymWall.position.set(SKY_X0 + 0.05, SKY_H / 2, GY_Z_CENTRE);
          skyGymWall.rotation.y = Math.PI / 2;
          scene.add(skyGymWall);
        }
      }

      // - Full moon -
      {
        const moonCv = document.createElement("canvas");
        moonCv.width = 256; moonCv.height = 256;
        const g = moonCv.getContext("2d");
        const moonGrad = g.createRadialGradient(128, 128, 50, 128, 128, 128);
        moonGrad.addColorStop(0, "rgba(255,255,240,1)");
        moonGrad.addColorStop(0.4, "rgba(220,220,200,0.9)");
        moonGrad.addColorStop(0.7, "rgba(180,190,200,0.3)");
        moonGrad.addColorStop(1, "rgba(100,110,130,0)");
        g.fillStyle = moonGrad;
        g.fillRect(0, 0, 256, 256);
        // A few subtle craters
        g.globalAlpha = 0.12;
        g.fillStyle = "#888";
        g.beginPath(); g.arc(110, 100, 15, 0, Math.PI * 2); g.fill();
        g.beginPath(); g.arc(150, 140, 10, 0, Math.PI * 2); g.fill();
        g.beginPath(); g.arc(120, 155, 8, 0, Math.PI * 2); g.fill();
        g.globalAlpha = 1;
        const moonTex = new THREE.CanvasTexture(moonCv);
        moonTex.colorSpace = THREE.SRGBColorSpace;
        const moon = new THREE.Mesh(
          new THREE.PlaneGeometry(4, 4),
          new THREE.MeshBasicMaterial({ map: moonTex, transparent: true, side: THREE.DoubleSide, depthWrite: false })
        );
        moon.position.set(GY_X + GY_DEPTH - 2, 12, GY_Z_CENTRE - 3);
        moon.rotation.y = -Math.PI / 2;
        scene.add(moon);

        // Moonlight - dim directional light casting down into the graveyard
        const moonLight = new THREE.PointLight(0x8899bb, 1.5, 30);
        moonLight.position.set(GY_X + GY_DEPTH / 2, 8, GY_Z_CENTRE);
        scene.add(moonLight);
      }

      // - Graveyard ground (dark earth / patchy grass) -
      {
        const gndCv = document.createElement("canvas");
        gndCv.width = 512; gndCv.height = 512;
        const g = gndCv.getContext("2d");
        g.fillStyle = "#1a1f15";  // dark earth
        g.fillRect(0, 0, 512, 512);
        // Patchy grass tufts
        for (let i = 0; i < 600; i++) {
          const gx = Math.random() * 512, gy = Math.random() * 512;
          g.fillStyle = `hsl(${100 + Math.random() * 40}, ${30 + Math.random() * 30}%, ${12 + Math.random() * 10}%)`;
          g.fillRect(gx, gy, 2 + Math.random() * 6, 1 + Math.random() * 3);
        }
        const gndTex = new THREE.CanvasTexture(gndCv);
        gndTex.colorSpace = THREE.SRGBColorSpace;
        gndTex.wrapS = gndTex.wrapT = THREE.RepeatWrapping;
        gndTex.repeat.set(4, 4);
        const totalGroundDepth = CORR_LEN + GY_DEPTH;  // include corridor area
        const GRASS_PAD = 4;  // extra grass beyond the fence on each side
        const ground = new THREE.Mesh(
          new THREE.PlaneGeometry(totalGroundDepth + GRASS_PAD, GY_WIDTH + GRASS_PAD * 2),
          new THREE.MeshBasicMaterial({ map: gndTex, side: THREE.DoubleSide })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.set(GY_X + totalGroundDepth / 2 + GRASS_PAD / 2, GY_FLOOR_Y + 0.01, GY_Z_CENTRE);
        scene.add(ground);
      }

      // - Ground fog (low-lying mist across the graveyard) -
      {
        const mistCv = document.createElement("canvas");
        mistCv.width = 256; mistCv.height = 64;
        const g = mistCv.getContext("2d");
        const mistGrad = g.createLinearGradient(0, 0, 0, 64);
        mistGrad.addColorStop(0, "rgba(120,130,140,0.35)");
        mistGrad.addColorStop(1, "rgba(120,130,140,0)");
        g.fillStyle = mistGrad;
        g.fillRect(0, 0, 256, 64);
        const mistTex = new THREE.CanvasTexture(mistCv);
        mistTex.colorSpace = THREE.SRGBColorSpace;

        for (let i = 0; i < 5; i++) {
          const mist = new THREE.Mesh(
            new THREE.PlaneGeometry(GY_WIDTH * 0.8, 1.2),
            new THREE.MeshBasicMaterial({ map: mistTex, transparent: true, side: THREE.DoubleSide, depthWrite: false, opacity: 0.5 })
          );
          mist.rotation.x = -Math.PI / 2;
          mist.position.set(
            GY_X + CORR_LEN + 2 + i * 2.5,
            GY_FLOOR_Y + 0.15 + Math.random() * 0.2,
            GY_Z_CENTRE + (Math.random() - 0.5) * 4
          );
          mist.userData.baseX = mist.position.x;
          mist.userData.drift = i;
          scene.add(mist);
          graveyardAnims.push(mist);
        }
      }

      // - 3D grass blades (thin triangles scattered around) -
      {
        const grassMat = new THREE.MeshBasicMaterial({ color: 0x2a3a1a, side: THREE.DoubleSide });
        const grassGeo = new THREE.BufferGeometry();
        const h = 0.3, w = 0.04;
        grassGeo.setAttribute("position", new THREE.Float32BufferAttribute([
          -w, 0, 0,  w, 0, 0,  0, h, 0
        ], 3));
        grassGeo.computeVertexNormals();
        for (let i = 0; i < 250; i++) {
          const blade = new THREE.Mesh(grassGeo, grassMat);
          blade.position.set(
            GY_X + CORR_LEN - 1 + Math.random() * (GY_DEPTH + 4),
            GY_FLOOR_Y,
            GY_Z_CENTRE + (Math.random() - 0.5) * (GY_WIDTH + 6)
          );
          blade.rotation.y = Math.random() * Math.PI;
          blade.scale.set(
            0.8 + Math.random() * 0.5,
            0.6 + Math.random() * 1.0,
            1
          );
          scene.add(blade);
        }
      }

      // - Tombstones for retired shoes -
      {
        const graveyard = data.graveyardMeta || {};
        const graveKeys = Object.keys(graveyard);
        const STONE_SPACING = 3.0;
        const startZ = GY_Z_CENTRE - ((graveKeys.length - 1) * STONE_SPACING) / 2;

        graveKeys.forEach((gKey, idx) => {
          const entry = graveyard[gKey];
          const stoneX = GY_X + CORR_LEN + GY_DEPTH * 0.45;
          const stoneZ = startZ + idx * STONE_SPACING;

          // Tombstone body - arched top (box + cylinder top)
          const STONE_W = 0.85, STONE_H = 1.05, STONE_D = 0.12;

          // Shared procedural stone texture for the 3D geometry
          const stCv = document.createElement("canvas");
          stCv.width = 512; stCv.height = 512;
          const sg = stCv.getContext("2d");
          const sBaseR = 130, sBaseG = 125, sBaseB = 120;
          sg.fillStyle = `rgb(${sBaseR},${sBaseG},${sBaseB})`;
          sg.fillRect(0, 0, 512, 512);
          sg.globalAlpha = 0.08;
          for (let i = 0; i < 60; i++) {
            const r = sBaseR + (Math.random() - 0.5) * 40;
            const gr2 = sBaseG + (Math.random() - 0.5) * 40;
            const b = sBaseB + (Math.random() - 0.5) * 40;
            sg.fillStyle = `rgb(${r|0},${gr2|0},${b|0})`;
            sg.beginPath();
            sg.ellipse(Math.random()*512, Math.random()*512, 30+Math.random()*60, 20+Math.random()*40, Math.random()*Math.PI, 0, Math.PI*2);
            sg.fill();
          }
          sg.globalAlpha = 0.06;
          for (let i = 0; i < 1500; i++) {
            sg.fillStyle = Math.random() > 0.5 ? "#ddd" : "#444";
            sg.fillRect(Math.random()*512, Math.random()*512, 1+Math.random()*2, 1+Math.random()*2);
          }
          sg.globalAlpha = 0.1;
          sg.strokeStyle = "#888"; sg.lineWidth = 0.5;
          for (let i = 0; i < 5; i++) {
            sg.beginPath();
            let vx = Math.random()*512, vy = Math.random()*512;
            sg.moveTo(vx, vy);
            for (let j = 0; j < 4; j++) { vx += (Math.random()-0.5)*60; vy += Math.random()*40; sg.lineTo(vx, vy); }
            sg.stroke();
          }
          sg.globalAlpha = 0.12;
          for (let i = 0; i < 10; i++) {
            const hue = 80 + Math.random()*50;
            sg.fillStyle = `hsl(${hue}, 40%, 30%)`;
            sg.beginPath();
            sg.arc(Math.random()*512, 300+Math.random()*212, 8+Math.random()*15, 0, Math.PI*2);
            sg.fill();
          }
          sg.globalAlpha = 1;
          const stoneTex = new THREE.CanvasTexture(stCv);
          stoneTex.colorSpace = THREE.SRGBColorSpace;
          const stoneMat = new THREE.MeshBasicMaterial({ map: stoneTex });

          // Base rectangle
          const base = new THREE.Mesh(new THREE.BoxGeometry(STONE_W, STONE_H, STONE_D), stoneMat);
          base.position.set(stoneX, STONE_H / 2, stoneZ);
          base.rotation.y = Math.PI / 2;  // face toward the gym (-X)
          scene.add(base);

          // Arched top - half cylinder dome on top of the box.
          const arch = new THREE.Mesh(
            new THREE.CylinderGeometry(STONE_W / 2, STONE_W / 2, STONE_D, 16, 1, false, 0, Math.PI),
            stoneMat
          );
          arch.rotation.z = Math.PI / 2;
          arch.position.set(stoneX, STONE_H, stoneZ);
          scene.add(arch);

          // ── ARCH PANEL - cross, shoe name, colorway ──
          const ARCH_R = STONE_W / 2;
          {
            // Canvas aspect should match the plane geometry aspect
            const planeW = STONE_W * 0.8;    // ~0.68m
            const planeH = ARCH_R * 0.85;    // ~0.36m
            const AW = 512, AH = Math.round(512 * (planeH / planeW));
            const aCv = document.createElement("canvas");
            aCv.width = AW; aCv.height = AH;
            const ag = aCv.getContext("2d");
            ag.clearRect(0, 0, AW, AH);

            // Layout from bottom up - bottom of canvas = bottom of semicircle
            // Colorway near the bottom
            ag.font = "italic 32px Georgia, serif";
            ag.fillStyle = "#555";
            ag.textAlign = "center";
            ag.fillText(entry.colorway || "", AW / 2, AH - 20);

            // Shoe name above colorway
            ag.fillStyle = "#555";
            ag.font = "bold 42px Georgia, serif";
            ag.fillText(entry.shoeName || "", AW / 2, AH - 60);

            // Cross - large, near the top of the arch
            ag.fillStyle = "#555";
            ag.fillRect(AW / 2 - 14, 5, 28, 110);
            ag.fillRect(AW / 2 - 50, 35, 100, 24);

            const archTex = new THREE.CanvasTexture(aCv);
            archTex.colorSpace = THREE.SRGBColorSpace;
            const archFace = new THREE.Mesh(
              new THREE.PlaneGeometry(planeW, planeH),
              new THREE.MeshBasicMaterial({ map: archTex, transparent: true })
            );
            archFace.position.set(stoneX - STONE_D / 2 - 0.01, STONE_H + ARCH_R * 0.4, stoneZ);
            archFace.rotation.y = -Math.PI / 2;
            scene.add(archFace);
          }

          // ── RECT PANEL - dates, reason, story ──
          {
            const rPlaneW = STONE_W * 0.85;   // ~0.72m
            const rPlaneH = STONE_H * 0.55;   // ~0.58m
            const RW = 512, RH = Math.round(512 * (rPlaneH / rPlaneW));
            const rCv = document.createElement("canvas");
            rCv.width = RW; rCv.height = RH;
            const rg = rCv.getContext("2d");
            rg.clearRect(0, 0, RW, RH);

            // Dates - formatted as Month Day, Year
            const fmtDate = (iso) => {
              if (!iso || iso === "???") return "???";
              const [y, m, d] = iso.split("-");
              const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
              return `${months[parseInt(m, 10) - 1]} ${parseInt(d, 10)}, ${y}`;
            };
            const purchDate = fmtDate(entry.purchaseDate);
            const retDate = fmtDate(entry.retireDate);
            // Reason
            if (entry.reason) {
              rg.font = "bold 28px Georgia, serif";
              rg.fillStyle = "#555";
              rg.textAlign = "center";
              rg.fillText(entry.reason.toUpperCase(), RW / 2, 45);
            }

            rg.font = "30px Georgia, serif";
            rg.fillStyle = "#555";
            rg.textAlign = "center";
            rg.fillText(`${purchDate}  -  ${retDate}`, RW / 2, 90);

            // Story - word wrap
            if (entry.story) {
              rg.font = "italic 24px Georgia, serif";
              rg.fillStyle = "#555";
              const words = entry.story.split(" ");
              let line = "", lineY = 135, maxW = RW - 50;
              for (const word of words) {
                const test = line ? line + " " + word : word;
                if (rg.measureText(test).width > maxW && line) {
                  rg.fillText(line, RW / 2, lineY);
                  line = word; lineY += 26;
                  if (lineY > RH - 30) break;
                } else {
                  line = test;
                }
              }
              if (line && lineY <= RH - 30) rg.fillText(line, RW / 2, lineY);
            }

            const rectTex = new THREE.CanvasTexture(rCv);
            rectTex.colorSpace = THREE.SRGBColorSpace;
            const rectFace = new THREE.Mesh(
              new THREE.PlaneGeometry(rPlaneW, rPlaneH),
              new THREE.MeshBasicMaterial({ map: rectTex, transparent: true })
            );
            rectFace.position.set(stoneX - STONE_D / 2 - 0.01, STONE_H * 0.72, stoneZ);
            rectFace.rotation.y = -Math.PI / 2;
            scene.add(rectFace);
          }

          // Shoe image in the lower portion of the rectangle
          const imgPath = entry.img ? ("../" + entry.img) : (images[gKey] ? ("../" + images[gKey]) : null);
          if (imgPath) {
            loader.load(imgPath, (tex) => {
              tex.colorSpace = THREE.SRGBColorSpace;
              const aspect = tex.image.width / tex.image.height;
              const imgH = 0.32, imgW = imgH * aspect;
              const imgMesh = new THREE.Mesh(
                new THREE.PlaneGeometry(imgW, imgH),
                new THREE.MeshBasicMaterial({ map: tex, transparent: true })
              );
              imgMesh.position.set(stoneX - STONE_D / 2 - 0.02, STONE_H * 0.38, stoneZ);
              imgMesh.rotation.y = -Math.PI / 2;
              scene.add(imgMesh);
            });
          }

          // Dirt mound in front of the grave (toward the gym)
          const mound = new THREE.Mesh(
            new THREE.SphereGeometry(0.5, 12, 6, 0, Math.PI * 2, 0, Math.PI / 2),
            new THREE.MeshBasicMaterial({ color: 0x2a1f15 })
          );
          mound.scale.set(1.1, 0.25, 0.6);
          mound.position.set(stoneX - STONE_D / 2 - 0.5, GY_FLOOR_Y, stoneZ);
          scene.add(mound);
        });
      }

      // - Wrought iron fence along the edges -
      {
        const fenceMat = new THREE.MeshBasicMaterial({ color: 0x1a1a1a });
        const fenceH = 1.8, postR = 0.04, railR = 0.02;
        const buildFence = (x1, z1, x2, z2) => {
          const len = Math.sqrt((x2 - x1) ** 2 + (z2 - z1) ** 2);
          const posts = Math.max(2, Math.ceil(len / 1.5));
          for (let i = 0; i <= posts; i++) {
            const t = i / posts;
            const px = x1 + (x2 - x1) * t, pz = z1 + (z2 - z1) * t;
            const post = new THREE.Mesh(new THREE.CylinderGeometry(postR, postR, fenceH, 6), fenceMat);
            post.position.set(px, fenceH / 2, pz);
            scene.add(post);
            // Pointed top
            const point = new THREE.Mesh(new THREE.ConeGeometry(postR * 1.8, 0.12, 6), fenceMat);
            point.position.set(px, fenceH + 0.06, pz);
            scene.add(point);
          }
          // Top rail
          const rail = new THREE.Mesh(new THREE.CylinderGeometry(railR, railR, len, 6), fenceMat);
          rail.position.set((x1 + x2) / 2, fenceH * 0.9, (z1 + z2) / 2);
          // CylinderGeometry is along Y by default; rotate to aim along the fence segment.
          rail.quaternion.setFromUnitVectors(
            new THREE.Vector3(0, 1, 0),
            new THREE.Vector3(x2 - x1, 0, z2 - z1).normalize()
          );
          rail.position.set((x1 + x2) / 2, fenceH * 0.9, (z1 + z2) / 2);
          scene.add(rail);
        };

        const fxMin = GY_X + CORR_LEN;
        const fxMax = GY_X + CORR_LEN + GY_DEPTH;
        const fzMin = GY_Z_CENTRE - GY_WIDTH / 2;
        const fzMax = GY_Z_CENTRE + GY_WIDTH / 2;
        buildFence(fxMax, fzMin, fxMax, fzMax);  // far side
        buildFence(fxMin, fzMin, fxMax, fzMin);  // left side
        buildFence(fxMin, fzMax, fxMax, fzMax);  // right side
      }
    } // end graveyard block

    // ════════════════════════════════════════════════════════════════════
    //  RENDER LOOP
    // ════════════════════════════════════════════════════════════════════
    let _lastFrameT = performance.now();
    renderer.setAnimationLoop((time) => {
      const now = time || performance.now();
      const dt  = Math.min((now - _lastFrameT) / 1000, 0.1);
      _lastFrameT = now;
      if (TEST_MODE) updateFpsMovement(now);
      else updateLocomotion(dt);
      clampToRoom();
      updateCases(now);
      updatePulse(now);
      updateStage(now);
      ofd.update(now, dt);
      if (window._rc) window._rc.update(now, dt);
      if (podiumGroup.userData?.update) podiumGroup.userData.update(now);
      if (storyPanel) faceUserUpright(storyPanel);
      // Graveyard fog drift
      for (const fp of graveyardAnims) {
        const t = now * 0.001 + fp.userData.drift * 2.0;
        if (fp.userData.baseZ !== undefined) {
          fp.position.z = fp.userData.baseZ + Math.sin(t * 0.4) * 0.15;
          fp.material.opacity = 0.4 + Math.sin(t * 0.3) * 0.15;
        } else if (fp.userData.baseX !== undefined) {
          fp.position.x = fp.userData.baseX + Math.sin(t * 0.25) * 0.3;
          fp.material.opacity = 0.3 + Math.sin(t * 0.2 + 1) * 0.1;
        }
      }
      renderer.render(scene, camera);
    });

    log(TEST_MODE
      ? "Scene ready. Click the canvas to start."
      : "Scene ready. Tap Enter VR to begin.", "ok");

    // Fade out the loading log after a short delay so visitors don't
    // see a wall of diagnostic text.  The test-mode controls banner is
    // a separate element and stays visible.
    setTimeout(() => {
      statusEl.style.transition = "opacity 1s ease";
      statusEl.style.opacity = "0";
    }, 2000);
  </script>
</body>
</html>
