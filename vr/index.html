        // ── OFD audio ─────────────────────────────────────────────────
        const ofdAudio = new Audio("../assets/ofd-theme.mp3");
        ofdAudio.preload = "auto";
        ofdAudio.volume = 0.8;
        let ofdAudioFading = false;

        // ── Display panel in the key ────────────────────────────────────
        const OFD_Y = 0.01, OFD_Z = -4.5;
        ofdDisplay = new THREE.Group();
        ofdDisplay.position.set(0, OFD_Y, OFD_Z);
        ofdDisplay.rotation.x = -Math.PI / 2;           // flat on floor, face up
        scene.add(ofdDisplay);

        // Dark plaque backing (canvas) with title, shoe name, and prompt
        const CW = 768, CH = 1100, margin = 16, rad = 28;
        const cv = document.createElement("canvas");
        cv.width = CW; cv.height = CH;
        const g = cv.getContext("2d");
        g.clearRect(0, 0, CW, CH);

        // Rounded rect
        g.beginPath();
        g.moveTo(margin + rad, margin);
        g.arcTo(CW - margin, margin, CW - margin, CH - margin, rad);
        g.arcTo(CW - margin, CH - margin, margin, CH - margin, rad);
        g.arcTo(margin, CH - margin, margin, margin, rad);
        g.arcTo(margin, margin, CW - margin, margin, rad);
        g.closePath();
        g.fillStyle = "rgba(10,10,10,0.92)"; g.fill();
        g.lineWidth = 6; g.strokeStyle = "#e63946"; g.stroke();

        g.textAlign = "center"; g.textBaseline = "middle";

        // "ON FEET TODAY" — vault-red, letterspaced
        g.fillStyle = "#e63946";
        g.font = "bold 60px -apple-system, BlinkMacSystemFont, sans-serif";
        const titleChars = "ON FEET TODAY".split("");
        const sp = 10;
        let tw = 0;
        for (const ch of titleChars) tw += g.measureText(ch).width + sp;
        tw -= sp;
        let tx = (CW - tw) / 2;
        for (const ch of titleChars) {
          const cw = g.measureText(ch).width;
          g.fillText(ch, tx + cw / 2, 78);
          tx += cw + sp;
        }

        // Accent line
        g.strokeStyle = "rgba(230,57,70,0.4)"; g.lineWidth = 2;
        g.beginPath(); g.moveTo(60, 125); g.lineTo(CW - 60, 125); g.stroke();

        // Shoe name
        g.fillStyle = "#ffffff";
        g.font = "bold 54px -apple-system, BlinkMacSystemFont, sans-serif";
        g.fillText(precomp.shoeName, CW / 2, 860);

        // Colorway
        g.fillStyle = "#f0e6c8";
        g.font = "46px -apple-system, BlinkMacSystemFont, sans-serif";
        g.fillText(precomp.colorway, CW / 2, 930);

        // Prompt
        g.fillStyle = "rgba(255,255,255,0.30)";
        g.font = "italic 34px -apple-system, BlinkMacSystemFont, sans-serif";
        g.fillText("select to launch", CW / 2, 1035);

        const backingTex = new THREE.CanvasTexture(cv);
        backingTex.colorSpace = THREE.SRGBColorSpace;
        const pw = 1.5, ph = pw * (CH / CW);
        const backing = new THREE.Mesh(
          new THREE.PlaneGeometry(pw, ph),
          new THREE.MeshBasicMaterial({ map: backingTex, transparent: true, side: THREE.DoubleSide })
        );
        ofdDisplay.add(backing);
        ofdClickTarget = backing;

        // Shoe photo overlaid on the backing
        const photo = new THREE.Mesh(
          new THREE.PlaneGeometry(0.84, 0.84),
          new THREE.MeshBasicMaterial({ color: 0x222222, transparent: true, alphaTest: 0.01, side: THREE.DoubleSide })
        );
        photo.position.set(0, 0.10, 0.005);
        ofdDisplay.add(photo);

        loader.load(imgPaths[0], (texture) => {
          texture.colorSpace = THREE.SRGBColorSpace;
          texture.anisotropy = 8;
          photo.material.map = texture;
          photo.material.color.set(0xffffff);
          photo.material.needsUpdate = true;
          const aspect = texture.image.width / texture.image.height;
          const fitW = 0.84, fitH = 0.80;
          const aw = aspect >= fitW / fitH ? fitW : fitH * aspect;
          const ah = aspect >= fitW / fitH ? fitW / aspect : fitH;
          photo.geometry.dispose();
          photo.geometry = new THREE.PlaneGeometry(aw, ah);
        });

        // ── Animation infrastructure ────────────────────────────────────

        // Fade sphere (hides the room during the sequence)
        const fadeSphere = new THREE.Mesh(
          new THREE.SphereGeometry(45, 16, 12),
          new THREE.MeshBasicMaterial({
            color: 0x000000, side: THREE.BackSide,
            transparent: true, opacity: 0, depthWrite: false,
          })
        );
        fadeSphere.renderOrder = 998;
        camera.add(fadeSphere);

        // Hide/show all room content (everything except the player group,
        // which carries the camera and all OFD animation elements).
        let _hiddenRoom = [];
        const hideRoom = () => {
          _hiddenRoom = [];
          for (const obj of scene.children) {
            if (obj === player) continue;
            if (obj.visible) { _hiddenRoom.push(obj); obj.visible = false; }
          }
        };
        const showRoom = () => {
          for (const obj of _hiddenRoom) obj.visible = true;
          _hiddenRoom = [];
        };

        // Starfield particles (camera-local so they always stream from ahead)
        const STAR_COUNT = 400, WARP_SPEED = 22;
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(STAR_COUNT * 3);
        for (let i = 0; i < STAR_COUNT; i++) {
          starPos[i * 3]     = (Math.random() - 0.5) * 24;
          starPos[i * 3 + 1] = (Math.random() - 0.5) * 24;
          starPos[i * 3 + 2] = -(Math.random() * 35 + 5);
        }
        starGeo.setAttribute("position", new THREE.BufferAttribute(starPos, 3));
        const starField = new THREE.Points(starGeo, new THREE.PointsMaterial({
          color: 0xffffff, size: 0.06, sizeAttenuation: true,
          transparent: true, depthWrite: false,
        }));
        starField.visible = false;
        starField.renderOrder = 999;
        camera.add(starField);

        const warpStars = (dt) => {
          const pos = starGeo.attributes.position.array;
          for (let i = 0; i < STAR_COUNT; i++) {
            pos[i * 3 + 2] += WARP_SPEED * dt;
            if (pos[i * 3 + 2] > 5) {
              pos[i * 3 + 2] -= 40;
              pos[i * 3]     = (Math.random() - 0.5) * 24;
              pos[i * 3 + 1] = (Math.random() - 0.5) * 24;
            }
          }
          starGeo.attributes.position.needsUpdate = true;
        };

        // Helper: canvas text → plane mesh
        const makeLabel = (text, fontSize, color, letterSpace) => {
          const LW = 1400, LH = 200;
          const lc = document.createElement("canvas");
          lc.width = LW; lc.height = LH;
          const lg = lc.getContext("2d");
          lg.clearRect(0, 0, LW, LH);
          lg.textAlign = "center"; lg.textBaseline = "middle";
          lg.fillStyle = color;
          lg.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
          if (letterSpace) {
            const chars = text.split("");
            let tw2 = 0;
            for (const c of chars) tw2 += lg.measureText(c).width + letterSpace;
            tw2 -= letterSpace;
            let lx = (LW - tw2) / 2;
            for (const c of chars) {
              const cw2 = lg.measureText(c).width;
              lg.fillText(c, lx + cw2 / 2, LH / 2);
              lx += cw2 + letterSpace;
            }
          } else {
            lg.fillText(text, LW / 2, LH / 2);
          }
          const tex = new THREE.CanvasTexture(lc);
          tex.colorSpace = THREE.SRGBColorSpace;
          const h = 0.35, w = h * (LW / LH);
          return new THREE.Mesh(
            new THREE.PlaneGeometry(w, h),
            new THREE.MeshBasicMaterial({
              map: tex, transparent: true, side: THREE.DoubleSide,
              depthWrite: false, depthTest: false,
            })
          );
        };

        // Intro label — "ON FEET TODAY" Superman-style fly-at-camera with ghost trails
        const introGroup = new THREE.Group();
        introGroup.visible = false;
        introGroup.renderOrder = 1001;
        camera.add(introGroup);

        const introLabel = makeLabel("ON FEET TODAY", 120, "#ffffff", 16);
        introLabel.renderOrder = 1002;
        introGroup.add(introLabel);

        // Ghost trail copies behind the main text
        const GHOST_COUNT = 7;
        const ghosts = [];
        for (let i = 0; i < GHOST_COUNT; i++) {
          const g = makeLabel("ON FEET TODAY", 120, "#ffffff", 16);
          g.renderOrder = 1001;
          g.material.opacity = 0;
          introGroup.add(g);
          ghosts.push(g);
        }

        // Flythrough planes (one per image, camera-local)
        const flyGroup = new THREE.Group();
        flyGroup.visible = false;
        camera.add(flyGroup);

        const FLY_W = 1.2, FLY_H = 1.0;
        const flyPlanes = [];
        for (let i = 0; i < imgPaths.length; i++) {
          const mat = new THREE.MeshBasicMaterial({
            color: 0xffffff, transparent: true, opacity: 0,
            side: THREE.DoubleSide, depthWrite: false, depthTest: false,
          });
          const p = new THREE.Mesh(new THREE.PlaneGeometry(FLY_W, FLY_H), mat);
          p.visible = false;
          p.renderOrder = 1000 + i;
          flyGroup.add(p);
          flyPlanes.push(p);
        }

        // Card group — three images + labels, shown after flythrough
        const cardGroup = new THREE.Group();
        cardGroup.visible = false;
        cardGroup.position.set(0, 0, -2.5);
        camera.add(cardGroup);

        const cardTitle = makeLabel("ON FEET TODAY", 90, "#e63946", 12);
        cardTitle.position.set(0, 0.7, 0);
        cardTitle.renderOrder = 1010;
        cardGroup.add(cardTitle);

        const cardName = makeLabel(
          `${precomp.shoeName}  \u2014  ${precomp.colorway}`, 72, "#ffffff", 0
        );
        cardName.position.set(0, -0.65, 0);
        cardName.renderOrder = 1010;
        cardGroup.add(cardName);

        const CARD_SPACING = 0.75;
        const cardPlanes = [];
        for (let i = 0; i < imgPaths.length; i++) {
          const mat = new THREE.MeshBasicMaterial({
            color: 0xffffff, transparent: true, alphaTest: 0.01,
            side: THREE.DoubleSide, depthWrite: false, depthTest: false,
          });
          const p = new THREE.Mesh(new THREE.PlaneGeometry(0.55, 0.55), mat);
          p.position.set((i - (imgPaths.length - 1) / 2) * CARD_SPACING, -0.03, 0);
          p.visible = false;
          p.renderOrder = 1010;
          cardGroup.add(p);
          cardPlanes.push(p);
        }

        const cardExit = makeLabel("select to exit", 48, "rgba(255,255,255,0.35)", 0);
        cardExit.position.set(0, -0.95, 0);
        cardExit.renderOrder = 1010;
        cardGroup.add(cardExit);

        // Load textures (shared by flythrough + card planes)
        imgPaths.forEach((path, i) => {
          loader.load(path, (texture) => {
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.anisotropy = 8;
            const aspect = texture.image.width / texture.image.height;
            if (flyPlanes[i]) {
              flyPlanes[i].material.map = texture;
              flyPlanes[i].material.needsUpdate = true;
              const fw = aspect >= 1 ? FLY_W : FLY_H * aspect;
              const fh = aspect >= 1 ? FLY_W / aspect : FLY_H;
              flyPlanes[i].geometry.dispose();
              flyPlanes[i].geometry = new THREE.PlaneGeometry(fw, fh);
            }
            if (cardPlanes[i]) {
              cardPlanes[i].material.map = texture;
              cardPlanes[i].material.needsUpdate = true;
              cardPlanes[i].visible = true;
              const cs = 0.55;
              const cw2 = aspect >= 1 ? cs : cs * aspect;
              const ch2 = aspect >= 1 ? cs / aspect : cs;
              cardPlanes[i].geometry.dispose();
              cardPlanes[i].geometry = new THREE.PlaneGeometry(cw2, ch2);
            }
          });
        });

        // ── Timing constants ────────────────────────────────────────────
        const OFD_FADEOUT_MS = 600;
        const OFD_INTRO_MS  = 2200;   // text: 600 drift + 600 hold + 1000 rush
        const OFD_TEXT_DRIFT = 600;    // slow approach from distance
        const OFD_TEXT_HOLD  = 600;    // pause at hero position
        const OFD_TEXT_RUSH  = 1000;   // accelerate through camera
        const OFD_FLY_MS    = 2800;   // per shoe: 400 appear + 800 drift + 600 hold + 1000 rush
        const OFD_SHOE_APPEAR = 400;  // fade in from distance
        const OFD_SHOE_DRIFT  = 800;  // slow drift toward camera
        const OFD_SHOE_HOLD   = 600;  // pause at hero position
        const OFD_SHOE_RUSH   = 1000; // accelerate past camera
        const OFD_OVERLAP   = 500;
        const OFD_FLY_TOTAL = imgPaths.length > 1
          ? (imgPaths.length - 1) * (OFD_FLY_MS - OFD_OVERLAP) + OFD_FLY_MS
          : OFD_FLY_MS;
        const OFD_FADEIN_MS = 600;

        const ease = (t) => 1 - Math.pow(1 - t, 3);
        const easeIn = (t) => t * t * t;  // accelerate for the rush phase

        // ── Trigger ─────────────────────────────────────────────────────
        ofd.trigger = (now) => {
          ofd.phase = "fadeout";
          ofd.t0 = now;
          ofdDisplay.visible = false;
          restoreStageInstant();
          hideStory();
          // Start the music — user gesture (click) satisfies autoplay policy
          ofdAudio.currentTime = 0;
          ofdAudio.volume = 0.8;
          ofdAudioFading = false;
          ofdAudio.play().catch(() => {});
        };

        // ── Exit card (user clicks during card phase) ───────────────────
        ofd.exitCard = (now) => {
          cardGroup.visible = false;
          starField.visible = false;
          ofd.phase = "fadein";
          ofd.t0 = now;
          // Begin audio fade-out over the room fadein duration
          ofdAudioFading = true;
        };

        // ── Per-frame update ────────────────────────────────────────────
        ofd.update = (now, dt) => {
          if (ofd.phase === "idle" || ofd.phase === "done") return;
          const elapsed = now - ofd.t0;

          if (ofd.phase === "fadeout") {
            const t = Math.min(elapsed / OFD_FADEOUT_MS, 1);
            fadeSphere.material.opacity = ease(t);
            if (t >= 1) {
              hideRoom();
              fadeSphere.material.transparent = false;
              fadeSphere.material.needsUpdate = true;
              starField.visible = true;
              introGroup.visible = true;
              ofd.phase = "intro";
              ofd.t0 = now;
            }

          } else if (ofd.phase === "intro") {
            warpStars(dt);
            // Superman-style text: drift in → hold → rush through camera
            // Ghost trail spacing and opacity scale with current speed
            let textZ, textOpacity = 1, speed = 0;
            if (elapsed < OFD_TEXT_DRIFT) {
              // Drift: text approaches from far
              const t = elapsed / OFD_TEXT_DRIFT;
              textZ = -18 + 15 * ease(t);       // -18 → -3
              speed = 0.3;
            } else if (elapsed < OFD_TEXT_DRIFT + OFD_TEXT_HOLD) {
              // Hold: text pauses at hero position
              textZ = -3;
              speed = 0.05;
            } else {
              // Rush: text accelerates through camera
              const rushT = (elapsed - OFD_TEXT_DRIFT - OFD_TEXT_HOLD) / OFD_TEXT_RUSH;
              const rushE = easeIn(Math.min(rushT, 1));
              textZ = -3 + 15 * rushE;            // -3 → +12 (past camera)
              textOpacity = Math.max(0, 1 - rushT * 1.5);
              speed = 0.3 + 2.5 * rushE;
            }
            introLabel.position.set(0, 0, textZ);
            introLabel.material.opacity = textOpacity;

            // Ghost trails: spaced behind the main label, more spread at higher speed
            const ghostSpacing = 0.15 + 0.6 * speed;
            for (let gi = 0; gi < GHOST_COUNT; gi++) {
              const depth = (gi + 1) * ghostSpacing;
              ghosts[gi].position.set(0, 0, textZ - depth);
              ghosts[gi].material.opacity = textOpacity * (0.45 - gi * (0.38 / GHOST_COUNT)) * Math.min(speed * 2, 1);
            }

            if (elapsed >= OFD_INTRO_MS) {
              introGroup.visible = false;
              flyGroup.visible = true;
              ofd.phase = "fly";
              ofd.t0 = now;
            }

          } else if (ofd.phase === "fly") {
            warpStars(dt);
            for (let i = 0; i < flyPlanes.length; i++) {
              const start = i * (OFD_FLY_MS - OFD_OVERLAP);
              const localElapsed = elapsed - start;
              if (localElapsed < 0) { flyPlanes[i].visible = false; continue; }
              if (localElapsed > OFD_FLY_MS) { flyPlanes[i].visible = false; continue; }
              flyPlanes[i].visible = true;

              let shoeZ, shoeScale, shoeOpacity;
              if (localElapsed < OFD_SHOE_APPEAR) {
                // Appear: fade in from deep
                const t = localElapsed / OFD_SHOE_APPEAR;
                shoeZ = -18 + 4 * ease(t);
                shoeScale = 0.3 + 0.3 * t;
                shoeOpacity = ease(t);
              } else if (localElapsed < OFD_SHOE_APPEAR + OFD_SHOE_DRIFT) {
                // Drift: slow approach toward hero position
                const t = (localElapsed - OFD_SHOE_APPEAR) / OFD_SHOE_DRIFT;
                shoeZ = -14 + 11 * ease(t);       // -14 → -3
                shoeScale = 0.6 + 0.8 * ease(t);
                shoeOpacity = 1;
              } else if (localElapsed < OFD_SHOE_APPEAR + OFD_SHOE_DRIFT + OFD_SHOE_HOLD) {
                // Hold: hero moment, shoe pauses center stage
                shoeZ = -3;
                shoeScale = 1.4;
                shoeOpacity = 1;
              } else {
                // Rush: accelerate through and past the camera
                const t = (localElapsed - OFD_SHOE_APPEAR - OFD_SHOE_DRIFT - OFD_SHOE_HOLD) / OFD_SHOE_RUSH;
                const rushE = easeIn(Math.min(t, 1));
                shoeZ = -3 + 15 * rushE;
                shoeScale = 1.4 + 1.6 * rushE;
                shoeOpacity = Math.max(0, 1 - t * 1.5);
              }
              flyPlanes[i].position.set(0, 0, shoeZ);
              flyPlanes[i].scale.setScalar(shoeScale);
              flyPlanes[i].material.opacity = shoeOpacity;
            }
            if (elapsed >= OFD_FLY_TOTAL) {
              flyGroup.visible = false;
              introGroup.visible = false;
              cardGroup.visible = true;
              ofd.phase = "card";
              ofd.t0 = now;
            }

          } else if (ofd.phase === "card") {
            warpStars(dt);
            // Fade card in during first 300ms
            const cardFade = Math.min(elapsed / 300, 1);
            cardTitle.material.opacity = cardFade;
            cardName.material.opacity = cardFade;
            cardExit.material.opacity = Math.min(Math.max((elapsed - 600) / 400, 0), 1);
            for (const cp of cardPlanes) cp.material.opacity = cardFade;
            // Card persists until the user selects to exit

          } else if (ofd.phase === "fadein") {
            if (!fadeSphere.material.transparent) {
              showRoom();
              fadeSphere.material.transparent = true;
              fadeSphere.material.needsUpdate = true;
            }
            const t = Math.min(elapsed / OFD_FADEIN_MS, 1);
            fadeSphere.material.opacity = 1 - ease(t);
            // Fade audio out in sync with the room fading back in
            if (ofdAudioFading) {
              ofdAudio.volume = Math.max(0, 0.8 * (1 - ease(t)));
            }
            if (t >= 1) {
              fadeSphere.material.opacity = 0;
              ofd.phase = "done";
              if (ofdDisplay) ofdDisplay.visible = true;
              ofdAudio.pause();
              ofdAudio.currentTime = 0;
              ofdAudioFading = false;
            }
          }
        };

        log("On Feet Today: " + precomp.shoeName + " — " + precomp.colorway, "ok");
      } else if (precomp) {
        log("On Feet Today: skipped (last worn " + precomp.date + ", today " + todayISO + ")", "dim");
      }
    }

    // ════════════════════════════════════════════════════════════════════
    //  RENDER LOOP
    // ════════════════════════════════════════════════════════════════════
    let _lastFrameT = performance.now();
    renderer.setAnimationLoop((time) => {
      const now = time || performance.now();
      const dt  = Math.min((now - _lastFrameT) / 1000, 0.1);
      _lastFrameT = now;
      if (TEST_MODE) updateFpsMovement(now);
      else updateLocomotion(dt);
      clampToRoom();
      updateCases(now);
      updatePulse(now);
      updateStage(now);
      ofd.update(now, dt);
      if (storyPanel) faceUserUpright(storyPanel);
      renderer.render(scene, camera);
    });

    log(TEST_MODE
      ? "Scene ready. Click the canvas to start."
      : "Scene ready. Tap Enter VR to begin.", "ok");
  </script>
</body>
</html>
