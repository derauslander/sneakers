      // Office cases stage on the pedestal - float the panel directly above
      // the shoe, anchored by its bottom edge so longer stories grow upward
      // and never crowd the shoe. Uses the actual rest position and shoe
      // height computed in ensurePopTexture (which runs before this call).
      if (caseRef.usePedestal) {
        const panelH  = storyPanel.geometry.parameters.height;
        const shoeTop = stage.restPos.y + stageShoe.geometry.parameters.height / 2;
        const bottomY = shoeTop + 0.12;              // small gap above the shoe
        storyPanel.position.set(PED_X, bottomY + panelH / 2, PED_Z);
        faceUserUpright(storyPanel);
        scene.add(storyPanel);
        return;
      }

      // Place the panel beside the pulled-forward case (which lands at
      // caseRef.viewPosWorld). "Beside" means offset to the user's right -
      // mirror direction depends on which wall the user is facing. The
      // viewPosWorld already has a 0.5m left-offset baked in; we use its
      // sign to determine the panel's offset direction.
      const viewP = caseRef.viewPosWorld;
      // If viewPosWorld.x is negative (display wall), put panel at +1.2 x.
      // If positive (dream wall), put panel at -1.2 x. Same offset magnitude.
      const panelX = viewP.x < 0 ? 1.2 : -1.2;
      storyPanel.position.set(panelX, 1.6, viewP.z);
      faceUserUpright(storyPanel);
      scene.add(storyPanel);
    };
    const hideStory = () => {
      if (!storyPanel) return;
      scene.remove(storyPanel);
      storyPanel.material.map.dispose();
      storyPanel.material.dispose();
      storyPanel.geometry.dispose();
      storyPanel = null;
    };

    // ════════════════════════════════════════════════════════════════════
    //  RENDERER + WEBXR
    // ════════════════════════════════════════════════════════════════════
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    if (!TEST_MODE) renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);
    if (!TEST_MODE) document.body.appendChild(VRButton.createButton(renderer));

    // ── Test-mode FPS controls ──────────────────────────────────────────
    let fpsControls = null;
    const fpsKeys = {};
    const FPS_SPEED = 2.5;           // metres per second
    const fpsDir = new THREE.Vector3();
    const fpsSide = new THREE.Vector3();

    if (TEST_MODE) {
      fpsControls = new PointerLockControls(camera, renderer.domElement);

      // Crosshair - thin + centred on screen, only visible when locked.
      const crosshair = document.createElement("div");
      crosshair.id = "crosshair";
      Object.assign(crosshair.style, {
        position: "fixed", top: "50%", left: "50%",
        width: "20px", height: "20px",
        marginTop: "-10px", marginLeft: "-10px",
        pointerEvents: "none", display: "none", zIndex: "100",
      });
      crosshair.innerHTML = `
        <div style="position:absolute;width:2px;height:20px;left:9px;top:0;background:rgba(255,255,255,0.5)"></div>
        <div style="position:absolute;width:20px;height:2px;left:0;top:9px;background:rgba(255,255,255,0.5)"></div>`;
      document.body.appendChild(crosshair);

      // Banner with instructions (fades out after lock).
      const banner = document.createElement("div");
      Object.assign(banner.style, {
        position: "fixed", bottom: "24px", left: "50%", transform: "translateX(-50%)",
        padding: "10px 20px", background: "rgba(0,0,0,0.7)", border: "1px solid #444",
        color: "#ccc", fontSize: "13px", fontFamily: "-apple-system, sans-serif",
        letterSpacing: "1px", zIndex: "100", whiteSpace: "nowrap",
      });
      banner.textContent = "TEST MODE - Click to start · WASD move · Mouse look · Click to interact · ESC release";
      document.body.appendChild(banner);

      fpsControls.addEventListener("lock", () => { crosshair.style.display = "block"; banner.style.display = "none"; });
      fpsControls.addEventListener("unlock", () => { crosshair.style.display = "none"; banner.style.display = "block"; });

      document.addEventListener("keydown", (e) => { fpsKeys[e.code] = true; });
      document.addEventListener("keyup",   (e) => { fpsKeys[e.code] = false; });

      log("Test mode enabled - click the canvas to start", "ok");
    }

    // Per-frame WASD movement (test mode only). Projects the camera's
    // forward vector onto XZ so WASD never causes vertical drift.
    let lastFpsTime = performance.now();
    const updateFpsMovement = (now) => {
      if (!fpsControls || !fpsControls.isLocked) return;
      const dt = Math.min((now - lastFpsTime) / 1000, 0.1); // cap to avoid jumps
      lastFpsTime = now;
      camera.getWorldDirection(fpsDir);
      fpsDir.y = 0; fpsDir.normalize();
      fpsSide.crossVectors(camera.up, fpsDir).normalize();
      let dx = 0, dz = 0;
      if (fpsKeys["KeyW"]) { dx += fpsDir.x; dz += fpsDir.z; }
      if (fpsKeys["KeyS"]) { dx -= fpsDir.x; dz -= fpsDir.z; }
      if (fpsKeys["KeyA"]) { dx += fpsSide.x; dz += fpsSide.z; }
      if (fpsKeys["KeyD"]) { dx -= fpsSide.x; dz -= fpsSide.z; }
      if (dx || dz) {
        const len = Math.sqrt(dx * dx + dz * dz);
        camera.position.x += (dx / len) * FPS_SPEED * dt;
        camera.position.z += (dz / len) * FPS_SPEED * dt;
      }
    };

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ════════════════════════════════════════════════════════════════════
    //  ON FEET TODAY - shared state (display + animation built later)
    // ════════════════════════════════════════════════════════════════════
    let ofdDisplay = null, ofdClickTarget = null;
    const ofd = { phase: "idle", trigger: () => {}, update: () => {}, exitCard: () => {} };

    // ════════════════════════════════════════════════════════════════════
    //  CONTROLLERS - raycaster + trigger select
    // ════════════════════════════════════════════════════════════════════
    const raycaster = new THREE.Raycaster();
    const tempMatrix = new THREE.Matrix4();
    const pointerGeometry = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(0, 0, -5),
    ]);

    let focusedCase = null;

    // beginReturn captures the case's current position/scale before kicking
    // off the return animation, so the lerp starts from where the case
    // actually is - not from where it would have been at end-of-pull.
    // Without this, interrupting a pull mid-flight (rapid clicks) causes a
    // teleport to the forward position before the return begins.
    const beginReturn = (c, now) => {
      c.returnStart = c.group.position.clone();
      c.returnStartScale = c.group.scale.x;
      c.state = "returning";
      c.stateStart = now;
    };

    // Swap a case between its resting image (image 3, on the wall) and its
    // popped image (image 2, shown pulled forward). The resting texture is
    // cached at build; image 2 is lazy-loaded on first pull (deliberately not
    // counted in the initial "all textures loaded" tally). The showing-guard
    // stops a slow load from applying after the user has moved on.
    const swapCaseImage = (caseRef, which) => {
      caseRef.showing = which;
      const apply = (texture, aspect) => {
        if (caseRef.showing !== which) return;
        caseRef.plane.material.map = texture;
        caseRef.plane.material.color.set(0xffffff);
        caseRef.plane.material.needsUpdate = true;
        fitPlaneToBox(caseRef.plane, aspect, INNER_W, INNER_H);
      };
      const cached = which === "rest" ? caseRef.restTexture : caseRef.popTexture;
      if (cached) {
        apply(cached, which === "rest" ? caseRef.restAspect : caseRef.popAspect);
        return;
      }
      const path = which === "rest" ? caseRef.restPath : caseRef.popPath;
      loader.load(path, (texture) => {
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.anisotropy = 8;
        const aspect = texture.image.width / texture.image.height;
        if (which === "rest") { caseRef.restTexture = texture; caseRef.restAspect = aspect; }
        else                  { caseRef.popTexture  = texture; caseRef.popAspect  = aspect; }
        apply(texture, aspect);
      }, undefined, (err) => log(`Failed to load ${path}: ${err?.message || err}`, "err"));
    };

    // ── Pedestal staging (office wall) ──────────────────────────────────
    // Ensure image 2 is loaded for a case, then run cb(texture, aspect).
    // Caches on the caseRef (same field swapCaseImage uses, though a given
    // case is only ever office or dream, never both).
    const ensurePopTexture = (caseRef, cb) => {
      if (caseRef.popTexture) { cb(caseRef.popTexture, caseRef.popAspect); return; }
      loader.load(caseRef.popPath, (texture) => {
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.anisotropy = 8;
        caseRef.popTexture = texture;
        caseRef.popAspect  = texture.image.width / texture.image.height;
        cb(texture, caseRef.popAspect);
      }, undefined, (err) => log(`Failed to load ${caseRef.popPath}: ${err?.message || err}`, "err"));
    };

    const tmpWorld = new THREE.Vector3();

    // Face the user but stay vertical: aim at the camera's XZ at the mesh's
    // own height so there's no backward pitch. Uses the camera's live world
    // position so the shoe and story panel track the user under locomotion.
    const _faceTarget = new THREE.Vector3();
    const faceUserUpright = (mesh) => {
      camera.getWorldPosition(_faceTarget);
      mesh.lookAt(_faceTarget.x, mesh.position.y, _faceTarget.z);
    };

    // Put a staged case back instantly (no animation): re-show its image-3
    // plane, hide the stage shoe. Used when one click supersedes another.
    const restoreStageInstant = () => {
      if (!stage.active) return;
      if (stage.caseRef) stage.caseRef.plane.visible = true;
      stageShoe.visible = false;
      contactShadow.visible = false;
      stage.active = false;
      stage.caseRef = null;
      stage.phase = "idle";
    };

    // Fly a clicked office case's shoe (image 2) out to the pedestal.
    const launchToPedestal = (caseRef, now) => {
      restoreStageInstant();                  // clear any shoe already out
      // Source = the cell's world position (the photo plane sits at the cell
      // group's origin, so the group's world position is the cell centre).
      caseRef.group.getWorldPosition(tmpWorld);
      const source = tmpWorld.clone();
      stage.active = true;
      stage.caseRef = caseRef;
      stage.phase = "out";
      stage.t0 = now;
      stage.sourceWorld.copy(source);
      stage.fromPos.copy(source);
      stage.fromScale = STAGE_START_SCALE;
      // Texture + size the stage shoe, then reveal it and hide the cell's
      // image-3 plane. Doing the hide at texture-ready (not on click) avoids a
      // brief empty beat the first time a case is opened.
      ensurePopTexture(caseRef, (texture, aspect) => {
        if (!stage.active || stage.caseRef !== caseRef || stage.phase !== "out") return; // superseded/dismissed
        stageShoe.material.map = texture;
        stageShoe.material.color.set(0xffffff);
        stageShoe.material.needsUpdate = true;
        fitPlaneToBox(stageShoe, aspect, PED_FIT_W, PED_FIT_H);
        // Sit the shoe's base on the cap: anchor by the bottom edge (at full
        // scale) so wide and tall shoes share a ground line, tucked slightly
        // into the cap. Resting pos is per-shoe; the travel lerps toward it.
        const ph = stageShoe.geometry.parameters.height;
        const pw = stageShoe.geometry.parameters.width;
        stage.restPos.set(PED_X, PED_CAP_TOP + ph / 2 - PED_SIT_SINK, PED_Z);
        stage.shadowW = pw;
        stageShoe.position.copy(source);
        stageShoe.scale.setScalar(STAGE_START_SCALE);
        faceUserUpright(stageShoe);             // stand upright, yaw to face the user
        stageShoe.visible = true;
        caseRef.plane.visible = false;
        stage.t0 = performance.now();          // start travel from actual reveal
        showStoryFor(caseRef);                 // after restPos is set so the panel anchors to the real shoe top
      });
    };

    // Send the staged shoe back to its cell.
    const dismissPedestal = (now) => {
      if (!stage.active) return;
      stage.phase = "back";
      stage.t0 = now;
      stage.fromPos.copy(stageShoe.position);
      stage.fromScale = stageShoe.scale.x;
      hideStory();
    };

    // Per-frame travel for the stage shoe. Reuses the pull-forward easing.
    const updateStage = (now) => {
      if (!stage.active || stage.phase === "idle") return;
      const sw = stage.shadowW;
      contactShadow.scale.set(sw * 1.25, sw * 0.5, 1);   // elliptical, shoe-width
      if (stage.phase === "settled") {
        faceUserUpright(stageShoe);
        contactShadow.visible = true;
        contactShadow.material.opacity = 1;
        return;
      }
      const t = Math.min((now - stage.t0) / PULL_DURATION_MS, 1);
      const e = easeOutCubic(t);
      if (stage.phase === "out") {
        stageShoe.position.lerpVectors(stage.fromPos, stage.restPos, e);
        stageShoe.scale.setScalar(stage.fromScale + (1 - stage.fromScale) * e);
        faceUserUpright(stageShoe);
        contactShadow.visible = stageShoe.visible;       // only once the shoe is revealed
        contactShadow.material.opacity = stageShoe.visible ? e : 0;
        if (t >= 1) stage.phase = "settled";
      } else if (stage.phase === "back") {
        stageShoe.position.lerpVectors(stage.fromPos, stage.sourceWorld, e);
        stageShoe.scale.setScalar(stage.fromScale + (STAGE_START_SCALE - stage.fromScale) * e);
        faceUserUpright(stageShoe);
        contactShadow.material.opacity = 1 - e;          // fade out as it leaves
        if (t >= 1) {
          stageShoe.visible = false;
          contactShadow.visible = false;
          if (stage.caseRef) stage.caseRef.plane.visible = true;
          stage.active = false;
          stage.caseRef = null;
          stage.phase = "idle";
        }
      }
    };

    const onSelect = (event) => {
      const controller = event.target;
      tempMatrix.identity().extractRotation(controller.matrixWorld);
      raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
      raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
      handleRayHit();
    };

    // Shared hit-test + interaction logic. The raycaster must already be
    // aimed before calling this (by onSelect for VR, by the test-mode
    // click handler for desktop).
    const handleRayHit = () => {
      const now = performance.now();

      // During OFD animation, block all interactions (except card phase exit).
      if (ofd.phase === "card") { ofd.exitCard(now); return; }
      if (ofd.phase !== "idle" && ofd.phase !== "done") return;

      // During Roll Call - tap to exit; block all other interactions.
      if (window._rc && window._rc.phase === "fly") {
        window._rc.exit(now);
        return;
      }
      if (window._rc && window._rc.phase !== "idle") return;

      // Check OFD display first.
      if (ofdClickTarget && (ofd.phase === "idle" || ofd.phase === "done")) {
        const ofdHits = raycaster.intersectObject(ofdClickTarget, false);
        if (ofdHits.length > 0) {
          ofd.trigger(now);
          return;
        }
      }

      // Check Roll Call trigger panel.
      if (window._rc) {
        const rcHits = raycaster.intersectObjects(scene.children.filter(c => c.userData?.isRollCall), false);
        if (rcHits.length > 0) {
          window._rc.trigger(now);
          return;
        }
      }

      // Check podium click target - advance to next ranking category.
      if (podiumGroup.userData?.clickTarget) {
        const podiumHits = raycaster.intersectObject(podiumGroup.userData.clickTarget, true);
        if (podiumHits.length > 0) {
          podiumGroup.userData.advance();
          return;
        }
      }

      // Hit-test the box shells, not the inner photo planes - the shell
      // is the visible "object" the user is pointing at, and the photo
      // sits inside (partially obscured by the shell). userData.caseRef
      // is now set on shell, not plane.
      const targets = allCases.map((c) => c.shell);
      const intersects = raycaster.intersectObjects(targets, false);

      // Clear an active dream-wall pull (return the case + restore image 3).
      const clearDreamFocus = () => {
        if (focusedCase) {
          beginReturn(focusedCase, now);
          swapCaseImage(focusedCase, "rest");
          focusedCase = null;
        }
      };

      if (intersects.length === 0) {
        // Empty space - dismiss whatever is active (at most one of these).
        if (stage.active) dismissPedestal(now);
        if (focusedCase) { clearDreamFocus(); hideStory(); }
        return;
      }

      const caseRef = intersects[0].object.userData.caseRef;
      if (!caseRef) return;

      if (caseRef.usePedestal) {
        // Office wall → pedestal.
        if (stage.active && stage.caseRef === caseRef) { dismissPedestal(now); return; } // toggle off
        clearDreamFocus();                 // a dream pull, if any, returns
        launchToPedestal(caseRef, now);    // supersedes any other staged shoe
        return;
      }

      // Dream wall → pull-forward (unchanged behaviour).
      if (stage.active) dismissPedestal(now);   // a staged office shoe goes home
      if (focusedCase === caseRef) {
        beginReturn(caseRef, now);
        swapCaseImage(caseRef, "rest");
        hideStory();
        focusedCase = null;
        return;
      }
      if (focusedCase) {
        beginReturn(focusedCase, now);
        swapCaseImage(focusedCase, "rest");
      }

      caseRef.state = "pulling";
      caseRef.stateStart = now;
      // Per-wall world-space view target → local to this case's parent.
      // Computed at build time per wall so display/dream pull-forward
      // targets are each in front of the user when facing that wall.
      caseRef.viewPositionLocal = caseRef.group.parent.worldToLocal(caseRef.viewPosWorld.clone());
      focusedCase = caseRef;
      swapCaseImage(caseRef, "pop");
      showStoryFor(caseRef);
    };

    if (TEST_MODE) {
      // Test mode: click to lock pointer (FPS-style), then subsequent
      // clicks raycast from screen centre (crosshair) for interaction.
      document.addEventListener("click", () => {
        if (!fpsControls.isLocked) { fpsControls.lock(); return; }
        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
        handleRayHit();
      });
    } else {
      // VR mode: controllers + laser pointers.
      for (let i = 0; i < 2; i++) {
        const controller = renderer.xr.getController(i);
        controller.addEventListener("select", onSelect);
        const pointer = new THREE.Line(
          pointerGeometry,
          new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.5, transparent: true })
        );
        controller.add(pointer);
        player.add(controller);   // ride with locomotion so the ray stays aligned to your hand
      }
    }

    // ════════════════════════════════════════════════════════════════════
    //  ANIMATION (pull-forward / return)
    // ════════════════════════════════════════════════════════════════════
    const PULL_DURATION_MS = 400;
    // Pull-forward target is computed per-wall (see buildWall) - each wall
    // has its own world-space view position so a case is always pulled
    // toward where the user is standing relative to that wall.
    const VIEW_SCALE = 1.5;
    const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);

    const updateCases = (now) => {
      for (const c of allCases) {
        if (c.state === "home") continue;
        const elapsed = now - c.stateStart;
        const t = Math.min(elapsed / PULL_DURATION_MS, 1);
        const e = easeOutCubic(t);

        if (c.state === "pulling") {
          c.group.position.lerpVectors(c.homePosition, c.viewPositionLocal, e);
          c.group.scale.setScalar(1 + (VIEW_SCALE - 1) * e);
          // lookAt takes a world-space target, so (0, 1.6, 0) is correct
          // regardless of which wall the case lives on.
          c.group.lookAt(0, 1.6, 0);
          if (t >= 1) c.state = "forward";
        } else if (c.state === "returning") {
          // Lerp from the position recorded when "returning" began (which
          // may be mid-pull) back to home. returnStart is set in onSelect.
          c.group.position.lerpVectors(c.returnStart, c.homePosition, e);
          // Same for scale - return from whatever scale the case was at.
          const startScale = c.returnStartScale;
          c.group.scale.setScalar(startScale + (1 - startScale) * e);
          if (t >= 1) {
            c.group.position.copy(c.homePosition);
            c.group.rotation.copy(c.homeRotation);
            c.group.scale.setScalar(1);
            c.state = "home";
          } else {
            c.group.lookAt(0, 1.6, 0);
          }
        }
      }
    };

    // Pulse animation: unowned dream-wall entries fade between low and
    // full opacity on a slow cycle, signalling "still on the wishlist."
    // Only active when the case is at rest (state="home") - during pull-
    // forward we want full opacity so the user can see the shoe clearly.
    const PULSE_PERIOD_MS = 3000;
    const PULSE_MIN = 0.6;
    const PULSE_MAX = 1.0;
    const updatePulse = (now) => {
      // Sin-based oscillation between MIN and MAX over PULSE_PERIOD_MS.
      const phase = (now % PULSE_PERIOD_MS) / PULSE_PERIOD_MS;
      const t = (Math.sin(phase * Math.PI * 2) + 1) / 2; // 0→1
      const opacity = PULSE_MIN + (PULSE_MAX - PULSE_MIN) * t;
      for (const c of allCases) {
        if (!c.pulse) continue;
        if (c.state !== "home") {
          c.plane.material.opacity = 1.0;
          continue;
        }
        c.plane.material.opacity = opacity;
      }
    };

    // ════════════════════════════════════════════════════════════════════
    //  VR LOCOMOTION (thumbsticks) - smooth move + smooth turn
    // ════════════════════════════════════════════════════════════════════
    // Left stick glides along the floor relative to where you're looking; right
    // stick turns smoothly, rotating the player around your head so you pivot in
    // place. Speed is analog - partial deflection moves/turns proportionally.
    const MOVE_SPEED     = 2.5;                            // metres / second
    const TURN_SPEED     = THREE.MathUtils.degToRad(90);   // degrees / second
    const STICK_DEADZONE = 0.15;
    const _locForward = new THREE.Vector3();
    const _locRight   = new THREE.Vector3();
    const _locMove    = new THREE.Vector3();
    const _locHead    = new THREE.Vector3();
    const _locUp      = new THREE.Vector3(0, 1, 0);

    const updateLocomotion = (dt) => {
      const session = renderer.xr.getSession();
      if (!session) return;
      let moveX = 0, moveY = 0, turnX = 0;
      for (const src of session.inputSources) {
        const gp = src.gamepad;
        if (!gp || !gp.axes) continue;
        const ax = gp.axes;
        const sx = ax.length > 2 ? ax[2] : (ax[0] || 0);   // thumbstick X (xr-standard)
        const sy = ax.length > 3 ? ax[3] : (ax[1] || 0);   // thumbstick Y
        if (src.handedness === "right") {
          if (Math.abs(sx) > STICK_DEADZONE) turnX += sx;
        } else {                                           // left (or unknown) → movement
          if (Math.abs(sx) > STICK_DEADZONE) moveX += sx;
          if (Math.abs(sy) > STICK_DEADZONE) moveY += sy;
        }
      }

      // Smooth turn - rotate the player about the head so you pivot in place.
      if (turnX !== 0) {
        const angle = -turnX * TURN_SPEED * dt;            // push right → turn right
        camera.getWorldPosition(_locHead);
        player.position.sub(_locHead);
        player.position.applyAxisAngle(_locUp, angle);
        player.position.add(_locHead);
        player.rotation.y += angle;
      }

      // Smooth move - head-relative, projected flat onto the floor.
      if (moveX !== 0 || moveY !== 0) {
        camera.getWorldDirection(_locForward);
        _locForward.y = 0;
        if (_locForward.lengthSq() < 1e-6) return;         // looking straight up/down
        _locForward.normalize();
        _locRight.crossVectors(_locForward, _locUp).normalize();
        _locMove.set(0, 0, 0)
          .addScaledVector(_locRight, moveX)
          .addScaledVector(_locForward, -moveY);           // stick up (−Y) = forward
        _locMove.y = 0;
        const mag = Math.min(1, Math.hypot(moveX, moveY)); // analog speed, clamped
        if (_locMove.lengthSq() > 1e-6) {
          _locMove.normalize().multiplyScalar(mag * MOVE_SPEED * dt);
          player.position.add(_locMove);
        }
      }
    };

    // ════════════════════════════════════════════════════════════════════
    //  ROOM BOUNDS - keep the user inside the gym walls
    // ════════════════════════════════════════════════════════════════════
    const ROOM_BOUND = 8.7;              // walls at ±9, 0.3m buffer so you don't clip
    const GY_BOUND_X = 9 + 1.0 + 14 - 0.3;  // far edge of graveyard
    const GY_BOUND_Z = 8.0;                   // half-width of graveyard
    const GY_DOOR_HALF_W = 1.2;               // half the doorway width (2.4m / 2)
    const _clampHead = new THREE.Vector3();
    const clampToRoom = () => {
      camera.getWorldPosition(_clampHead);
      let dx = 0, dz = 0;
      const inGraveyard = _clampHead.x > ROOM_BOUND;
      if (inGraveyard) {
        // In the graveyard - clamp to graveyard bounds
        if (_clampHead.x > GY_BOUND_X) dx = GY_BOUND_X - _clampHead.x;
        if (_clampHead.z >  GY_BOUND_Z) dz =  GY_BOUND_Z - _clampHead.z;
        if (_clampHead.z < -GY_BOUND_Z) dz = -GY_BOUND_Z - _clampHead.z;
        // Gym wall: block re-entry unless within the doorway opening
        // Wall is at x=9 (HALF), use a small buffer inside the graveyard
        const GY_WALL_LIMIT = ROOM_BOUND + 0.6;  // 9.3 - just past the wall
        if (_clampHead.x < GY_WALL_LIMIT) {
          const inDoorway = Math.abs(_clampHead.z) < GY_DOOR_HALF_W;
          if (!inDoorway) {
            dx = GY_WALL_LIMIT - _clampHead.x;
          }
        }
      } else {
        // In the gym - normal bounds, but allow passage through the doorway
        if (_clampHead.x < -ROOM_BOUND) dx = -ROOM_BOUND - _clampHead.x;
        if (_clampHead.z >  ROOM_BOUND) dz =  ROOM_BOUND - _clampHead.z;
        if (_clampHead.z < -ROOM_BOUND) dz = -ROOM_BOUND - _clampHead.z;
        // Right wall: block unless within the doorway opening
        if (_clampHead.x > ROOM_BOUND) {
          const inDoorway = Math.abs(_clampHead.z) < GY_DOOR_HALF_W;
          if (!inDoorway) {
            dx = ROOM_BOUND - _clampHead.x;
          }
        }
      }
      if (dx || dz) {
        player.position.x += dx;
        player.position.z += dz;
      }
    };

    // ════════════════════════════════════════════════════════════════════
    //  ON FEET TODAY - display in the key + starfield animation
    // ════════════════════════════════════════════════════════════════════
    // A panel in the painted lane shows today's shoe. Clicking it triggers
    // a starfield + flythrough intro (same image order as the main site:
    // main → hover2 → hover). After the sequence the display clears out.
    {
      const precomp = data.precomputedOnFeetToday;
      // precomputedOnFeetToday carries the shoe from the last build.
      // Gate on the client's local date so it auto-expires the next day
      // without requiring a rebuild.
      const _d = new Date();
      const todayISO = _d.getFullYear() + "-" + String(_d.getMonth() + 1).padStart(2, "0") + "-" + String(_d.getDate()).padStart(2, "0");
      const isToday = precomp && precomp.date === todayISO;
      const imgPaths = [];
      if (isToday) {
        for (const sfx of ["", "_hover2", "_hover"]) {
          const p = images[precomp.key + sfx];
          if (p) imgPaths.push("../" + p);
        }
      }

      if (isToday && imgPaths.length > 0) {

        // ── OFD audio ─────────────────────────────────────────────────
        // WebXR requires audio routed through AudioContext to reach
        // the headset speakers. We load the mp3s into buffers and
        // play them via gain nodes for volume/fade control.
        let ofdAudioCtx = null;
        let ofdAudioBuffer = null;
        let ofdWhooshBuffer = null;
        let ofdGain = null;
        let ofdWhooshGain = null;
        let ofdSource = null;        // current playing music source
        let ofdAudioFading = false;
        const OFD_VOLUME = 0.8;
        const OFD_WHOOSH_VOLUME = 0.9;

        // Preload audio buffers
        const initAudioCtx = () => {
          if (!ofdAudioCtx) {
            ofdAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            ofdGain = ofdAudioCtx.createGain();
            ofdGain.connect(ofdAudioCtx.destination);
            ofdWhooshGain = ofdAudioCtx.createGain();
            ofdWhooshGain.connect(ofdAudioCtx.destination);
          }
        };

        fetch("../assets/ofd-theme.mp3")
          .then(r => r.arrayBuffer())
          .then(buf => { initAudioCtx(); return ofdAudioCtx.decodeAudioData(buf); })
          .then(decoded => {
            ofdAudioBuffer = decoded;
            log("OFD music loaded (" + decoded.duration.toFixed(1) + "s)", "ok");
          })
          .catch(e => log("OFD music failed to load: " + e.message, "dim"));

        fetch("../assets/whoosh.mp3")
          .then(r => r.arrayBuffer())
          .then(buf => { initAudioCtx(); return ofdAudioCtx.decodeAudioData(buf); })
          .then(decoded => {
            ofdWhooshBuffer = decoded;
            log("OFD whoosh loaded (" + decoded.duration.toFixed(1) + "s)", "ok");
          })
          .catch(e => log("OFD whoosh failed to load: " + e.message, "dim"));

        const ofdAudioPlay = () => {
          if (!ofdAudioCtx || !ofdAudioBuffer) return;
          if (ofdAudioCtx.state === "suspended") ofdAudioCtx.resume();
          if (ofdSource) { try { ofdSource.stop(); } catch (_) {} }
          ofdSource = ofdAudioCtx.createBufferSource();
          ofdSource.buffer = ofdAudioBuffer;
          ofdSource.connect(ofdGain);
          ofdGain.gain.setValueAtTime(OFD_VOLUME, ofdAudioCtx.currentTime);
          ofdAudioFading = false;
          ofdSource.start(0);
        };

        const ofdWhooshPlay = () => {
          if (!ofdAudioCtx || !ofdWhooshBuffer) return;
          if (ofdAudioCtx.state === "suspended") ofdAudioCtx.resume();
          const src = ofdAudioCtx.createBufferSource();
          src.buffer = ofdWhooshBuffer;
          src.connect(ofdWhooshGain);
          ofdWhooshGain.gain.setValueAtTime(OFD_WHOOSH_VOLUME, ofdAudioCtx.currentTime);
          src.start(0);
        };

        const ofdAudioStop = () => {
          if (ofdSource) { try { ofdSource.stop(); } catch (_) {} ofdSource = null; }
          ofdAudioFading = false;
        };

        const ofdAudioSetVolume = (v) => {
          if (ofdGain && ofdAudioCtx) {
            ofdGain.gain.setValueAtTime(Math.max(0, v), ofdAudioCtx.currentTime);
          }
        };

        // ── Display panel in the key ────────────────────────────────────
        const OFD_Y = 0.01, OFD_Z = -4.5;
        ofdDisplay = new THREE.Group();
        ofdDisplay.position.set(0, OFD_Y, OFD_Z);
        ofdDisplay.rotation.x = -Math.PI / 2;           // flat on floor, face up
        scene.add(ofdDisplay);

        // Dark plaque backing (canvas) with title, shoe name, and prompt
        const CW = 768, CH = 1100, margin = 16, rad = 28;
        const cv = document.createElement("canvas");
        cv.width = CW; cv.height = CH;
        const g = cv.getContext("2d");
        g.clearRect(0, 0, CW, CH);

        // Rounded rect
        g.beginPath();
        g.moveTo(margin + rad, margin);
        g.arcTo(CW - margin, margin, CW - margin, CH - margin, rad);
        g.arcTo(CW - margin, CH - margin, margin, CH - margin, rad);
        g.arcTo(margin, CH - margin, margin, margin, rad);
        g.arcTo(margin, margin, CW - margin, margin, rad);
        g.closePath();
        g.fillStyle = "rgba(10,10,10,0.92)"; g.fill();
        g.lineWidth = 6; g.strokeStyle = "#e63946"; g.stroke();

        g.textAlign = "center"; g.textBaseline = "middle";

        // "ON FEET TODAY" - vault-red, letterspaced
        g.fillStyle = "#e63946";
        g.font = "bold 60px -apple-system, BlinkMacSystemFont, sans-serif";
        const titleChars = "ON FEET TODAY".split("");
        const sp = 10;
        let tw = 0;
        for (const ch of titleChars) tw += g.measureText(ch).width + sp;
        tw -= sp;
        let tx = (CW - tw) / 2;
        for (const ch of titleChars) {
          const cw = g.measureText(ch).width;
          g.fillText(ch, tx + cw / 2, 78);
          tx += cw + sp;
        }

        // Accent line
        g.strokeStyle = "rgba(230,57,70,0.4)"; g.lineWidth = 2;
        g.beginPath(); g.moveTo(60, 125); g.lineTo(CW - 60, 125); g.stroke();

        // Shoe name
        g.fillStyle = "#ffffff";
        g.font = "bold 54px -apple-system, BlinkMacSystemFont, sans-serif";
        g.fillText(precomp.shoeName, CW / 2, 860);

        // Colorway
        g.fillStyle = "#f0e6c8";
        g.font = "46px -apple-system, BlinkMacSystemFont, sans-serif";
        g.fillText(precomp.colorway, CW / 2, 930);

        // Prompt
        g.fillStyle = "rgba(255,255,255,0.30)";
        g.font = "italic 34px -apple-system, BlinkMacSystemFont, sans-serif";
        g.fillText("select to launch", CW / 2, 1035);

        const backingTex = new THREE.CanvasTexture(cv);
        backingTex.colorSpace = THREE.SRGBColorSpace;
        const pw = 1.5, ph = pw * (CH / CW);
        const backing = new THREE.Mesh(
          new THREE.PlaneGeometry(pw, ph),
          new THREE.MeshBasicMaterial({ map: backingTex, transparent: true, side: THREE.DoubleSide })
        );
        ofdDisplay.add(backing);
        ofdClickTarget = backing;

        // Shoe photo overlaid on the backing
        const photo = new THREE.Mesh(
          new THREE.PlaneGeometry(0.84, 0.84),
          new THREE.MeshBasicMaterial({ color: 0x222222, transparent: true, alphaTest: 0.01, side: THREE.DoubleSide })
        );
        photo.position.set(0, 0.10, 0.005);
        ofdDisplay.add(photo);

        loader.load(imgPaths[0], (texture) => {
          texture.colorSpace = THREE.SRGBColorSpace;
          texture.anisotropy = 8;
          photo.material.map = texture;
          photo.material.color.set(0xffffff);
          photo.material.needsUpdate = true;
          const aspect = texture.image.width / texture.image.height;
          const fitW = 0.84, fitH = 0.80;
          const aw = aspect >= fitW / fitH ? fitW : fitH * aspect;
          const ah = aspect >= fitW / fitH ? fitW / aspect : fitH;
          photo.geometry.dispose();
          photo.geometry = new THREE.PlaneGeometry(aw, ah);
        });

        // ── Animation infrastructure ────────────────────────────────────

        // Fade sphere (hides the room during the sequence)
        const fadeSphere = new THREE.Mesh(
          new THREE.SphereGeometry(45, 16, 12),
          new THREE.MeshBasicMaterial({
            color: 0x000000, side: THREE.BackSide,
            transparent: true, opacity: 0, depthWrite: false,
          })
        );
        fadeSphere.renderOrder = 998;
        camera.add(fadeSphere);

        // Hide/show all room content (everything except the player group,
        // which carries the camera and all OFD animation elements).
        let _hiddenRoom = [];
        const hideRoom = () => {
          _hiddenRoom = [];
          for (const obj of scene.children) {
            if (obj === player) continue;
            if (obj.visible) { _hiddenRoom.push(obj); obj.visible = false; }
          }
        };
        const showRoom = () => {
          for (const obj of _hiddenRoom) obj.visible = true;
          _hiddenRoom = [];
        };

        // Starfield particles (camera-local so they always stream from ahead)
        const STAR_COUNT = 400, WARP_SPEED = 22;
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(STAR_COUNT * 3);
        const starDepthMul = new Float32Array(STAR_COUNT); // parallax speed per star
        for (let i = 0; i < STAR_COUNT; i++) {
          starPos[i * 3]     = (Math.random() - 0.5) * 24;
          starPos[i * 3 + 1] = (Math.random() - 0.5) * 24;
          starPos[i * 3 + 2] = -(Math.random() * 35 + 5);
          // Depth layer: 0.3 (distant/slow) to 1.6 (close/fast)
          starDepthMul[i] = 0.3 + Math.random() * 1.3;
        }
        starGeo.setAttribute("position", new THREE.BufferAttribute(starPos, 3));
        const starField = new THREE.Points(starGeo, new THREE.PointsMaterial({
          color: 0xffffff, size: 0.06, sizeAttenuation: true,
          transparent: true, depthWrite: false,
        }));
        starField.visible = false;
        starField.renderOrder = 999;
        camera.add(starField);

        const warpStars = (dt) => {
          const pos = starGeo.attributes.position.array;
          for (let i = 0; i < STAR_COUNT; i++) {
            pos[i * 3 + 2] += WARP_SPEED * starDepthMul[i] * dt;
            if (pos[i * 3 + 2] > 5) {
              pos[i * 3 + 2] -= 40;
              pos[i * 3]     = (Math.random() - 0.5) * 24;
              pos[i * 3 + 1] = (Math.random() - 0.5) * 24;
            }
          }
          starGeo.attributes.position.needsUpdate = true;
        };

        // Helper: canvas text → plane mesh
        const makeLabel = (text, fontSize, color, letterSpace) => {
          const LW = 1400, LH = 200;
          const lc = document.createElement("canvas");
          lc.width = LW; lc.height = LH;
          const lg = lc.getContext("2d");
          lg.clearRect(0, 0, LW, LH);
          lg.textAlign = "center"; lg.textBaseline = "middle";
          lg.fillStyle = color;
          lg.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
          if (letterSpace) {
            const chars = text.split("");
            let tw2 = 0;
            for (const c of chars) tw2 += lg.measureText(c).width + letterSpace;
            tw2 -= letterSpace;
            let lx = (LW - tw2) / 2;
            for (const c of chars) {
              const cw2 = lg.measureText(c).width;
              lg.fillText(c, lx + cw2 / 2, LH / 2);
              lx += cw2 + letterSpace;
            }
          } else {
            lg.fillText(text, LW / 2, LH / 2);
          }
          const tex = new THREE.CanvasTexture(lc);
          tex.colorSpace = THREE.SRGBColorSpace;
          const h = 0.35, w = h * (LW / LH);
          return new THREE.Mesh(
            new THREE.PlaneGeometry(w, h),
            new THREE.MeshBasicMaterial({
              map: tex, transparent: true, side: THREE.DoubleSide,
              depthWrite: false, depthTest: false,
            })
          );
        };

        // Helper: Superman credits-style outlined stencil text → plane mesh
        // Uses Granby Elephant (the original Superman '78 font) rendered as
        // outlines only with a soft glow halo for the cinematic credit look.
        const makeStencilLabel = (text, fontSize, color, letterSpace) => {
          const LW = 2000, LH = 250;
          const lc = document.createElement("canvas");
          lc.width = LW; lc.height = LH;
          const lg = lc.getContext("2d");
          lg.clearRect(0, 0, LW, LH);
          lg.textAlign = "center"; lg.textBaseline = "middle";
          lg.font = `${fontSize}px "Granby Elephant", "Arial Narrow", "Helvetica Neue", Arial, sans-serif`;

          // Draw helper - letterspaced or centred
          const drawText = (fn) => {
            if (letterSpace) {
              const chars = text.split("");
              let tw2 = 0;
              for (const c of chars) tw2 += lg.measureText(c).width + letterSpace;
              tw2 -= letterSpace;
              let lx = (LW - tw2) / 2;
              for (const c of chars) {
                const cw2 = lg.measureText(c).width;
                fn(c, lx + cw2 / 2, LH / 2);
                lx += cw2 + letterSpace;
              }
            } else {
              fn(text, LW / 2, LH / 2);
            }
          };

          // Pass 1: soft glow halo
          lg.shadowColor = color;
          lg.shadowBlur = 30;
          lg.strokeStyle = color;
          lg.lineWidth = 4;
          drawText((t, x, y) => lg.strokeText(t, x, y));

          // Pass 2: crisp outline (no shadow)
          lg.shadowColor = "transparent";
          lg.shadowBlur = 0;
          lg.strokeStyle = color;
          lg.lineWidth = 2;
          drawText((t, x, y) => lg.strokeText(t, x, y));

          const tex = new THREE.CanvasTexture(lc);
          tex.colorSpace = THREE.SRGBColorSpace;
          const h = 0.45, w = h * (LW / LH);
          return new THREE.Mesh(
            new THREE.PlaneGeometry(w, h),
            new THREE.MeshBasicMaterial({
              map: tex, transparent: true, side: THREE.DoubleSide,
              depthWrite: false, depthTest: false,
            })
          );
        };

        // Ensure Granby Elephant is loaded before rendering stencil labels
        await document.fonts.load('100px "Granby Elephant"').catch(() => {});

        // Intro label - "ON FEET TODAY" Superman-style fly-at-camera with ghost trails
        const introGroup = new THREE.Group();
        introGroup.visible = false;
        introGroup.renderOrder = 1001;
        camera.add(introGroup);

        const introLabel = makeStencilLabel("ON FEET TODAY", 130, "#ffffff", 18);
        introLabel.renderOrder = 1002;
        introGroup.add(introLabel);

        // Ghost trail copies behind the main text
        const GHOST_COUNT = 7;
        const ghosts = [];
        for (let i = 0; i < GHOST_COUNT; i++) {
          const g = makeStencilLabel("ON FEET TODAY", 130, "#ffffff", 18);
          g.renderOrder = 1001;
          g.material.opacity = 0;
          introGroup.add(g);
          ghosts.push(g);
        }

        // Flythrough planes (one per image, camera-local)
        const flyGroup = new THREE.Group();
        flyGroup.visible = false;
        camera.add(flyGroup);

        const FLY_W = 1.2, FLY_H = 1.0;
        const flyPlanes = [];
        for (let i = 0; i < imgPaths.length; i++) {
          const mat = new THREE.MeshBasicMaterial({
            color: 0xffffff, transparent: true, opacity: 0,
            side: THREE.DoubleSide, depthWrite: false, depthTest: false,
          });
          const p = new THREE.Mesh(new THREE.PlaneGeometry(FLY_W, FLY_H), mat);
          p.visible = false;
          p.renderOrder = 1000 + i;
          flyGroup.add(p);
          flyPlanes.push(p);
        }

        // Card group - three images + labels, shown after flythrough
        const cardGroup = new THREE.Group();
        cardGroup.visible = false;
        cardGroup.position.set(0, 0, -3.5);
        camera.add(cardGroup);

        const cardTitle = makeStencilLabel("ON FEET TODAY", 100, "#e63946", 14);
        cardTitle.position.set(0, 1.1, 0);
        cardTitle.renderOrder = 1010;
        cardGroup.add(cardTitle);

        const cardName = makeLabel(
          `${precomp.shoeName}  \u2014  ${precomp.colorway}`, 72, "#ffffff", 0
        );
        cardName.position.set(0, -1.0, 0);
        cardName.renderOrder = 1010;
        cardGroup.add(cardName);

        const cardDate = makeLabel(formatMMDDYYYY(precomp.date), 52, "rgba(240,230,200,0.6)", 6);
        cardDate.position.set(0, -1.25, 0);
        cardDate.renderOrder = 1010;
        cardGroup.add(cardDate);

        const CARD_SIZE = 1.2;       // match FLY_W - same visual size as hold
        const CARD_SPACING = 1.35;
        const cardPlanes = [];
        for (let i = 0; i < imgPaths.length; i++) {
          const mat = new THREE.MeshBasicMaterial({
            color: 0xffffff, transparent: true, alphaTest: 0.01,
            side: THREE.DoubleSide, depthWrite: false, depthTest: false,
          });
          const p = new THREE.Mesh(new THREE.PlaneGeometry(CARD_SIZE, CARD_SIZE), mat);
          p.position.set((i - (imgPaths.length - 1) / 2) * CARD_SPACING, -0.03, 0);
          p.visible = false;
          p.renderOrder = 1010;
          cardGroup.add(p);
          cardPlanes.push(p);
        }

        const cardExit = makeLabel("select to exit", 48, "rgba(255,255,255,0.35)", 0);
        cardExit.position.set(0, -1.55, 0);
        cardExit.renderOrder = 1010;
        cardGroup.add(cardExit);

        // Load textures (shared by flythrough + card planes)
        imgPaths.forEach((path, i) => {
          loader.load(path, (texture) => {
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.anisotropy = 8;
            const aspect = texture.image.width / texture.image.height;
            if (flyPlanes[i]) {
              flyPlanes[i].material.map = texture;
              flyPlanes[i].material.needsUpdate = true;
              const fw = aspect >= 1 ? FLY_W : FLY_H * aspect;
              const fh = aspect >= 1 ? FLY_W / aspect : FLY_H;
              flyPlanes[i].geometry.dispose();
              flyPlanes[i].geometry = new THREE.PlaneGeometry(fw, fh);
            }
            if (cardPlanes[i]) {
              cardPlanes[i].material.map = texture;
              cardPlanes[i].material.needsUpdate = true;
              cardPlanes[i].visible = true;
              const cw2 = aspect >= 1 ? CARD_SIZE : CARD_SIZE * aspect;
              const ch2 = aspect >= 1 ? CARD_SIZE / aspect : CARD_SIZE;
              cardPlanes[i].geometry.dispose();
              cardPlanes[i].geometry = new THREE.PlaneGeometry(cw2, ch2);
            }
          });
        });

        // ── Timing constants ────────────────────────────────────────────
        // Target: card phase begins at ~21s into the music.
        // fadeout(600) + intro(7600) + fly(12800) = 21000ms
        const OFD_FADEOUT_MS = 600;
        const OFD_INTRO_MS  = 7600;   // total intro phase
        const OFD_STAR_ONLY = 3600;   // starfield alone before text appears
        const OFD_TEXT_DRIFT = 1200;   // text approaches from distance
        const OFD_TEXT_HOLD  = 1200;   // pause at hero position
        const OFD_TEXT_RUSH  = 1600;   // accelerate through camera
        const OFD_FLY_MS    = 4800;   // per shoe total
        const OFD_SHOE_APPEAR = 500;  // fade in from distance
        const OFD_SHOE_DRIFT  = 1500; // slow drift toward camera
        const OFD_SHOE_HOLD   = 1200; // pause at hero position
        const OFD_SHOE_RUSH   = 1600; // accelerate past camera
        const OFD_OVERLAP   = 800;
        const OFD_FLY_TOTAL = imgPaths.length > 1
          ? (imgPaths.length - 1) * (OFD_FLY_MS - OFD_OVERLAP) + OFD_FLY_MS
          : OFD_FLY_MS;
        const OFD_FADEIN_MS = 600;

        const ease = (t) => 1 - Math.pow(1 - t, 3);
        const easeIn = (t) => t * t * t;  // accelerate for the rush phase

        // Track which whooshes have fired so they don't repeat
        let ofdTextWhooshed = false;
        const ofdShoeWhooshed = new Array(imgPaths.length).fill(false);
        const OFD_WHOOSH_DELAY = 200; // ms into rush before whoosh fires

        // ── Trigger ─────────────────────────────────────────────────────
        ofd.trigger = (now) => {
          ofd.phase = "fadeout";
          ofd.t0 = now;
          ofdDisplay.visible = false;
          restoreStageInstant();
          hideStory();
          // Start the music - user gesture (click) satisfies autoplay policy
          ofdAudioPlay();
          ofdTextWhooshed = false;
          ofdShoeWhooshed.fill(false);
        };

        // ── Exit card (user clicks during card phase) ───────────────────
        ofd.exitCard = (now) => {
          cardGroup.visible = false;
          starField.visible = false;
          ofd.phase = "fadein";
          ofd.t0 = now;
          // Begin audio fade-out over the room fadein duration
          ofdAudioFading = true;
          ofdAudioSetVolume(OFD_VOLUME);
        };

        // ── Per-frame update ────────────────────────────────────────────
        ofd.update = (now, dt) => {
          if (ofd.phase === "idle" || ofd.phase === "done") return;
          const elapsed = now - ofd.t0;

          if (ofd.phase === "fadeout") {
            const t = Math.min(elapsed / OFD_FADEOUT_MS, 1);
            fadeSphere.material.opacity = ease(t);
            if (t >= 1) {
              hideRoom();
              fadeSphere.material.transparent = false;
              fadeSphere.material.needsUpdate = true;
              starField.visible = true;
              introGroup.visible = true;
              ofd.phase = "intro";
              ofd.t0 = now;
            }

          } else if (ofd.phase === "intro") {
            warpStars(dt);
            // Starfield-only window before text appears
            const textElapsed = elapsed - OFD_STAR_ONLY;
            if (textElapsed < 0) {
              // Pure starfield - text not visible yet
              introLabel.material.opacity = 0;
              for (const g of ghosts) g.material.opacity = 0;
            } else {
              // Superman-style text: drift in → hold → rush through camera
              // Ghost trail spacing and opacity scale with current speed
              let textZ, textOpacity = 1, speed = 0;
              if (textElapsed < OFD_TEXT_DRIFT) {
                // Drift: text approaches from far
                const t = textElapsed / OFD_TEXT_DRIFT;
                textZ = -18 + 15 * ease(t);       // -18 → -3
                speed = 0.3;
              } else if (textElapsed < OFD_TEXT_DRIFT + OFD_TEXT_HOLD) {
                // Hold: text pauses at hero position
                textZ = -3;
                speed = 0.05;
              } else {
                // Rush: text accelerates through camera
                const rushT = (textElapsed - OFD_TEXT_DRIFT - OFD_TEXT_HOLD) / OFD_TEXT_RUSH;
                if (!ofdTextWhooshed && (textElapsed - OFD_TEXT_DRIFT - OFD_TEXT_HOLD) >= OFD_WHOOSH_DELAY) {
                  ofdWhooshPlay(); ofdTextWhooshed = true;
                }
                const rushE = easeIn(Math.min(rushT, 1));
                textZ = -3 + 15 * rushE;            // -3 → +12 (past camera)
                textOpacity = Math.max(0, 1 - rushT * 1.5);
                speed = 0.3 + 2.5 * rushE;
              }
              introLabel.position.set(0, 0, textZ);
              introLabel.material.opacity = textOpacity;

              // Ghost trails: spaced behind the main label, more spread at higher speed
              const ghostSpacing = 0.15 + 0.6 * speed;
              for (let gi = 0; gi < GHOST_COUNT; gi++) {
                const depth = (gi + 1) * ghostSpacing;
                ghosts[gi].position.set(0, 0, textZ - depth);
                ghosts[gi].material.opacity = textOpacity * (0.45 - gi * (0.38 / GHOST_COUNT)) * Math.min(speed * 2, 1);
              }
            }

            if (elapsed >= OFD_INTRO_MS) {
              introGroup.visible = false;
              flyGroup.visible = true;
              ofd.phase = "fly";
              ofd.t0 = now;
            }

          } else if (ofd.phase === "fly") {
            warpStars(dt);
            for (let i = 0; i < flyPlanes.length; i++) {
              const start = i * (OFD_FLY_MS - OFD_OVERLAP);
              const localElapsed = elapsed - start;
              if (localElapsed < 0) { flyPlanes[i].visible = false; continue; }
              if (localElapsed > OFD_FLY_MS) { flyPlanes[i].visible = false; continue; }
              flyPlanes[i].visible = true;

              let shoeZ, shoeScale, shoeOpacity;
              if (localElapsed < OFD_SHOE_APPEAR) {
                // Appear: fade in from deep
                const t = localElapsed / OFD_SHOE_APPEAR;
                shoeZ = -18 + 4 * ease(t);
                shoeScale = 0.3 + 0.3 * t;
                shoeOpacity = ease(t);
              } else if (localElapsed < OFD_SHOE_APPEAR + OFD_SHOE_DRIFT) {
                // Drift: slow approach toward hero position
                const t = (localElapsed - OFD_SHOE_APPEAR) / OFD_SHOE_DRIFT;
                shoeZ = -14 + 11 * ease(t);       // -14 → -3
                shoeScale = 0.6 + 0.8 * ease(t);
                shoeOpacity = 1;
              } else if (localElapsed < OFD_SHOE_APPEAR + OFD_SHOE_DRIFT + OFD_SHOE_HOLD) {
                // Hold: hero moment, shoe pauses center stage
                shoeZ = -3;
                shoeScale = 1.4;
                shoeOpacity = 1;
              } else {
                // Rush: accelerate through and past the camera
                const rushInto = localElapsed - OFD_SHOE_APPEAR - OFD_SHOE_DRIFT - OFD_SHOE_HOLD;
                if (!ofdShoeWhooshed[i] && rushInto >= OFD_WHOOSH_DELAY) {
                  ofdWhooshPlay(); ofdShoeWhooshed[i] = true;
                }
                const t = rushInto / OFD_SHOE_RUSH;
                const rushE = easeIn(Math.min(t, 1));
                shoeZ = -3 + 15 * rushE;
                shoeScale = 1.4 + 1.6 * rushE;
                shoeOpacity = Math.max(0, 1 - t * 1.5);
              }
              flyPlanes[i].position.set(0, 0, shoeZ);
              flyPlanes[i].scale.setScalar(shoeScale);
              flyPlanes[i].material.opacity = shoeOpacity;
            }
            if (elapsed >= OFD_FLY_TOTAL) {
              flyGroup.visible = false;
              introGroup.visible = false;
              cardGroup.visible = true;
              ofd.phase = "card";
              ofd.t0 = now;
            }

          } else if (ofd.phase === "card") {
            warpStars(dt);
            // Fade card in during first 300ms
            const cardFade = Math.min(elapsed / 300, 1);
            cardTitle.material.opacity = cardFade;
            cardName.material.opacity = cardFade;
            cardDate.material.opacity = cardFade;
            cardExit.material.opacity = Math.min(Math.max((elapsed - 600) / 400, 0), 1);
            for (const cp of cardPlanes) cp.material.opacity = cardFade;
            // Auto-exit when the music ends (36.923s total, card starts at 21s)
            const OFD_CARD_DURATION = 15923;
            if (elapsed >= OFD_CARD_DURATION) {
              ofd.exitCard(now);
            }

          } else if (ofd.phase === "fadein") {
            if (!fadeSphere.material.transparent) {
              showRoom();
              fadeSphere.material.transparent = true;
              fadeSphere.material.needsUpdate = true;
            }
            const t = Math.min(elapsed / OFD_FADEIN_MS, 1);
            fadeSphere.material.opacity = 1 - ease(t);
            // Fade audio out in sync with the room fading back in
            if (ofdAudioFading) {
              ofdAudioSetVolume(OFD_VOLUME * (1 - ease(t)));
            }
            if (t >= 1) {
              fadeSphere.material.opacity = 0;
              ofd.phase = "done";
              if (ofdDisplay) ofdDisplay.visible = true;
              ofdAudioStop();
            }
          }
        };

        log("On Feet Today: " + precomp.shoeName + " - " + precomp.colorway, "ok");
      } else if (precomp) {
        log("On Feet Today: skipped (last worn " + precomp.date + ", today " + todayISO + ")", "dim");
      }
    }

    // ════════════════════════════════════════════════════════════════════
    //  ROLL CALL - chronological collection flythrough
    // ════════════════════════════════════════════════════════════════════
    // A full-screen animation triggered from a panel on the left sideline
    // wall. Cycles through every owned shoe in purchase-date order with a
    // city-night-drive background (streaking neon lines). Each shoe shows
    // name, colorway, purchase date, and tier. Tap to exit.
    {
      // Build the collection list sorted by purchase date
      const allEntries = [];
      for (const cell of [...displayCells, ...dreamCells]) {
        if (cell.empty || !cell.entry?.owned) continue;
        const e = cell.entry;
        const pd = colorwayMeta[e.key]?.purchaseDate || "";
        allEntries.push({
          key: e.key,
          shoeName: e.shoeName,
          colorway: e.colorway,
          tier: e.tier,
          purchaseDate: pd,
          imagePath: e.imagePath,
        });
      }
      // Sort by purchase date (earliest first), shoes without dates go last
      allEntries.sort((a, b) => {
        if (!a.purchaseDate && !b.purchaseDate) return 0;
        if (!a.purchaseDate) return 1;
        if (!b.purchaseDate) return -1;
        return a.purchaseDate.localeCompare(b.purchaseDate);
      });

      // Deduplicate by key (a shoe may appear on both walls)
      const seen = new Set();
      const rcShoes = allEntries.filter(e => {
        if (seen.has(e.key)) return false;
        seen.add(e.key);
        return true;
      });

      log(`Roll Call: ${rcShoes.length} shoes in chronological order`, "ok");

      if (rcShoes.length > 0) {

        // ── Timing ────────────────────────────────────────────────────
        const RC_FADEOUT_MS  = 600;
        const RC_PER_SHOE_MS = 3500;  // total time per shoe
        const RC_APPEAR_MS   = 400;   // fade in from distance
        const RC_DRIFT_MS    = 800;   // drift toward camera
        const RC_HOLD_MS     = 1300;  // pause at hero position
        const RC_RUSH_MS     = 1000;  // rush through camera
        const RC_FADEIN_MS   = 600;
        const RC_TOTAL_MS    = rcShoes.length * RC_PER_SHOE_MS;

        const rcEase = (t) => 1 - Math.pow(1 - t, 3);
        const rcEaseIn = (t) => t * t * t;

        // ── Roll Call state ───────────────────────────────────────────
        const rc = { phase: "idle", t0: 0 };

        // ── Fade sphere (reuse concept from OFD) ─────────────────────
        const rcFadeSphere = new THREE.Mesh(
          new THREE.SphereGeometry(44, 16, 12),
          new THREE.MeshBasicMaterial({
            color: 0x000000, side: THREE.BackSide,
            transparent: true, opacity: 0, depthWrite: false,
          })
        );
        rcFadeSphere.renderOrder = 996;
        camera.add(rcFadeSphere);

        // ── City night drive - streaking neon lines ──────────────────
        const STREAK_COUNT = 200;
        const streakGeo = new THREE.BufferGeometry();
        const streakPos = new Float32Array(STREAK_COUNT * 6); // line segments: 2 verts each
        const streakColors = new Float32Array(STREAK_COUNT * 6); // RGB per vert
        const NEON_PALETTE = [
          [1.0, 0.2, 0.3],   // red
          [0.2, 0.6, 1.0],   // blue
          [1.0, 0.5, 0.1],   // orange
          [0.9, 0.1, 0.5],   // pink
          [0.3, 1.0, 0.6],   // green
          [1.0, 1.0, 0.2],   // yellow
        ];
        const streakSpeeds = new Float32Array(STREAK_COUNT);
        const streakSides  = new Float32Array(STREAK_COUNT); // -1 or +1

        for (let i = 0; i < STREAK_COUNT; i++) {
          const side = Math.random() < 0.5 ? -1 : 1;
          streakSides[i] = side;
          const x = side * (3 + Math.random() * 8);      // spread to the sides
          const y = (Math.random() - 0.3) * 6;            // mostly below eye level
          const z = -(Math.random() * 40 + 5);            // behind camera spread
          const len = 0.5 + Math.random() * 2.0;          // streak length
          const idx = i * 6;
          streakPos[idx]     = x; streakPos[idx + 1] = y; streakPos[idx + 2] = z;
          streakPos[idx + 3] = x; streakPos[idx + 4] = y; streakPos[idx + 5] = z - len;
          streakSpeeds[i] = 15 + Math.random() * 25;
          const col = NEON_PALETTE[Math.floor(Math.random() * NEON_PALETTE.length)];
          for (let v = 0; v < 2; v++) {
            streakColors[idx + v * 3]     = col[0];
            streakColors[idx + v * 3 + 1] = col[1];
            streakColors[idx + v * 3 + 2] = col[2];
          }
        }
        streakGeo.setAttribute("position", new THREE.BufferAttribute(streakPos, 3));
        streakGeo.setAttribute("color", new THREE.BufferAttribute(streakColors, 3));
        const streakLines = new THREE.LineSegments(streakGeo, new THREE.LineBasicMaterial({
          vertexColors: true, transparent: true, opacity: 0.7, depthWrite: false,
        }));
        streakLines.visible = false;
        streakLines.renderOrder = 997;
        camera.add(streakLines);

        const updateStreaks = (dt) => {
          const pos = streakGeo.attributes.position.array;
          for (let i = 0; i < STREAK_COUNT; i++) {
            const idx = i * 6;
            const speed = streakSpeeds[i] * dt;
            pos[idx + 2] += speed;
            pos[idx + 5] += speed;
            if (pos[idx + 2] > 5) {
              const side = streakSides[i];
              const x = side * (3 + Math.random() * 8);
              const y = (Math.random() - 0.3) * 6;
              const z = -(Math.random() * 40 + 5);
              const len = 0.5 + Math.random() * 2.0;
              pos[idx]     = x; pos[idx + 1] = y; pos[idx + 2] = z;
              pos[idx + 3] = x; pos[idx + 4] = y; pos[idx + 5] = z - len;
            }
          }
          streakGeo.attributes.position.needsUpdate = true;
        };

        // ── Shoe display plane ───────────────────────────────────────
        const rcShoeGroup = new THREE.Group();
        rcShoeGroup.visible = false;
        rcShoeGroup.renderOrder = 1001;
        camera.add(rcShoeGroup);

        const RC_FLY_W = 1.0, RC_FLY_H = 0.85;
        const rcShoePlane = new THREE.Mesh(
          new THREE.PlaneGeometry(RC_FLY_W, RC_FLY_H),
          new THREE.MeshBasicMaterial({
            color: 0xffffff, transparent: true, opacity: 0,
            side: THREE.DoubleSide, depthWrite: false, depthTest: false,
          })
        );
        rcShoePlane.renderOrder = 1002;
        rcShoeGroup.add(rcShoePlane);

        // ── Info labels (shoe name, colorway, purchase date, tier) ───
        const rcMakeLabel = (text, fontSize, color, yPos) => {
          const LW = 1400, LH = 160;
          const lc = document.createElement("canvas");
          lc.width = LW; lc.height = LH;
          const lg = lc.getContext("2d");
          lg.clearRect(0, 0, LW, LH);
          lg.textAlign = "center"; lg.textBaseline = "middle";
          lg.fillStyle = color;
          lg.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
          lg.fillText(text, LW / 2, LH / 2);
          const tex = new THREE.CanvasTexture(lc);
          tex.colorSpace = THREE.SRGBColorSpace;
          const h = 0.25, w = h * (LW / LH);
          const mesh = new THREE.Mesh(
            new THREE.PlaneGeometry(w, h),
            new THREE.MeshBasicMaterial({
              map: tex, transparent: true, side: THREE.DoubleSide,
              depthWrite: false, depthTest: false,
            })
          );
          mesh.position.set(0, yPos, 0);
          mesh.renderOrder = 1003;
          return mesh;
        };

        // Pre-create label meshes (updated each shoe)
        const rcNameMesh = rcMakeLabel("", 72, "#ffffff", 0.65);
        rcShoeGroup.add(rcNameMesh);
        const rcCwMesh = rcMakeLabel("", 52, "#cccccc", 0.48);
        rcShoeGroup.add(rcCwMesh);
        const rcDateMesh = rcMakeLabel("", 44, "#888888", -0.62);
        rcShoeGroup.add(rcDateMesh);
        const rcTierMesh = rcMakeLabel("", 40, "#e63946", -0.78);
        rcShoeGroup.add(rcTierMesh);

        const TIER_LABELS = {
          diamond: "◆ DIAMOND", platinum: "▲ PLATINUM",
          gold: "● GOLD", silver: "■ SILVER", iron: "▪ IRON", phantom: "👻 PHANTOM",
        };
        const TIER_COLORS = {
          diamond: "#b9f2ff", platinum: "#e5e4e2",
          gold: "#ffd700", silver: "#c0c0c0", iron: "#888888", phantom: "#8b7fc7",
        };

        const rcUpdateLabel = (mesh, text, fontSize, color) => {
          const canvas = document.createElement("canvas");
          canvas.width = 1400; canvas.height = 160;
          const ctx = canvas.getContext("2d");
          ctx.clearRect(0, 0, 1400, 160);
          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillStyle = color;
          ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
          ctx.fillText(text, 700, 80);
          const tex = new THREE.CanvasTexture(canvas);
          tex.colorSpace = THREE.SRGBColorSpace;
          mesh.material.map?.dispose();
          mesh.material.map = tex;
          mesh.material.needsUpdate = true;
        };

        // ── Room hide/show (separate from OFD's) ─────────────────────
        let _rcHiddenRoom = [];
        const rcHideRoom = () => {
          _rcHiddenRoom = [];
          for (const obj of scene.children) {
            if (obj === player) continue;
            if (obj.visible) { _rcHiddenRoom.push(obj); obj.visible = false; }
          }
        };
        const rcShowRoom = () => {
          for (const obj of _rcHiddenRoom) obj.visible = true;
          _rcHiddenRoom = [];
        };

        // ── Load shoe for a given index ──────────────────────────────
        let rcCurrentTexture = null;
        const rcLoadShoe = (idx) => {
          const shoe = rcShoes[idx];
          // Update labels
          rcUpdateLabel(rcNameMesh, shoe.shoeName, 72, "#ffffff");
          rcUpdateLabel(rcCwMesh, shoe.colorway, 52, "#cccccc");
          const dateStr = shoe.purchaseDate
            ? "Purchased on " + formatMMDDYYYY(shoe.purchaseDate)
            : "";
          rcUpdateLabel(rcDateMesh, dateStr, 44, "#888888");
          const tierLabel = TIER_LABELS[shoe.tier] || "■ SILVER";
          const tierColor = TIER_COLORS[shoe.tier] || "#c0c0c0";
          rcUpdateLabel(rcTierMesh, tierLabel, 40, tierColor);

          // Load shoe image
          loader.load(shoe.imagePath, (texture) => {
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.anisotropy = 8;
            if (rcCurrentTexture && rcCurrentTexture !== texture) {
              rcCurrentTexture.dispose();
            }
            rcCurrentTexture = texture;
            rcShoePlane.material.map = texture;
            rcShoePlane.material.needsUpdate = true;
            const aspect = texture.image.width / texture.image.height;
            const fw = aspect >= 1 ? RC_FLY_W : RC_FLY_H * aspect;
            const fh = aspect >= 1 ? RC_FLY_W / aspect : RC_FLY_H;
            rcShoePlane.geometry.dispose();
            rcShoePlane.geometry = new THREE.PlaneGeometry(fw, fh);
          });
        };

        // ── Trigger panel on the left sideline wall ──────────────────
        const rcTriggerCanvas = document.createElement("canvas");
        rcTriggerCanvas.width = 800; rcTriggerCanvas.height = 400;
        const rtx = rcTriggerCanvas.getContext("2d");

        // Background
        rtx.fillStyle = "#111111";
        rtx.beginPath();
        rtx.roundRect(0, 0, 800, 400, 20);
        rtx.fill();

        // Red border
        rtx.strokeStyle = "#e63946";
        rtx.lineWidth = 6;
        rtx.beginPath();
        rtx.roundRect(3, 3, 794, 394, 18);
        rtx.stroke();

        // Title
        rtx.fillStyle = "#ffffff";
        rtx.font = "bold 72px -apple-system, BlinkMacSystemFont, sans-serif";
        rtx.textAlign = "center"; rtx.textBaseline = "middle";
        rtx.fillText("ROLL CALL", 400, 150);

        // Subtitle
        rtx.fillStyle = "rgba(255,255,255,0.4)";
        rtx.font = "italic 36px -apple-system, BlinkMacSystemFont, sans-serif";
        rtx.fillText("select to launch", 400, 260);

        // Count
        rtx.fillStyle = "#e63946";
        rtx.font = "bold 32px -apple-system, BlinkMacSystemFont, sans-serif";
        rtx.fillText(`${rcShoes.length} shoes`, 400, 330);

        const rcTriggerTex = new THREE.CanvasTexture(rcTriggerCanvas);
        rcTriggerTex.colorSpace = THREE.SRGBColorSpace;

        const rcTrigger = new THREE.Mesh(
          new THREE.PlaneGeometry(1.4, 0.7),
          new THREE.MeshBasicMaterial({ map: rcTriggerTex, transparent: true, side: THREE.DoubleSide })
        );
        // Left sideline wall (X = -9), facing into the court (+X)
        rcTrigger.position.set(-8.95, 1.5, 0);
        rcTrigger.rotation.y = Math.PI / 2;
        rcTrigger.userData.isRollCall = true;
        scene.add(rcTrigger);

        // ── Trigger action ───────────────────────────────────────────
        rc.trigger = (now) => {
          if (rc.phase !== "idle") return;
          rc.phase = "fadeout";
          rc.t0 = now;
          rc.shoeIdx = 0;
          rcLoadShoe(0);
        };

        // ── Exit ─────────────────────────────────────────────────────
        rc.exit = (now) => {
          rcShoeGroup.visible = false;
          streakLines.visible = false;
          rc.phase = "fadein";
          rc.t0 = now;
        };

        // ── Per-frame update ─────────────────────────────────────────
        rc.update = (now, dt) => {
          if (rc.phase === "idle" || rc.phase === "done") return;
          const elapsed = now - rc.t0;

          if (rc.phase === "fadeout") {
            const t = Math.min(elapsed / RC_FADEOUT_MS, 1);
            rcFadeSphere.material.opacity = rcEase(t);
            if (t >= 1) {
              rcHideRoom();
              rcFadeSphere.material.transparent = false;
              rcFadeSphere.material.needsUpdate = true;
              streakLines.visible = true;
              rcShoeGroup.visible = true;
              rc.phase = "fly";
              rc.t0 = now;
              rc.shoeIdx = 0;
              rc.shoeT0 = now;
            }

          } else if (rc.phase === "fly") {
            updateStreaks(dt);

            // Which shoe are we on?
            const shoeElapsed = now - rc.shoeT0;
            if (shoeElapsed >= RC_PER_SHOE_MS) {
              // Next shoe
              rc.shoeIdx++;
              if (rc.shoeIdx >= rcShoes.length) {
                // All done - auto exit
                rc.exit(now);
                return;
              }
              rc.shoeT0 = now;
              rcLoadShoe(rc.shoeIdx);
              return; // process next frame with fresh timing
            }

            // Animate current shoe: appear → drift → hold → rush
            let shoeZ, shoeScale, shoeOpacity, labelOpacity;
            if (shoeElapsed < RC_APPEAR_MS) {
              const t = shoeElapsed / RC_APPEAR_MS;
              shoeZ = -16 + 3 * rcEase(t);
              shoeScale = 0.3 + 0.3 * t;
              shoeOpacity = rcEase(t);
              labelOpacity = rcEase(t);
            } else if (shoeElapsed < RC_APPEAR_MS + RC_DRIFT_MS) {
              const t = (shoeElapsed - RC_APPEAR_MS) / RC_DRIFT_MS;
              shoeZ = -13 + 10 * rcEase(t);         // -13 → -3
              shoeScale = 0.6 + 0.6 * rcEase(t);
              shoeOpacity = 1;
              labelOpacity = 1;
            } else if (shoeElapsed < RC_APPEAR_MS + RC_DRIFT_MS + RC_HOLD_MS) {
              shoeZ = -3;
              shoeScale = 1.2;
              shoeOpacity = 1;
              labelOpacity = 1;
            } else {
              const rushT = (shoeElapsed - RC_APPEAR_MS - RC_DRIFT_MS - RC_HOLD_MS) / RC_RUSH_MS;
              const rushE = rcEaseIn(Math.min(rushT, 1));
              shoeZ = -3 + 14 * rushE;
              shoeScale = 1.2 + 1.4 * rushE;
              shoeOpacity = Math.max(0, 1 - rushT * 1.8);
              labelOpacity = Math.max(0, 1 - rushT * 2.0);
            }

            rcShoePlane.position.set(0, 0, shoeZ);
            rcShoePlane.scale.setScalar(shoeScale);
            rcShoePlane.material.opacity = shoeOpacity;
            rcNameMesh.material.opacity = labelOpacity;
            rcCwMesh.material.opacity = labelOpacity;
            rcDateMesh.material.opacity = labelOpacity;
            rcTierMesh.material.opacity = labelOpacity;

            // Labels follow shoe Z but stay fixed scale
            const labelZ = shoeZ - 0.01;
            rcNameMesh.position.z = labelZ;
            rcCwMesh.position.z = labelZ;
            rcDateMesh.position.z = labelZ;
            rcTierMesh.position.z = labelZ;

          } else if (rc.phase === "fadein") {
            if (!rcFadeSphere.material.transparent) {
              rcShowRoom();
              rcFadeSphere.material.transparent = true;
              rcFadeSphere.material.needsUpdate = true;
            }
            const t = Math.min(elapsed / RC_FADEIN_MS, 1);
            rcFadeSphere.material.opacity = 1 - rcEase(t);
            if (t >= 1) {
              rcFadeSphere.material.opacity = 0;
              rc.phase = "idle";   // Can be triggered again (not "done")
            }
          }
        };

        // ── Expose for render loop and click handler ─────────────────
        window._rc = rc;

      } // end if rcShoes.length > 0
    } // end Roll Call block

    // ════════════════════════════════════════════════════════════════════
    //  GRAVEYARD - outdoor space through the right-wall doorway
    // ════════════════════════════════════════════════════════════════════
    // An outdoor nighttime graveyard for retired shoes. Each retired
    // colorway gets a tombstone with its image, name, dates, and story.
    // Accessible by walking through the foggy doorway on the right wall.
    const graveyardAnims = [];   // fog planes to animate
    {
      const GY_X = 9;                  // doorway is at x=+9
      const GY_DEPTH = 14;            // extends 14m out from the wall
      const GY_WIDTH = 16;            // 16m wide (±8 from door centre)
      const GY_Z_CENTRE = 0;          // door centred at z=0
      const GY_FLOOR_Y = 0;

      // - Transition corridor (short hallway through the wall thickness) -
      const CORR_LEN = 1.0;  // 1m deep corridor through the wall
      const corrMat = new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.DoubleSide });
      // Corridor ceiling - lies flat at DOOR_H, spans CORR_LEN along X and DOOR_W along Z
      const corrCeil = new THREE.Mesh(new THREE.PlaneGeometry(CORR_LEN, DOOR_W), corrMat);
      corrCeil.rotation.x = -Math.PI / 2;
      corrCeil.position.set(GY_X + CORR_LEN / 2, DOOR_H, GY_Z_CENTRE);
      scene.add(corrCeil);
      // Corridor side walls - run along X (corridor depth), face inward along Z
      for (const side of [-1, 1]) {
        const cw = new THREE.Mesh(new THREE.PlaneGeometry(CORR_LEN, DOOR_H), corrMat);
        cw.position.set(GY_X + CORR_LEN / 2, DOOR_H / 2, GY_Z_CENTRE + side * DOOR_W / 2);
        // No Y rotation - plane default faces +Z; side=+1 wall needs to face -Z (inward),
        // side=-1 wall needs to face +Z (inward). DoubleSide handles both.
        scene.add(cw);
      }

      // - Fog wall at the doorway (visible from inside the gym) -
      {
        const fogCv = document.createElement("canvas");
        fogCv.width = 256; fogCv.height = 256;
        const g = fogCv.getContext("2d");
        const grad = g.createRadialGradient(128, 128, 20, 128, 128, 128);
        grad.addColorStop(0, "rgba(140,160,170,0.85)");
        grad.addColorStop(0.5, "rgba(100,120,130,0.5)");
        grad.addColorStop(1, "rgba(60,70,80,0)");
        g.fillStyle = grad;
        g.fillRect(0, 0, 256, 256);
        const fogTex = new THREE.CanvasTexture(fogCv);
        fogTex.colorSpace = THREE.SRGBColorSpace;

        // Two fog planes at slightly different depths for parallax
        for (let i = 0; i < 2; i++) {
          const fogPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(DOOR_W * 1.2, DOOR_H * 1.1),
            new THREE.MeshBasicMaterial({ map: fogTex, transparent: true, side: THREE.DoubleSide, depthWrite: false, opacity: 0.7 - i * 0.2 })
          );
          fogPlane.position.set(GY_X + 0.2 + i * 0.5, DOOR_H / 2, GY_Z_CENTRE);
          fogPlane.rotation.y = -Math.PI / 2;
          fogPlane.userData.baseZ = fogPlane.position.z;
          fogPlane.userData.drift = i;
          scene.add(fogPlane);
          graveyardAnims.push(fogPlane);
        }
      }

      // - Sky dome (dark night sky with stars) -
      {
        const skyCv = document.createElement("canvas");
        skyCv.width = 512; skyCv.height = 512;
        const g = skyCv.getContext("2d");
        // Night sky gradient
        const skyGrad = g.createLinearGradient(0, 0, 0, 512);
        skyGrad.addColorStop(0, "#0a0a1a");
        skyGrad.addColorStop(0.6, "#0d0d2b");
        skyGrad.addColorStop(1, "#1a1a2e");
        g.fillStyle = skyGrad;
        g.fillRect(0, 0, 512, 512);
        // Stars
        g.fillStyle = "#ffffff";
        for (let i = 0; i < 200; i++) {
          const sz = Math.random() * 2 + 0.5;
          g.globalAlpha = Math.random() * 0.7 + 0.3;
          g.fillRect(Math.random() * 512, Math.random() * 400, sz, sz);
        }
        g.globalAlpha = 1.0;
        const skyTex = new THREE.CanvasTexture(skyCv);
        skyTex.colorSpace = THREE.SRGBColorSpace;
        const skyMat = new THREE.MeshBasicMaterial({ map: skyTex, side: THREE.DoubleSide });

        // Sky box dimensions - enclose the entire graveyard.
        // Each panel extends 0.5m past its edges so panels overlap at
        // every corner and seam, eliminating visible gaps.
        const SKY_PAD = 0.5;
        const SKY_H = 20;                         // total height
        const SKY_Y = SKY_H / 2;                  // centre height
        const SKY_TOP = SKY_H;                     // ceiling Y
        const SKY_X0 = GY_X;                       // gym wall edge
        const SKY_X1 = GY_X + GY_DEPTH + 1;        // far edge (1m past graveyard)
        const SKY_DX = SKY_X1 - SKY_X0;            // depth along X
        const SKY_CX = (SKY_X0 + SKY_X1) / 2;      // centre X
        const SKY_HW = GY_WIDTH / 2 + 5;           // half-width along Z
        const SKY_WZ = SKY_HW * 2;                  // full width along Z

        // Back wall (far edge, facing -X toward gym)
        const skyBack = new THREE.Mesh(new THREE.PlaneGeometry(SKY_WZ + SKY_PAD * 2, SKY_H + SKY_PAD), skyMat);
        skyBack.position.set(SKY_X1, SKY_Y, GY_Z_CENTRE);
        skyBack.rotation.y = -Math.PI / 2;
        scene.add(skyBack);

        // Side walls (face inward along Z)
        for (const side of [-1, 1]) {
          const sideSky = new THREE.Mesh(new THREE.PlaneGeometry(SKY_DX + SKY_PAD * 2, SKY_H + SKY_PAD), skyMat);
          sideSky.position.set(SKY_CX, SKY_Y, GY_Z_CENTRE + side * SKY_HW);
          scene.add(sideSky);
        }

        // Ceiling - separate texture (uniform dark, stars everywhere, no gradient)
        const ceilCv = document.createElement("canvas");
        ceilCv.width = 512; ceilCv.height = 512;
        const cg = ceilCv.getContext("2d");
        cg.fillStyle = "#0a0a1a";
        cg.fillRect(0, 0, 512, 512);
        cg.fillStyle = "#ffffff";
        for (let i = 0; i < 200; i++) {
          const sz = Math.random() * 2 + 0.5;
          cg.globalAlpha = Math.random() * 0.7 + 0.3;
          cg.fillRect(Math.random() * 512, Math.random() * 512, sz, sz);
        }
        cg.globalAlpha = 1.0;
        const ceilTex = new THREE.CanvasTexture(ceilCv);
        ceilTex.colorSpace = THREE.SRGBColorSpace;
        const skyCeil = new THREE.Mesh(new THREE.PlaneGeometry(SKY_DX + SKY_PAD * 2, SKY_WZ + SKY_PAD * 2),
          new THREE.MeshBasicMaterial({ map: ceilTex, side: THREE.DoubleSide }));
        skyCeil.rotation.x = Math.PI / 2;
