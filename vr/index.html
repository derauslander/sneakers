<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Vault — VR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #status {
      position: fixed; top: 16px; left: 16px; right: 16px;
      font-size: 13px; line-height: 1.6; color: #aaa;
      pointer-events: none; user-select: none;
      white-space: pre-line; max-height: 50vh; overflow: hidden;
    }
    #status .err { color: #ff6b6b; }
    #status .ok  { color: #6bff8e; }
    #status .dim { color: #666; }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three":         "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="status">The Vault — VR
Loading…</div>

  <script type="module">
    import * as THREE from "three";
    import { VRButton } from "three/addons/webxr/VRButton.js";

    // ════════════════════════════════════════════════════════════════════
    //  SETUP & STATUS LOGGING
    // ════════════════════════════════════════════════════════════════════
    const statusEl = document.getElementById("status");
    const log = (msg, cls = "") => {
      const line = cls ? `<span class="${cls}">${msg}</span>` : msg;
      statusEl.innerHTML += "\n" + line;
      console.log("[VR]", msg);
    };
    const fail = (msg) => { log(msg, "err"); throw new Error(msg); };

    // ════════════════════════════════════════════════════════════════════
    //  DATA LOAD
    // ════════════════════════════════════════════════════════════════════
    let data;
    try {
      const resp = await fetch("../public-data.json", { cache: "no-store" });
      if (!resp.ok) fail(`public-data.json fetch returned ${resp.status}`);
      data = await resp.json();
      log("Loaded public-data.json", "ok");
    } catch (e) {
      fail(`Could not load public-data.json: ${e.message}`);
    }

    const inventory     = data.inventory || [];
    const colorwayMeta  = data.colorwayMeta || {};
    const tierMeta      = data.tierMeta || {};
    const images        = data.images || {};
    const displayLayout = data.displayLayout || [];

    if (displayLayout.length === 0) fail("displayLayout is empty in public-data.json");

    // shortName → shoe lookup (displayLayout cells reference shoes by code/shortName)
    const shoeByShortName = {};
    for (const shoe of inventory) shoeByShortName[shoe.shortName] = shoe;

    // ════════════════════════════════════════════════════════════════════
    //  WHICH CELLS GO IN THE GRID
    // ════════════════════════════════════════════════════════════════════
    // displayLayout is an 8x5 grid of cells. Each cell is either:
    //   { code: "AJ1", colorway: "Royal Reimagined" }  — filled
    //   { code: "", colorway: "" } or {}               — empty
    // We flatten into a list of cell records: filled cells get their full
    // entry data, empty cells are marked so we can render outlines for them.
    const ROWS = displayLayout.length;
    const COLS = Math.max(...displayLayout.map((r) => r.length));

    const cells = []; // [{ row, col, empty, entry? }]
    let filledCount = 0;
    let emptyCount = 0;
    for (let r = 0; r < ROWS; r++) {
      const row = displayLayout[r] || [];
      for (let c = 0; c < COLS; c++) {
        const raw = row[c] || {};
        const code = raw.code;
        const cw   = raw.colorway;
        if (!code || !cw) {
          cells.push({ row: r, col: c, empty: true });
          emptyCount++;
          continue;
        }
        const shoe = shoeByShortName[code];
        if (!shoe) {
          log(`Skipping cell [${r},${c}] — unknown shoe code "${code}"`, "dim");
          cells.push({ row: r, col: c, empty: true });
          emptyCount++;
          continue;
        }
        const key = `${shoe.id}_${cw}`;
        const imagePath = images[key];
        if (!imagePath) {
          log(`Skipping cell [${r},${c}] — no image for ${key}`, "dim");
          cells.push({ row: r, col: c, empty: true });
          emptyCount++;
          continue;
        }
        cells.push({
          row: r, col: c, empty: false,
          entry: {
            key,
            shoeId: shoe.id,
            shoeName: shoe.name,
            shortName: shoe.shortName,
            colorway: cw,
            tier: tierMeta[key] || "silver",
            imagePath: "../" + imagePath,
            story: colorwayMeta[key]?.story || "",
            notes: colorwayMeta[key]?.notes || "",
          },
        });
        filledCount++;
      }
    }
    log(`Grid: ${ROWS}×${COLS}, ${filledCount} filled, ${emptyCount} empty`, "ok");

    // ════════════════════════════════════════════════════════════════════
    //  SCENE
    // ════════════════════════════════════════════════════════════════════
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    // Floor grid for spatial reference. 10m × 10m.
    const floor = new THREE.GridHelper(10, 20, 0x333333, 0x1a1a1a);
    scene.add(floor);

    // Lights — unused by the unlit photo planes, but harmless and ready
    // if we add lit elements (display case backing, frame moldings, etc.).
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const keyLight = new THREE.DirectionalLight(0xffffff, 0.6);
    keyLight.position.set(0, 4, 2);
    scene.add(keyLight);

    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 100);
    camera.position.set(0, 1.6, 0); // standing eye height

    // ════════════════════════════════════════════════════════════════════
    //  GEOMETRY CONSTANTS
    // ════════════════════════════════════════════════════════════════════
    // Wall: 8 rows × 5 cols of real-scale shoeboxes. Box dimensions:
    //   34cm wide × 22.225cm tall × 14cm deep (side-out orientation —
    //   the long side faces the user so the sneaker photo fits naturally).
    // 8 3/4" tall is the real shoebox dimension provided by the owner.
    // 1cm gaps between boxes (thin shelf-line look, not airy spacing).
    // Bottom row sits 0.5m off the floor (knee-height shelf), top row at
    // ~2.35m — comfortable look-up/down range at 2.5m viewing distance.
    const BOX_W      = 0.34;
    const BOX_H      = 0.22225;     // 8 3/4 inches exactly
    const BOX_D      = 0.14;
    const GAP_X      = 0.01;
    const GAP_Y      = 0.01;
    const PITCH_X    = BOX_W + GAP_X;
    const PITCH_Y    = BOX_H + GAP_Y;
    const WALL_Z     = -2.5;
    const BOTTOM_Y   = 0.5;          // lowest row centre Y (box centre, not bottom edge)
    const TOP_Y      = BOTTOM_Y + (ROWS - 1) * PITCH_Y;
    const LEFT_X     = -((COLS - 1) / 2) * PITCH_X;

    const cellPosition = (row, col) => {
      // displayLayout row 0 is the top shelf; +Y is up, so invert.
      const x = LEFT_X + col * PITCH_X;
      const y = TOP_Y - row * PITCH_Y;
      return new THREE.Vector3(x, y, WALL_Z);
    };

    // ════════════════════════════════════════════════════════════════════
    //  TEXTURE LOADER
    // ════════════════════════════════════════════════════════════════════
    const loader = new THREE.TextureLoader();
    loader.setCrossOrigin("anonymous");
    let texturesLoaded = 0;
    const texturesTotal = filledCount;

    const loadTextureFor = (path, plane, onSized) => {
      loader.load(
        path,
        (texture) => {
          texture.colorSpace = THREE.SRGBColorSpace;
          texture.anisotropy = 8;
          plane.material.map = texture;
          plane.material.color.set(0xffffff);
          plane.material.needsUpdate = true;
          const aspect = texture.image.width / texture.image.height;
          if (onSized) onSized(aspect);
          texturesLoaded++;
          if (texturesLoaded === texturesTotal) {
            log(`All ${texturesTotal} textures loaded`, "ok");
          }
        },
        undefined,
        (err) => {
          log(`Failed to load ${path}: ${err?.message || err}`, "err");
          texturesLoaded++;
        }
      );
    };

    // ════════════════════════════════════════════════════════════════════
    //  CELLS — 3D transparent shoeboxes with photos on the back wall
    // ════════════════════════════════════════════════════════════════════
    // Each filled cell is a Group containing:
    //   1. A clear-plastic box shell (BoxGeometry, transparent material)
    //   2. A photo plane sized to fit, positioned just in front of the
    //      back wall of the box so the shoe appears "inside" the box
    // The whole Group is what gets translated/scaled/rotated during pull-
    // forward, so the box and its photo move as one object.
    // Empty cells get a wireframe box at the same dimensions — a visible
    // "this slot is intentionally empty" hint that matches the box theme.
    const allCases = [];

    // Shared geometries — one BoxGeometry, one wireframe for empties.
    // Shared materials too: every filled box gets the same shell material
    // (clear plastic), every empty cell the same wireframe.
    const sharedBoxGeometry = new THREE.BoxGeometry(BOX_W, BOX_H, BOX_D);
    // Clear-plastic look: very low opacity gives the "barely there"
    // visibility of a transparent shoebox. MeshBasicMaterial keeps it
    // simple and fast on Quest — MeshPhysicalMaterial with transmission
    // would be more photorealistic but heavier and prone to artifacts.
    // The faint white tint with low opacity reads as glassy edges.
    const sharedShellMaterial = new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.1,
      side: THREE.DoubleSide,
      depthWrite: false,    // don't occlude the photo behind during transparent sort
    });

    // Also draw visible edges on each box so the shell reads as a real
    // object even when its faces are nearly invisible. Edges are a separate
    // LineSegments overlay using the same geometry's edge map.
    const sharedEdgesGeometry = new THREE.EdgesGeometry(sharedBoxGeometry);
    const sharedEdgesMaterial = new THREE.LineBasicMaterial({
      color: 0x888888,
      transparent: true,
      opacity: 0.6,
    });

    const sharedWireframeGeometry = sharedEdgesGeometry; // reuse for empties
    const sharedWireframeMaterial = new THREE.LineBasicMaterial({
      color: 0x333333,
      transparent: true,
      opacity: 0.4,
    });

    for (const cell of cells) {
      const pos = cellPosition(cell.row, cell.col);

      if (cell.empty) {
        const wf = new THREE.LineSegments(sharedWireframeGeometry, sharedWireframeMaterial);
        wf.position.copy(pos);
        scene.add(wf);
        continue;
      }

      // Filled cell group: contains box shell + inner photo plane.
      const group = new THREE.Group();
      group.position.copy(pos);
      scene.add(group);

      // Box shell — clear plastic. Centred on group origin.
      const shell = new THREE.Mesh(sharedBoxGeometry, sharedShellMaterial);
      group.add(shell);

      // Edges overlay — visible outline of the box so it reads as a
      // distinct object even when the shell material is mostly invisible.
      const edges = new THREE.LineSegments(sharedEdgesGeometry, sharedEdgesMaterial);
      group.add(edges);

      // Photo plane — starts square at box-front size as placeholder, then
      // resizes when the texture loads. Positioned just in front of the
      // back inner wall of the box (z = -BOX_D/2 + small offset) so the
      // photo appears "inside" the box rather than on its front face.
      const photoGeometry = new THREE.PlaneGeometry(BOX_W * 0.9, BOX_H * 0.9);
      const photoMaterial = new THREE.MeshBasicMaterial({
        color: 0x222222,
        side: THREE.DoubleSide,
        transparent: true,
        alphaTest: 0.01,
      });
      const plane = new THREE.Mesh(photoGeometry, photoMaterial);
      // Sit photo just inside the back wall, facing the user (front of box).
      // Tiny offset (0.001m) keeps it off the back wall to avoid z-fighting.
      plane.position.set(0, 0, -BOX_D / 2 + 0.001);
      group.add(plane);

      const caseRef = {
        entry: cell.entry, plane, group, shell,
        homePosition: group.position.clone(),
        homeRotation: group.rotation.clone(),
        state: "home",
        stateStart: 0,
      };
      // Raycaster targets the shell (the outer box) for hit detection —
      // pointing anywhere on the box counts as selecting that case.
      shell.userData.caseRef = caseRef;
      allCases.push(caseRef);

      // Texture load: photo fits inside the box face. Box "face" is BOX_W
      // wide × BOX_H tall (34cm × 22cm). Fit photo with 5% margin on each
      // side so it doesn't touch the box walls.
      const innerW = BOX_W * 0.9;
      const innerH = BOX_H * 0.9;
      loadTextureFor(cell.entry.imagePath, plane, (aspect) => {
        plane.geometry.dispose();
        // Fit-inside logic: scale to the most-constraining dimension.
        let w, h;
        const innerAspect = innerW / innerH;
        if (aspect >= innerAspect) {
          // Photo is wider than inner space → width-limited
          w = innerW;
          h = innerW / aspect;
        } else {
          // Photo is taller than inner space → height-limited
          h = innerH;
          w = innerH * aspect;
        }
        plane.geometry = new THREE.PlaneGeometry(w, h);
      });
    }

    // ════════════════════════════════════════════════════════════════════
    //  STORY PANEL (canvas-rendered text for the pulled-forward case)
    // ════════════════════════════════════════════════════════════════════
    // Text rendered into a 1024×768 canvas, used as a texture on a 1.2m ×
    // 0.9m plane. Roughly double the previous font sizes; brighter colors
    // for VR readability. Story text wraps at canvas width minus padding.
    const TIER_GLYPH = { diamond: "◆", platinum: "▲", gold: "●", silver: "■" };

    const makeTextPanel = (headline, subhead, story) => {
      const W = 1024, H = 768;
      const canvas = document.createElement("canvas");
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext("2d");

      // Opaque near-black background. Without this, the canvas is fully
      // transparent except where text is drawn, and the grid wall behind
      // the panel shows through — making the text hard to read against
      // a backdrop of patterned shoe photos. #0a0a0a (very slightly lifted
      // from pure black) keeps the panel readable as a distinct rectangle
      // against the black scene void rather than disappearing into it.
      ctx.fillStyle = "#0a0a0a";
      ctx.fillRect(0, 0, W, H);

      // Headline — pure white, bold, large
      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 88px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.textBaseline = "top";
      ctx.fillText(headline, 40, 40);

      // Subhead — light grey, medium
      ctx.fillStyle = "#dddddd";
      ctx.font = "60px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.fillText(subhead, 40, 160);

      // Story — near-white, italic, wrapped
      ctx.fillStyle = "#f0f0f0";
      ctx.font = "italic 52px -apple-system, BlinkMacSystemFont, sans-serif";
      const words = (story || "").split(/\s+/);
      let line = "";
      let y = 290;
      const maxWidth = W - 80;
      const lineHeight = 72;
      for (const word of words) {
        const test = line ? line + " " + word : word;
        if (ctx.measureText(test).width > maxWidth && line) {
          ctx.fillText(line, 40, y);
          line = word;
          y += lineHeight;
          if (y > H - lineHeight) break;
        } else {
          line = test;
        }
      }
      if (line && y <= H - lineHeight) ctx.fillText(line, 40, y);

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;

      const material = new THREE.MeshBasicMaterial({
        map: texture, transparent: true, side: THREE.DoubleSide,
      });

      // Panel: 0.9m tall, 4:3 aspect → 1.2m wide
      const panelHeight = 0.9;
      const panelWidth = panelHeight * (W / H);
      const geometry = new THREE.PlaneGeometry(panelWidth, panelHeight);
      return new THREE.Mesh(geometry, material);
    };

    let storyPanel = null;
    const showStoryFor = (entry) => {
      hideStory();
      const headline = entry.shoeName;
      const subhead  = `${entry.colorway}   ${TIER_GLYPH[entry.tier] || ""}`;
      const text     = entry.story || entry.notes || "";
      storyPanel = makeTextPanel(headline, subhead, text);
      // Right of the forward viewing position, eye height, angled toward user.
      storyPanel.position.set(1.2, 1.6, -2.0);
      storyPanel.lookAt(0, 1.6, 0);
      scene.add(storyPanel);
    };
    const hideStory = () => {
      if (!storyPanel) return;
      scene.remove(storyPanel);
      storyPanel.material.map.dispose();
      storyPanel.material.dispose();
      storyPanel.geometry.dispose();
      storyPanel = null;
    };

    // ════════════════════════════════════════════════════════════════════
    //  RENDERER + WEBXR
    // ════════════════════════════════════════════════════════════════════
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);
    document.body.appendChild(VRButton.createButton(renderer));

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ════════════════════════════════════════════════════════════════════
    //  CONTROLLERS — raycaster + trigger select
    // ════════════════════════════════════════════════════════════════════
    const raycaster = new THREE.Raycaster();
    const tempMatrix = new THREE.Matrix4();
    const pointerGeometry = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(0, 0, -5),
    ]);

    let focusedCase = null;

    const onSelect = (event) => {
      const controller = event.target;
      tempMatrix.identity().extractRotation(controller.matrixWorld);
      raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
      raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

      // Hit-test the box shells, not the inner photo planes — the shell
      // is the visible "object" the user is pointing at, and the photo
      // sits inside (partially obscured by the shell). userData.caseRef
      // is now set on shell, not plane.
      const targets = allCases.map((c) => c.shell);
      const intersects = raycaster.intersectObjects(targets, false);

      if (intersects.length === 0) {
        if (focusedCase) {
          focusedCase.state = "returning";
          focusedCase.stateStart = performance.now();
          hideStory();
          focusedCase = null;
        }
        return;
      }

      const caseRef = intersects[0].object.userData.caseRef;
      if (!caseRef) return;

      if (focusedCase === caseRef) {
        caseRef.state = "returning";
        caseRef.stateStart = performance.now();
        hideStory();
        focusedCase = null;
        return;
      }

      if (focusedCase) {
        focusedCase.state = "returning";
        focusedCase.stateStart = performance.now();
      }

      caseRef.state = "pulling";
      caseRef.stateStart = performance.now();
      focusedCase = caseRef;
      showStoryFor(caseRef.entry);
    };

    for (let i = 0; i < 2; i++) {
      const controller = renderer.xr.getController(i);
      controller.addEventListener("select", onSelect);
      const pointer = new THREE.Line(
        pointerGeometry,
        new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.5, transparent: true })
      );
      controller.add(pointer);
      scene.add(controller);
    }

    // ════════════════════════════════════════════════════════════════════
    //  ANIMATION (pull-forward / return)
    // ════════════════════════════════════════════════════════════════════
    const PULL_DURATION_MS = 400;
    // Forward viewing position: 2.0m in front, half a metre left of centre
    // (story panel fits on the right), eye height.
    const VIEW_POSITION = new THREE.Vector3(-0.5, 1.6, -2.0);
    const VIEW_SCALE = 1.5;
    const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);

    const updateCases = (now) => {
      for (const c of allCases) {
        if (c.state === "home") continue;
        const elapsed = now - c.stateStart;
        const t = Math.min(elapsed / PULL_DURATION_MS, 1);
        const e = easeOutCubic(t);

        if (c.state === "pulling") {
          c.group.position.lerpVectors(c.homePosition, VIEW_POSITION, e);
          c.group.scale.setScalar(1 + (VIEW_SCALE - 1) * e);
          c.group.lookAt(0, 1.6, 0);
          if (t >= 1) c.state = "forward";
        } else if (c.state === "returning") {
          c.group.position.lerpVectors(VIEW_POSITION, c.homePosition, e);
          c.group.scale.setScalar(VIEW_SCALE - (VIEW_SCALE - 1) * e);
          if (t >= 1) {
            c.group.position.copy(c.homePosition);
            c.group.rotation.copy(c.homeRotation);
            c.group.scale.setScalar(1);
            c.state = "home";
          } else {
            c.group.lookAt(0, 1.6, 0);
          }
        }
      }
    };

    // ════════════════════════════════════════════════════════════════════
    //  RENDER LOOP
    // ════════════════════════════════════════════════════════════════════
    renderer.setAnimationLoop((time) => {
      const now = time || performance.now();
      updateCases(now);
      renderer.render(scene, camera);
    });

    log("Scene ready. Tap Enter VR to begin.", "ok");
  </script>
</body>
</html>
