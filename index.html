<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Vault — DerAusländer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #ffffff; font-family: 'Aptos', 'Segoe UI', sans-serif; color: #111111; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f0f0f0; }
    ::-webkit-scrollbar-thumb { background: #ccc; }
    @keyframes grailPulse {
      0%   { opacity: 1; }
      50%  { opacity: 0.4; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const useIsMobile = () => {
      const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
      useEffect(() => {
        const handler = () => setIsMobile(window.innerWidth < 768);
        window.addEventListener("resize", handler);
        return () => window.removeEventListener("resize", handler);
      }, []);
      return isMobile;
    };

    const CAT_COLORS = {
      Jordan: { bg: "#fff0f0", accent: "#e63946" },
      Nike:   { bg: "#fff0f0", accent: "#e63946" },
    };

    // ── Read-only ImageSlot ──────────────────────────────────────────────────
    function ImageSlot({ img, hoverImg, label, accent, width = 96, height = 60,
                         isGrail = false, isBeater = false, purchaseDate = null,
                         size = null, ogYear = null, wearDates = [], story = null, isOnIce = false }) {
      const isMobile    = useIsMobile();
      const [hovered,     setHovered]     = useState(false);
      const [showHover,   setShowHover]   = useState(false);
      const [beaterGlow,  setBeaterGlow]  = useState(false);
      const [grailReveal, setGrailReveal] = useState(false);
      const [showStory,   setShowStory]   = useState(false);
      const [iceGlow,     setIceGlow]     = useState(false);
      const timerRef    = useRef(null);
      const crossfadeRef= useRef(null);
      const beaterRef   = useRef(null);
      const grailRef    = useRef(null);
      const storyRef    = useRef(null);
      const iceRef      = useRef(null);

      const triggerOpen = () => {
        if (!img) return;
        setHovered(true);
        setShowHover(false);
        setBeaterGlow(false);
        setGrailReveal(false);
        setShowStory(false);
        setIceGlow(false);
        if (isGrail && hoverImg) {
          crossfadeRef.current = setTimeout(() => { setShowHover(true); setGrailReveal(true);
            if (story) storyRef.current = setTimeout(() => setShowStory(true), 5000);
          }, 200);
        } else if (isGrail) {
          grailRef.current = setTimeout(() => { setGrailReveal(true);
            if (story) storyRef.current = setTimeout(() => setShowStory(true), 5000);
          }, 200);
        } else if (story) {
          storyRef.current = setTimeout(() => setShowStory(true), 5000);
        }
        if (isBeater) {
          beaterRef.current = setTimeout(() => setBeaterGlow(true), 200);
        }
        if (isOnIce) {
          iceRef.current = setTimeout(() => setIceGlow(true), 200);
        }
      };
      const triggerClose = () => {
        clearTimeout(crossfadeRef.current);
        clearTimeout(beaterRef.current);
        clearTimeout(grailRef.current);
        clearTimeout(storyRef.current);
        clearTimeout(iceRef.current);
        setHovered(false);
        setShowHover(false);
        setBeaterGlow(false);
        setGrailReveal(false);
        setShowStory(false);
        setIceGlow(false);
      };

      const handleMouseEnter = () => { if (isMobile) return; timerRef.current = setTimeout(triggerOpen, 500); };
      const handleMouseLeave = () => { if (isMobile) return; clearTimeout(timerRef.current); triggerClose(); };
      const handleTap        = (e) => { if (!isMobile) return; e.stopPropagation(); hovered ? triggerClose() : triggerOpen(); };

      return (
        <div style={{ position:"relative", display:"inline-block" }}>
          {img ? (
            <div style={{ textAlign:"center" }}>
              <div style={{ position:"relative", display:"inline-block" }}>
                <img src={img} alt={label}
                  onMouseEnter={handleMouseEnter}
                  onMouseLeave={handleMouseLeave}
                  onClick={handleTap}
                  style={{ width, height, objectFit:"cover", border:"none", display:"block", cursor: isMobile ? "pointer" : "zoom-in" }}
                />
                {hovered && (
                  <div onClick={triggerClose} style={{
                    position:"fixed", top:0, left:0, width:"100vw", height:"100vh",
                    background:"rgba(0,0,0,0.85)", display:"flex", flexDirection:"column",
                    alignItems:"center", justifyContent:"center", zIndex:9999,
                    pointerEvents: isMobile ? "auto" : "none",
                  }}>
                    <div style={{ position:"relative", width: isMobile ? "90vw" : "50vw", maxWidth:"600px", display:"flex", flexDirection:"column", alignItems:"center" }}>
                      {/* Image — stays fixed, never fades */}
                      <div style={{ position:"relative", width:"100%", display:"flex", justifyContent:"center" }}>
                        <img src={img} alt={label} style={{
                          maxWidth: isMobile ? "90vw" : "50vw", maxHeight:"40vh", objectFit:"contain",
                          filter: isBeater && beaterGlow
                            ? "drop-shadow(0 0 30px rgba(180,80,20,0.8)) drop-shadow(0 0 8px rgba(255,255,255,0.3))"
                            : isOnIce && iceGlow
                            ? "drop-shadow(0 0 30px rgba(100,200,255,0.8)) drop-shadow(0 0 8px rgba(255,255,255,0.3))"
                            : "drop-shadow(0 0 8px rgba(255,255,255,0.6))",
                          display:"block",
                          opacity: (isGrail && hoverImg && showHover) ? 0 : 1,
                          transition:"opacity 3s ease-in-out, filter 3s ease-in-out"
                        }} />
                        {isGrail && hoverImg && (
                          <img src={hoverImg} alt={label} style={{
                            position:"absolute", top:0, left:"50%",
                            transform: showHover ? "translateX(-50%) scale(1)" : "translateX(-50%) scale(0.95)",
                            maxWidth: isMobile ? "90vw" : "50vw", maxHeight:"40vh",
                            objectFit:"contain",
                            filter:"drop-shadow(0 0 30px rgba(255,215,0,0.7)) drop-shadow(0 0 8px rgba(255,255,255,0.6))",
                            opacity: showHover ? 1 : 0,
                            transition:"opacity 3s ease-in-out, transform 3s ease-in-out"
                          }} />
                        )}
                      </div>
                      {/* Text area — fixed container, info fades out, story fades in */}
                      <div style={{ width:"100%", marginTop:"16px", textAlign:"center", position:"relative", minHeight:"80px" }}>
                        {/* Info text */}
                        <div style={{ position:"absolute", width:"100%", opacity: showStory ? 0 : 1, transition:"opacity 1s ease-in-out" }}>
                          {isGrail  && <div style={{ fontSize:"11px", letterSpacing:"6px", color:"#FFD700", opacity: grailReveal ? 1 : 0, transition:"opacity 3s ease-in-out" }}>✦ GRAIL ✦</div>}
                          {isBeater && <div style={{ fontSize:"11px", letterSpacing:"6px", color:"#b45014", marginTop:"6px", opacity: beaterGlow ? 1 : 0, transition:"opacity 3s ease-in-out" }}>💀 BEATER 💀</div>}
                          {isOnIce  && <div style={{ fontSize:"11px", letterSpacing:"6px", color:"#64c8ff", marginTop:"6px", opacity: iceGlow ? 1 : 0, transition:"opacity 3s ease-in-out" }}>❄️ ON ICE ❄️</div>}
                          <div style={{ marginTop:(isGrail||isBeater||isOnIce)?"6px":"0", fontSize:"13px", letterSpacing:"3px", color: isGrail && grailReveal ? "#FFD700" : isBeater && beaterGlow ? "#b45014" : isOnIce && iceGlow ? "#64c8ff" : "#fff", transition:"color 3s ease-in-out" }}>{label}</div>
                          {ogYear && <div style={{ marginTop:"4px", fontSize:"10px", color:"#fff", letterSpacing:"1px" }}>Originally Owned in {ogYear}</div>}
                          {purchaseDate && <div style={{ marginTop:"8px", fontSize:"10px", color:"#aaa", letterSpacing:"1px" }}>Purchase Date: {new Date(purchaseDate+"T00:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"})}</div>}
                          {size && <div style={{ marginTop:"4px", fontSize:"10px", color:"#aaa", letterSpacing:"1px" }}>Size: {size}</div>}
                          <div style={{ marginTop:"4px", fontSize:"10px", color:"#aaa", letterSpacing:"1px" }}>Last Worn: {wearDates.length > 0 ? new Date([...wearDates].sort((a,b) => b>a?1:-1)[0]+"T00:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}) : "Never"}</div>
                          {isMobile && <div style={{ marginTop:"16px", fontSize:"10px", color:"#666", letterSpacing:"2px" }}>TAP TO CLOSE</div>}
                        </div>
                        {/* Story text */}
                        {story && (
                          <div style={{ position:"absolute", width:"100%", opacity: showStory ? 1 : 0, transition:"opacity 2s ease-in-out" }}>
                            <div style={{ fontSize:"13px", color:"#fff", lineHeight:"1.8", letterSpacing:"0.5px" }}>{story}</div>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                )}
              </div>
              <div style={{ fontSize:"11px", color:"#666", marginTop:"4px", maxWidth:width, textAlign:"center", lineHeight:"1.3", wordBreak:"break-word" }}>{label}</div>
            </div>
          ) : (
            <div style={{ textAlign:"center" }}>
              <div style={{ width, height, background:"#f5f5f5", display:"flex", alignItems:"center", justifyContent:"center" }}>
                <div style={{ fontSize:"10px", color:"#ccc", letterSpacing:"1px" }}>—</div>
              </div>
              <div style={{ fontSize:"11px", color:"#666", marginTop:"4px", maxWidth:width, textAlign:"center", lineHeight:"1.3", wordBreak:"break-word" }}>{label}</div>
            </div>
          )}
        </div>
      );
    }

    // ── Read-only DisplayCell ────────────────────────────────────────────────
    function DisplayCell({ c, img, hoverImg, isGrail, cellW = 160, cellH = 100 }) {
      const isMobile    = useIsMobile();
      const [hovered,   setHovered]   = useState(false);
      const [showHover, setShowHover] = useState(false);
      const timerRef     = useRef(null);
      const crossfadeRef = useRef(null);

      const triggerOpen = () => {
        if (!img) return;
        setHovered(true);
        setShowHover(false);
        if (isGrail && hoverImg) {
          crossfadeRef.current = setTimeout(() => setShowHover(true), 200);
        }
      };
      const triggerClose = () => {
        clearTimeout(crossfadeRef.current);
        setHovered(false);
        setShowHover(false);
      };

      const handleMouseEnter = () => { if (isMobile || !img) return; timerRef.current = setTimeout(triggerOpen, 500); };
      const handleMouseLeave = () => { if (isMobile) return; clearTimeout(timerRef.current); triggerClose(); };
      const handleTap        = (e) => { if (!isMobile) return; e.stopPropagation(); hovered ? triggerClose() : triggerOpen(); };

      return (
        <div style={{ width: cellW }}>
          <div onMouseEnter={handleMouseEnter} onMouseLeave={handleMouseLeave} onClick={handleTap}
            style={{
              width: cellW, height: cellH,
              background: c.empty ? "#f5f5f5" : img ? "#ffffff" : c.bg,
              border:"none",
              display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
              padding: img ? "0" : "6px", textAlign:"center",
              overflow:"hidden", position:"relative", cursor: img ? "pointer" : "default",
            }}>
            {c.empty
              ? <span style={{color:"#ddd",fontSize:"18px"}}>·</span>
              : img
                ? <img src={img} alt={c.colorway} style={{ width:"100%", height:"100%", objectFit:"cover", display:"block" }} />
                : <div style={{fontSize:"11px",letterSpacing:"2px",color:c.accent,fontWeight:"bold"}}>{c.label}</div>
            }
            {hovered && img && (
              <div onClick={triggerClose} style={{
                position:"fixed", top:0, left:0, width:"100vw", height:"100vh",
                background:"rgba(0,0,0,0.85)", display:"flex", flexDirection:"column",
                alignItems:"center", justifyContent:"center", zIndex:9999,
                pointerEvents: isMobile ? "auto" : "none",
              }}>
                <div style={{ position:"relative", maxWidth:"90vw", maxHeight:"70vh" }}>
                  <img src={img} alt={c.colorway} style={{ maxWidth:"90vw", maxHeight:"70vh", objectFit:"contain", filter:"drop-shadow(0 0 8px rgba(255,255,255,0.6))", display:"block", opacity:(isGrail&&hoverImg&&showHover)?0:1, transition:"opacity 3s ease-in-out" }} />
                  {isGrail && hoverImg && (
                    <img src={hoverImg} alt={c.colorway} style={{ position:"absolute", top:0, left:0, maxWidth:"90vw", maxHeight:"70vh", objectFit:"contain", filter:"drop-shadow(0 0 30px rgba(255,215,0,0.7)) drop-shadow(0 0 8px rgba(255,255,255,0.6))", opacity:showHover?1:0, transform:showHover?"scale(1)":"scale(0.95)", transition:"opacity 3s ease-in-out, transform 3s ease-in-out" }} />
                  )}
                </div>
                {isGrail && <div style={{ marginTop:"12px", fontSize:"11px", letterSpacing:"6px", color:"#FFD700" }}>✦ GRAIL ✦</div>}
                <div style={{ marginTop:isGrail?"6px":"16px", fontSize:"13px", letterSpacing:"3px", color:isGrail?"#FFD700":c.accent }}>{c.colorway}</div>
                {isMobile && <div style={{ marginTop:"16px", fontSize:"10px", color:"#666", letterSpacing:"2px" }}>TAP TO CLOSE</div>}
              </div>
            )}
          </div>
          {!c.empty && (
            <div style={{ textAlign:"center", marginTop:"4px" }}>
              <div style={{ fontSize:"8px", color:"#666", letterSpacing:"0.5px", overflow:"hidden", whiteSpace:"nowrap", textOverflow:"ellipsis" }}>{c.colorway}</div>
            </div>
          )}
        </div>
      );
    }

    // ── Main App ─────────────────────────────────────────────────────────────
    function App() {
      const isMobile  = useIsMobile();
      const [data,    setData]    = useState(null);
      const [loading, setLoading] = useState(true);
      const [error,   setError]   = useState(null);
      const [view,    setView]    = useState("inventory");

      useEffect(() => {
        fetch("vault-data.json")
          .then(r => { if (!r.ok) throw new Error("Could not load vault-data.json"); return r.json(); })
          .then(d => { setData(d); setLoading(false); })
          .catch(e => { setError(e.message); setLoading(false); });
      }, []);

      if (loading) return (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", flexDirection:"column", gap:"16px" }}>
          <div style={{ fontSize:"11px", letterSpacing:"4px", color:"#e63946" }}>LOADING THE VAULT...</div>
        </div>
      );

      if (error) return (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", flexDirection:"column", gap:"16px" }}>
          <div style={{ fontSize:"11px", letterSpacing:"4px", color:"#e63946" }}>VAULT UNAVAILABLE</div>
          <div style={{ fontSize:"10px", color:"#aaa" }}>{error}</div>
        </div>
      );

      const { inventory = [], wearLog = {}, images = {}, colorwayMeta = {}, grailMeta = {}, beaterMeta = {}, colorways = {}, displayLayout = [] } = data;

      const owned    = inventory.filter(s => !s.wishlist);
      const wishlist = inventory.filter(s =>  s.wishlist);
      const total    = owned.reduce((n, s) => n + s.quantity, 0);
      const filledCells = displayLayout.flat().filter(c => c.code && c.code !== "").length;
      const empty    = 40 - filledCells;

      // Rotation banner
      const allColorwayEntries = owned.flatMap(shoe => {
        const shoeColorways = colorways[shoe.shortName] || [];
        return shoeColorways.map(cw => {
          const entries = (wearLog[shoe.id] || []).filter(e => e.colorway === cw);
          const lastWorn = entries.length ? [...entries].sort((a,b) => a.date < b.date ? 1 : -1)[0].date : null;
          return { shoe, colorway: cw, lastWorn };
        });
      });
      const longestUnwornEntry = allColorwayEntries.reduce((pick, entry) => {
        if (!pick) return entry;
        if (!pick.lastWorn && !entry.lastWorn) return pick;
        if (!entry.lastWorn) return entry;
        if (!pick.lastWorn) return pick;
        return entry.lastWorn < pick.lastWorn ? entry : pick;
      }, null);
      const longestUnworn         = longestUnwornEntry?.shoe || null;
      const longestUnwornColorway = longestUnwornEntry?.colorway || null;
      const longestUnwornLastDate = longestUnwornEntry?.lastWorn || null;

      const getCellStyle = (cell) => {
        if (!cell.code || cell.code === "" || cell.code === "--") return { empty: true };
        const col = CAT_COLORS[inventory.find(s => s.shortName === cell.code)?.category] || CAT_COLORS.Jordan;
        return { bg: col.bg, accent: col.accent, label: cell.code, colorway: cell.colorway };
      };

      return (
        <div style={{ minHeight:"100vh" }}>
          {/* Header */}
          <div style={{ background:"#ffffff", borderBottom:"1px solid #e0e0e0", padding: isMobile ? "12px 16px" : "20px 32px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div>
              <div style={{ fontSize: isMobile ? "20px" : "28px", fontWeight:"bold", color:"#e63946", letterSpacing:"2px", lineHeight:1 }}>DerAusländer</div>
              <div style={{ fontSize: isMobile ? "14px" : "20px", letterSpacing:"8px", color:"#111", marginTop:"4px" }}>THE VAULT</div>
            </div>
            <div style={{ display:"flex", gap: isMobile ? "16px" : "32px" }}>
              {[["PAIRS", total], ["OPEN BOXES", empty], ["WISHLIST", wishlist.length]].map(([label, val]) => (
                <div key={label} style={{ textAlign:"center" }}>
                  <div style={{ fontSize: isMobile ? "16px" : "22px", fontWeight:"bold", color:"#e63946" }}>{val}</div>
                  <div style={{ fontSize:"8px", letterSpacing:"3px", color:"#888" }}>{label}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Nav */}
          <div style={{ display:"flex", borderBottom:"1px solid #e0e0e0", background:"#f5f5f5" }}>
            {["inventory", ...(isMobile ? [] : ["display"]), "wishlist", "about"].map(v => (
              <button key={v} onClick={() => setView(v)} style={{
                padding:"14px 28px", background:view===v?"#e63946":"transparent",
                color:view===v?"#fff":"#666", border:"none", cursor:"pointer",
                fontSize:"11px", letterSpacing:"4px", textTransform:"uppercase",
                fontFamily:"'Aptos','Segoe UI',sans-serif",
              }}>{v}</button>
            ))}
          </div>

          <div style={{ padding: isMobile ? "16px" : "32px" }}>

            {/* ── INVENTORY ── */}
            {view === "inventory" && (
              <div>
                {/* Rotation Banner */}
                {longestUnworn && (() => {
                  const isRotationGrail = longestUnwornColorway ? !!grailMeta[`${longestUnworn.id}_${longestUnwornColorway}`] : false;
                  const rotationImg = images[`${longestUnworn.id}_${longestUnwornColorway}`] || null;
                  return (
                    <div style={{ background:"linear-gradient(90deg,#fff5f5,#ffe8e8)", border:"1px solid #f4a261", padding:"16px", marginBottom:"24px", display:"flex", alignItems:"center", gap:"16px" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:"16px" }}>
                        {rotationImg && <img src={rotationImg} alt={longestUnwornColorway} style={{ width:"96px", height:"60px", objectFit:"cover", flexShrink:0 }} />}
                        <div>
                          <div style={{ fontSize:"9px", letterSpacing:"4px", color:"#e63946", marginBottom:"4px" }}>
                            {isRotationGrail ? <span><span style={{color:"#FFD700"}}>✦</span> GRAIL UP NEXT <span style={{color:"#FFD700"}}>✦</span></span> : "UP NEXT FOR ROTATION"}
                          </div>
                          <div style={{ fontSize: isMobile ? "13px" : "16px", fontWeight:"bold", color:"#111" }}>
                            {isRotationGrail ? <span><span style={{color:"#FFD700"}}>✦</span> {longestUnworn.name}{longestUnwornColorway ? ` — ${longestUnwornColorway}` : ""} <span style={{color:"#FFD700"}}>✦</span></span> : `${longestUnworn.name}${longestUnwornColorway ? ` — ${longestUnwornColorway}` : ""}`}
                          </div>
                          <div style={{ fontSize:"10px", color:"#555", marginTop:"2px" }}>
                            {longestUnwornLastDate ? `Last worn: ${longestUnwornLastDate}` : "Never worn"}
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })()}
                <div style={{ display:"flex", flexWrap:"wrap", gap:"12px", alignItems:"flex-start" }}>
                {owned.map(shoe => {
                  const col = CAT_COLORS[shoe.category] || CAT_COLORS.Jordan;
                  const shoeColorways = colorways[shoe.shortName] || [];
                  const perRow = isMobile ? shoeColorways.length : Math.min(shoeColorways.length, 5);
                  const imgW = isMobile ? 72 : (perRow === 1 ? 120 : perRow <= 3 ? 96 : 80);
                  const imgH = Math.round(imgW * 0.625);
                  const cardMinW = isMobile ? "100%" : Math.max(280, perRow * (imgW + 16) + 32);
                  return (
                    <div key={shoe.id} style={{ background:"#ffffff", border:"1px solid #e0e0e0", minWidth: cardMinW, maxWidth: isMobile ? "100%" : cardMinW, flex: isMobile ? "1 1 100%" : "0 1 auto" }}>
                      <div style={{ padding:"16px", height: isMobile ? "auto" : "240px", overflow: isMobile ? "visible" : "hidden" }}>
                      <div style={{ fontSize:"14px", color:"#111", fontWeight:"bold", marginBottom:"12px" }}>
                        {shoe.name}{shoe.quantity > 1 ? ` — ${shoe.quantity} pairs` : ""}
                      </div>
                      <div style={{ display:"flex", flexWrap:"wrap", gap:"8px", maxWidth: isMobile ? "100%" : perRow * (imgW + 8) + "px" }}>
                        {shoeColorways.map(cw => {
                          const metaKey = `${shoe.id}_${cw}`;
                          const meta    = colorwayMeta[metaKey] || {};
                          return (
                            <ImageSlot key={cw}
                              img={images[metaKey] || null}
                              hoverImg={images[`${metaKey}_hover`] || null}
                              label={cw}
                              accent={col.accent}
                              width={imgW}
                              height={imgH}
                              isGrail={!!grailMeta[metaKey]}
                              isBeater={!!beaterMeta[metaKey]}
                              isOnIce={(wearLog[shoe.id] || []).filter(e => e.colorway === cw).length === 0}
                              purchaseDate={meta.purchaseDate || null}
                              size={meta.size || null}
                              ogYear={meta.ogYear || null}
                              story={meta.story || null}
                              wearDates={(wearLog[shoe.id] || []).filter(e => e.colorway === cw).map(e => e.date)}
                            />
                          );
                        })}
                      </div>
                      </div>
                    </div>
                  );
                })}
              </div>
              </div>
            )}

            {/* ── DISPLAY ── */}
            {view === "display" && (() => {
              const gridW = 5 * 160 + 4 * 6; // 824px
              const availW = Math.min(window.innerWidth - 64, 1200);
              const scale = availW < gridW ? availW / gridW : 1;
              return (
              <div>
                <div style={{ fontSize:"9px", letterSpacing:"4px", color:"#aaa", marginBottom:"16px" }}>MY COLLECTION · AS CURRENTLY DISPLAYED IN MY OFFICE</div>
                <div style={{ transformOrigin:"top left", transform:`scale(${scale})`, width: gridW + "px", height: Math.round((8 * 100 + 7 * 6 + 8 * 20) * scale) + "px" }}>
                <div style={{ display:"inline-grid", gridTemplateColumns:"repeat(5, 160px)", gap:"6px" }}>
                {displayLayout.map((row, ri) => row.map((cell, ci) => {
                  const c    = getCellStyle(cell);
                  const shoe = !c.empty ? inventory.find(s => s.shortName === cell.code) : null;
                  const img      = shoe ? images[`${shoe.id}_${cell.colorway}`]         : null;
                  const hoverImg = shoe ? images[`${shoe.id}_${cell.colorway}_hover`]   : null;
                  const isGrail  = shoe ? !!grailMeta[`${shoe.id}_${cell.colorway}`]    : false;
                  return <DisplayCell key={`${ri}-${ci}`} c={c} img={img} hoverImg={hoverImg} isGrail={isGrail} cellW={160} cellH={100} />;
                }))}
                </div>
                </div>
              </div>
              );
            })()}

            {/* ── WISHLIST ── */}
            {view === "wishlist" && (
              <div style={{ display:"flex", flexWrap:"wrap", gap:"12px", alignItems:"flex-start" }}>
                {wishlist.length === 0
                  ? <div style={{ fontSize:"11px", letterSpacing:"4px", color:"#888" }}>NOTHING ON THE WISHLIST</div>
                  : wishlist.map(shoe => {
                      const col = CAT_COLORS[shoe.category] || CAT_COLORS.Jordan;
                      const shoeColorways = colorways[shoe.shortName] || [];
                      const imgW = isMobile ? 72 : (shoeColorways.length === 1 ? 120 : shoeColorways.length <= 3 ? 96 : 80);
                      const imgH = Math.round(imgW * 0.625);
                      const cardMinW = isMobile ? "100%" : Math.max(200, shoeColorways.length * (imgW + 16) + 32);
                      return (
                        <div key={shoe.id} style={{ background:"#ffffff", border:"1px solid #e0e0e0", padding:"16px", minWidth: cardMinW, flex: isMobile ? "1 1 100%" : "0 1 auto" }}>
                          <div style={{ fontSize:"14px", color:"#111", fontWeight:"bold", marginBottom:"12px" }}>{shoe.name}</div>
                          <div style={{ display:"flex", flexWrap:"wrap", gap:"8px" }}>
                            {shoeColorways.map(cw => {
                              const metaKey = `${shoe.id}_${cw}`;
                              const meta    = colorwayMeta[metaKey] || {};
                              return (
                                <ImageSlot key={cw}
                                  img={images[metaKey] || null}
                                  label={cw}
                                  accent={col.accent}
                                  width={imgW}
                                  height={imgH}
                                  isGrail={!!grailMeta[metaKey]}
                                  purchaseDate={meta.purchaseDate || null}
                                  size={meta.size || null}
                                  ogYear={meta.ogYear || null}
                                />
                              );
                            })}
                          </div>
                        </div>
                      );
                    })
                }
              </div>
            )}

            {/* ── ABOUT ── */}
            {view === "about" && (
              <div style={{ maxWidth:"640px", margin:"0 auto", padding:"16px 0" }}>
                <div style={{ fontSize:"11px", letterSpacing:"4px", color:"#e63946", marginBottom:"32px" }}>ABOUT THE VAULT</div>
                <p style={{ fontSize:"15px", color:"#333", lineHeight:"2", marginBottom:"24px", fontStyle:"italic" }}>
                  The first time I saw the Air Jordan 4 sitting in the window of my local shoe store, I was hooked. Every trip to the mall meant one thing: making my way to Foot Locker and staring at the shoes worn by my favorite athletes — Michael Jordan, Andre Agassi, and Bo Jackson. I'd stand there daydreaming about the day I could own all of them.
                </p>
                <p style={{ fontSize:"15px", color:"#333", lineHeight:"2", marginBottom:"24px", fontStyle:"italic" }}>
                  In 2023, I decided to make that childhood dream a reality.
                </p>
                <p style={{ fontSize:"15px", color:"#333", lineHeight:"2", fontStyle:"italic" }}>
                  This collection is for that 10 year old boy who never stopped looking through the glass.
                </p>
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
