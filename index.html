    }

    function App() {
      const isMobile = useIsMobile();
      const isMobilePublic = !ADMIN_MODE && isMobile;
      const [dark, setDark] = useDarkMode(ADMIN_MODE);
      const T = dark ? DARK : LIGHT;
      // CT = card text colors (always dark on light cards, light on dark cards)
      const CT = dark ? T : { text:"#111", text2:"#333", text3:"#555", text4:"#666", text5:"#888", text6:"#aaa", text7:"#bbb", text8:"#ddd", border:`1px solid #e0e0e0`, border2:"#ccc" };
      // ── Public data loading ──────────────────────────────────────────────
      const [publicData, setPublicData] = useState(null);
      const [publicLoading, setPublicLoading] = useState(!ADMIN_MODE);
      const [publicError, setPublicError] = useState(null);

      useEffect(() => {
        if (ADMIN_MODE) return;
        fetch("public-data.json")
          .then(r => { if (!r.ok) throw new Error("Could not load public-data.json"); return r.json(); })
          .then(d => { setPublicData(d); setPublicLoading(false); })
          .catch(e => { setPublicError(e.message); setPublicLoading(false); });
      }, []);

      const [inventory,    setInventory]    = useState(() => ADMIN_MODE ? load("vault_inventory", []) : []);
      const importRef = useRef();
      const [importMsg, setImportMsg] = useState(null);
      const [wearLog,        setWearLog]        = useState(() => ADMIN_MODE ? load("vault_wearlog_v3", {}) : {});
      const [images,         setImages]         = useState(() => ADMIN_MODE ? load("vault_images", {}) : {});
      const [colorwayMeta,   setColorwayMeta]   = useState(() => ADMIN_MODE ? load("vault_colorway_meta", {}) : {});
      const [tierMeta,       setTierMeta]       = useState(() => {
        if (!ADMIN_MODE) return {};
        const existing = load("vault_tier_meta", null);
        if (existing) return existing;
        // One-time migration from grailMeta/beaterMeta
        const inv = load("vault_inventory", []);
        const cws = load("vault_colorways", {});
        const gm = load("vault_grail_meta", {});
        const bm = load("vault_beater_meta", {});
        const migrated = migrateTiers(inv, cws, gm, bm);
        try {
          localStorage.setItem("vault_tier_meta", JSON.stringify(migrated));
          localStorage.removeItem("vault_grail_meta");
          localStorage.removeItem("vault_beater_meta");
        } catch {}
        return migrated;
      });
      const [glowMeta,       setGlowMeta]       = useState(() => ADMIN_MODE ? load("vault_glow_meta", {}) : {});
      const [graveyardMeta,  setGraveyardMeta]  = useState(() => ADMIN_MODE ? load("vault_graveyard_meta", {}) : {});
      const [colorways,      setColorways]      = useState(() => ADMIN_MODE ? load("vault_colorways", {}) : {});
      const [colorwayOwned, setColorwayOwned] = useState(() => {
        if (!ADMIN_MODE) return {};
        const existing = load("vault_colorway_owned", null);
        if (existing) return existing;
        // One-time migration from wishlist flag + colorwayWishlist
        const inv = load("vault_inventory", []);
        const cws = load("vault_colorways", {});
        const cwWishlist = load("vault_colorway_wishlist", {});
        const owned = {};
        inv.forEach(shoe => {
          (cws[shoe.shortName] || []).forEach(cw => {
            const key = `${shoe.id}_${cw}`;
            // Start with shoe-level wishlist flag, then override with colorwayWishlist
            owned[key] = !shoe.wishlist;
            if (cwWishlist[key]) owned[key] = false;
          });
        });
        try {
          localStorage.setItem("vault_colorway_owned", JSON.stringify(owned));
          localStorage.removeItem("vault_colorway_wishlist");
          // Remove wishlist flag from inventory items
          const migratedInv = inv.map(s => { const n={...s}; delete n.wishlist; delete n.quantity; return n; });
          localStorage.setItem("vault_inventory", JSON.stringify(migratedInv));
        } catch {}
        return owned;
      });
      const [wishlistOrder,    setWishlistOrder]    = useState(() => ADMIN_MODE ? load("vault_wishlist_order", []) : []);
      const [displayLayout,  setDisplayLayout]  = useState(() => ADMIN_MODE ? load("vault_display_layout", []) : []);
      const [dreamLayout,    setDreamLayout]    = useState(() => { if (ADMIN_MODE) { const stored = load("vault_dream_layout", null); if (stored && stored.length) return stored; } return Array.from({length:8}, () => Array.from({length:5}, () => ({code:"",colorway:""}))); });
      const [displayMode,    setDisplayMode]    = useState("my");
      const [editingCell,    setEditingCell]    = useState(null);
      const [editShoe,       setEditShoe]       = useState("");
      const [editCw,         setEditCw]         = useState("");
      const [view,           setView]           = useState("collection");
      const [showForm,       setShowForm]       = useState(false);
      const [quickLog,       setQuickLog]       = useState(false);
      const [quickShoeId,    setQuickShoeId]    = useState("");
      const [quickColorway,  setQuickColorway]  = useState("");
      const [quickDate,      setQuickDate]      = useState(() => localDateStr());
      const [editId,         setEditId]         = useState(null);
      const [newShoe,        setNewShoe]        = useState({ name:"", shortName:"", category:"Jordan" });
      const [editColorways,  setEditColorways]  = useState([]);
      const [newColorway,    setNewColorway]    = useState("");
      const [renamingColorwayIdx, setRenamingColorwayIdx] = useState(null);
      const [retiringMeta, setRetiringMeta] = useState(null); // { shoeId, colorway }
      const [retireForm, setRetireForm] = useState({ reason:"Sold", dateRetired:"", story:"" });
      const [loggingId,      setLoggingId]      = useState(null);
      const [wearDate,       setWearDate]       = useState(() => localDateStr());
      const [wearColorway,   setWearColorway]   = useState("");
      const [sortCol,        setSortCol]        = useState("date");
      const [sortDir,        setSortDir]        = useState("desc");
      const [histFilterShoe, setHistFilterShoe] = useState("");
      const [histFilterCw,   setHistFilterCw]   = useState("");
      const [histDatePreset, setHistDatePreset] = useState("all");
      const [histDateFrom,   setHistDateFrom]   = useState("");
      const [histDateTo,     setHistDateTo]     = useState("");
      const [editingMeta,    setEditingMeta]    = useState(null);
      const [metaForm,       setMetaForm]       = useState({ purchaseDate:"", purchasePrice:"", retailer:"", size:"", notes:"", ogYear:"", story:"", saleDate:"", saleTime:"", comfortRating:"", releaseYear:"" });
      const [bannerIdx, setBannerIdx] = useState(0);
      const [collectionFilter, setCollectionFilter] = useState("all");
      const [top10Filter, setTop10Filter] = useState("worn");

      useEffect(() => {
        const interval = setInterval(() => setBannerIdx(i => i + 1), 6000);
        return () => clearInterval(interval);
      }, []);

      // Apply public data once loaded
      useEffect(() => {
        if (ADMIN_MODE || !publicData) return;
        setInventory(publicData.inventory || []);
        setWearLog(publicData.wearLog || {});
        setImages(publicData.images || {});
        setColorwayMeta(publicData.colorwayMeta || {});
        setTierMeta(publicData.tierMeta || {});
        setGlowMeta(publicData.glowMeta || {});
        setGraveyardMeta(publicData.graveyardMeta || {});
        setColorways(publicData.colorways || {});
        setColorwayOwned(publicData.colorwayOwned || {});
        setWishlistOrder(publicData.wishlistOrder || []);
        setDisplayLayout(publicData.displayLayout || []);
        setDreamLayout(publicData.dreamLayout || []);
      }, [publicData]);

      // Admin: persist to localStorage
      useEffect(() => save("vault_inventory",      inventory),    [inventory]);
      useEffect(() => save("vault_wearlog_v3",     wearLog),      [wearLog]);
      useEffect(() => save("vault_images",         images),       [images]);
      useEffect(() => save("vault_colorway_meta",  colorwayMeta), [colorwayMeta]);
      useEffect(() => save("vault_tier_meta",      tierMeta),     [tierMeta]);
      useEffect(() => save("vault_glow_meta",      glowMeta),     [glowMeta]);
      useEffect(() => save("vault_graveyard_meta", graveyardMeta),[graveyardMeta]);
      useEffect(() => save("vault_colorways",      colorways),    [colorways]);
      useEffect(() => save("vault_colorway_owned", colorwayOwned), [colorwayOwned]);
      useEffect(() => save("vault_wishlist_order", wishlistOrder), [wishlistOrder]);
      useEffect(() => save("vault_display_layout",  displayLayout),[displayLayout]);
      useEffect(() => save("vault_dream_layout",    dreamLayout),  [dreamLayout]);

      useEffect(() => {
        if (!ADMIN_MODE) return;
        const handler = (e) => {
          if (e.key !== "Escape") return;
          if (quickLog)      { setQuickLog(false); }
          else if (editingMeta)   { setEditingMeta(null); }
          else if (showForm)      { setShowForm(false); setEditId(null); setNewShoe({name:"",shortName:"",category:"Jordan"}); setEditColorways([]); setNewColorway(""); }
          else if (loggingId)     { setLoggingId(null); }
          else if (editingCell)   { setEditingCell(null); }
          else if (importMsg)     { setImportMsg(null); }
        };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, [showForm, quickLog, loggingId, editingMeta, editingCell, importMsg]);

      // colorwayOwned determines per-colorway ownership — collection shows owned, wishlist shows unowned
      const isColorwayOwned = React.useCallback((shoeId, cw) => colorwayOwned[`${shoeId}_${cw}`] !== false, [colorwayOwned]);
      const total = inventory.reduce((n, shoe) => {
        return n + (colorways[shoe.shortName] || []).filter(cw => isColorwayOwned(shoe.id, cw)).length;
      }, 0);
      const wishlistCount = inventory.reduce((n, shoe) => {
        return n + (colorways[shoe.shortName] || []).filter(cw => !isColorwayOwned(shoe.id, cw)).length;
      }, 0);

      // ── Memoised Top 10 rankings ────────────────────────────────────────
      // Public site uses pre-computed rankings from public-data.json (no prices in public JSON)
      const top10Rankings = React.useMemo(() => {
        if (!ADMIN_MODE && publicData?.precomputedRankings) {
          const rehydrate = (entries) => entries.map(e => ({
            ...e,
            shoe: inventory.find(s => s.id === e.shoeId) || { id: e.shoeId, name: e.shoeName, shortName: e.shortName }
          }));
          const r = publicData.precomputedRankings;
          return {
            wornRanked:  rehydrate(r.wornRanked  || []),
            priceRanked: rehydrate(r.priceRanked || []),
            valueRanked: rehydrate(r.valueRanked || []),
            iceRanked:   rehydrate(r.iceRanked   || []),
            gapRanked:   rehydrate(r.gapRanked   || []),
          };
        }

        const excluded = (key) => tierExcludedFromRotation(tierOf(tierMeta, key)) || colorwayOwned[key] === false;

        // Most Worn
        const wearCounts = {};
        inventory.forEach(shoe => {
          (wearLog[shoe.id] || []).forEach(entry => {
            const key = `${shoe.id}_${entry.colorway}`;
            if (excluded(key)) return;
            if (!wearCounts[key]) wearCounts[key] = { shoe, colorway: entry.colorway, count: 0, lastWorn: entry.date };
            wearCounts[key].count++;
            if (entry.date > wearCounts[key].lastWorn) wearCounts[key].lastWorn = entry.date;
          });
        });
        const wornRanked = Object.values(wearCounts)
          .sort((a, b) => b.count !== a.count ? b.count - a.count : a.lastWorn < b.lastWorn ? -1 : a.lastWorn > b.lastWorn ? 1 : 0)
          .slice(0, 10);

        // Most Expensive
        const priceEntries = [];
        inventory.forEach(shoe => {
          (colorways[shoe.shortName] || []).forEach(cw => {
            const key = `${shoe.id}_${cw}`;
            if (excluded(key)) return;
            const meta = colorwayMeta[key] || {};
            if (!meta.purchasePrice) return;
            const price = parseFloat(meta.purchasePrice.replace(/[^0-9.]/g, ""));
            if (isNaN(price) || price <= 0) return;
            priceEntries.push({ shoe, colorway: cw, price, purchaseDate: meta.purchaseDate || "" });
          });
        });
        const priceRanked = priceEntries
          .sort((a, b) => b.price !== a.price ? b.price - a.price : a.purchaseDate < b.purchaseDate ? -1 : 1)
          .slice(0, 10);

        // Best Value
        const valueEntries = [];
        inventory.forEach(shoe => {
          (colorways[shoe.shortName] || []).forEach(cw => {
            const key = `${shoe.id}_${cw}`;
            if (excluded(key)) return;
            const meta = colorwayMeta[key] || {};
            if (!meta.purchasePrice) return;
            const price = parseFloat(meta.purchasePrice.replace(/[^0-9.]/g, ""));
            if (isNaN(price) || price <= 0) return;
            const wears = (wearLog[shoe.id] || []).filter(e => e.colorway === cw).length;
            if (wears === 0) return;
            valueEntries.push({ shoe, colorway: cw, price, wears, costPerWear: price / wears });
          });
        });
        const valueRanked = valueEntries
          .sort((a, b) => a.costPerWear !== b.costPerWear ? a.costPerWear - b.costPerWear : b.wears - a.wears)
          .slice(0, 10);

        // Longest On Ice
        const iceEntries = [];
        inventory.forEach(shoe => {
          (colorways[shoe.shortName] || []).forEach(cw => {
            const key = `${shoe.id}_${cw}`;
            if (excluded(key)) return;
            const meta = colorwayMeta[key] || {};
            if (!meta.purchaseDate) return;
            const wears = (wearLog[shoe.id] || []).filter(e => e.colorway === cw);
            if (wears.length === 0) return;
            const firstWorn = [...wears].sort((a, b) => a.date < b.date ? -1 : 1)[0].date;
            const daysOnIce = Math.round((new Date(firstWorn + "T00:00:00") - new Date(meta.purchaseDate + "T00:00:00")) / 86400000);
            if (daysOnIce < 0) return;
            iceEntries.push({ shoe, colorway: cw, daysOnIce, purchaseDate: meta.purchaseDate, firstWorn });
          });
        });
        const iceRanked = iceEntries
          .sort((a, b) => b.daysOnIce !== a.daysOnIce ? b.daysOnIce - a.daysOnIce : a.purchaseDate < b.purchaseDate ? -1 : 1)
          .slice(0, 10);

        // Longest Gap
        const gapEntries = [];
        inventory.forEach(shoe => {
          (colorways[shoe.shortName] || []).forEach(cw => {
            const key = `${shoe.id}_${cw}`;
            if (excluded(key)) return;
            const wears = (wearLog[shoe.id] || []).filter(e => e.colorway === cw);
            if (wears.length < 2) return;
            const sorted = [...wears].sort((a, b) => a.date < b.date ? -1 : 1);
            for (let i = 1; i < sorted.length; i++) {
              const from = sorted[i - 1].date;
              const to   = sorted[i].date;
              const days = Math.round((new Date(to + "T00:00:00") - new Date(from + "T00:00:00")) / 86400000);
              if (days > 0) gapEntries.push({ shoe, colorway: cw, days, from, to, entryKey: `${shoe.id}_${cw}_${from}` });
            }
          });
        });
        const gapRanked = gapEntries
          .sort((a, b) => b.days !== a.days ? b.days - a.days : a.from < b.from ? -1 : 1)
          .slice(0, 10);

        return { wornRanked, priceRanked, valueRanked, iceRanked, gapRanked };
      }, [inventory, wearLog, colorwayMeta, tierMeta, colorwayOwned, colorways, publicData]);

      // ── Memoised wishlist card order ────────────────────────────────────
      const orderedWishlistCards = React.useMemo(() => {
        // Group unowned colorways by shoe
        const shoeMap = {};
        inventory.forEach(shoe => {
          const unownedCws = (colorways[shoe.shortName] || []).filter(cw => !isColorwayOwned(shoe.id, cw));
          if (unownedCws.length > 0) shoeMap[shoe.id] = { shoe, wishCws: unownedCws };
        });
        const allCards = Object.values(shoeMap).map(({ shoe, wishCws }) => ({
          type: "wish", id: String(shoe.id), shoe, wishCws,
        }));
        return wishlistOrder.length
          ? [...wishlistOrder.filter(id => allCards.find(c => c.id === id)).map(id => allCards.find(c => c.id === id)),
             ...allCards.filter(c => !wishlistOrder.includes(c.id))]
          : allCards;
      }, [inventory, colorways, colorwayOwned, wishlistOrder]);

      // Loading / error screens (public only) — must be after all hooks/memos
      if (!ADMIN_MODE && publicLoading) return (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", flexDirection:"column", gap:"16px" }}>
          <div style={{ fontSize:"11px", letterSpacing:"4px", color:"#e63946" }}>LOADING THE VAULT...</div>
        </div>
      );
      if (!ADMIN_MODE && publicError) return (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", flexDirection:"column", gap:"16px" }}>
          <div style={{ fontSize:"11px", letterSpacing:"4px", color:"#e63946" }}>VAULT UNAVAILABLE</div>
          <div style={{ fontSize:"10px", color:"#aaa" }}>{publicError}</div>
        </div>
      );

      const filledCells = displayLayout.flat().filter(c => c.code && c.code !== "").length;
      const empty    = 40 - filledCells;

      // Build a flat list of { shoe, colorway, lastWorn } for every owned colorway
      const allColorwayEntries = inventory.flatMap(shoe => {
        const shoeColorways = colorways[shoe.shortName] || [];
        return shoeColorways
          .filter(cw => isColorwayOwned(shoe.id, cw))
          .filter(cw => !tierExcludedFromRotation(tierOf(tierMeta, `${shoe.id}_${cw}`)))
          .filter(cw => {
            const meta = colorwayMeta[`${shoe.id}_${cw}`] || {};
            return !isNewPickupCheck(meta.purchaseDate);
          })
          .map(cw => {
            const entries = (wearLog[shoe.id] || []).filter(e => e.colorway === cw);
            const lastWorn = entries.length ? [...entries].sort((a,b) => a.date < b.date ? 1 : -1)[0].date : null;
            return { shoe, colorway: cw, lastWorn };
          });
      });

      const longestUnwornEntry = allColorwayEntries.reduce((pick, entry) => {
        if (!pick) return entry;
        if (!pick.lastWorn && !entry.lastWorn) return pick;
        if (!entry.lastWorn) return entry;
        if (!pick.lastWorn) return pick;
        return entry.lastWorn < pick.lastWorn ? entry : pick;
      }, null);

      const longestUnworn = longestUnwornEntry?.shoe || null;
      const longestUnwornColorway = longestUnwornEntry?.colorway || null;
      const longestUnwornLastDate = longestUnwornEntry?.lastWorn || null;

      // Most recently worn
      const mostRecentEntry = allColorwayEntries
        .filter(e => e.lastWorn)
        .reduce((pick, entry) => {
          if (!pick) return entry;
          return entry.lastWorn > pick.lastWorn ? entry : pick;
        }, null);
      const lastWornShoe = mostRecentEntry?.shoe || null;
      const lastWornColorway = mostRecentEntry?.colorway || null;
      const lastWornDate = mostRecentEntry?.lastWorn || null;

      // Anniversary computation — find colorways purchased on today's month/day in past years
      const todayStr = localDateStr(); // YYYY-MM-DD
      const todayMD = todayStr.slice(5); // MM-DD
      const anniversaries = [];
      Object.entries(colorwayMeta).forEach(([key, meta]) => {
        if (!meta.purchaseDate) return;
        const pd = meta.purchaseDate;
        if (pd.slice(5) !== todayMD) return;
        const purchaseYear = parseInt(pd.slice(0, 4));
        const todayYear = parseInt(todayStr.slice(0, 4));
        const years = todayYear - purchaseYear;
        if (years <= 0) return;
        // Find shoe name from key (shoeId_colorway)
        const underIdx = key.indexOf("_");
        const shoeId = parseInt(key.slice(0, underIdx));
        const colorway = key.slice(underIdx + 1);
        const shoe = inventory.find(s => s.id === shoeId);
        if (!shoe) return;
        anniversaries.push({ shoe, colorway, years });
      });

      // Sale alerts and GOT 'EM! celebrations — scan all colorways by owned status
      const nowMs = Date.now();
      const todayDateStr = localDateStr();
      const saleAlerts = [];
      const saleGlowKeys = new Set();
      const gotEmQuestions = [];
      const gotEmCelebrations = [];
      inventory.forEach(shoe => {
        (colorways[shoe.shortName] || []).forEach(cw => {
          const key = `${shoe.id}_${cw}`;
          const meta = colorwayMeta[key] || {};
          const isOwned = isColorwayOwned(shoe.id, cw);
          if (!isOwned) {
            // Unowned — check for sale alerts
            if (meta.saleDate) {
              const saleDateTime = new Date(`${meta.saleDate}T${meta.saleTime || "00:00"}`).getTime();
              const hoursUntil = (saleDateTime - nowMs) / (1000 * 60 * 60);
              if (hoursUntil >= 0 && hoursUntil <= 168) saleGlowKeys.add(key);
              if (hoursUntil >= 0 && hoursUntil <= 24) {
                saleAlerts.push({ shoe, colorway: cw, saleDateTime, hoursUntil, img: images[key] || null });
              } else if (hoursUntil < 0 && meta.saleDate === todayDateStr) {
                gotEmQuestions.push({ shoe, colorway: cw, img: images[key] || null });
              }
            }
          } else {
            // Owned — check for new pickup celebration
            if (meta.purchaseDate && isNewPickupCheck(meta.purchaseDate)) {
              gotEmCelebrations.push({ shoe, colorway: cw, img: images[key] || null });
            }
          }
        });
      });
      const wishlistHasSale = saleGlowKeys.size > 0;

      const openLogForm = (shoe) => {
        setLoggingId(shoe.id);
        setWearDate(localDateStr());
        const cw = colorways[shoe.shortName];
        setWearColorway(cw ? cw[0] : "");
      };

      const logWear = () => {
        if (!wearColorway || wearColorway === "__custom") return;
        const entry = { date: wearDate, colorway: wearColorway };
        setWearLog(log => ({ ...log, [loggingId]: [...(log[loggingId] || []), entry] }));
        setLoggingId(null);
      };

      const handleSaveColorways = (shortName) => {
        setColorways(cws => ({ ...cws, [shortName]: editColorways }));
      };

      const handleImageUpload = (shoeId, colorway, file, kind = "main") => {
        const key = `${shoeId}_${colorway}`;
        const storageKey = kind === "hover" ? `${key}_hover` : kind === "hover2" ? `${key}_hover2` : key;
        file.arrayBuffer().then(buffer => {
          fetch(`/upload?key=${encodeURIComponent(key)}&type=${kind}`, {
            method: "POST",
            headers: { "Content-Type": file.type || "image/png" },
            body: buffer,
          })
          .then(r => r.json())
          .then(data => {
            if (data.path) {
              setImages(imgs => ({ ...imgs, [storageKey]: data.path }));
            }
          })
          .catch(() => {
            // Fallback to base64 if server not available
            const reader = new FileReader();
            reader.onload = (e) => setImages(imgs => ({ ...imgs, [storageKey]: e.target.result }));
            reader.readAsDataURL(file);
          });
        });
      };

      const handleAdd = () => {
        if (!newShoe.name || !newShoe.shortName) return;
        if (editId !== null) {
          setInventory(inv => inv.map(s => s.id === editId ? { ...s, ...newShoe } : s));
          setEditId(null);
        } else {
          setInventory(inv => [...inv, { ...newShoe, id: Date.now() }]);
        }
        handleSaveColorways(newShoe.shortName);
        setNewShoe({ name:"", shortName:"", category:"Jordan" });
        setEditColorways([]);
        setNewColorway("");
        setShowForm(false);
      };

      const reorderShoe = (id, dir) => {
        setInventory(inv => {
          const idx = inv.findIndex(s => s.id === id);
          const newIdx = idx + dir;
          if (newIdx < 0 || newIdx >= inv.length) return inv;
          const n = [...inv];
          [n[idx], n[newIdx]] = [n[newIdx], n[idx]];
          return n;
        });
      };

      const handleEdit = (shoe) => {
        setNewShoe({ name:shoe.name, shortName:shoe.shortName, category:shoe.category });
        setEditColorways([...(colorways[shoe.shortName] || [])]);
        setNewColorway("");
        setEditId(shoe.id);
        setShowForm(true);
      };

      const handleDeleteColorway = (shoe, cw) => {
        const key = `${shoe.id}_${cw}`;
        const hasWear = (wearLog[shoe.id] || []).some(e => e.colorway === cw);
        const hasImage = !!images[key];
        const hasMeta = !!colorwayMeta[key];
        const hasTier = !!tierMeta[key];
        const hasGlow = !!glowMeta[key];
        const hasHoverImg = !!images[`${key}_hover`];
        const hasHover2Img = !!images[`${key}_hover2`];
        if (hasWear || hasImage || hasMeta || hasTier || hasGlow || hasHoverImg || hasHover2Img) {
          const msg = [hasWear && "wear history", (hasImage || hasHoverImg || hasHover2Img) && "image(s)", hasMeta && "details"].filter(Boolean).join(", ");
          if (!window.confirm(`"${cw}" has ${msg} attached. Deleting it will remove all of that data. Are you sure?`)) return;
          if (hasWear) setWearLog(log => ({ ...log, [shoe.id]: (log[shoe.id] || []).filter(e => e.colorway !== cw) }));
          if (hasImage || hasHoverImg || hasHover2Img) {
            setImages(imgs => { const n = {...imgs}; delete n[key]; delete n[`${key}_hover`]; delete n[`${key}_hover2`]; return n; });
            // Delete actual files from Shoes/ folder via server
            if (hasImage) fetch(`/delete?key=${encodeURIComponent(key)}&type=main`, { method: "POST" }).catch(() => {});
            if (hasHoverImg) fetch(`/delete?key=${encodeURIComponent(key)}&type=hover`, { method: "POST" }).catch(() => {});
            if (hasHover2Img) fetch(`/delete?key=${encodeURIComponent(key)}&type=hover2`, { method: "POST" }).catch(() => {});
          }
          if (hasMeta) setColorwayMeta(m => { const n = {...m}; delete n[key]; return n; });
          if (hasTier) setTierMeta(tm => { const n = {...tm}; delete n[key]; return n; });
          if (hasGlow) setGlowMeta(g => { const n = {...g}; delete n[key]; return n; });
        }
        setColorwayOwned(o => { const n = {...o}; delete n[key]; return n; });
        setEditColorways(cws => cws.filter(c => c !== cw));
      };

      const exportJSON = () => {
        const data = { inventory, wearLog, images, colorwayMeta, tierMeta, glowMeta, graveyardMeta, colorways, colorwayOwned, wishlistOrder, displayLayout, dreamLayout, exportedAt: new Date().toISOString() };
        const json = JSON.stringify(data, null, 2);
        if (ADMIN_MODE) {
          // Save via server — backs up old vault-data.json, writes new one
          fetch("/backup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: json,
          })
          .then(r => r.json())
          .then(result => {
            if (result.success) {
              setImportMsg({ type:"success", text: result.message || "Backup saved!" });
            } else {
              setImportMsg({ type:"error", text: result.error || "Backup failed." });
            }
            setTimeout(() => setImportMsg(null), 4000);
          })
          .catch(() => {
            // Fallback to browser download if server unavailable
            const blob = new Blob([json], { type:"application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = `sneaker-vault-backup-${localDateStr()}.json`;
            a.click(); URL.revokeObjectURL(url);
          });
        } else {
          const blob = new Blob([json], { type:"application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url; a.download = `sneaker-vault-backup-${localDateStr()}.json`;
          a.click(); URL.revokeObjectURL(url);
        }
      };

      const importJSON = (file) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            if (data.inventory)     { setInventory(data.inventory);         save("vault_inventory",       data.inventory); }
            if (data.wearLog)       { setWearLog(data.wearLog);             save("vault_wearlog_v3",      data.wearLog); }
            if (data.images)        { setImages(data.images);               save("vault_images",          data.images); }
            if (data.colorwayMeta)  { setColorwayMeta(data.colorwayMeta);   save("vault_colorway_meta",   data.colorwayMeta); }
            if (data.tierMeta)      { setTierMeta(data.tierMeta);           save("vault_tier_meta",       data.tierMeta); }
            else if (data.grailMeta || data.beaterMeta) {
              // Legacy backup — migrate on import
              const migrated = migrateTiers(data.inventory || [], data.colorways || {}, data.grailMeta || {}, data.beaterMeta || {});
              setTierMeta(migrated); save("vault_tier_meta", migrated);
            }
            if (data.glowMeta)      { setGlowMeta(data.glowMeta);           save("vault_glow_meta",       data.glowMeta); }
            if (data.graveyardMeta) { setGraveyardMeta(data.graveyardMeta); save("vault_graveyard_meta",  data.graveyardMeta); }
            if (data.colorways)     { setColorways(data.colorways);         save("vault_colorways",       data.colorways); }
            if (data.colorwayOwned)    { setColorwayOwned(data.colorwayOwned);       save("vault_colorway_owned",    data.colorwayOwned); }
            else if (data.colorwayWishlist) {
              // Legacy backup — run migration
              const inv = data.inventory || [];
              const cws = data.colorways || {};
              const cwWishlist = data.colorwayWishlist || {};
              const migrated = {};
              inv.forEach(shoe => {
                (cws[shoe.shortName] || []).forEach(cw => {
                  const key = `${shoe.id}_${cw}`;
                  migrated[key] = !shoe.wishlist;
                  if (cwWishlist[key]) migrated[key] = false;
                });
              });
              setColorwayOwned(migrated); save("vault_colorway_owned", migrated);
            }
            if (data.wishlistOrder)    { setWishlistOrder(data.wishlistOrder);       save("vault_wishlist_order",    data.wishlistOrder); }
            if (data.displayLayout) { setDisplayLayout(data.displayLayout); save("vault_display_layout",  data.displayLayout); }
            if (data.dreamLayout)   { setDreamLayout(data.dreamLayout);     save("vault_dream_layout",    data.dreamLayout); }
            setImportMsg({ type:"success", text:"Backup restored successfully!" });
          } catch {
            setImportMsg({ type:"error", text:"Invalid backup file. Please use a Vault JSON backup." });
          }
          setTimeout(() => setImportMsg(null), 4000);
        };
        reader.readAsText(file);
      };

      const IS = { background: T.inputBg, border:`1px solid ${T.inputBorder}`, color: T.inputText, padding:"8px", fontFamily:"'Aptos','Segoe UI',sans-serif", fontSize:"13px", width:"100%" };
      const CAT = { Jordan: { bg: T.categoryBg, accent: "#e63946" }, Nike: { bg: T.categoryBg, accent: "#e63946" }, "New Balance": { bg: T.categoryBg, accent: "#e63946" }, Adidas: { bg: T.categoryBg, accent: "#e63946" }, Asics: { bg: T.categoryBg, accent: "#e63946" } };

      const getCellStyle = (cell) => {
        if (!cell.code || cell.code === "") return { empty: true };
        if (cell.code === "--") return { empty: true };
        const col = CAT[inventory.find(s => s.shortName === cell.code)?.category] || CAT.Jordan;
        return { bg: col.bg, accent: col.accent, label: cell.code, colorway: cell.colorway };
      };

      const Btn = ({ label, onClick, color, solid }) => (
        <button onClick={onClick} style={{
          background: solid ? color : "transparent",
          border: `1px solid ${color}`,
          color: solid ? "#fff" : color,
          padding:"5px 12px", cursor:"pointer", fontSize:"10px",
          fontFamily:"'Aptos','Segoe UI',sans-serif", fontWeight: solid ? "bold" : "normal",
          whiteSpace:"nowrap",
        }}>{label}</button>
      );

      return (
        <div style={{ minHeight:"100vh", background: T.bg }}>

          <div style={{ background:"#000000", borderBottom:"2px solid #e63946", position:"relative", minHeight: isMobilePublic ? "80px" : "200px", display:"flex", alignItems:"center" }}>
            <img src="assets/banner.png" alt="" style={{ position:"absolute", top:0, left:0, width:"100%", height: isMobilePublic ? "80px" : "200px", objectFit:"cover", objectPosition:"center" }} />
            {/* Title — fills remaining space, layered */}
            <div style={{ flex:1, display:"flex", justifyContent:"center", alignItems:"center", position:"relative", zIndex:2, pointerEvents:"none" }}>
              <img src="assets/title2.png" alt="DerAusländer" style={{ display:"block", height: isMobilePublic ? "28px" : "90px", objectFit:"contain" }} />
              <img src="assets/title1.png" alt="The Vault" style={{ position:"absolute", display:"block", height: isMobilePublic ? "20px" : "60px", objectFit:"contain", animation:"fadeInTitle 1.5s ease-in-out 1s both", filter:"drop-shadow(0px 0px 4px rgba(0,0,0,1)) drop-shadow(0px 0px 8px rgba(0,0,0,1))" }} />
            </div>
            {/* Admin buttons — solid black panel */}
            {ADMIN_MODE && <div style={{ position:"relative", zIndex:2, flexShrink:0, display:"flex", gap:"24px", textAlign:"center", alignItems:"center", background:"#000000", borderLeft:"2px solid #e63946", padding:"16px 32px", height:"200px" }}>
              <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
                <button onClick={exportJSON} style={{ background:"#e63946", color:"#000", border:"none", padding:"8px 16px", cursor:"pointer", fontSize:"10px", letterSpacing:"2px", fontFamily:"'Aptos','Segoe UI',sans-serif", fontWeight:"bold", whiteSpace:"nowrap" }}>⬇ BACKUP</button>
                <button onClick={() => importRef.current.click()} style={{ background:"transparent", color:"#e63946", border:"1px solid #4cc9f0", padding:"8px 16px", cursor:"pointer", fontSize:"10px", letterSpacing:"2px", fontFamily:"'Aptos','Segoe UI',sans-serif", whiteSpace:"nowrap" }}>⬆ RESTORE</button>
                <button onClick={() => { if (window.confirm("Clear all images? This cannot be undone.")) { setImages({}); save("vault_images", {}); } }} style={{ background:"transparent", color: T.text5, border:`1px solid ${T.text5}`, padding:"8px 16px", cursor:"pointer", fontSize:"10px", letterSpacing:"2px", fontFamily:"'Aptos','Segoe UI',sans-serif", whiteSpace:"nowrap" }}>✕ CLEAR IMAGES</button>
                <input ref={importRef} type="file" accept=".json" style={{ display:"none" }}
                  onChange={e => { if (e.target.files[0]) importJSON(e.target.files[0]); e.target.value=""; }} />
              </div>
            </div>}
          </div>

          {/* Import message */}
          {ADMIN_MODE && importMsg && (
            <div style={{ background: importMsg.type==="success" ? "#0a2a0a" : "#2a0a0a", borderBottom:`1px solid #e63946`, padding:"12px 32px", fontSize:"11px", letterSpacing:"2px", color:"#e63946", textAlign:"center" }}>
              {importMsg.text}
            </div>
          )}

          {/* Nav */}
          <div style={{ display:"flex", borderBottom: isMobilePublic ? `1px solid ${T.border}` : "none", background: T.navBg, alignItems:"center" }}>
            {(ADMIN_MODE ? ["collection","display","wishlist","graveyard","history","stats","about"] : ["collection", ...(!isMobile ? ["display"] : []), "wishlist", ...(Object.keys(graveyardMeta).length > 0 ? ["graveyard"] : []), "stats", "about"]).map(v => (
              <button key={v} onClick={() => setView(v)} style={{
                padding: isMobilePublic ? "12px 0" : "14px 28px",
                flex: isMobilePublic ? "1 1 0" : undefined,
                background:view===v?"#e63946":"transparent",
                color:view===v?"#fff": T.text4, border:"none", cursor:"pointer",
                fontSize: isMobilePublic ? "9px" : "11px",
                letterSpacing: isMobilePublic ? "2px" : "4px",
                textTransform:"uppercase", fontFamily:"'Aptos','Segoe UI',sans-serif",
                textAlign: isMobilePublic ? "center" : undefined,
                animation: v==="wishlist" && wishlistHasSale && view!=="wishlist" ? "saleGlow 1.5s ease-in-out infinite" : "none",
              }}>{v === "stats" ? "top 10" : v}</button>
            ))}
            {/* Desktop: stats + dark mode toggle right-aligned in nav */}
            {!isMobilePublic && <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:"20px", padding:"0 20px" }}>
              <div style={{ display:"flex", gap:"16px", alignItems:"center" }}>
                {(ADMIN_MODE ? [["PAIRS",total],["OPEN BOXES",empty],["WISHLIST",wishlistCount]] : [["PAIRS",total],["WISHLIST",wishlistCount]]).map(([label,val]) => (
                  <div key={label} style={{ display:"flex", alignItems:"center", gap:"6px" }}>
                    <span style={{ fontSize:"14px", fontWeight:"bold", color:"#e63946" }}>{val}</span>
                    <span style={{ fontSize:"9px", letterSpacing:"2px", color: T.text5 }}>{label}</span>
                  </div>
                ))}
              </div>
              <button onClick={() => setDark(d => !d)} style={{ background:"transparent", border:"none", color: T.text4, cursor:"pointer", fontSize:"16px", padding:"0", lineHeight:1 }} title={dark ? "Switch to light mode" : "Switch to dark mode"}>{dark ? "☀" : "☾"}</button>
            </div>}
          </div>
          {/* Desktop: border below nav (after stats) */}
          {!isMobilePublic && <div style={{ borderBottom:`1px solid ${T.border}` }} />}

          {/* Mobile: stats strip below nav */}
          {isMobilePublic && (
            <div style={{ display:"flex", justifyContent:"center", alignItems:"center", gap:"20px", padding:"8px 16px", background: T.navBg, borderBottom:`1px solid ${T.border}` }}>
              {[["PAIRS",total],["WISHLIST",wishlistCount]].map(([label,val]) => (
                <div key={label} style={{ display:"flex", alignItems:"center", gap:"5px" }}>
                  <span style={{ fontSize:"12px", fontWeight:"bold", color:"#e63946" }}>{val}</span>
                  <span style={{ fontSize:"8px", letterSpacing:"2px", color: T.text5 }}>{label}</span>

            </div>
          )}

          <div style={{ padding: isMobilePublic ? "16px" : "32px" }}>

            {/* ── COLLECTION ── */}
            {view === "collection" && (
              <div>
                {/* Unified Banner — cycles through all notifications and rotation */}
                {(() => {
                  // ── Compute UP NEXT data ──
                  const rotationTier = longestUnwornColorway ? tierOf(tierMeta, `${longestUnworn?.id}_${longestUnwornColorway}`) : "silver";
                  const rotationTierInfo = TIERS[rotationTier] || TIERS.silver;
                  const isRotationPremium = rotationTier === "diamond" || rotationTier === "platinum";
                  const isRotationOnIce = longestUnworn && longestUnwornColorway ? (wearLog[longestUnworn.id] || []).filter(e => e.colorway === longestUnwornColorway).length === 0 : false;
                  const rotationImgKey = longestUnworn ? `${longestUnworn.id}_${longestUnwornColorway}` : "";
                  const rotationImg = images[rotationImgKey] || null;
                  const rotationHoverImg = isRotationPremium ? (images[`${rotationImgKey}_hover`] || null) : null;
                  const rotationMetaKey = rotationImgKey;
                  const isRotationGlow = dark && !!glowMeta[rotationMetaKey];
                  const upNextImgFilter = isRotationPremium
                    ? `drop-shadow(0 0 12px ${rotationTierInfo.glowRgba})`
                    : dark && isRotationOnIce
                    ? "drop-shadow(0 0 14px rgba(100,200,255,0.7))"
                    : isRotationGlow
                    ? "drop-shadow(0 0 14px rgba(255,255,255,0.5))"
                    : "none";

                  // ── Compute LAST WORN data ──
                  const lastWornTier = lastWornColorway ? tierOf(tierMeta, `${lastWornShoe?.id}_${lastWornColorway}`) : "silver";
                  const lastWornTierInfo = TIERS[lastWornTier] || TIERS.silver;
                  const isLastWornPremium = lastWornTier === "diamond" || lastWornTier === "platinum";
                  const lastWornImg = lastWornShoe ? images[`${lastWornShoe.id}_${lastWornColorway}`] || null : null;

                  // ── Compute queues ──
                  const sortedQueue = [...allColorwayEntries].sort((a, b) => {
                    if (!a.lastWorn && !b.lastWorn) return 0;
                    if (!a.lastWorn) return -1;
                    if (!b.lastWorn) return 1;
                    return a.lastWorn < b.lastWorn ? -1 : 1;
                  });
                  const upcomingQueue = sortedQueue.slice(1, 5);
                  const recentlyWornQueue = [...allColorwayEntries]
                    .filter(e => e.lastWorn)
                    .sort((a, b) => a.lastWorn > b.lastWorn ? -1 : 1)
                    .slice(1, 5);

                  // ── Build unified items in priority order ──
                  const bannerItems = [];
                  const hasNews = saleAlerts.length > 0 || gotEmCelebrations.length > 0 || gotEmQuestions.length > 0 || anniversaries.length > 0;

                  // 1. Sale Alerts
                  saleAlerts.forEach(item => {
                    const sub = item.hoursUntil < 1
                      ? `Sale starts in ${Math.round(item.hoursUntil * 60)} minutes`
                      : `Sale starts in ${Math.round(item.hoursUntil)} hours`;
                    bannerItems.push({ type:"sale", label:"🛒 SALE ALERT", shoe: item.shoe, colorway: item.colorway, img: item.img, subtitle: sub });
                  });

                  // 2. GOT 'EM
                  gotEmCelebrations.forEach(item => {
                    bannerItems.push({ type:"gotem", label:"✦ GOT 'EM! ✦", shoe: item.shoe, colorway: item.colorway, img: item.img, subtitle:"Welcome to The Vault" });
                  });

                  // 3. UP NEXT
                  if (longestUnworn) {
                    bannerItems.push({ type:"upnext", shoe: longestUnworn, colorway: longestUnwornColorway });
                  }

                  // 4. LAST WORN
                  if (lastWornShoe) {
                    bannerItems.push({ type:"lastworn", shoe: lastWornShoe, colorway: lastWornColorway });
                  }

                  // 5. GOT 'EM?
                  gotEmQuestions.forEach(item => {
                    bannerItems.push({ type:"gotemq", label:"✦ GOT 'EM? ✦", shoe: item.shoe, colorway: item.colorway, img: item.img, subtitle:"Sale was today" });
                  });

                  // 6. Anniversary
                  anniversaries.forEach(a => {
                    const aImg = images[`${a.shoe.id}_${a.colorway}`] || null;
                    bannerItems.push({ type:"anniversary", label:"✦ PURCHASE ANNIVERSARY ✦", shoe: a.shoe, colorway: a.colorway, img: aImg, subtitle:`${a.years} ${a.years === 1 ? "year" : "years"} ago today` });
                  });

                  // 7. On This Day
                  inventory.forEach(shoe => {
                    (colorways[shoe.shortName] || []).filter(cw => isColorwayOwned(shoe.id, cw)).forEach(cw => {
                      const wears = (wearLog[shoe.id] || []).filter(e => e.colorway === cw);
                      if (wears.length === 0) return;
                      const firstWear = [...wears].sort((a, b) => a.date < b.date ? -1 : 1)[0].date;
                      if (firstWear.slice(5) !== todayMD) return;
                      const years = parseInt(todayStr.slice(0,4)) - parseInt(firstWear.slice(0,4));
                      if (years <= 0) return;
                      const img = images[`${shoe.id}_${cw}`] || null;
                      bannerItems.push({ type:"onthisday", label:"👟 ON THIS DAY", shoe, colorway: cw, img, subtitle:`${years} ${years === 1 ? "year" : "years"} ago today, you first wore these` });
                    });
                  });

                  // 8. Shoe of the Day — only when no news items
                  if (!hasNews) {
                    const allOwned = inventory.flatMap(shoe =>
                      (colorways[shoe.shortName] || []).filter(cw => isColorwayOwned(shoe.id, cw)).map(cw => ({ shoe, colorway: cw }))
                    );
                    if (allOwned.length > 0) {
                      const dateSeed = todayStr.replace(/-/g, "");
                      const seedIdx = parseInt(dateSeed, 10) % allOwned.length;
                      const pick = allOwned[seedIdx];
                      const pickKey = `${pick.shoe.id}_${pick.colorway}`;
                      const pickImg = images[pickKey] || null;
                      const pickMeta = colorwayMeta[pickKey] || {};
                      const pickWears = (wearLog[pick.shoe.id] || []).filter(e => e.colorway === pick.colorway).length;
                      const purchaseLine = pickMeta.purchaseDate ? `Purchased ${formatDate(pickMeta.purchaseDate)}` : null;
                      const wearLine = `Worn ${pickWears} ${pickWears === 1 ? "time" : "times"}`;
                      const sub = [purchaseLine, wearLine].filter(Boolean).join(" · ");
                      bannerItems.push({ type:"spotlight", label:"✦ SHOE OF THE DAY ✦", shoe: pick.shoe, colorway: pick.colorway, img: pickImg, subtitle: sub });
                    }
                  }

                  if (bannerItems.length === 0) return null;
                  const safeIdx = bannerIdx % bannerItems.length;
                  const currentItem = bannerItems[safeIdx];
                  const isRotationSlide = currentItem.type === "upnext" || currentItem.type === "lastworn";

                  // ── Background per slide type ──
                  const getBannerBg = (item) => {
                    if (item.type === "upnext") {
                      return rotationTier === "diamond"
                        ? dark ? "linear-gradient(90deg,#1a1a2a,#111122)" : "linear-gradient(90deg,#f0f8ff,#e8f4ff)"
                        : rotationTier === "platinum"
                        ? dark ? "linear-gradient(90deg,#222228,#1e1e24)" : "linear-gradient(90deg,#f5f5f8,#ebebf0)"
                        : dark ? `linear-gradient(90deg,${T.bg2},${T.bg3})` : "linear-gradient(90deg,#fff5f5,#ffe8e8)";
                    }
                    if (item.type === "lastworn") {
                      return lastWornTier === "diamond"
                        ? dark ? "linear-gradient(90deg,#1a1a2a,#111122)" : "linear-gradient(90deg,#f0f8ff,#e8f4ff)"
                        : lastWornTier === "platinum"
                        ? dark ? "linear-gradient(90deg,#222228,#1e1e24)" : "linear-gradient(90deg,#f5f5f8,#ebebf0)"
                        : dark ? `linear-gradient(90deg,${T.bg2},${T.bg3})` : "linear-gradient(90deg,#fff5f5,#ffe8e8)";
                    }
                    return dark ? `linear-gradient(90deg,${T.bg2},${T.bg3})` : `linear-gradient(90deg,${T.bg},${T.bg2})`;
                  };
                  const getBannerBorder = (item) => {
                    if (item.type === "upnext") return rotationTier === "diamond" ? "#b8f0ff" : rotationTier === "platinum" ? "#C0C0C0" : "#e63946";
                    if (item.type === "lastworn") return lastWornTier === "diamond" ? "#b8f0ff" : lastWornTier === "platinum" ? "#C0C0C0" : "#e63946";
                    if (item.type === "sale") return "#e6b800";
                    if (item.type === "gotem") return "#e6b800";
                    return T.border;
                  };

                  return (
                  <div style={{ marginBottom:"24px" }}>
                    <div style={{ background: getBannerBg(currentItem), border:`1px solid ${getBannerBorder(currentItem)}`, padding:"16px 24px", position:"relative", minHeight:"90px", transition:"background 0.5s ease-in-out" }}>
                      {bannerItems.map((item, i) => {
                        const isActive = i === safeIdx;

                        // ── UP NEXT slide ──
                        if (item.type === "upnext") {
                          return (
                            <div key={`upnext-${i}`} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:"16px", position: i === 0 ? "relative" : "absolute", top:0, left:0, right:0, padding: i === 0 ? undefined : "16px 24px", opacity: isActive ? 1 : 0, transition:"opacity 1s ease-in-out", pointerEvents: isActive ? "auto" : "none" }}>
                              <div style={{ display:"flex", alignItems:"center", gap:"16px", minWidth:0 }}>
                                {rotationImg && (() => {
                                  function RotationImg() {
                                    const [showAlt, setShowAlt] = React.useState(false);
                                    React.useEffect(() => {
                                      if (!rotationHoverImg) return;
                                      const interval = setInterval(() => setShowAlt(v => !v), 8000);
                                      return () => clearInterval(interval);
                                    }, []);
                                    return (
                                      <div style={{ position:"relative", width:"120px", height:"75px", flexShrink:0 }}>
                                        <img src={rotationImg} alt={longestUnwornColorway} style={{ position:"absolute", top:0, left:0, width:"120px", height:"75px", objectFit:"cover", filter: upNextImgFilter, opacity: rotationHoverImg && showAlt ? 0 : 1, transition:"opacity 2s ease-in-out" }} />
                                        {rotationHoverImg && <img src={rotationHoverImg} alt={longestUnwornColorway} style={{ position:"absolute", top:0, left:0, width:"120px", height:"75px", objectFit:"cover", filter: upNextImgFilter, opacity: showAlt ? 1 : 0, transition:"opacity 2s ease-in-out" }} />}
                                      </div>
                                    );
                                  }
                                  return <RotationImg />;
                                })()}
                                <div style={{ minWidth:0 }}>
                                  <div style={{ fontSize:"9px", letterSpacing:"4px", color:"#e63946", marginBottom:"4px" }}>
                                    {isRotationOnIce
                                      ? <span><span style={{color:"#64c8ff"}}>❄️</span> TIME TO TAKE THEM OFF ICE? <span style={{color:"#64c8ff"}}>❄️</span></span>
                                      : rotationTierInfo.color
                                      ? <span><span style={{color: rotationTierInfo.color}}>✦</span> UP NEXT <span style={{color: rotationTierInfo.color}}>✦</span></span>
                                      : "UP NEXT FOR ROTATION"}
                                  </div>
                                  <div style={{ fontSize: isMobilePublic ? "13px" : "16px", fontWeight:"bold", color: T.text }}>
                                    {isRotationOnIce
                                      ? <span><span style={{color:"#64c8ff"}}>❄️</span> {longestUnworn.name}{longestUnwornColorway ? ` — ${longestUnwornColorway}` : ""} <span style={{color:"#64c8ff"}}>❄️</span></span>
                                      : rotationTierInfo.color
                                      ? <span><span style={{color: rotationTierInfo.color}}>✦</span> {longestUnworn.name}{longestUnwornColorway ? ` — ${longestUnwornColorway}` : ""} <span style={{color: rotationTierInfo.color}}>✦</span></span>
                                      : `${longestUnworn.name}${longestUnwornColorway ? ` — ${longestUnwornColorway}` : ""}`}
                                  </div>
                                  <div style={{ fontSize:"10px", color: T.text3, marginTop:"2px" }}>
                                    {longestUnwornLastDate ? `Last worn: ${formatDate(longestUnwornLastDate)}` : "Never worn"}
                                  </div>
                                </div>
                                {!isMobilePublic && upcomingQueue.length > 0 && (
                                  <div style={{ display:"flex", alignItems:"center", gap:"8px", flexShrink:0 }}>
                                    <div style={{ fontSize:"8px", letterSpacing:"3px", color: T.text5, flexShrink:0 }}>COMING UP</div>
                                    <div style={{ display:"flex", gap:"6px", alignItems:"center" }}>
                                      {upcomingQueue.map((entry, qi) => {
                                        const qImg = images[`${entry.shoe.id}_${entry.colorway}`] || null;
                                        return qImg ? (
                                          <img key={qi} src={qImg} alt={entry.colorway} title={`${entry.shoe.name} — ${entry.colorway}`} style={{ width:"56px", height:"35px", objectFit:"cover" }} />
                                        ) : null;
                                      })}
                                    </div>
                                  </div>
                                )}
                              </div>
                              {ADMIN_MODE && <div style={{ flexShrink:0 }}>
                                <Btn label="LOG WEAR" onClick={() => { setLoggingId(longestUnworn.id); setWearDate(localDateStr()); const ownedCws = (colorways[longestUnworn.shortName] || []).filter(cw => isColorwayOwned(longestUnworn.id, cw)); setWearColorway(longestUnwornColorway || (ownedCws[0] ?? "")); }} color="#e63946" solid />
                              </div>}
                            </div>
                          );
                        }

                        // ── LAST WORN slide ──
                        if (item.type === "lastworn") {
                          return (
                            <div key={`lastworn-${i}`} style={{ display:"flex", alignItems:"center", gap:"16px", position: i === 0 ? "relative" : "absolute", top:0, left:0, right:0, padding: i === 0 ? undefined : "16px 24px", opacity: isActive ? 1 : 0, transition:"opacity 1s ease-in-out", pointerEvents: isActive ? "auto" : "none" }}>
                              {lastWornImg && <img src={lastWornImg} alt={lastWornColorway} style={{ width:"120px", height:"75px", objectFit:"cover", flexShrink:0, filter: isLastWornPremium ? `drop-shadow(0 0 12px ${lastWornTierInfo.glowRgba})` : "none" }} />}
                              <div style={{ minWidth:0 }}>
                                <div style={{ fontSize:"9px", letterSpacing:"4px", color:"#e63946", marginBottom:"4px" }}>
                                  {isLastWornPremium ? <span><span style={{color: lastWornTierInfo.color}}>✦</span> LAST WORN <span style={{color: lastWornTierInfo.color}}>✦</span></span> : "LAST WORN"}
                                </div>
                                <div style={{ fontSize: isMobilePublic ? "13px" : "16px", fontWeight:"bold", color: isLastWornPremium ? lastWornTierInfo.color : T.text }}>
                                  {lastWornShoe.name}{lastWornColorway ? ` — ${lastWornColorway}` : ""}
                                </div>
                                <div style={{ fontSize:"10px", color: T.text3, marginTop:"2px" }}>{lastWornDate ? `Worn on ${formatDate(lastWornDate)}` : ""}</div>
                              </div>
                              {!isMobilePublic && recentlyWornQueue.length > 0 && (
                                <div style={{ display:"flex", alignItems:"center", gap:"8px", flexShrink:0 }}>
                                  <div style={{ fontSize:"8px", letterSpacing:"3px", color: T.text5, flexShrink:0 }}>RECENT</div>
                                  <div style={{ display:"flex", gap:"6px", alignItems:"center" }}>
                                    {recentlyWornQueue.map((entry, qi) => {
                                      const qImg = images[`${entry.shoe.id}_${entry.colorway}`] || null;
                                      return qImg ? (
                                        <img key={qi} src={qImg} alt={entry.colorway} title={`${entry.shoe.name} — ${entry.colorway}`} style={{ width:"56px", height:"35px", objectFit:"cover" }} />
                                      ) : null;
                                    })}
                                  </div>
                                </div>
                              )}
                            </div>
                          );
                        }

                        // ── News slides (sale, gotem, gotemq, anniversary, onthisday, spotlight) ──
                        return (
                          <div key={`${item.type}-${i}`} style={{ display:"flex", alignItems:"center", gap:"16px", position: i === 0 ? "relative" : "absolute", top:0, left:0, right:0, padding: i === 0 ? undefined : "16px 24px", opacity: isActive ? 1 : 0, transition:"opacity 1s ease-in-out", pointerEvents: isActive ? "auto" : "none" }}>
                            {item.img && <img src={item.img} alt={item.colorway} style={{ width:"120px", height:"75px", objectFit:"cover", flexShrink:0 }} />}
                            <div>
                              <div style={{ fontSize:"9px", letterSpacing:"4px", color: item.type === "sale" || item.type === "gotem" || item.type === "spotlight" ? "#e6b800" : "#e63946", marginBottom:"4px" }}>{item.label}</div>
                              <div style={{ fontSize:"15px", fontWeight:"bold", color: T.text }}>{item.shoe.name} — {item.colorway}</div>
                              <div style={{ fontSize:"10px", color: T.text3, marginTop:"2px" }}>{item.subtitle}</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>

                    {/* Dots — tappable navigation */}
                    {bannerItems.length > 1 && (
                      <div style={{ display:"flex", justifyContent:"center", gap:"6px", marginTop:"10px" }}>
                        {bannerItems.map((_, i) => (
                          <div key={i} onClick={() => setBannerIdx(i)} style={{ width:"8px", height:"8px", borderRadius:"50%", background: i === safeIdx ? "#e63946" : (dark ? "#444" : "#ccc"), cursor:"pointer", transition:"background 0.3s" }} />
                        ))}
                      </div>
                    )}
                  </div>
                  );
                })()}

                {/* Wear Log Form */}
                {loggingId && (() => {
                  const shoe = inventory.find(s => s.id === loggingId);
                  const shoeColorways = (colorways[shoe?.shortName] || []).filter(cw => shoe && isColorwayOwned(shoe.id, cw));
                  return (
                    <div style={{ background: T.bg4, border:"1px solid #f4a261", padding:"16px 24px", marginBottom:"24px", display:"flex", alignItems:"center", gap:"12px", flexWrap:"wrap" }}>
                      <div style={{ fontSize:"10px", letterSpacing:"3px", color:"#e63946", marginRight:"4px" }}>LOGGING: {shoe?.name}</div>
                      <select value={wearColorway} onChange={e => setWearColorway(e.target.value)}
                        style={{ ...IS, width:"auto", minWidth:"180px" }}>
                        {shoeColorways.map(cw => <option key={cw} value={cw}>{cw}</option>)}
                      </select>
                      <input type="date" value={wearDate} onChange={e => setWearDate(e.target.value)}
                        style={{ ...IS, width:"auto" }} />
                      <Btn label="CONFIRM" onClick={logWear} color="#e63946" solid />
                      <Btn label="CANCEL"  onClick={() => setLoggingId(null)} color="#666" />
                    </div>
                  );
                })()}

                {/* Add shoe header — admin only */}
                {ADMIN_MODE && <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"24px" }}>
                  <div></div>
                  <button onClick={() => { setShowForm(!showForm); setEditId(null); setNewShoe({name:"",shortName:"",category:"Jordan"}); }} style={{
                    background:"#e63946", color:T.text, border:"none", padding:"10px 20px",
                    cursor:"pointer", fontSize:"11px", letterSpacing:"3px", fontFamily:"'Aptos','Segoe UI',sans-serif",
                  }}>+ ADD SHOE</button>
                </div>}

                {ADMIN_MODE && showForm && (
                  <div style={{ background:T.bg4, border:`1px solid ${T.border2}`, padding:"24px", marginBottom:"24px" }}>
                    <div style={{ display:"flex", gap:"12px", flexWrap:"wrap", alignItems:"flex-end" }}>
                      {[["FULL NAME","name"],["SHORT CODE","shortName"]].map(([label,key]) => (
                        <div key={key} style={{ flex:"1 1 160px" }}>
                          <div style={{ fontSize:"10px", letterSpacing:"3px", color:T.text4, marginBottom:"6px" }}>{label}</div>
                          <input value={newShoe[key]} onChange={e => setNewShoe(s => ({...s,[key]:e.target.value}))} style={IS} />
                        </div>
                      ))}
                      <div style={{ flex:"0 0 120px" }}>
                        <div style={{ fontSize:"10px", letterSpacing:"3px", color:T.text4, marginBottom:"6px" }}>CATEGORY</div>
                        <select value={newShoe.category} onChange={e => setNewShoe(s => ({...s,category:e.target.value}))} style={IS}>
                          <option>Jordan</option><option>Nike</option><option>New Balance</option><option>Adidas</option><option>Asics</option>
                        </select>
                      </div>

                    </div>
                    {/* Colorway management */}
                    <div style={{ marginTop:"16px", borderTop:"1px solid #ddd", paddingTop:"16px" }}>
                      <div style={{ fontSize:"10px", letterSpacing:"3px", color:T.text4, marginBottom:"10px" }}>COLORWAYS</div>
                      {editColorways.map((cw, i) => {
                        const isRenaming = renamingColorwayIdx === i;
                        return (
                        <div key={i} style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"6px" }}>
                          {isRenaming ? (
                            <input autoFocus type="text" defaultValue={cw}
                              onBlur={e => {
                                const newName = e.target.value.trim();
                                if (newName && newName !== cw) {
                                  // Rename colorway — update all related data
                                  const shoe = editId !== null ? inventory.find(s => s.id === editId) : null;
                                  setEditColorways(cws => { const n=[...cws]; n[i]=newName; return n; });
                                  if (shoe) {
                                    const oldKey = `${shoe.id}_${cw}`;
                                    const newKey = `${shoe.id}_${newName}`;
                                    // Migrate wear log
                                    setWearLog(log => ({ ...log, [shoe.id]: (log[shoe.id]||[]).map(e => e.colorway===cw ? {...e,colorway:newName} : e) }));
                                    // Migrate images
                                    setImages(imgs => { const n={...imgs}; if(n[oldKey]){n[newKey]=n[oldKey];delete n[oldKey];} if(n[`${oldKey}_hover`]){n[`${newKey}_hover`]=n[`${oldKey}_hover`];delete n[`${oldKey}_hover`];} if(n[`${oldKey}_hover2`]){n[`${newKey}_hover2`]=n[`${oldKey}_hover2`];delete n[`${oldKey}_hover2`];} return n; });
                                    // Migrate colorwayMeta
                                    setColorwayMeta(m => { const n={...m}; if(n[oldKey]){n[newKey]=n[oldKey];delete n[oldKey];} return n; });
                                    // Migrate tierMeta
                                    setTierMeta(tm => { const n={...tm}; if(n[oldKey]){n[newKey]=n[oldKey];delete n[oldKey];} return n; });
                                    // Migrate glowMeta
                                    setGlowMeta(gm => { const n={...gm}; if(n[oldKey]){n[newKey]=n[oldKey];delete n[oldKey];} return n; });
                                    // Migrate colorwayOwned
                                    setColorwayOwned(co => { const n={...co}; if(oldKey in n){n[newKey]=n[oldKey];delete n[oldKey];} return n; });
                                    // Migrate display layout
                                    setDisplayLayout(dl => dl.map(row => row.map(cell => cell.code===shoe.shortName && cell.colorway===cw ? {...cell,colorway:newName} : cell)));
                                  }
                                }
                                setRenamingColorwayIdx(null);
                              }}
                              onKeyDown={e => { if(e.key==="Enter") e.target.blur(); if(e.key==="Escape") setRenamingColorwayIdx(null); }}
                              style={{...IS, flex:1, fontSize:"12px", padding:"2px 6px"}} />
                          ) : (
