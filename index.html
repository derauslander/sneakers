<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="The Vault — DerAusländer's Sneaker Collection" />
  <meta name="twitter:description" content="A personal sneaker collection more than 30 years in the making. Air Jordans, Air Tech Challenge and other Nikes. Every pair has a story." />
  <meta name="twitter:image" content="https://derauslander.com/assets/og-image.png" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 680 680' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='680' height='680' fill='%23000000' rx='80'/%3E%3Ccircle cx='340' cy='340' r='280' fill='none' stroke='%23e63946' stroke-width='24'/%3E%3Ccircle cx='340' cy='340' r='180' fill='none' stroke='%23e63946' stroke-width='16'/%3E%3Ccircle cx='340' cy='340' r='60' fill='%23e63946'/%3E%3Cline x1='340' y1='60' x2='340' y2='160' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Cline x1='340' y1='520' x2='340' y2='620' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Cline x1='60' y1='340' x2='160' y2='340' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Cline x1='520' y1='340' x2='620' y2='340' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Cline x1='143' y1='143' x2='213' y2='213' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Cline x1='467' y1='467' x2='537' y2='537' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Cline x1='537' y1='143' x2='467' y2='213' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Cline x1='143' y1='537' x2='213' y2='467' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Ccircle cx='340' cy='340' r='24' fill='%23000000'/%3E%3Ccircle cx='340' cy='340' r='12' fill='%23e63946'/%3E%3C/svg%3E" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #ffffff; font-family: 'Aptos', 'Segoe UI', sans-serif; color: #111111; transition: background 0.3s, color 0.3s; }
    body.dark { background: #1a1a1a; color: #f0f0f0; }
    input[type=date]::-webkit-calendar-picker-indicator { filter: none; }
    body.dark input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f0f0f0; }
    body.dark ::-webkit-scrollbar-track { background: #2a2a2a; }
    ::-webkit-scrollbar-thumb { background: #ccc; }
    body.dark ::-webkit-scrollbar-thumb { background: #555; }
    select option { background: #ffffff; color: #111; }
    body.dark select option { background: #2a2a2a; color: #f0f0f0; }
    @keyframes fadeInTitle {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes saleGlow {
      0%, 100% { box-shadow: 0 0 4px rgba(230,180,0,0.4); }
      50%       { box-shadow: 0 0 14px rgba(230,180,0,0.9); }
    }
    @keyframes prismaticGlow {
      0%   { filter: drop-shadow(0 0 35px rgba(184,240,255,0.8)) drop-shadow(0 0 12px rgba(255,255,255,0.7)); }
      20%  { filter: drop-shadow(0 0 35px rgba(184,240,255,0.8)) drop-shadow(0 0 12px rgba(255,255,255,0.7)); }
      45%  { filter: drop-shadow(0 0 35px rgba(255,255,255,0.9)) drop-shadow(0 0 12px rgba(220,220,255,0.7)); }
      75%  { filter: drop-shadow(0 0 35px rgba(200,180,255,0.8)) drop-shadow(0 0 12px rgba(255,255,255,0.7)); }
      100% { filter: drop-shadow(0 0 35px rgba(184,240,255,0.8)) drop-shadow(0 0 12px rgba(255,255,255,0.7)); }
    }
    @keyframes diamondReveal {
      0%   { filter: blur(8px) drop-shadow(0 0 35px rgba(184,240,255,0.8)) drop-shadow(0 0 12px rgba(255,255,255,0.7)); }
      100% { filter: blur(0px) drop-shadow(0 0 35px rgba(184,240,255,0.8)) drop-shadow(0 0 12px rgba(255,255,255,0.7)); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ═══════════════════════════════════════════════════════════════════════════
    // ADMIN_MODE — true for local admin app, false for public site
    // build.bat flips this to false when generating index.html
    // ═══════════════════════════════════════════════════════════════════════════
    const ADMIN_MODE = false;

    const { useState, useEffect, useRef } = React;

    const LIGHT = {
      bg: "#faf8f5", bg2: "#f5f2ee", bg3: "#ede9e3", bg4: "#e8e3dc",
      border: "#ddd8d0", border2: "#c8c2b8",
      text: "#1a1612", text2: "#2e2a24", text3: "#4a4540", text4: "#6b6560", text5: "#8c8680", text6: "#aaa49e", text7: "#c4beb8", text8: "#dedad4",
      navBg: "#f0ece6", cardBg: "#ffffff",
      inputBg: "#f0ece6", inputBorder: "#c8c2b8", inputText: "#1a1612",
      overlayText: "#fff",
      categoryBg: "#fff4f2",
    };
    const DARK = {
      bg: "#1a1a1a", bg2: "#222222", bg3: "#2a2a2a", bg4: "#2f2f2f",
      border: "#333333", border2: "#444444",
      text: "#f0f0f0", text2: "#d0d0d0", text3: "#b0b0b0", text4: "#999", text5: "#888", text6: "#777", text7: "#666", text8: "#444",
      navBg: "#111111", cardBg: "#222222",
      inputBg: "#2a2a2a", inputBorder: "#444", inputText: "#f0f0f0",
      overlayText: "#fff",
      categoryBg: "#2a1a1a",
      cardText: "#f0f0f0", cardText2: "#d0d0d0", cardText3: "#b0b0b0", cardText4: "#999999", cardText5: "#888888", cardText6: "#777777", cardText7: "#666666",
    };

    const useDarkMode = (isAdmin) => {
      const [dark, setDark] = useState(() => {
        if (isAdmin) {
          try { return localStorage.getItem("vault_dark") === "true"; } catch { return false; }
        }
        return window.matchMedia("(prefers-color-scheme: dark)").matches;
      });
      useEffect(() => {
        document.body.classList.toggle("dark", dark);
        if (isAdmin) {
          try { localStorage.setItem("vault_dark", dark); } catch {}
        }
      }, [dark]);
      useEffect(() => {
        if (isAdmin) return;
        const mq = window.matchMedia("(prefers-color-scheme: dark)");
        const handler = e => setDark(e.matches);
        mq.addEventListener("change", handler);
        return () => mq.removeEventListener("change", handler);
      }, []);
      return [dark, setDark];
    };

    const useIsMobile = () => {
      const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
      useEffect(() => {
        const handler = () => setIsMobile(window.innerWidth < 768);
        window.addEventListener("resize", handler);
        return () => window.removeEventListener("resize", handler);
      }, []);
      return isMobile;
    };

    const load = (key, fallback) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } };
    const save = (key, val) => { if (!ADMIN_MODE) return; try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) { console.error(e); } };
    const localDateStr = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
    const formatDate = (iso) => iso ? new Date(iso+"T00:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}) : null;

    // ── Anniversary check helper ─────────────────────────────────────────
    const isAnniversaryToday = (purchaseDate) => {
      if (!purchaseDate) return false;
      const todayStr = localDateStr();
      const todayMD = todayStr.slice(5);
      if (purchaseDate.slice(5) !== todayMD) return false;
      const years = parseInt(todayStr.slice(0,4)) - parseInt(purchaseDate.slice(0,4));
      return years > 0;
    };

    // ── New pickup check helper (within 7 days of purchase) ───────────────
    const isNewPickupCheck = (purchaseDate) => {
      if (!purchaseDate) return false;
      const today = new Date(localDateStr() + "T00:00:00").getTime();
      const purchase = new Date(purchaseDate + "T00:00:00").getTime();
      const diff = today - purchase;
      return diff >= 0 && diff <= 7 * 86400000;
    };

    // ── Tier System ──────────────────────────────────────────────────────
    const TIERS = {
      diamond:  { label: "✦ DIAMOND ✦",    color: "#b8f0ff", glowRgba: "rgba(184,240,255,0.8)", ripLabel: "✦ R.I.P. ✦" },
      platinum: { label: "✦ PLATINUM ✦",   color: "#C0C0C0", glowRgba: "rgba(192,192,192,0.7)", ripLabel: "✦ R.I.P. ✦" },
      gold:     { label: "✦ GOLD ✦",       color: "#FFD700", glowRgba: null,                     ripLabel: "✦ R.I.P. ✦" },
      silver:   { label: "⬥ BUYER'S REMORSE ⬥", color: "#aaaaaa", glowRgba: null,                ripLabel: null },
      bronze:   { label: "💀 BRONZE 💀",   color: "#CD7F32", glowRgba: "rgba(180,80,20,0.8)",   ripLabel: "💀 R.I.P. 💀" },
    };
    const TIER_OPTIONS = ["diamond","platinum","gold","silver","bronze"];
    const tierOf = (tierMeta, key) => tierMeta[key] || "silver";
    const tierHasCrossfade = (tier) => tier === "diamond" || tier === "platinum";
    const tierExcludedFromRotation = (tier) => tier === "bronze";
    const tierAnniversaryColor = (tier) => tier === "diamond" ? "#b8f0ff" : tier === "platinum" ? "#C0C0C0" : tier === "gold" ? "#FFD700" : tier === "bronze" ? "#CD7F32" : "#aaa";

    // One-time migration from grailMeta/beaterMeta to tierMeta
    const migrateTiers = (inventory, colorways, grailMeta, beaterMeta) => {
      const tierMeta = {};
      inventory.forEach(shoe => {
        (colorways[shoe.shortName] || []).forEach(cw => {
          const key = `${shoe.id}_${cw}`;
          if (grailMeta[key]) tierMeta[key] = "diamond";
          else if (beaterMeta[key]) tierMeta[key] = "bronze";
          else tierMeta[key] = "silver";
        });
      });
      return tierMeta;
    };

    function SaleCountdown({ saleDate, saleTime }) {
      const [now, setNow] = useState(Date.now());
      useEffect(() => {
        const interval = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(interval);
      }, []);
      const target = new Date(`${saleDate}T${saleTime || "00:00"}`).getTime();
      const diff = target - now;
      if (diff <= 0) return <span style={{ fontSize:"10px", letterSpacing:"2px", color:"#e6b800", fontWeight:"bold" }}>LIVE NOW</span>;
      const days = Math.floor(diff / 86400000);
      const hrs  = Math.floor((diff % 86400000) / 3600000);
      const mins = Math.floor((diff % 3600000) / 60000);
      const secs = Math.floor((diff % 60000) / 1000);
      return (
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:"2px" }}>
          <div style={{ fontSize:"9px", letterSpacing:"3px", color:"#e6b800", marginBottom:"2px" }}>DROPS IN</div>
          <div style={{ display:"flex", gap:"6px", alignItems:"baseline" }}>
            {days > 0 && <div style={{ textAlign:"center" }}>
              <div style={{ fontSize:"16px", fontWeight:"bold", color:"#e6b800", fontVariantNumeric:"tabular-nums" }}>{days}</div>
              <div style={{ fontSize:"7px", letterSpacing:"1px", color:"#999" }}>DAY{days !== 1 ? "S" : ""}</div>
            </div>}
            <div style={{ textAlign:"center" }}>
              <div style={{ fontSize:"16px", fontWeight:"bold", color:"#e6b800", fontVariantNumeric:"tabular-nums" }}>{String(hrs).padStart(2,"0")}</div>
              <div style={{ fontSize:"7px", letterSpacing:"1px", color:"#999" }}>HR</div>
            </div>
            <div style={{ textAlign:"center" }}>
              <div style={{ fontSize:"16px", fontWeight:"bold", color:"#e6b800", fontVariantNumeric:"tabular-nums" }}>{String(mins).padStart(2,"0")}</div>
              <div style={{ fontSize:"7px", letterSpacing:"1px", color:"#999" }}>MIN</div>
            </div>
            <div style={{ textAlign:"center" }}>
              <div style={{ fontSize:"16px", fontWeight:"bold", color:"#e6b800", fontVariantNumeric:"tabular-nums" }}>{String(secs).padStart(2,"0")}</div>
              <div style={{ fontSize:"7px", letterSpacing:"1px", color:"#999" }}>SEC</div>
            </div>
          </div>
        </div>
      );
    }

    function ImageSlot({ img, hoverImg, img3, label, accent, bg, onUpload, onClear, width = 96, height = 60, wearDates = [], tier = "silver", purchaseDate = null, size = null, ogYear = null, story = null, isOnIce = false, dark = false, shoeName = null, isMobilePublic = false, isNewPickup = false }) {
      const fileRef = useRef();
      const [hovered, setHovered] = useState(false);
      const [showHover, setShowHover] = useState(false);
      const [tierGlow, setTierGlow] = useState(false);
      const [tierReveal, setTierReveal] = useState(false);
      const [showStory, setShowStory] = useState(false);
      const [showTriptych, setShowTriptych] = useState(false);
      const [triptychVisible, setTriptychVisible] = useState(false);
      const [iceGlow, setIceGlow] = useState(false);
      const overlayBg = "rgba(0,0,0,0.85)";
      const timerRef = useRef(null);
      const crossfadeRef = useRef(null);
      const tierRef = useRef(null);
      const storyRef = useRef(null);
      const triptychRef = useRef(null);
      const iceRef = useRef(null);
      const hasTriptych = tier === "diamond" && hoverImg && img3 && window.innerWidth >= 768;

      const tierInfo = TIERS[tier] || TIERS.silver;
      const hasCrossfade = tierHasCrossfade(tier);
      const isAnniversary = isAnniversaryToday(purchaseDate);
      const shouldCrossfade = hoverImg && (hasCrossfade || isAnniversary);
      const anniversaryGlow = !hasCrossfade && isAnniversary && shouldCrossfade;

      // Diamond crossfade: scale(0.9) rotate(-3deg) → scale(1) rotate(0) over 4s
      // Platinum crossfade: scale(0.95) → scale(1) over 3s
      const crossfadeTransformStart = tier === "diamond" ? "translateX(-50%) scale(0.8) rotate(-3deg)" : "translateX(-50%) scale(0.95)";
      const crossfadeTransformEnd = tier === "diamond" ? "translateX(-50%) scale(1) rotate(0deg)" : "translateX(-50%) scale(1)";
      const crossfadeDuration = tier === "diamond" ? "4s" : "3s";

      const triggerOpen = () => {
        if (!img) return;
        setHovered(true);
        setShowHover(false);
        setTierGlow(false);
        setTierReveal(false);
        setShowStory(false);
        setShowTriptych(false);
        setTriptychVisible(false);
        setIceGlow(false);
        // Preload all images up front so triptych has no load-time shift
        if (hasTriptych) {
          [img, hoverImg, img3].forEach(src => { if (src) { const i = new Image(); i.src = src; } });
        }
        if (hasCrossfade && shouldCrossfade) {
          crossfadeRef.current = setTimeout(() => { setShowHover(true); setTierReveal(true);
            if (hasTriptych) {
              triptychRef.current = setTimeout(() => {
                setShowTriptych(true);
                setShowStory(true);
                requestAnimationFrame(() => requestAnimationFrame(() => setTriptychVisible(true)));
              }, 5000);
            } else if (story) {
              storyRef.current = setTimeout(() => setShowStory(true), 5000);
            }
          }, 200);
        } else if (tierInfo.label) {
          tierRef.current = setTimeout(() => { setTierReveal(true);
            if (story) storyRef.current = setTimeout(() => setShowStory(true), 5000);
          }, 200);
        } else if (shouldCrossfade) {
          crossfadeRef.current = setTimeout(() => { setShowHover(true);
            if (story) storyRef.current = setTimeout(() => setShowStory(true), 5000);
          }, 200);
        } else if (story) {
          storyRef.current = setTimeout(() => setShowStory(true), 5000);
        }
        if (tierInfo.glowRgba) {
          tierRef.current = setTimeout(() => setTierGlow(true), 200);
        }
        if (isOnIce) {
          iceRef.current = setTimeout(() => setIceGlow(true), 200);
        }
      };
      const triggerClose = () => {
        clearTimeout(crossfadeRef.current);
        clearTimeout(tierRef.current);
        clearTimeout(storyRef.current);
        clearTimeout(triptychRef.current);
        clearTimeout(iceRef.current);
        setHovered(false);
        setShowHover(false);
        setTierGlow(false);
        setTierReveal(false);
        setShowStory(false);
        setShowTriptych(false);
        setTriptychVisible(false);
        setIceGlow(false);
      };
      const handleMouseEnter = () => { if (isMobilePublic) return; timerRef.current = setTimeout(triggerOpen, 500); };
      const handleMouseLeave = () => { if (isMobilePublic) return; clearTimeout(timerRef.current); triggerClose(); };
      const handleTap = (e) => { if (!isMobilePublic) return; e.stopPropagation(); hovered ? triggerClose() : triggerOpen(); };

      useEffect(() => {
        return () => {
          clearTimeout(timerRef.current);
          clearTimeout(crossfadeRef.current);
          clearTimeout(tierRef.current);
          clearTimeout(storyRef.current);
          clearTimeout(triptychRef.current);
          clearTimeout(iceRef.current);
        };
      }, []);

      useEffect(() => {
        if (!isMobilePublic || !hovered) return;
        const handler = () => triggerClose();
        window.addEventListener("orientationchange", handler);
        return () => window.removeEventListener("orientationchange", handler);
      }, [isMobilePublic, hovered]);

      const sortedDates = [...wearDates].sort((a, b) => b > a ? 1 : -1);

      // Glow filter for main image
      const mainGlowFilter = tierInfo.glowRgba && tierGlow
        ? `drop-shadow(0 0 30px ${tierInfo.glowRgba}) drop-shadow(0 0 8px rgba(255,255,255,0.3))`
        : isOnIce && iceGlow
        ? "drop-shadow(0 0 30px rgba(100,200,255,0.8)) drop-shadow(0 0 8px rgba(255,255,255,0.3))"
        : "drop-shadow(0 0 8px rgba(255,255,255,0.6))";

      // Crossfade glow — diamond uses prismatic via CSS animation, others use tier color
      const crossfadeGlow = tier === "diamond"
        ? "drop-shadow(0 0 30px rgba(184,240,255,0.7)) drop-shadow(0 0 8px rgba(255,255,255,0.6))"
        : tierInfo.glowRgba
        ? `drop-shadow(0 0 30px ${tierInfo.glowRgba}) drop-shadow(0 0 8px rgba(255,255,255,0.6))`
        : "drop-shadow(0 0 30px rgba(255,255,255,0.5)) drop-shadow(0 0 8px rgba(255,255,255,0.6))";

      // Name color on hover
      const nameColor = tierInfo.color && tierReveal ? tierInfo.color : isOnIce && iceGlow ? "#64c8ff" : anniversaryGlow && showHover ? "#FFD700" : isNewPickup ? "#FFD700" : "#fff";

      return (
        <div style={{ position:"relative", display:"inline-block" }}>
          {img ? (
            <div style={{ textAlign:"center" }}>
              <div style={{ position:"relative", display:"inline-block", width, height, overflow:"hidden", background: dark ? "#222222" : "#ffffff" }}>
                <img
                  src={img} alt={label}
                  onMouseEnter={handleMouseEnter}
                  onMouseLeave={handleMouseLeave}
                  onClick={handleTap}
                  style={{ width, height, objectFit:"contain", border:"none", display:"block", cursor: isMobilePublic ? "pointer" : "zoom-in", transition:"opacity 0.15s" }}
                />
                {hovered && (
                  <div onClick={triggerClose} style={{
                    position:"fixed", top:0, left:0, width:"100vw", height:"100vh",
                    background: overlayBg, display:"flex", flexDirection:"column",
                    alignItems:"center", justifyContent:"center", zIndex:9999,
                    pointerEvents: isMobilePublic ? "auto" : "none",
                  }}>
                    {/* ── UNIFIED OVERLAY — triptych and single view coexist, no layout swap ── */}
                    <div style={{ display:"flex", flexDirection:"column", alignItems:"center" }}>
                      {/* Image row — fixed size always, flanking images absolute so they never affect layout */}
                      <div style={{ position:"relative", width:"100vw", height:"42vh", display:"flex", alignItems:"center", justifyContent:"center" }}>
                        {/* Left — img1, fades in at Act 3 */}
                        {hasTriptych && (
                          <div style={{ position:"absolute", right:"calc(50% + 20vw)", top:"50%", transform: triptychVisible ? "translateY(-50%)" : "translateY(-50%) translateX(-80px)", opacity: triptychVisible ? 1 : 0, transition:"opacity 3s ease-out 0.05s, transform 3s ease-out 0.05s", pointerEvents:"none" }}>
                            <img src={img} alt={label} style={{ maxWidth:"25vw", maxHeight:"35vh", objectFit:"contain", animation: triptychVisible ? "prismaticGlow 2.5s ease-in-out -1s infinite" : "none", display:"block" }} />
                          </div>
                        )}
                        {/* Center — always visible, never moves */}
                        <div style={{ position:"relative" }}>
                          <img src={img} alt={label} style={{ maxWidth: isMobilePublic ? "90vw" : "50vw", maxHeight:"40vh", objectFit:"contain", filter: mainGlowFilter, display:"block", opacity: (shouldCrossfade && showHover) ? 0 : 1, transition:`opacity ${crossfadeDuration} ease-in-out, filter 3s ease-in-out` }} />
                          {shouldCrossfade && (
                            <img src={hoverImg} alt={label} style={{ position:"absolute", top:0, left:"50%", transform: showHover ? crossfadeTransformEnd : crossfadeTransformStart, maxWidth: isMobilePublic ? "90vw" : "50vw", maxHeight:"40vh", objectFit:"contain", filter: tier !== "diamond" ? crossfadeGlow : undefined, animation: tier === "diamond" && showHover ? "diamondReveal 4s ease-out forwards, prismaticGlow 2.5s ease-in-out 4s infinite" : "none", opacity: showHover ? 1 : 0, transition:`opacity ${crossfadeDuration} ease-in-out, transform ${crossfadeDuration} ease-in-out` }} />
                          )}
                        </div>
                        {/* Right — img3, fades in at Act 3 */}
                        {hasTriptych && (
                          <div style={{ position:"absolute", left:"calc(50% + 20vw)", top:"50%", transform: triptychVisible ? "translateY(-50%)" : "translateY(-50%) translateX(80px)", opacity: triptychVisible ? 1 : 0, transition:"opacity 3s ease-out 0.05s, transform 3s ease-out 0.05s", pointerEvents:"none" }}>
                            <img src={img3} alt={label} style={{ maxWidth:"25vw", maxHeight:"35vh", objectFit:"contain", animation: triptychVisible ? "prismaticGlow 2.5s ease-in-out -1s infinite" : "none", display:"block" }} />
                          </div>
                        )}
                      </div>
                      {/* Text area — fixed height, always reserved so center never shifts */}
                      <div style={{ height:"80px", width:"100%", textAlign:"center", position:"relative" }}>
                        {/* Act 1+2 metadata — fades out when story/triptych arrives */}
                        <div style={{ position:"absolute", width:"100%", opacity: showStory ? 0 : 1, transition:"opacity 1s ease-in-out" }}>
                          {tierInfo.label && <div style={{ fontSize:"11px", letterSpacing:"6px", color: tierInfo.color, opacity: tierReveal ? 1 : 0, transition:"opacity 3s ease-in-out" }}>{tierInfo.label}</div>}
                          {isOnIce && <div style={{ fontSize:"11px", letterSpacing:"6px", color:"#64c8ff", marginTop:"6px", opacity: iceGlow ? 1 : 0, transition:"opacity 3s ease-in-out" }}>❄️ ON ICE ❄️</div>}
                          {anniversaryGlow && <div style={{ fontSize:"11px", letterSpacing:"6px", color: tierAnniversaryColor(tier), marginTop:"6px", opacity: showHover ? 1 : 0, transition:"opacity 3s ease-in-out" }}>✦ ANNIVERSARY ✦</div>}
                          {isNewPickup && tier === "silver" && <div style={{ fontSize:"11px", letterSpacing:"6px", color:"#FFD700", marginTop:"6px" }}>✦ NEW PICKUP ✦</div>}
                          <div style={{ marginTop:(tierInfo.label||isOnIce||anniversaryGlow||isNewPickup)?"6px":"0", fontSize:"13px", letterSpacing:"3px", color: nameColor, transition:"color 3s ease-in-out" }}>
                            {shoeName ? `${shoeName} — ${label}` : label}
                          </div>
                          {ogYear && <div style={{ marginTop:"4px", fontSize:"10px", color:"#fff", letterSpacing:"1px" }}>Originally Owned in {ogYear}</div>}
                          {purchaseDate && <div style={{ marginTop:"8px", fontSize:"10px", color: dark ? "#777" : "#aaa", letterSpacing:"1px" }}>Purchase Date: {new Date(purchaseDate + "T00:00:00").toLocaleDateString("en-US", { month:"2-digit", day:"2-digit", year:"numeric" })}</div>}
                          {size && <div style={{ marginTop:"4px", fontSize:"10px", color: dark ? "#777" : "#aaa", letterSpacing:"1px" }}>Size: {size}</div>}
                          {sortedDates.length > 0 && <div style={{ marginTop:"4px", fontSize:"10px", color: dark ? "#777" : "#aaa", letterSpacing:"1px" }}>Last Worn: {new Date(sortedDates[0] + "T00:00:00").toLocaleDateString("en-US", { month:"2-digit", day:"2-digit", year:"numeric" })}</div>}
                          {isMobilePublic && <div style={{ marginTop:"16px", fontSize:"10px", color:"#666", letterSpacing:"2px" }}>TAP TO CLOSE</div>}
                        </div>
                        {/* Act 2 story / Act 3 story+triptych label — fades in */}
                        {story && (
                          <div style={{ position:"absolute", width:"100%", opacity: showStory ? 1 : 0, transition:"opacity 2s ease-in-out" }}>
                            {hasTriptych && tierInfo.label && <div style={{ fontSize:"11px", letterSpacing:"6px", color: tierInfo.color, marginBottom:"10px", opacity: triptychVisible ? 1 : 0, transition:"opacity 2s ease-in-out" }}>{tierInfo.label}</div>}
                            <div style={{ fontSize:"13px", color:"#fff", lineHeight:"1.8", letterSpacing:"0.5px" }}>{story}</div>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                )}
              </div>
              <div style={{ fontSize:"11px", color:"#666", marginTop:"4px", maxWidth:width, textAlign:"center", lineHeight:"1.3", wordBreak:"break-word" }}>{label}{isNewPickup && <span style={{ fontSize:"9px", letterSpacing:"2px", color:"#FFD700", fontWeight:"bold", marginLeft:"5px" }}>NEW</span>}</div>
              
            </div>
          ) : (
            <div style={{ textAlign:"center" }}>
              <div onClick={() => fileRef.current.click()} title={`Upload: ${label}`} style={{
                width, height, background:bg, border:`1px dashed ${accent}`,
                display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                cursor:"pointer",
              }}>
                <div style={{ fontSize:"18px", color:accent, lineHeight:1 }}>+</div>
              </div>
              <div style={{ fontSize:"11px", color:"#666", marginTop:"4px", maxWidth:width, textAlign:"center", lineHeight:"1.3", wordBreak:"break-word" }}>{label}</div>
              
            </div>
          )}
          <input ref={fileRef} type="file" accept="image/*" style={{ display:"none" }}
            onChange={e => { if (e.target.files[0]) onUpload(e.target.files[0]); e.target.value = ""; }} />
        </div>
      );
    }

    function DisplayCell({ c, img, hoverImg, ri, onEdit, isEditing, tier = "silver", dark = false, isMobilePublic = false, isWishlist = false, shoeName = null }) {
      const [hovered, setHovered] = useState(false);
      const [showHover, setShowHover] = useState(false);
      const timerRef = useRef(null);
      const crossfadeRef = useRef(null);
      const hasCrossfade = tierHasCrossfade(tier);
      const tierInfo = TIERS[tier] || TIERS.silver;

      const triggerOpen = () => {
        if (!img) return;
        setHovered(true);
        setShowHover(false);
        if (hasCrossfade && hoverImg) {
          crossfadeRef.current = setTimeout(() => setShowHover(true), 200);
        }
      };
      const triggerClose = () => {
        clearTimeout(crossfadeRef.current);
        setHovered(false);
        setShowHover(false);
      };
      const handleMouseEnter = () => { if (isMobilePublic || !img) return; timerRef.current = setTimeout(triggerOpen, 500); };
      const handleMouseLeave = () => { if (isMobilePublic) return; clearTimeout(timerRef.current); triggerClose(); };
      const handleTap = (e) => { if (!isMobilePublic) return; e.stopPropagation(); hovered ? triggerClose() : triggerOpen(); };

      useEffect(() => {
        return () => {
          clearTimeout(timerRef.current);
          clearTimeout(crossfadeRef.current);
        };
      }, []);

      useEffect(() => {
        if (!isMobilePublic || !hovered) return;
        const handler = () => triggerClose();
        window.addEventListener("orientationchange", handler);
        return () => window.removeEventListener("orientationchange", handler);
      }, [isMobilePublic, hovered]);

      return (
        <div
          onClick={ADMIN_MODE ? onEdit : undefined}
          style={{ width:"160px", cursor: ADMIN_MODE ? "pointer" : "default", perspective:"800px", paddingTop:"4px" }}>
          <div style={{ position:"relative", transformStyle:"preserve-3d", transform:"rotateX(2deg)" }}>
            {/* Top face of acrylic case */}
            <div style={{
              position:"absolute", top:0, left:0, width:"160px", height:"12px",
              background: dark
                ? "linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%)"
                : "linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.4) 100%)",
              transform:"rotateX(70deg)", transformOrigin:"top center",
              borderTop: dark ? "1px solid rgba(255,255,255,0.12)" : "1px solid rgba(255,255,255,0.8)",
              borderLeft: dark ? "1px solid rgba(255,255,255,0.06)" : "1px solid rgba(255,255,255,0.5)",
              borderRight: dark ? "1px solid rgba(255,255,255,0.06)" : "1px solid rgba(255,255,255,0.5)",
              pointerEvents:"none", zIndex:2,
            }} />
            {/* Front face */}
            <div
              onMouseEnter={handleMouseEnter}
              onMouseLeave={handleMouseLeave}
              onClick={handleTap}
              style={{
                width:"160px", height:"100px",
                background: c.empty ? (dark ? "#2a2a2a" : "#f5f5f5") : img ? (dark ? "#1a1a1a" : "#ffffff") : c.bg,
                border: isEditing ? "2px solid #f4a261"
                  : isWishlist ? "1px dashed #e63946"
                  : dark ? "1px solid rgba(255,255,255,0.1)" : "1px solid rgba(0,0,0,0.08)",
                borderBottom: dark ? "2px solid rgba(255,255,255,0.06)" : "2px solid rgba(0,0,0,0.1)",
                display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                padding: img ? "0" : "6px", textAlign:"center",
                overflow:"hidden", position:"relative",
                cursor: isMobilePublic && img ? "pointer" : undefined,
                boxShadow: dark
                  ? "0 4px 12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05)"
                  : "0 4px 12px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.8)",
              }}>
              {/* Acrylic reflection highlight */}
              <div style={{
                position:"absolute", top:0, left:0, width:"100%", height:"100%",
                background: dark
                  ? "linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 40%, transparent 60%, rgba(255,255,255,0.02) 100%)"
                  : "linear-gradient(135deg, rgba(255,255,255,0.6) 0%, transparent 40%, transparent 60%, rgba(255,255,255,0.15) 100%)",
                pointerEvents:"none", zIndex:1,
              }} />
            {c.empty
              ? <span style={{color: dark ? "#555" : "#ddd",fontSize:"18px"}}>·</span>
              : img
                  ? <img src={img} alt={c.colorway} style={{ width:"100%", height:"100%", objectFit:"cover", objectPosition:"bottom", display:"block" }} />
                  : <>
                      <div style={{fontSize:"11px",letterSpacing:"2px",color:c.accent,fontWeight:"bold"}}>{c.label}</div>
                    </>
            }
          </div>
          </div>
          {hovered && img && ReactDOM.createPortal(
              <div onClick={triggerClose} style={{
                position:"fixed", top:0, left:0, width:"100vw", height:"100vh",
                background:"rgba(0,0,0,0.85)", display:"flex", flexDirection:"column",
                alignItems:"center", justifyContent:"center", zIndex:9999, pointerEvents: isMobilePublic ? "auto" : "none",
              }}>
                <div style={{ position:"relative", maxWidth: isMobilePublic ? "90vw" : "60vw", maxHeight: isMobilePublic ? "70vh" : "60vh" }}>
                  <img src={hoverImg || img} alt={c.colorway} style={{ maxWidth: isMobilePublic ? "90vw" : "60vw", maxHeight: isMobilePublic ? "70vh" : "60vh", objectFit:"contain", filter:"drop-shadow(0 0 8px rgba(255,255,255,0.6))", display:"block" }} />
                </div>
                {tierInfo.label && <div style={{ marginTop:"16px", fontSize:"11px", letterSpacing:"6px", color: tierInfo.color }}>{tierInfo.label}</div>}
                <div style={{ marginTop: tierInfo.label ? "8px" : "16px", fontSize:"15px", fontWeight:"bold", letterSpacing:"2px", color:"#fff" }}>{shoeName}</div>
                <div style={{ marginTop:"4px", fontSize:"12px", letterSpacing:"2px", color: tierInfo.color || c.accent }}>{c.colorway}</div>
                {isMobilePublic && <div style={{ marginTop:"16px", fontSize:"10px", color:"#666", letterSpacing:"2px" }}>TAP TO CLOSE</div>}
              </div>,
          document.body)}
          {!c.empty && (
            <div style={{ textAlign:"center", marginTop:"4px" }}>
              <div style={{ fontSize:"8px", color: dark ? "#999" : "#666", letterSpacing:"0.5px", overflow:"hidden", whiteSpace:"nowrap", textOverflow:"ellipsis" }}>{c.colorway}</div>
            </div>
          )}
        </div>
      );
    }

    function GraveyardCard({ entryKey, entry, T, CT, dark, setColorways, setGraveyardMeta, isMobilePublic = false }) {
      const [hovered,    setHovered]    = useState(false);
      const [showHover,  setShowHover]  = useState(false);
      const [ghosted,    setGhosted]    = useState(false);
      const timerRef     = useRef(null);
      const crossfadeRef = useRef(null);
      const ghostRef     = useRef(null);

      const entryTier = entry.tier || (entry.isGrail ? "diamond" : entry.isBeater ? "bronze" : "silver");
      const tierInfo = TIERS[entryTier] || TIERS.silver;
      const hasCrossfade = tierHasCrossfade(entryTier);
      const glowColor  = tierInfo.glowRgba || "rgba(150,150,150,0.6)";
      const purchaseDate = entry.purchaseDate ? new Date(entry.purchaseDate+"T00:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}) : null;
      const retireDate   = entry.retireDate   ? new Date(entry.retireDate+"T00:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}) : null;

      const triggerOpen = () => {
        if (!entry.img) return;
        setHovered(true); setShowHover(false); setGhosted(false);
        ghostRef.current = setTimeout(() => setGhosted(true), 500);
      };
      const triggerClose = () => {
        clearTimeout(crossfadeRef.current);
        clearTimeout(ghostRef.current);
        setHovered(false); setShowHover(false); setGhosted(false);
      };
      const handleMouseEnter = () => { if (isMobilePublic) return; if (!entry.img) return; timerRef.current = setTimeout(triggerOpen, 500); };
      const handleMouseLeave = () => { if (isMobilePublic) return; clearTimeout(timerRef.current); triggerClose(); };
      const handleTap = (e) => { if (!isMobilePublic) return; e.stopPropagation(); hovered ? triggerClose() : triggerOpen(); };

      useEffect(() => {
        return () => {
          clearTimeout(timerRef.current);
          clearTimeout(crossfadeRef.current);
          clearTimeout(ghostRef.current);
        };
      }, []);

      useEffect(() => {
        if (!isMobilePublic || !hovered) return;
        const handler = () => triggerClose();
        window.addEventListener("orientationchange", handler);
        return () => window.removeEventListener("orientationchange", handler);
      }, [isMobilePublic, hovered]);

      const cardW = isMobilePublic ? "140px" : "200px";
      const imgW = isMobilePublic ? "108px" : "168px";
      const imgH = isMobilePublic ? "68px" : "105px";
      const ghostFilter = "none";
      const normalFilter = "none";

      // Tombstone shape — classic rounded arch, 240×320px at desktop scale
      const stoneW = isMobilePublic ? 180 : 260;
      const stoneH = isMobilePublic ? (entry.story ? 280 : 220) : (entry.story ? 400 : 320);
      const archR = stoneW / 2; // full semicircle arch
      const engravedShadow = "0 -1px 2px rgba(0,0,0,0.7), 0 2px 1px rgba(255,255,255,0.12)";

      return (
        <div style={{ background: dark ? T.cardBg : "#f9f9f9", border:`1px solid ${T.border}`, padding:"16px", width: cardW, flex:"0 0 auto" }}>
          {/* Image */}
          <div style={{ position:"relative", width: imgW, height: imgH, marginBottom:"10px" }}>
            {entry.img ? (
              <>
                <img src={entry.img} alt={entry.colorway} onMouseEnter={handleMouseEnter} onMouseLeave={handleMouseLeave} onClick={handleTap}
                  style={{ width: imgW, height: imgH, objectFit:"cover", display:"block", cursor: isMobilePublic ? "pointer" : "zoom-in",
                    filter: hovered ? `drop-shadow(0 0 20px ${glowColor})` : "none",
                    opacity: hasCrossfade && entry.hoverImg && showHover ? 0 : 1,
                    transition:"opacity 3s ease-in-out, filter 0.3s ease-in-out" }} />
                {hasCrossfade && entry.hoverImg && (
                  <img src={entry.hoverImg} alt={entry.colorway} onMouseEnter={handleMouseEnter} onMouseLeave={handleMouseLeave} onClick={handleTap}
                    style={{ position:"absolute", top:0, left:0, width: imgW, height: imgH, objectFit:"cover",
                      filter:`drop-shadow(0 0 20px ${glowColor})`,
                      opacity: showHover ? 1 : 0, transform: showHover ? "scale(1)" : "scale(0.95)",
                      transition:"opacity 3s ease-in-out, transform 3s ease-in-out" }} />
                )}
              </>
            ) : (
              <div style={{ width: imgW, height: imgH, background:T.bg3, display:"flex", alignItems:"center", justifyContent:"center" }}>
                <span style={{ fontSize:"32px" }}>🪦</span>
              </div>
            )}
            {/* Hover overlay */}
            {hovered && entry.img && (
              <div onClick={triggerClose} style={{ position:"fixed", top:0, left:0, width:"100vw", height:"100vh", background:"rgba(0,0,0,0.88)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", zIndex:9999, pointerEvents: isMobilePublic ? "auto" : "none" }}>
                <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:"24px" }}>

                  {/* Tombstone shape */}
                  <div style={{ position:"relative", width:`${stoneW}px`, height:`${stoneH}px`, flexShrink:0 }}>
                    {/* Stone shape — CSS clip with rounded arch top */}
                    <div style={{
                      position:"absolute", inset:0,
                      backgroundImage:"url('assets/tombstone.png')",
                      backgroundSize:"cover", backgroundPosition:"center",
                      borderRadius:`${archR}px ${archR}px 6px 6px`,
                      overflow:"hidden",
                      boxShadow:"0 8px 32px rgba(0,0,0,0.7), inset 0 0 40px rgba(0,0,0,0.3)",
                    }}>
                      {/* Dark overlay for depth */}
                      <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.25)", borderRadius:`${archR}px ${archR}px 6px 6px` }} />
                    </div>

                    {/* Engraved text — upper arch area */}
                    <div style={{ position:"absolute", top:0, left:0, right:0, padding:`${Math.round(archR * 0.5)}px 20px 12px`, textAlign:"center" }}>
                      {tierInfo.ripLabel && (
                        <div style={{ fontSize:"11px", letterSpacing:"4px", color: tierInfo.color || "rgba(220,215,205,0.95)", textShadow: engravedShadow, marginBottom:"8px", opacity:0.95 }}>{tierInfo.ripLabel}</div>
                      )}
                      <div style={{ fontSize: isMobilePublic ? "11px" : "13px", letterSpacing:"2px", color:"rgba(230,225,215,0.97)", textShadow: engravedShadow, fontWeight:"bold", lineHeight:1.4, marginBottom:"6px" }}>
                        {entry.shoeName}
                      </div>
                      <div style={{ fontSize: isMobilePublic ? "10px" : "13px", letterSpacing:"1px", color:"rgba(210,205,195,0.95)", textShadow: engravedShadow, marginBottom:"8px" }}>
                        {entry.colorway}
                      </div>
                      {(purchaseDate || retireDate) && (
                        <div style={{ fontSize: isMobilePublic ? "9px" : "12px", color:"rgba(195,190,180,0.92)", letterSpacing:"1px", textShadow: engravedShadow, marginBottom: entry.story ? "10px" : "0" }}>
                          {purchaseDate || "?"} — {retireDate || "?"}
                        </div>
                      )}
                      {entry.story && (
                        <div style={{ fontSize: isMobilePublic ? "9px" : "12px", fontStyle:"italic", color:"rgba(210,205,195,0.90)", textShadow: engravedShadow, lineHeight:1.6, letterSpacing:"0.3px", maxHeight:"80px", overflowY:"auto", marginTop:"2px" }}>
                          {entry.story}
                        </div>
                      )}
                    </div>

                    {/* Shoe — img2 if available, nudged up and right for visual centering */}
                    <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"flex-end", justifyContent:"center", paddingBottom:"18%", paddingLeft:"8%" }}>
                      <img src={entry.hoverImg || entry.img}
                        alt={entry.colorway}
                        style={{
                          maxWidth:`${stoneW - 24}px`, maxHeight:`${Math.round(stoneH * 0.42)}px`,
                          objectFit:"contain",
                          filter: ghosted ? ghostFilter : normalFilter,
                          transition:"filter 2.5s ease-in-out",
                        }} />
                    </div>
                  </div>


                  {isMobilePublic && <div style={{ fontSize:"10px", color:"#555", letterSpacing:"2px" }}>TAP TO CLOSE</div>}
                </div>
              </div>
            )}
          </div>
          <div style={{ fontSize:"11px", fontWeight:"bold", color: CT.text, marginBottom:"2px", textAlign:"center" }}>{entry.shoeName}</div>
          <div style={{ fontSize:"10px", color: CT.text4, textAlign:"center" }}>{entry.colorway}</div>
          {ADMIN_MODE && <button onClick={() => { if (window.confirm(`Restore ${entry.shoeName} — ${entry.colorway} to your collection?`)) {
            setColorways(cws => ({ ...cws, [entry.shortName]: [...(cws[entry.shortName]||[]), entry.colorway] }));
            setGraveyardMeta(g => { const n={...g}; delete n[entryKey]; return n; });
            // Restore ownership and tier
            const restoreKey = entryKey;
            setColorwayOwned(o => ({ ...o, [restoreKey]: true }));
            if (entryTier && entryTier !== "silver") setTierMeta(tm => ({ ...tm, [restoreKey]: entryTier }));
          }}} style={{ marginTop:"10px", background:"transparent", border:`1px solid ${T.border2}`, color:T.text5, padding:"3px 8px", cursor:"pointer", fontSize:"8px", letterSpacing:"2px", fontFamily:"'Aptos','Segoe UI',sans-serif" }}>RESTORE</button>}
        </div>
      );
    }

    function MetaEditForm({ editingMeta, metaForm, setMetaForm, setColorwayMeta, setEditingMeta, tierMeta, setTierMeta, setGlowMeta, glowMeta, setImages, images, handleImageUpload, setRetiringMeta, setRetireForm, IS, CT, T, dark, isWishlist = false, colorwayOwned = {}, setColorwayOwned = null }) {
      const key = `${editingMeta.shoeId}_${editingMeta.colorway}`;
      const hoverKey = `${key}_hover`;
      const hoverImgVal = images[hoverKey];
      const currentTier = tierOf(tierMeta, key);
      const tierInfo = TIERS[currentTier] || TIERS.silver;
      const hasCrossfade = tierHasCrossfade(currentTier);
      const hoverUploadRef = useRef();
      const btnStyle = { background:"transparent", border:"1px solid #bbb", color:CT.text7, padding:"6px 14px", cursor:"pointer", fontSize:"10px", letterSpacing:"2px", fontFamily:"'Aptos','Segoe UI',sans-serif", whiteSpace:"nowrap" };
      return (
        <div style={{ background:T.bg2, border:`1px solid ${T.border}`, padding:"12px", marginTop: isWishlist ? "10px" : undefined }}>
          <div style={{ fontSize:"9px", letterSpacing:"3px", color:"#e63946", marginBottom:"8px" }}>
            {editingMeta.colorway} — DETAILS
          </div>
          {/* Tier dropdown */}
          <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"10px" }}>
            <div style={{ fontSize:"9px", letterSpacing:"2px", color: tierInfo.color || CT.text5 }}>TIER</div>
            <select value={currentTier} onChange={e => {
              setTierMeta(tm => ({ ...tm, [key]: e.target.value }));
            }} style={{ ...IS, width:"140px", fontSize:"11px", padding:"5px" }}>
              {TIER_OPTIONS.map(t => <option key={t} value={t}>{t.charAt(0).toUpperCase() + t.slice(1)}</option>)}
            </select>
            {tierInfo.label && <span style={{ fontSize:"9px", letterSpacing:"2px", color: tierInfo.color }}>{tierInfo.label}</span>}
          </div>
          {/* Dark mode glow toggle — collection only */}
          {!isWishlist && (
            <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"10px" }}>
              <input type="checkbox"
                checked={!!glowMeta[key]}
                onChange={e => {
                  setGlowMeta(g => { const n={...g}; if (e.target.checked) n[key]=true; else delete n[key]; return n; });
                }}
                style={{ width:"14px", height:"14px", cursor:"pointer", accentColor:"#64c8ff" }} />
              <span style={{ fontSize:"10px", letterSpacing:"3px", color: CT.text5, cursor:"pointer" }}>☾ DARK GLOW</span>
            </div>
          )}
          {/* Hover image upload */}
          {(
            <div style={{ marginBottom:"10px" }}>
              <div style={{ fontSize:"9px", letterSpacing:"2px", color: hasCrossfade ? (tierInfo.color || "#e63946") : "#e63946", marginBottom:"6px" }}>{hasCrossfade ? "✦ HOVER IMAGE (IMG 2)" : "✦ 2ND IMAGE (ANNIVERSARY)"}</div>
              <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
                {hoverImgVal
                  ? <img src={hoverImgVal} alt="hover" style={{ width:"80px", height:"50px", objectFit:"cover", border:`1px solid ${tierInfo.color || "#FFD700"}` }} />
                  : <div style={{ width:"80px", height:"50px", background: dark ? "#2a2a2a" : "#f0f0f0", border:`1px dashed ${tierInfo.color || "#FFD700"}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"18px", color: tierInfo.color || "#FFD700", cursor:"pointer" }}
                      onClick={() => hoverUploadRef.current.click()}>+</div>
                }
                <div style={{ display:"flex", flexDirection:"column", gap:"6px" }}>
                  <button onClick={() => hoverUploadRef.current.click()}
                    style={{ background:"transparent", border:`1px solid ${tierInfo.color || "#FFD700"}`, color: tierInfo.color || "#FFD700", padding:"4px 10px", cursor:"pointer", fontSize:"9px", letterSpacing:"2px", fontFamily:"'Aptos','Segoe UI',sans-serif" }}>
                    {hoverImgVal ? "REPLACE" : "UPLOAD"}
                  </button>
                  {hoverImgVal && (
                    <button onClick={() => { setImages(imgs => { const n={...imgs}; delete n[hoverKey]; return n; }); fetch(`/delete?key=${encodeURIComponent(key)}&type=hover`, { method: "POST" }).catch(() => {}); }}

            {setColorwayOwned && (() => {

                  )}

              );
            })()}
            {!isWishlist && (
              <button onClick={() => {
                setRetiringMeta({ shoeId: editingMeta.shoeId, colorway: editingMeta.colorway });
                setRetireForm({ reason:"Sold", dateRetired: localDateStr(), story:"" });

              }} style={{ background:"transparent", border:"1px solid #888", color:"#888", padding:"6px 14px", cursor:"pointer", fontSize:"10px", letterSpacing:"2px", fontFamily:"'Aptos','Segoe UI',sans-serif", whiteSpace:"nowrap" }}>🪦 RETIRE</button>
