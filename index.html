<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Vault — DerAusländer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #ffffff; font-family: 'Aptos', 'Segoe UI', sans-serif; color: #111111; transition: background 0.3s, color 0.3s; }
    body.dark { background: #1a1a1a; color: #f0f0f0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f0f0f0; }
    body.dark ::-webkit-scrollbar-track { background: #2a2a2a; }
    ::-webkit-scrollbar-thumb { background: #ccc; }
    body.dark ::-webkit-scrollbar-thumb { background: #555; }
    @keyframes grailPulse {
      0%   { opacity: 1; }
      50%  { opacity: 0.4; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const LIGHT = {
      bg: "#ffffff", bg2: "#f9f9f9", bg3: "#f5f5f5", bg4: "#f0f0f0",
      border: "#e0e0e0", border2: "#ccc",
      text: "#111", text2: "#333", text3: "#555", text4: "#666", text5: "#888", text6: "#aaa", text7: "#bbb", text8: "#ddd",
      navBg: "#f5f5f5", cardBg: "#ffffff", categoryBg: "#fff0f0",
    };
    const DARK = {
      bg: "#1a1a1a", bg2: "#222222", bg3: "#2a2a2a", bg4: "#2f2f2f",
      border: "#333333", border2: "#444444",
      text: "#f0f0f0", text2: "#d0d0d0", text3: "#b0b0b0", text4: "#999", text5: "#888", text6: "#777", text7: "#666", text8: "#444",
      navBg: "#111111", cardBg: "#222222", categoryBg: "#2a1a1a",
    };

    const localDateStr = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };

    const useOSDark = () => {
      const [dark, setDark] = useState(() => window.matchMedia("(prefers-color-scheme: dark)").matches);
      useEffect(() => {
        const mq = window.matchMedia("(prefers-color-scheme: dark)");
        const handler = e => { setDark(e.matches); document.body.classList.toggle("dark", e.matches); };
        mq.addEventListener("change", handler);
        document.body.classList.toggle("dark", dark);
        return () => mq.removeEventListener("change", handler);
      }, []);
      return dark;
    };

    const useIsMobile = () => {
      const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
      useEffect(() => {
        const handler = () => setIsMobile(window.innerWidth < 768);
        window.addEventListener("resize", handler);
        return () => window.removeEventListener("resize", handler);
      }, []);
      return isMobile;
    };

    // ── Read-only ImageSlot ──────────────────────────────────────────────────
    function ImageSlot({ img, hoverImg, label, accent, width = 96, height = 96,
                         isGrail = false, isBeater = false, purchaseDate = null,
                         size = null, ogYear = null, wearDates = [], story = null, isOnIce = false, dark = false, shoeName = null }) {
      const isMobile    = useIsMobile();
      const [hovered,     setHovered]     = useState(false);
      const [showHover,   setShowHover]   = useState(false);
      const [beaterGlow,  setBeaterGlow]  = useState(false);
      const [grailReveal, setGrailReveal] = useState(false);
      const [showStory,   setShowStory]   = useState(false);
      const [iceGlow,     setIceGlow]     = useState(false);
      const timerRef    = useRef(null);
      const crossfadeRef= useRef(null);
      const beaterRef   = useRef(null);
      const grailRef    = useRef(null);
      const storyRef    = useRef(null);
      const iceRef      = useRef(null);

      const triggerOpen = () => {
        if (!img) return;
        setHovered(true);
        setShowHover(false);
        setBeaterGlow(false);
        setGrailReveal(false);
        setShowStory(false);
        setIceGlow(false);
        if (isGrail && hoverImg) {
          crossfadeRef.current = setTimeout(() => { setShowHover(true); setGrailReveal(true);
            if (story) storyRef.current = setTimeout(() => setShowStory(true), 5000);
          }, 200);
        } else if (isGrail) {
          grailRef.current = setTimeout(() => { setGrailReveal(true);
            if (story) storyRef.current = setTimeout(() => setShowStory(true), 5000);
          }, 200);
        } else if (story) {
          storyRef.current = setTimeout(() => setShowStory(true), 5000);
        }
        if (isBeater) {
          beaterRef.current = setTimeout(() => setBeaterGlow(true), 200);
        }
        if (isOnIce) {
          iceRef.current = setTimeout(() => setIceGlow(true), 200);
        }
      };
      const triggerClose = () => {
        clearTimeout(crossfadeRef.current);
        clearTimeout(beaterRef.current);
        clearTimeout(grailRef.current);
        clearTimeout(storyRef.current);
        clearTimeout(iceRef.current);
        setHovered(false);
        setShowHover(false);
        setBeaterGlow(false);
        setGrailReveal(false);
        setShowStory(false);
        setIceGlow(false);
      };

      const handleMouseEnter = () => { if (isMobile) return; timerRef.current = setTimeout(triggerOpen, 500); };
      const handleMouseLeave = () => { if (isMobile) return; clearTimeout(timerRef.current); triggerClose(); };
      const handleTap        = (e) => { if (!isMobile) return; e.stopPropagation(); hovered ? triggerClose() : triggerOpen(); };

      return (
        <div style={{ position:"relative", display:"inline-block" }}>
          {img ? (
            <div style={{ textAlign:"center" }}>
              <div style={{ position:"relative", display:"inline-block" }}>
                <img src={img} alt={label}
                  onMouseEnter={handleMouseEnter}
                  onMouseLeave={handleMouseLeave}
                  onClick={handleTap}
                  style={{ width, height, objectFit:"cover", border:"none", display:"block", cursor: isMobile ? "pointer" : "zoom-in" }}
                />
                {hovered && (
                  <div onClick={triggerClose} style={{
                    position:"fixed", top:0, left:0, width:"100vw", height:"100vh",
                    background:"rgba(0,0,0,0.85)", display:"flex", flexDirection:"column",
                    alignItems:"center", justifyContent:"center", zIndex:9999,
                    pointerEvents: isMobile ? "auto" : "none",
                  }}>
                    <div style={{ position:"relative", width: isMobile ? "90vw" : "50vw", maxWidth:"600px", display:"flex", flexDirection:"column", alignItems:"center" }}>
                      {/* Image — stays fixed, never fades */}
                      <div style={{ position:"relative", width:"100%", display:"flex", justifyContent:"center" }}>
                        <img src={img} alt={label} style={{
                          maxWidth: isMobile ? "90vw" : "50vw", maxHeight:"40vh", objectFit:"contain",
                          filter: isBeater && beaterGlow
                            ? "drop-shadow(0 0 30px rgba(180,80,20,0.8)) drop-shadow(0 0 8px rgba(255,255,255,0.3))"
                            : isOnIce && iceGlow
                            ? "drop-shadow(0 0 30px rgba(100,200,255,0.8)) drop-shadow(0 0 8px rgba(255,255,255,0.3))"
                            : "drop-shadow(0 0 8px rgba(255,255,255,0.6))",
                          display:"block",
                          opacity: (isGrail && hoverImg && showHover) ? 0 : 1,
                          transition:"opacity 3s ease-in-out, filter 3s ease-in-out"
                        }} />
                        {isGrail && hoverImg && (
                          <img src={hoverImg} alt={label} style={{
                            position:"absolute", top:0, left:"50%",
                            transform: showHover ? "translateX(-50%) scale(1)" : "translateX(-50%) scale(0.95)",
                            maxWidth: isMobile ? "90vw" : "50vw", maxHeight:"40vh",
                            objectFit:"contain",
                            filter:"drop-shadow(0 0 30px rgba(255,215,0,0.7)) drop-shadow(0 0 8px rgba(255,255,255,0.6))",
                            opacity: showHover ? 1 : 0,
                            transition:"opacity 3s ease-in-out, transform 3s ease-in-out"
                          }} />
                        )}
                      </div>
                      {/* Text area — fixed container, info fades out, story fades in */}
                      <div style={{ width:"100%", marginTop:"16px", textAlign:"center", position:"relative", minHeight:"80px" }}>
                        {/* Info text */}
                        <div style={{ position:"absolute", width:"100%", opacity: showStory ? 0 : 1, transition:"opacity 1s ease-in-out" }}>
                          {isGrail  && <div style={{ fontSize:"11px", letterSpacing:"6px", color:"#FFD700", opacity: grailReveal ? 1 : 0, transition:"opacity 3s ease-in-out" }}>✦ GRAIL ✦</div>}
                          {isBeater && <div style={{ fontSize:"11px", letterSpacing:"6px", color:"#b45014", marginTop:"6px", opacity: beaterGlow ? 1 : 0, transition:"opacity 3s ease-in-out" }}>💀 BEATER 💀</div>}
                          {isOnIce  && <div style={{ fontSize:"11px", letterSpacing:"6px", color:"#64c8ff", marginTop:"6px", opacity: iceGlow ? 1 : 0, transition:"opacity 3s ease-in-out" }}>❄️ ON ICE ❄️</div>}
                          <div style={{ marginTop:(isGrail||isBeater||isOnIce)?"6px":"0", fontSize:"13px", letterSpacing:"3px", color: isGrail && grailReveal ? "#FFD700" : isBeater && beaterGlow ? "#b45014" : isOnIce && iceGlow ? "#64c8ff" : "#fff", transition:"color 3s ease-in-out" }}>
                            {shoeName ? `${shoeName} — ${label}` : label}
                          </div>
                          {ogYear && <div style={{ marginTop:"4px", fontSize:"10px", color:"#fff", letterSpacing:"1px" }}>Originally Owned in {ogYear}</div>}
                          {purchaseDate && <div style={{ marginTop:"8px", fontSize:"10px", color:"#aaa", letterSpacing:"1px" }}>Purchase Date: {new Date(purchaseDate+"T00:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"})}</div>}
                          {size && <div style={{ marginTop:"4px", fontSize:"10px", color:"#aaa", letterSpacing:"1px" }}>Size: {size}</div>}
                          <div style={{ marginTop:"4px", fontSize:"10px", color:"#aaa", letterSpacing:"1px" }}>Last Worn: {wearDates.length > 0 ? new Date([...wearDates].sort((a,b) => b>a?1:-1)[0]+"T00:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}) : "Never"}</div>
                          {isMobile && <div style={{ marginTop:"16px", fontSize:"10px", color:"#666", letterSpacing:"2px" }}>TAP TO CLOSE</div>}
                        </div>
                        {/* Story text */}
                        {story && (
                          <div style={{ position:"absolute", width:"100%", opacity: showStory ? 1 : 0, transition:"opacity 2s ease-in-out" }}>
                            <div style={{ fontSize:"13px", color:"#fff", lineHeight:"1.8", letterSpacing:"0.5px" }}>{story}</div>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                )}
              </div>
              <div style={{ fontSize:"11px", color: dark ? "#999" : "#666", marginTop:"4px", maxWidth:width, textAlign:"center", lineHeight:"1.3", wordBreak:"break-word" }}>{label}</div>
            </div>
          ) : (
            <div style={{ textAlign:"center" }}>
              <div style={{ width, height, background: dark ? "#2a2a2a" : "#f5f5f5", display:"flex", alignItems:"center", justifyContent:"center" }}>
                <div style={{ fontSize:"10px", color:"#ccc", letterSpacing:"1px" }}>—</div>
              </div>
              <div style={{ fontSize:"11px", color: dark ? "#999" : "#666", marginTop:"4px", maxWidth:width, textAlign:"center", lineHeight:"1.3", wordBreak:"break-word" }}>{label}</div>
            </div>
          )}
        </div>
      );
    }

    // ── Read-only DisplayCell ────────────────────────────────────────────────
    function DisplayCell({ c, img, hoverImg, isGrail, cellW = 160, cellH = 100, dark = false }) {
      const isMobile    = useIsMobile();
      const [hovered,   setHovered]   = useState(false);
      const [showHover, setShowHover] = useState(false);
      const timerRef     = useRef(null);
      const crossfadeRef = useRef(null);

      const triggerOpen = () => {
        if (!img) return;
        setHovered(true);
        setShowHover(false);
        if (isGrail && hoverImg) {
          crossfadeRef.current = setTimeout(() => setShowHover(true), 200);
        }
      };
      const triggerClose = () => {
        clearTimeout(crossfadeRef.current);
        setHovered(false);
        setShowHover(false);
      };

      const handleMouseEnter = () => { if (isMobile || !img) return; timerRef.current = setTimeout(triggerOpen, 500); };
      const handleMouseLeave = () => { if (isMobile) return; clearTimeout(timerRef.current); triggerClose(); };
      const handleTap        = (e) => { if (!isMobile) return; e.stopPropagation(); hovered ? triggerClose() : triggerOpen(); };

      return (
        <div style={{ width: cellW }}>
          <div onMouseEnter={handleMouseEnter} onMouseLeave={handleMouseLeave} onClick={handleTap}
            style={{
              width: cellW, height: cellH,
              background: c.empty ? (dark?"#2a2a2a":"#f5f5f5") : img ? (dark?"#1a1a1a":"#ffffff") : c.bg,
              border:"none",
              display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
              padding: img ? "0" : "6px", textAlign:"center",
              overflow:"hidden", position:"relative", cursor: img ? "pointer" : "default",
            }}>
            {c.empty
              ? <span style={{color:dark?"#555":"#ddd",fontSize:"18px"}}>·</span>
              : img
                ? <img src={img} alt={c.colorway} style={{ width:"100%", height:"100%", objectFit:"cover", display:"block" }} />
                : <div style={{fontSize:"11px",letterSpacing:"2px",color:c.accent,fontWeight:"bold"}}>{c.label}</div>
            }
            {hovered && img && (
              <div onClick={triggerClose} style={{
                position:"fixed", top:0, left:0, width:"100vw", height:"100vh",
                background:"rgba(0,0,0,0.85)", display:"flex", flexDirection:"column",
                alignItems:"center", justifyContent:"center", zIndex:9999,
                pointerEvents: isMobile ? "auto" : "none",
              }}>
                <div style={{ position:"relative", maxWidth:"90vw", maxHeight:"70vh" }}>
                  <img src={img} alt={c.colorway} style={{ maxWidth:"90vw", maxHeight:"70vh", objectFit:"contain", filter:"drop-shadow(0 0 8px rgba(255,255,255,0.6))", display:"block", opacity:(isGrail&&hoverImg&&showHover)?0:1, transition:"opacity 3s ease-in-out" }} />
                  {isGrail && hoverImg && (
                    <img src={hoverImg} alt={c.colorway} style={{ position:"absolute", top:0, left:0, maxWidth:"90vw", maxHeight:"70vh", objectFit:"contain", filter:"drop-shadow(0 0 30px rgba(255,215,0,0.7)) drop-shadow(0 0 8px rgba(255,255,255,0.6))", opacity:showHover?1:0, transform:showHover?"scale(1)":"scale(0.95)", transition:"opacity 3s ease-in-out, transform 3s ease-in-out" }} />
                  )}
                </div>
                {isGrail && <div style={{ marginTop:"12px", fontSize:"11px", letterSpacing:"6px", color:"#FFD700" }}>✦ GRAIL ✦</div>}
                <div style={{ marginTop:isGrail?"6px":"16px", fontSize:"13px", letterSpacing:"3px", color:isGrail?"#FFD700":c.accent }}>{c.colorway}</div>
                {isMobile && <div style={{ marginTop:"16px", fontSize:"10px", color:"#666", letterSpacing:"2px" }}>TAP TO CLOSE</div>}
              </div>
            )}
          </div>
          {!c.empty && (
            <div style={{ textAlign:"center", marginTop:"4px" }}>
              <div style={{ fontSize:"8px", color: dark ? "#999" : "#666", letterSpacing:"0.5px", overflow:"hidden", whiteSpace:"nowrap", textOverflow:"ellipsis" }}>{c.colorway}</div>
            </div>
          )}
        </div>
      );
    }

    // ── Main App ─────────────────────────────────────────────────────────────
    function App() {
      const dark = useOSDark();
      const T = dark ? DARK : LIGHT;
      const CAT_COLORS = { Jordan: { bg: T.categoryBg, accent: "#e63946" }, Nike: { bg: T.categoryBg, accent: "#e63946" } };
      const isMobile  = useIsMobile();
      const [data,    setData]    = useState(null);
      const [loading, setLoading] = useState(true);
      const [error,   setError]   = useState(null);
      const [view,    setView]    = useState("inventory");
      const [anniversaryDismissed, setAnniversaryDismissed] = useState(false);
      const [bannerShowUpNext, setBannerShowUpNext] = useState(true);

      useEffect(() => {
        const interval = setInterval(() => setBannerShowUpNext(v => !v), 5000);
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        fetch("vault-data.json")
          .then(r => { if (!r.ok) throw new Error("Could not load vault-data.json"); return r.json(); })
          .then(d => { setData(d); setLoading(false); })
          .catch(e => { setError(e.message); setLoading(false); });
      }, []);

      if (loading) return (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", flexDirection:"column", gap:"16px" }}>
          <div style={{ fontSize:"11px", letterSpacing:"4px", color:"#e63946" }}>LOADING THE VAULT...</div>
        </div>
      );

      if (error) return (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", flexDirection:"column", gap:"16px" }}>
          <div style={{ fontSize:"11px", letterSpacing:"4px", color:"#e63946" }}>VAULT UNAVAILABLE</div>
          <div style={{ fontSize:"10px", color:"#aaa" }}>{error}</div>
        </div>
      );

      const { inventory = [], wearLog = {}, images = {}, colorwayMeta = {}, grailMeta = {}, beaterMeta = {}, glowMeta = {}, graveyardMeta = {}, colorways = {}, displayLayout = [] } = data;

      const owned    = inventory.filter(s => !s.wishlist);
      const wishlist = inventory.filter(s =>  s.wishlist);
      const total    = owned.reduce((n, s) => n + s.quantity, 0);
      const filledCells = displayLayout.flat().filter(c => c.code && c.code !== "").length;
      const empty    = 40 - filledCells;

      // Rotation banner
      const allColorwayEntries = owned.flatMap(shoe => {
        const shoeColorways = colorways[shoe.shortName] || [];
        return shoeColorways.map(cw => {
          const entries = (wearLog[shoe.id] || []).filter(e => e.colorway === cw);
          const lastWorn = entries.length ? [...entries].sort((a,b) => a.date < b.date ? 1 : -1)[0].date : null;
          return { shoe, colorway: cw, lastWorn };
        });
      });
      const longestUnwornEntry = allColorwayEntries.reduce((pick, entry) => {
        if (!pick) return entry;
        if (!pick.lastWorn && !entry.lastWorn) return pick;
        if (!entry.lastWorn) return entry;
        if (!pick.lastWorn) return pick;
        return entry.lastWorn < pick.lastWorn ? entry : pick;
      }, null);
      const longestUnworn         = longestUnwornEntry?.shoe || null;
      const longestUnwornColorway = longestUnwornEntry?.colorway || null;
      const longestUnwornLastDate = longestUnwornEntry?.lastWorn || null;

      // Most recently worn
      const mostRecentEntry = allColorwayEntries
        .filter(e => e.lastWorn)
        .reduce((pick, entry) => {
          if (!pick) return entry;
          return entry.lastWorn > pick.lastWorn ? entry : pick;
        }, null);
      const lastWornShoe     = mostRecentEntry?.shoe || null;
      const lastWornColorway = mostRecentEntry?.colorway || null;
      const lastWornDate     = mostRecentEntry?.lastWorn || null;

      // Anniversary computation
      const todayStr = localDateStr();
      const todayMD  = todayStr.slice(5);
      const anniversaries = [];
      Object.entries(colorwayMeta).forEach(([key, meta]) => {
        if (!meta.purchaseDate) return;
        const pd = meta.purchaseDate;
        if (pd.slice(5) !== todayMD) return;
        const years = parseInt(todayStr.slice(0,4)) - parseInt(pd.slice(0,4));
        if (years <= 0) return;
        const underIdx = key.indexOf("_");
        const shoeId = parseInt(key.slice(0, underIdx));
        const colorway = key.slice(underIdx + 1);
        const shoe = inventory.find(s => s.id === shoeId);
        if (!shoe) return;
        anniversaries.push({ shoe, colorway, years });
      });

      const getCellStyle = (cell) => {
        if (!cell.code || cell.code === "" || cell.code === "--") return { empty: true };
        const col = CAT_COLORS[inventory.find(s => s.shortName === cell.code)?.category] || CAT_COLORS.Jordan;
        return { bg: col.bg, accent: col.accent, label: cell.code, colorway: cell.colorway };
      };

      return (
        <div style={{ minHeight:"100vh", background:T.bg }}>
          {/* Header */}
          <div style={{ background:"#000000", borderBottom:"1px solid #222", padding: isMobile ? "8px 16px" : "0", display:"flex", alignItems:"center", justifyContent:"space-between", position:"relative", minHeight: isMobile ? "auto" : "150px" }}>
            <img src="banner.png" alt="Der Ausländer — The Vault" style={{ height: isMobile ? "60px" : "200px", objectFit:"contain", position:"static" }} />
            <div style={{ display:"flex", gap: isMobile ? "16px" : "32px", paddingRight: isMobile ? "16px" : "32px" }}>
              {[["PAIRS", total], ["WISHLIST", wishlist.length]].map(([label, val]) => (
                <div key={label} style={{ textAlign:"center" }}>
                  <div style={{ fontSize: isMobile ? "16px" : "22px", fontWeight:"bold", color:"#e63946" }}>{val}</div>
                  <div style={{ fontSize:"8px", letterSpacing:"3px", color:"#888" }}>{label}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Nav */}
          <div style={{ display:"flex", borderBottom:`1px solid ${T.border}`, background:T.navBg }}>
            {["inventory", ...(isMobile ? [] : ["display"]), "wishlist", ...(Object.keys(graveyardMeta).length > 0 ? ["graveyard"] : []), "about"].map(v => (
              <button key={v} onClick={() => setView(v)} style={{
                padding:"14px 28px", background:view===v?"#e63946":"transparent",
                color:view===v?"#fff":T.text4, border:"none", cursor:"pointer",
                fontSize:"11px", letterSpacing:"4px", textTransform:"uppercase",
                fontFamily:"'Aptos','Segoe UI',sans-serif",
              }}>{v}</button>
            ))}
          </div>

          <div style={{ padding: isMobile ? "16px" : "32px", background:T.bg }}>

            {/* ── INVENTORY ── */}
            {view === "inventory" && (
              <div>
                {/* Anniversary Banner */}
                {!anniversaryDismissed && anniversaries.length > 0 && (() => {
                  function AnniversaryBanner() {
                    const [idx, setIdx] = React.useState(0);
                    React.useEffect(() => {
                      if (anniversaries.length <= 1) return;
                      const interval = setInterval(() => setIdx(i => (i + 1) % anniversaries.length), 4000);
                      return () => clearInterval(interval);
                    }, []);
                    const a = anniversaries[idx];
                    const aImg = images[`${a.shoe.id}_${a.colorway}`] || null;
                    return (
                      <div style={{ background: dark ? "linear-gradient(90deg,#2a2a1a,#2a2700)" : "linear-gradient(90deg,#fffdf0,#fff8d6)", border:"1px solid #FFD700", padding:"16px 24px", marginBottom:"16px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:"16px" }}>
                        <div style={{ display:"flex", alignItems:"center", gap:"16px" }}>
                          {aImg && <img src={aImg} alt={a.colorway} style={{ width:"120px", height:"75px", objectFit:"cover", flexShrink:0 }} />}
                          <div>
                            <div style={{ fontSize:"9px", letterSpacing:"4px", color:"#FFD700", marginBottom:"6px" }}>
                              ✦ PURCHASE ANNIVERSARY {anniversaries.length > 1 ? `(${idx + 1}/${anniversaries.length})` : ""} ✦
                            </div>
                            <div style={{ fontSize:"15px", fontWeight:"bold", color:T.text }}>
                              {a.shoe.name} — {a.colorway}
                            </div>
                            <div style={{ fontSize:"11px", color:T.text5, marginTop:"4px" }}>
                              {a.years} {a.years === 1 ? "year" : "years"} ago today
                            </div>
                          </div>
                        </div>
                        <button onClick={() => setAnniversaryDismissed(true)} style={{ background:"transparent", border:"none", color:T.text7, cursor:"pointer", fontSize:"18px", lineHeight:1, padding:"0", fontFamily:"'Aptos','Segoe UI',sans-serif" }}>✕</button>
                      </div>
                    );
                  }
                  return <AnniversaryBanner />;
                })()}

                {/* Rotation Banner */}
                {longestUnworn && (() => {
                  const isRotationGrail = longestUnwornColorway ? !!grailMeta[`${longestUnworn.id}_${longestUnwornColorway}`] : false;
                  const isRotationOnIce = longestUnwornColorway ? (wearLog[longestUnworn.id] || []).filter(e => e.colorway === longestUnwornColorway).length === 0 : false;
                  const rotationImgKey = `${longestUnworn.id}_${longestUnwornColorway}`;
                  const rotationImg = images[rotationImgKey] || null;
                  const rotationHoverImg = isRotationGrail ? (images[`${rotationImgKey}_hover`] || null) : null;
                  const isLastWornGrail = lastWornColorway ? !!grailMeta[`${lastWornShoe?.id}_${lastWornColorway}`] : false;
                  const lastWornImg = lastWornShoe ? images[`${lastWornShoe.id}_${lastWornColorway}`] || null : null;
                  const bannerBg = isRotationGrail
                    ? dark ? "linear-gradient(90deg,#2a2a1a,#2a2700)" : "linear-gradient(90deg,#fffcf0,#fff8d6)"
                    : dark ? `linear-gradient(90deg,${T.bg2},${T.bg3})` : "linear-gradient(90deg,#fff5f5,#ffe8e8)";
                  const bannerBorder = isRotationGrail ? "#FFD700" : "#e63946";
                  const isRotationGlow = dark && !!glowMeta[rotationImgKey];
                  const imgFilter = isRotationGrail
                    ? "drop-shadow(0 0 12px rgba(255,215,0,0.6))"
                    : dark && isRotationOnIce
                    ? "drop-shadow(0 0 14px rgba(100,200,255,0.7))"
                    : isRotationGlow
                    ? "drop-shadow(0 0 14px rgba(255,255,255,0.5))"
                    : "none";
                  const sortedQueue = [...allColorwayEntries].sort((a, b) => {
                    if (!a.lastWorn && !b.lastWorn) return 0;
                    if (!a.lastWorn) return -1;
                    if (!b.lastWorn) return 1;
                    return a.lastWorn < b.lastWorn ? -1 : 1;
                  });
                  const upcomingQueue = sortedQueue.slice(1, 5);
                  return (
                    <div style={{ marginBottom:"24px" }}>
                      <div style={{ background: bannerBg, border:`1px solid ${bannerBorder}`, padding:"16px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:"16px", position:"relative", minHeight:"107px" }}>
                        {/* UP NEXT */}
                        <div style={{ display:"flex", alignItems:"center", gap:"16px", position:"absolute", opacity: bannerShowUpNext ? 1 : 0, transition:"opacity 1s ease-in-out", pointerEvents: bannerShowUpNext ? "auto" : "none" }}>
                          {rotationImg && (() => {
                            function RotationImg() {
                              const [showAlt, setShowAlt] = React.useState(false);
                              React.useEffect(() => {
                                if (!rotationHoverImg) return;
                                const interval = setInterval(() => setShowAlt(v => !v), 5000);
                                return () => clearInterval(interval);
                              }, []);
                              return (
                                <div style={{ position:"relative", width:"120px", height:"75px", flexShrink:0 }}>
                                  <img src={rotationImg} alt={longestUnwornColorway} style={{ position:"absolute", top:0, left:0, width:"120px", height:"75px", objectFit:"cover", filter: imgFilter, opacity: rotationHoverImg && showAlt ? 0 : 1, transition:"opacity 2s ease-in-out" }} />
                                  {rotationHoverImg && <img src={rotationHoverImg} alt={longestUnwornColorway} style={{ position:"absolute", top:0, left:0, width:"120px", height:"75px", objectFit:"cover", filter: imgFilter, opacity: showAlt ? 1 : 0, transition:"opacity 2s ease-in-out" }} />}
                                </div>
                              );
                            }
                            return <RotationImg />;
                          })()}
                          <div>
                            <div style={{ fontSize:"9px", letterSpacing:"4px", color:"#e63946", marginBottom:"4px" }}>
                              {isRotationGrail
                                ? <span><span style={{color:"#FFD700"}}>✦</span> GRAIL UP NEXT <span style={{color:"#FFD700"}}>✦</span></span>
                                : isRotationOnIce
                                ? <span><span style={{color:"#64c8ff"}}>❄️</span> TIME TO TAKE THEM OFF ICE? <span style={{color:"#64c8ff"}}>❄️</span></span>
                                : "UP NEXT FOR ROTATION"}
                            </div>
                            <div style={{ fontSize: isMobile ? "13px" : "16px", fontWeight:"bold", color:T.text }}>
                              {isRotationGrail
                                ? <span><span style={{color:"#FFD700"}}>✦</span> {longestUnworn.name}{longestUnwornColorway ? ` — ${longestUnwornColorway}` : ""} <span style={{color:"#FFD700"}}>✦</span></span>
                                : isRotationOnIce
                                ? <span><span style={{color:"#64c8ff"}}>❄️</span> {longestUnworn.name}{longestUnwornColorway ? ` — ${longestUnwornColorway}` : ""} <span style={{color:"#64c8ff"}}>❄️</span></span>
                                : `${longestUnworn.name}${longestUnwornColorway ? ` — ${longestUnwornColorway}` : ""}`}
                            </div>
                            <div style={{ fontSize:"10px", color:T.text3, marginTop:"2px" }}>
                              {longestUnwornLastDate ? `Last worn: ${longestUnwornLastDate}` : "Never worn"}
                            </div>
                          </div>
                        </div>
                        {/* LAST WORN */}
                        {lastWornShoe && (
                          <div style={{ display:"flex", alignItems:"center", gap:"16px", position:"absolute", opacity: bannerShowUpNext ? 0 : 1, transition:"opacity 1s ease-in-out", pointerEvents: bannerShowUpNext ? "none" : "auto" }}>
                            {lastWornImg && <img src={lastWornImg} alt={lastWornColorway} style={{ width:"120px", height:"75px", objectFit:"cover", flexShrink:0, filter: isLastWornGrail ? "drop-shadow(0 0 12px rgba(255,215,0,0.6))" : "none" }} />}
                            <div>
                              <div style={{ fontSize:"9px", letterSpacing:"4px", color:"#e63946", marginBottom:"4px" }}>
                                {isLastWornGrail ? <span><span style={{color:"#FFD700"}}>✦</span> LAST WORN <span style={{color:"#FFD700"}}>✦</span></span> : "LAST WORN"}
                              </div>
                              <div style={{ fontSize: isMobile ? "13px" : "16px", fontWeight:"bold", color: isLastWornGrail ? "#FFD700" : T.text }}>
                                {lastWornShoe.name}{lastWornColorway ? ` — ${lastWornColorway}` : ""}
                              </div>
                              <div style={{ fontSize:"10px", color:T.text3, marginTop:"2px" }}>{lastWornDate}</div>
                            </div>
                          </div>
                        )}
                        <div style={{ marginLeft:"auto" }} />
                      </div>
                      {upcomingQueue.length > 0 && (
                        <div style={{ background: T.bg2, border:"1px solid #e63946", borderTop:"none", padding:"10px 24px", display:"flex", gap:"16px", alignItems:"center" }}>
                          <div style={{ fontSize:"8px", letterSpacing:"3px", color:"#e63946", flexShrink:0 }}>COMING UP</div>
                          <div style={{ display:"flex", gap:"8px", alignItems:"center" }}>
                            {upcomingQueue.map((entry, i) => {
                              const qImg = images[`${entry.shoe.id}_${entry.colorway}`] || null;
                              return qImg ? (
                                <img key={i} src={qImg} alt={entry.colorway} title={`${entry.shoe.name} — ${entry.colorway}`} style={{ width:"48px", height:"30px", objectFit:"cover" }} />
                              ) : null;
                            })}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })()}
                <div style={{ display:"flex", flexWrap:"wrap", gap:"12px", alignItems:"flex-start" }}>
                {owned.map(shoe => {
                  const col = CAT_COLORS[shoe.category] || CAT_COLORS.Jordan;
                  const shoeColorways = colorways[shoe.shortName] || [];
                  const perRow = isMobile ? shoeColorways.length : Math.min(shoeColorways.length, 5);
                  const imgW = isMobile ? 72 : 120;
                  const imgH = Math.round(imgW * 0.625);
                  const cardMinW = isMobile ? "100%" : Math.max(240, perRow * (imgW + 16) + 32);
                  return (
                    <div key={shoe.id} style={{ background:T.cardBg, border:`1px solid ${T.border}`, minWidth: cardMinW, maxWidth: isMobile ? "100%" : cardMinW, flex: isMobile ? "1 1 100%" : "0 1 auto" }}>
                      <div style={{ padding: isMobile ? "16px" : "16px 16px 0 16px", marginBottom: isMobile ? "0" : "8px" }}>
                        <div style={{ fontSize:"14px", color:T.text, fontWeight:"bold", whiteSpace: isMobile ? "normal" : "nowrap" }}>
                          {shoe.name}{shoe.quantity > 1 ? ` — ${shoe.quantity} pairs` : ""}
                        </div>
                      </div>
                      <div style={{ padding: isMobile ? "0 16px 16px 16px" : "0 16px 16px 16px", height: isMobile ? "auto" : "240px", overflow: isMobile ? "visible" : "hidden" }}>
                      <div style={{ display:"flex", flexWrap:"wrap", gap:"8px", maxWidth: isMobile ? "100%" : perRow * (imgW + 8) + "px" }}>
                        {shoeColorways.map(cw => {
                          const metaKey = `${shoe.id}_${cw}`;
                          const meta    = colorwayMeta[metaKey] || {};
                          return (
                            <ImageSlot key={cw}
                              img={images[metaKey] || null}
                              hoverImg={images[`${metaKey}_hover`] || null}
                              label={cw}
                              accent={col.accent}
                              width={imgW}
                              height={imgH}
                              isGrail={!!grailMeta[metaKey]}
                              isBeater={!!beaterMeta[metaKey]}
                              isOnIce={(wearLog[shoe.id] || []).filter(e => e.colorway === cw).length === 0}
                              shoeName={shoe.name}
                              dark={dark}
                              purchaseDate={meta.purchaseDate || null}
                              size={meta.size || null}
                              ogYear={meta.ogYear || null}
                              story={meta.story || null}
                              wearDates={(wearLog[shoe.id] || []).filter(e => e.colorway === cw).map(e => e.date)}
                            />
                          );
                        })}
                      </div>
                      </div>
                    </div>
                  );
                })}
              </div>
              </div>
            )}

            {/* ── DISPLAY ── */}
            {view === "display" && (() => {
              const gridW = 5 * 160 + 4 * 6; // 824px
              const availW = Math.min(window.innerWidth - 64, 1200);
              const scale = availW < gridW ? availW / gridW : 1;
              return (
              <div>
                <div style={{ fontSize:"9px", letterSpacing:"4px", color:T.text6, marginBottom:"16px" }}>MY COLLECTION · AS CURRENTLY DISPLAYED IN MY OFFICE</div>
                <div style={{ transformOrigin:"top left", transform:`scale(${scale})`, width: gridW + "px", height: Math.round((8 * 100 + 7 * 6 + 8 * 20) * scale) + "px" }}>
                <div style={{ display:"inline-grid", gridTemplateColumns:"repeat(5, 160px)", gap:"6px" }}>
                {displayLayout.map((row, ri) => row.map((cell, ci) => {
                  const c    = getCellStyle(cell);
                  const shoe = !c.empty ? inventory.find(s => s.shortName === cell.code) : null;
                  const img      = shoe ? images[`${shoe.id}_${cell.colorway}`]         : null;
                  const hoverImg = shoe ? images[`${shoe.id}_${cell.colorway}_hover`]   : null;
                  const isGrail  = shoe ? !!grailMeta[`${shoe.id}_${cell.colorway}`]    : false;
                  return <DisplayCell key={`${ri}-${ci}`} c={c} img={img} hoverImg={hoverImg} isGrail={isGrail} cellW={160} cellH={100} dark={dark} />;
                }))}
                </div>
                </div>
              </div>
              );
            })()}

            {/* ── WISHLIST ── */}
            {view === "wishlist" && (
              <div style={{ display:"flex", flexWrap:"wrap", gap:"12px", alignItems:"flex-start" }}>
                {wishlist.length === 0
                  ? <div style={{ fontSize:"11px", letterSpacing:"4px", color:T.text5 }}>NOTHING ON THE WISHLIST</div>
                  : wishlist.map(shoe => {
                      const col = CAT_COLORS[shoe.category] || CAT_COLORS.Jordan;
                      const shoeColorways = colorways[shoe.shortName] || [];
                      const imgW = isMobile ? 72 : (shoeColorways.length === 1 ? 120 : shoeColorways.length <= 3 ? 96 : 80);
                      const imgH = Math.round(imgW * 0.625);
                      const cardMinW = isMobile ? "100%" : Math.max(200, shoeColorways.length * (imgW + 16) + 32);
                      return (
                        <div key={shoe.id} style={{ background:T.cardBg, border:`1px solid ${T.border}`, padding:"16px", minWidth: cardMinW, flex: isMobile ? "1 1 100%" : "0 1 auto" }}>
                          <div style={{ fontSize:"14px", color:T.text, fontWeight:"bold", marginBottom:"12px" }}>{shoe.name}</div>
                          <div style={{ display:"flex", flexWrap:"wrap", gap:"8px" }}>
                            {shoeColorways.map(cw => {
                              const metaKey = `${shoe.id}_${cw}`;
                              const meta    = colorwayMeta[metaKey] || {};
                              return (
                                <ImageSlot key={cw}
                                  img={images[metaKey] || null}
                                  label={cw}
                                  accent={col.accent}
                                  width={imgW}
                                  height={imgH}
                                  isGrail={!!grailMeta[metaKey]}
                                  purchaseDate={meta.purchaseDate || null}
                                  size={meta.size || null}
                                  ogYear={meta.ogYear || null}
                                  dark={dark}
                                />
                              );
                            })}
                          </div>
                        </div>
                      );
                    })
                }
              </div>
            )}

            {/* ── GRAVEYARD ── */}
            {view === "graveyard" && (() => {
              const entries = Object.entries(graveyardMeta);
              const grails  = entries.filter(([,e]) => e.isGrail && !e.isBeater);
              const beaters = entries.filter(([,e]) => e.isBeater);
              const regular = entries.filter(([,e]) => !e.isGrail && !e.isBeater);
              const SectionHeader = ({ label, color }) => (
                <div style={{ fontSize:"10px", letterSpacing:"4px", color, marginBottom:"16px", marginTop:"8px" }}>{label}</div>
              );
              const GraveyardCardPublic = ({ entry }) => {
                const [hovered,    setHovered]    = useState(false);
                const [showHover,  setShowHover]  = useState(false);
                const [glowOn,     setGlowOn]     = useState(false);
                const timerRef     = React.useRef(null);
                const crossfadeRef = React.useRef(null);
                const glowRef      = React.useRef(null);
                const purchaseDate = entry.purchaseDate ? new Date(entry.purchaseDate+"T00:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}) : null;
                const retireDate   = entry.retireDate   ? new Date(entry.retireDate+"T00:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}) : null;
                const glowColor  = entry.isGrail ? "rgba(255,215,0,0.7)" : entry.isBeater ? "rgba(180,80,20,0.8)" : "rgba(150,150,150,0.6)";

                const triggerOpen = () => {
                  if (!entry.img) return;
                  setHovered(true); setShowHover(false); setGlowOn(false);
                  if (entry.isGrail && entry.hoverImg) {
                    crossfadeRef.current = setTimeout(() => { setShowHover(true); setGlowOn(true); }, 200);
                  } else {
                    glowRef.current = setTimeout(() => setGlowOn(true), 200);
                  }
                };
                const triggerClose = () => {
                  clearTimeout(crossfadeRef.current); clearTimeout(glowRef.current);
                  setHovered(false); setShowHover(false); setGlowOn(false);
                };
                const handleMouseEnter = () => { if (isMobile) return; timerRef.current = setTimeout(triggerOpen, 500); };
                const handleMouseLeave = () => { if (isMobile) return; clearTimeout(timerRef.current); triggerClose(); };
                const handleTap = (e) => { if (!isMobile) return; e.stopPropagation(); hovered ? triggerClose() : triggerOpen(); };

                return (
                  <div style={{ background: dark ? T.cardBg : "#f9f9f9", border:`1px solid ${T.border}`, padding:"16px", width: isMobile ? "140px" : "200px", flex:"0 0 auto" }}>
                    <div style={{ position:"relative", width: isMobile ? "108px" : "168px", height: isMobile ? "68px" : "105px", marginBottom:"10px" }}>
                      {entry.img ? (
                        <>
                          <img src={entry.img} alt={entry.colorway}
                            onMouseEnter={handleMouseEnter} onMouseLeave={handleMouseLeave} onClick={handleTap}
                            style={{ width:"100%", height:"100%", objectFit:"cover", display:"block", cursor:"zoom-in",
                              filter: glowOn ? `drop-shadow(0 0 20px ${glowColor})` : "none",
                              opacity: entry.isGrail && entry.hoverImg && showHover ? 0 : 1,
                              transition:"opacity 3s ease-in-out, filter 3s ease-in-out" }} />
                          {entry.isGrail && entry.hoverImg && (
                            <img src={entry.hoverImg} alt={entry.colorway}
                              onMouseEnter={handleMouseEnter} onMouseLeave={handleMouseLeave} onClick={handleTap}
                              style={{ position:"absolute", top:0, left:0, width:"100%", height:"100%", objectFit:"cover",
                                filter:`drop-shadow(0 0 20px ${glowColor})`,
                                opacity: showHover ? 1 : 0, transform: showHover ? "scale(1)" : "scale(0.95)",
                                transition:"opacity 3s ease-in-out, transform 3s ease-in-out" }} />
                          )}
                        </>
                      ) : (
                        <div style={{ width:"100%", height:"100%", background:T.bg3, display:"flex", alignItems:"center", justifyContent:"center" }}>
                          <span style={{ fontSize:"32px" }}>🪦</span>
                        </div>
                      )}
                      {hovered && entry.img && (
                        <div onClick={triggerClose} style={{ position:"fixed", top:0, left:0, width:"100vw", height:"100vh", background:"rgba(0,0,0,0.85)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", zIndex:9999, pointerEvents: isMobile ? "auto" : "none" }}>
                          <div style={{ position:"relative", width: isMobile ? "90vw" : "50vw", maxWidth:"600px", display:"flex", flexDirection:"column", alignItems:"center" }}>
                            <div style={{ position:"relative", width:"100%", display:"flex", justifyContent:"center" }}>
                              <img src={entry.img} alt={entry.colorway} style={{ maxWidth: isMobile ? "90vw" : "50vw", maxHeight:"40vh", objectFit:"contain", filter:"drop-shadow(0 0 8px rgba(255,255,255,0.4))", display:"block", opacity: entry.isGrail && entry.hoverImg && showHover ? 0 : 1, transition:"opacity 3s ease-in-out" }} />
                              {entry.isGrail && entry.hoverImg && (
                                <img src={entry.hoverImg} alt={entry.colorway} style={{ position:"absolute", top:0, left:"50%", transform: showHover ? "translateX(-50%) scale(1)" : "translateX(-50%) scale(0.95)", maxWidth: isMobile ? "90vw" : "50vw", maxHeight:"40vh", objectFit:"contain", filter:`drop-shadow(0 0 20px ${glowColor})`, opacity: showHover ? 1 : 0, transition:"opacity 3s ease-in-out, transform 3s ease-in-out" }} />
                              )}
                            </div>
                            <div style={{ width:"100%", marginTop:"16px", textAlign:"center" }}>
                              {entry.isGrail && <div style={{ fontSize:"11px", letterSpacing:"6px", color:"#FFD700", marginBottom:"6px", opacity: glowOn ? 1 : 0, transition:"opacity 3s ease-in-out" }}>✦ R.I.P. ✦</div>}
                              <div style={{ fontSize:"13px", letterSpacing:"3px", color: entry.isGrail && glowOn ? "#FFD700" : entry.isBeater && glowOn ? "#b45014" : "#fff", transition:"color 3s ease-in-out" }}>{entry.shoeName} — {entry.colorway}</div>
                              {(purchaseDate || retireDate) && <div style={{ marginTop:"8px", fontSize:"10px", color:"#aaa", letterSpacing:"1px" }}>🪦 {purchaseDate || "?"} — {retireDate || "?"} 🪦</div>}
                              {entry.story && <div style={{ marginTop:"12px", fontSize:"13px", color:"#fff", lineHeight:"1.8", letterSpacing:"0.5px" }}>{entry.story}</div>}
                              {isMobile && <div style={{ marginTop:"16px", fontSize:"10px", color:"#666", letterSpacing:"2px" }}>TAP TO CLOSE</div>}
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                    <div style={{ fontSize:"11px", fontWeight:"bold", color: T.text, marginBottom:"2px", textAlign:"center" }}>{entry.shoeName}</div>
                    <div style={{ fontSize:"10px", color: T.text4, textAlign:"center" }}>{entry.colorway}</div>
                  </div>
                );
              };
              return (
                <div>
                  {grails.length > 0 && (
                    <div style={{ marginBottom:"32px" }}>
                      <SectionHeader label="✦ RETIRED GRAILS ✦" color="#FFD700" />
                      <div style={{ display:"flex", flexWrap:"wrap", gap:"12px" }}>{grails.map(([k,e]) => <GraveyardCardPublic key={k} entry={e} />)}</div>
                    </div>
                  )}
                  {regular.length > 0 && (
                    <div style={{ marginBottom:"32px" }}>
                      <SectionHeader label="🪦 RETIRED" color={T.text4} />
                      <div style={{ display:"flex", flexWrap:"wrap", gap:"12px" }}>{regular.map(([k,e]) => <GraveyardCardPublic key={k} entry={e} />)}</div>
                    </div>
                  )}
                  {beaters.length > 0 && (
                    <div style={{ marginBottom:"32px" }}>
                      <SectionHeader label="💀 RETIRED BEATERS 💀" color="#b45014" />
                      <div style={{ display:"flex", flexWrap:"wrap", gap:"12px" }}>{beaters.map(([k,e]) => <GraveyardCardPublic key={k} entry={e} />)}</div>
                    </div>
                  )}
                </div>
              );
            })()}

            {/* ── ABOUT ── */}
            {view === "about" && (
              <div style={{ maxWidth:"640px", margin:"0 auto", padding:"16px 0" }}>
                <div style={{ fontSize:"11px", letterSpacing:"4px", color:"#e63946", marginBottom:"32px" }}>ABOUT THE VAULT</div>
                <p style={{ fontSize:"15px", color:T.text2, lineHeight:"2", marginBottom:"24px", fontStyle:"italic" }}>
                  The first time I saw the Air Jordan 4 sitting in the window of my local shoe store, I was hooked. Every trip to the mall meant one thing: making my way to Foot Locker and staring at the shoes worn by my favorite athletes — Michael Jordan, Andre Agassi, and Bo Jackson. I'd stand there daydreaming about the day I could own all of them.
                </p>
                <p style={{ fontSize:"15px", color:T.text2, lineHeight:"2", marginBottom:"24px", fontStyle:"italic" }}>
                  In 2023, I decided to make that childhood dream a reality.
                </p>
                <p style={{ fontSize:"15px", color:T.text2, lineHeight:"2", fontStyle:"italic" }}>
                  This collection is for that 10 year old boy who never stopped looking through the glass.
                </p>
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
