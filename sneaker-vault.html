<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Vault — Sneaker Collection</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 680 680' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='680' height='680' fill='%23000000' rx='80'/%3E%3Ccircle cx='340' cy='340' r='280' fill='none' stroke='%23e63946' stroke-width='24'/%3E%3Ccircle cx='340' cy='340' r='180' fill='none' stroke='%23e63946' stroke-width='16'/%3E%3Ccircle cx='340' cy='340' r='60' fill='%23e63946'/%3E%3Cline x1='340' y1='60' x2='340' y2='160' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Cline x1='340' y1='520' x2='340' y2='620' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Cline x1='60' y1='340' x2='160' y2='340' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Cline x1='520' y1='340' x2='620' y2='340' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Cline x1='143' y1='143' x2='213' y2='213' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Cline x1='467' y1='467' x2='537' y2='537' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Cline x1='537' y1='143' x2='467' y2='213' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Cline x1='143' y1='537' x2='213' y2='467' stroke='%23e63946' stroke-width='20' stroke-linecap='round'/%3E%3Ccircle cx='340' cy='340' r='24' fill='%23000000'/%3E%3Ccircle cx='340' cy='340' r='12' fill='%23e63946'/%3E%3C/svg%3E" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #ffffff; font-family: 'Aptos', 'Segoe UI', sans-serif; color: #111111; transition: background 0.3s, color 0.3s; }
    body.dark { background: #1a1a1a; color: #f0f0f0; }
    input[type=date]::-webkit-calendar-picker-indicator { filter: none; }
    body.dark input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f0f0f0; }
    body.dark ::-webkit-scrollbar-track { background: #2a2a2a; }
    ::-webkit-scrollbar-thumb { background: #ccc; }
    body.dark ::-webkit-scrollbar-thumb { background: #555; }
    select option { background: #ffffff; color: #111; }
    body.dark select option { background: #2a2a2a; color: #f0f0f0; }
    @keyframes fadeInTitle {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes saleGlow {
      0%, 100% { box-shadow: 0 0 4px rgba(230,180,0,0.4); }
      50%       { box-shadow: 0 0 14px rgba(230,180,0,0.9); }
    }
    @keyframes prismaticGlow {
      0%   { filter: drop-shadow(0 0 35px rgba(184,240,255,0.8)) drop-shadow(0 0 12px rgba(255,255,255,0.7)); }
      20%  { filter: drop-shadow(0 0 35px rgba(184,240,255,0.8)) drop-shadow(0 0 12px rgba(255,255,255,0.7)); }
      45%  { filter: drop-shadow(0 0 35px rgba(255,255,255,0.9)) drop-shadow(0 0 12px rgba(220,220,255,0.7)); }
      75%  { filter: drop-shadow(0 0 35px rgba(200,180,255,0.8)) drop-shadow(0 0 12px rgba(255,255,255,0.7)); }
      100% { filter: drop-shadow(0 0 35px rgba(184,240,255,0.8)) drop-shadow(0 0 12px rgba(255,255,255,0.7)); }
    }
    @keyframes diamondReveal {
      0%   { filter: blur(8px) drop-shadow(0 0 35px rgba(184,240,255,0.8)) drop-shadow(0 0 12px rgba(255,255,255,0.7)); }
      100% { filter: blur(0px) drop-shadow(0 0 35px rgba(184,240,255,0.8)) drop-shadow(0 0 12px rgba(255,255,255,0.7)); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ═══════════════════════════════════════════════════════════════════════════
    // ADMIN_MODE — true for local admin app, false for public site
    // build.bat flips this to false when generating index.html
    // ═══════════════════════════════════════════════════════════════════════════
    const ADMIN_MODE = true;

    const { useState, useEffect, useRef } = React;

    const LIGHT = {
      bg: "#faf8f5", bg2: "#f5f2ee", bg3: "#ede9e3", bg4: "#e8e3dc",
      border: "#ddd8d0", border2: "#c8c2b8",
      text: "#1a1612", text2: "#2e2a24", text3: "#4a4540", text4: "#6b6560", text5: "#8c8680", text6: "#aaa49e", text7: "#c4beb8", text8: "#dedad4",
      navBg: "#f0ece6", cardBg: "#ffffff",
      inputBg: "#f0ece6", inputBorder: "#c8c2b8", inputText: "#1a1612",
      overlayText: "#fff",
      categoryBg: "#fff4f2",
    };
    const DARK = {
      bg: "#1a1a1a", bg2: "#222222", bg3: "#2a2a2a", bg4: "#2f2f2f",
      border: "#333333", border2: "#444444",
      text: "#f0f0f0", text2: "#d0d0d0", text3: "#b0b0b0", text4: "#999", text5: "#888", text6: "#777", text7: "#666", text8: "#444",
      navBg: "#111111", cardBg: "#222222",
      inputBg: "#2a2a2a", inputBorder: "#444", inputText: "#f0f0f0",
      overlayText: "#fff",
      categoryBg: "#2a1a1a",
      cardText: "#f0f0f0", cardText2: "#d0d0d0", cardText3: "#b0b0b0", cardText4: "#999999", cardText5: "#888888", cardText6: "#777777", cardText7: "#666666",
    };

    const useDarkMode = (isAdmin) => {
      const [dark, setDark] = useState(() => {
        if (isAdmin) {
          try { return localStorage.getItem("vault_dark") === "true"; } catch { return false; }
        }
        return window.matchMedia("(prefers-color-scheme: dark)").matches;
      });
      useEffect(() => {
        document.body.classList.toggle("dark", dark);
        if (isAdmin) {
          try { localStorage.setItem("vault_dark", dark); } catch {}
        }
      }, [dark]);
      useEffect(() => {
        if (isAdmin) return;
        const mq = window.matchMedia("(prefers-color-scheme: dark)");
        const handler = e => setDark(e.matches);
        mq.addEventListener("change", handler);
        return () => mq.removeEventListener("change", handler);
      }, []);
      return [dark, setDark];
    };

    const useIsMobile = () => {
      const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
      useEffect(() => {
        const handler = () => setIsMobile(window.innerWidth < 768);
        window.addEventListener("resize", handler);
        return () => window.removeEventListener("resize", handler);
      }, []);
      return isMobile;
    };

    // ── Anniversary check helper ─────────────────────────────────────────
    const isAnniversaryToday = (purchaseDate) => {
      if (!purchaseDate) return false;
      const todayStr = localDateStr();
      const todayMD = todayStr.slice(5);
      if (purchaseDate.slice(5) !== todayMD) return false;
      const years = parseInt(todayStr.slice(0,4)) - parseInt(purchaseDate.slice(0,4));
      return years > 0;
    };

    // ── New pickup check helper (within 7 days of purchase) ───────────────
    const isNewPickupCheck = (purchaseDate) => {
      if (!purchaseDate) return false;
      const today = new Date(localDateStr() + "T00:00:00").getTime();
      const purchase = new Date(purchaseDate + "T00:00:00").getTime();
      const diff = today - purchase;
      return diff >= 0 && diff <= 7 * 86400000;
    };


    const load = (key, fallback) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } };
    const save = (key, val) => { if (!ADMIN_MODE) return; try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) { console.error(e); } };
    const localDateStr = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
    const formatDate = (iso) => iso ? new Date(iso+"T00:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}) : null;

    // ── Tier System ──────────────────────────────────────────────────────
    const TIERS = {
      diamond:  { label: "✦ DIAMOND ✦",    color: "#b8f0ff", glowRgba: "rgba(184,240,255,0.8)", ripLabel: "✦ R.I.P. ✦" },
      platinum: { label: "✦ PLATINUM ✦",   color: "#C0C0C0", glowRgba: "rgba(192,192,192,0.7)", ripLabel: "✦ R.I.P. ✦" },
      gold:     { label: "✦ GOLD ✦",       color: "#FFD700", glowRgba: null,                     ripLabel: "✦ R.I.P. ✦" },
      silver:   { label: null,              color: null,      glowRgba: null,                     ripLabel: null },
      bronze:   { label: "💀 BRONZE 💀",   color: "#CD7F32", glowRgba: "rgba(180,80,20,0.8)",   ripLabel: "💀 R.I.P. 💀" },
    };
    const TIER_OPTIONS = ["diamond","platinum","gold","silver","bronze"];
    const tierOf = (tierMeta, key) => tierMeta[key] || "silver";
    const tierHasCrossfade = (tier) => tier === "diamond" || tier === "platinum";
    const tierExcludedFromRotation = (tier) => tier === "bronze";
    const tierAnniversaryColor = (tier) => tier === "diamond" ? "#b8f0ff" : tier === "platinum" ? "#C0C0C0" : tier === "gold" ? "#FFD700" : tier === "bronze" ? "#CD7F32" : "#aaa";

    // One-time migration from grailMeta/beaterMeta to tierMeta
    const migrateTiers = (inventory, colorways, grailMeta, beaterMeta) => {
      const tierMeta = {};
      inventory.forEach(shoe => {
        (colorways[shoe.shortName] || []).forEach(cw => {
          const key = `${shoe.id}_${cw}`;
          if (grailMeta[key]) tierMeta[key] = "diamond";
          else if (beaterMeta[key]) tierMeta[key] = "bronze";
          else tierMeta[key] = "silver";
        });
      });
      return tierMeta;
    };

    function SaleCountdown({ saleDate, saleTime }) {
      const [now, setNow] = useState(Date.now());
      useEffect(() => {
        const interval = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(interval);
      }, []);
      const target = new Date(`${saleDate}T${saleTime || "00:00"}`).getTime();
      const diff = target - now;
      if (diff <= 0) return <span style={{ fontSize:"10px", letterSpacing:"2px", color:"#e6b800", fontWeight:"bold" }}>LIVE NOW</span>;
      const days = Math.floor(diff / 86400000);
      const hrs  = Math.floor((diff % 86400000) / 3600000);
      const mins = Math.floor((diff % 3600000) / 60000);
      const secs = Math.floor((diff % 60000) / 1000);
      return (
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:"2px" }}>
          <div style={{ fontSize:"9px", letterSpacing:"3px", color:"#e6b800", marginBottom:"2px" }}>DROPS IN</div>
          <div style={{ display:"flex", gap:"6px", alignItems:"baseline" }}>
            {days > 0 && <div style={{ textAlign:"center" }}>
              <div style={{ fontSize:"16px", fontWeight:"bold", color:"#e6b800", fontVariantNumeric:"tabular-nums" }}>{days}</div>
              <div style={{ fontSize:"7px", letterSpacing:"1px", color:"#999" }}>DAY{days !== 1 ? "S" : ""}</div>
            </div>}
            <div style={{ textAlign:"center" }}>
              <div style={{ fontSize:"16px", fontWeight:"bold", color:"#e6b800", fontVariantNumeric:"tabular-nums" }}>{String(hrs).padStart(2,"0")}</div>
              <div style={{ fontSize:"7px", letterSpacing:"1px", color:"#999" }}>HR</div>
            </div>
            <div style={{ textAlign:"center" }}>
              <div style={{ fontSize:"16px", fontWeight:"bold", color:"#e6b800", fontVariantNumeric:"tabular-nums" }}>{String(mins).padStart(2,"0")}</div>
              <div style={{ fontSize:"7px", letterSpacing:"1px", color:"#999" }}>MIN</div>
            </div>
            <div style={{ textAlign:"center" }}>
              <div style={{ fontSize:"16px", fontWeight:"bold", color:"#e6b800", fontVariantNumeric:"tabular-nums" }}>{String(secs).padStart(2,"0")}</div>
              <div style={{ fontSize:"7px", letterSpacing:"1px", color:"#999" }}>SEC</div>
            </div>
          </div>
        </div>
      );
    }

    function ImageSlot({ img, hoverImg, img3, label, accent, bg, onUpload, onClear, width = 96, height = 60, wearDates = [], tier = "silver", purchaseDate = null, size = null, ogYear = null, story = null, isOnIce = false, dark = false, shoeName = null, isMobilePublic = false, isNewPickup = false }) {
      const fileRef = useRef();
      const [hovered, setHovered] = useState(false);
      const [showHover, setShowHover] = useState(false);
      const [tierGlow, setTierGlow] = useState(false);
      const [tierReveal, setTierReveal] = useState(false);
      const [showStory, setShowStory] = useState(false);
      const [showTriptych, setShowTriptych] = useState(false);
      const [triptychVisible, setTriptychVisible] = useState(false);
      const [iceGlow, setIceGlow] = useState(false);
      const overlayBg = "rgba(0,0,0,0.85)";
      const timerRef = useRef(null);
      const crossfadeRef = useRef(null);
      const tierRef = useRef(null);
      const storyRef = useRef(null);
      const triptychRef = useRef(null);
      const iceRef = useRef(null);
      const hasTriptych = tier === "diamond" && hoverImg && img3 && !isMobilePublic;

      const tierInfo = TIERS[tier] || TIERS.silver;
      const hasCrossfade = tierHasCrossfade(tier);
      const isAnniversary = isAnniversaryToday(purchaseDate);
      const shouldCrossfade = hoverImg && (hasCrossfade || isAnniversary);
      const anniversaryGlow = !hasCrossfade && isAnniversary && shouldCrossfade;

      // Diamond crossfade: scale(0.9) rotate(-3deg) → scale(1) rotate(0) over 4s
      // Platinum crossfade: scale(0.95) → scale(1) over 3s
      const crossfadeTransformStart = tier === "diamond" ? "translateX(-50%) scale(0.8) rotate(-3deg)" : "translateX(-50%) scale(0.95)";
      const crossfadeTransformEnd = tier === "diamond" ? "translateX(-50%) scale(1) rotate(0deg)" : "translateX(-50%) scale(1)";
      const crossfadeDuration = tier === "diamond" ? "4s" : "3s";

      const triggerOpen = () => {
        if (!img) return;
        setHovered(true);
        setShowHover(false);
        setTierGlow(false);
        setTierReveal(false);
        setShowStory(false);
        setShowTriptych(false);
        setTriptychVisible(false);
        setIceGlow(false);
        // Preload all images up front so triptych has no load-time shift
        if (hasTriptych) {
          [img, hoverImg, img3].forEach(src => { if (src) { const i = new Image(); i.src = src; } });
        }
        if (hasCrossfade && shouldCrossfade) {
          crossfadeRef.current = setTimeout(() => { setShowHover(true); setTierReveal(true);
            if (hasTriptych) {
              triptychRef.current = setTimeout(() => {
                setShowTriptych(true);
                setShowStory(true);
                requestAnimationFrame(() => requestAnimationFrame(() => setTriptychVisible(true)));
              }, 5000);
            } else if (story) {
              storyRef.current = setTimeout(() => setShowStory(true), 5000);
            }
          }, 200);
        } else if (tierInfo.label) {
          tierRef.current = setTimeout(() => { setTierReveal(true);
            if (story) storyRef.current = setTimeout(() => setShowStory(true), 5000);
          }, 200);
        } else if (shouldCrossfade) {
          crossfadeRef.current = setTimeout(() => { setShowHover(true);
            if (story) storyRef.current = setTimeout(() => setShowStory(true), 5000);
          }, 200);
        } else if (story) {
          storyRef.current = setTimeout(() => setShowStory(true), 5000);
        }
        if (tierInfo.glowRgba) {
          tierRef.current = setTimeout(() => setTierGlow(true), 200);
        }
        if (isOnIce) {
          iceRef.current = setTimeout(() => setIceGlow(true), 200);
        }
      };
      const triggerClose = () => {
        clearTimeout(crossfadeRef.current);
        clearTimeout(tierRef.current);
        clearTimeout(storyRef.current);
        clearTimeout(triptychRef.current);
        clearTimeout(iceRef.current);
        setHovered(false);
        setShowHover(false);
        setTierGlow(false);
        setTierReveal(false);
        setShowStory(false);
        setShowTriptych(false);
        setTriptychVisible(false);
        setIceGlow(false);
      };
      const handleMouseEnter = () => { if (isMobilePublic) return; timerRef.current = setTimeout(triggerOpen, 500); };
      const handleMouseLeave = () => { if (isMobilePublic) return; clearTimeout(timerRef.current); triggerClose(); };
      const handleTap = (e) => { if (!isMobilePublic) return; e.stopPropagation(); hovered ? triggerClose() : triggerOpen(); };

      useEffect(() => {
        return () => {
          clearTimeout(timerRef.current);
          clearTimeout(crossfadeRef.current);
          clearTimeout(tierRef.current);
          clearTimeout(storyRef.current);
          clearTimeout(triptychRef.current);
          clearTimeout(iceRef.current);
        };
      }, []);

      const sortedDates = [...wearDates].sort((a, b) => b > a ? 1 : -1);

      // Glow filter for main image
      const mainGlowFilter = tierInfo.glowRgba && tierGlow
        ? `drop-shadow(0 0 30px ${tierInfo.glowRgba}) drop-shadow(0 0 8px rgba(255,255,255,0.3))`
        : isOnIce && iceGlow
        ? "drop-shadow(0 0 30px rgba(100,200,255,0.8)) drop-shadow(0 0 8px rgba(255,255,255,0.3))"
        : "drop-shadow(0 0 8px rgba(255,255,255,0.6))";

      // Crossfade glow — diamond uses prismatic via CSS animation, others use tier color
      const crossfadeGlow = tier === "diamond"
        ? "drop-shadow(0 0 30px rgba(184,240,255,0.7)) drop-shadow(0 0 8px rgba(255,255,255,0.6))"
        : tierInfo.glowRgba
        ? `drop-shadow(0 0 30px ${tierInfo.glowRgba}) drop-shadow(0 0 8px rgba(255,255,255,0.6))`
        : "drop-shadow(0 0 30px rgba(255,255,255,0.5)) drop-shadow(0 0 8px rgba(255,255,255,0.6))";

      // Name color on hover
      const nameColor = tierInfo.color && tierReveal ? tierInfo.color : isOnIce && iceGlow ? "#64c8ff" : anniversaryGlow && showHover ? "#FFD700" : isNewPickup ? "#FFD700" : "#fff";

      return (
        <div style={{ position:"relative", display:"inline-block" }}>
          {img ? (
            <div style={{ textAlign:"center" }}>
              <div style={{ position:"relative", display:"inline-block", width, height, overflow:"hidden", background: dark ? "#222222" : "#ffffff" }}>
                <img
                  src={img} alt={label}
                  onMouseEnter={handleMouseEnter}
                  onMouseLeave={handleMouseLeave}
                  onClick={handleTap}
                  style={{ width, height, objectFit:"contain", border:"none", display:"block", cursor: isMobilePublic ? "pointer" : "zoom-in", transition:"opacity 0.15s" }}
                />
                {hovered && (
                  <div onClick={triggerClose} style={{
                    position:"fixed", top:0, left:0, width:"100vw", height:"100vh",
                    background: overlayBg, display:"flex", flexDirection:"column",
                    alignItems:"center", justifyContent:"center", zIndex:9999,
                    pointerEvents: isMobilePublic ? "auto" : "none",
                  }}>
                    {/* ── UNIFIED OVERLAY — triptych and single view coexist, no layout swap ── */}
                    <div style={{ display:"flex", flexDirection:"column", alignItems:"center" }}>
                      {/* Image row — fixed size always, flanking images absolute so they never affect layout */}
                      <div style={{ position:"relative", width:"100vw", height:"42vh", display:"flex", alignItems:"center", justifyContent:"center" }}>
                        {/* Left — img1, fades in at Act 3 */}
                        {hasTriptych && (
                          <div style={{ position:"absolute", right:"calc(50% + 20vw)", top:"50%", transform: triptychVisible ? "translateY(-50%)" : "translateY(-50%) translateX(-80px)", opacity: triptychVisible ? 1 : 0, transition:"opacity 3s ease-out 0.05s, transform 3s ease-out 0.05s", pointerEvents:"none" }}>
                            <img src={img} alt={label} style={{ maxWidth:"25vw", maxHeight:"35vh", objectFit:"contain", animation: triptychVisible ? "prismaticGlow 2.5s ease-in-out -1s infinite" : "none", display:"block" }} />
                          </div>
                        )}
                        {/* Center — always visible, never moves */}
                        <div style={{ position:"relative" }}>
                          <img src={img} alt={label} style={{ maxWidth: isMobilePublic ? "90vw" : "50vw", maxHeight:"40vh", objectFit:"contain", filter: mainGlowFilter, display:"block", opacity: (shouldCrossfade && showHover) ? 0 : 1, transition:`opacity ${crossfadeDuration} ease-in-out, filter 3s ease-in-out` }} />
                          {shouldCrossfade && (
                            <img src={hoverImg} alt={label} style={{ position:"absolute", top:0, left:"50%", transform: showHover ? crossfadeTransformEnd : crossfadeTransformStart, maxWidth: isMobilePublic ? "90vw" : "50vw", maxHeight:"40vh", objectFit:"contain", filter: tier !== "diamond" ? crossfadeGlow : undefined, animation: tier === "diamond" && showHover ? "diamondReveal 4s ease-out forwards, prismaticGlow 2.5s ease-in-out 4s infinite" : "none", opacity: showHover ? 1 : 0, transition:`opacity ${crossfadeDuration} ease-in-out, transform ${crossfadeDuration} ease-in-out` }} />
                          )}
                        </div>
                        {/* Right — img3, fades in at Act 3 */}
                        {hasTriptych && (
                          <div style={{ position:"absolute", left:"calc(50% + 20vw)", top:"50%", transform: triptychVisible ? "translateY(-50%)" : "translateY(-50%) translateX(80px)", opacity: triptychVisible ? 1 : 0, transition:"opacity 3s ease-out 0.05s, transform 3s ease-out 0.05s", pointerEvents:"none" }}>
                            <img src={img3} alt={label} style={{ maxWidth:"25vw", maxHeight:"35vh", objectFit:"contain", animation: triptychVisible ? "prismaticGlow 2.5s ease-in-out -1s infinite" : "none", display:"block" }} />
                          </div>
                        )}
                      </div>
                      {/* Text area — fixed height, always reserved so center never shifts */}
                      <div style={{ height:"80px", width:"100%", textAlign:"center", position:"relative" }}>
                        {/* Act 1+2 metadata — fades out when story/triptych arrives */}
                        <div style={{ position:"absolute", width:"100%", opacity: showStory ? 0 : 1, transition:"opacity 1s ease-in-out" }}>
                          {tierInfo.label && <div style={{ fontSize:"11px", letterSpacing:"6px", color: tierInfo.color, opacity: tierReveal ? 1 : 0, transition:"opacity 3s ease-in-out" }}>{tierInfo.label}</div>}
                          {isOnIce && <div style={{ fontSize:"11px", letterSpacing:"6px", color:"#64c8ff", marginTop:"6px", opacity: iceGlow ? 1 : 0, transition:"opacity 3s ease-in-out" }}>❄️ ON ICE ❄️</div>}
                          {anniversaryGlow && <div style={{ fontSize:"11px", letterSpacing:"6px", color: tierAnniversaryColor(tier), marginTop:"6px", opacity: showHover ? 1 : 0, transition:"opacity 3s ease-in-out" }}>✦ ANNIVERSARY ✦</div>}
                          {isNewPickup && tier === "silver" && <div style={{ fontSize:"11px", letterSpacing:"6px", color:"#FFD700", marginTop:"6px" }}>✦ NEW PICKUP ✦</div>}

                          {isMobilePublic && <div style={{ marginTop:"16px", fontSize:"10px", color:"#666", letterSpacing:"2px" }}>TAP TO CLOSE</div>}
                        </div>
                        {/* Act 2 story / Act 3 story+triptych label — fades in */}

                          </div>

                      </div>
                    </div>

              </div>
              <div style={{ fontSize:"11px", color:"#666", marginTop:"4px", maxWidth:width, textAlign:"center", lineHeight:"1.3", wordBreak:"break-word" }}>{label}{isNewPickup && <span style={{ fontSize:"9px", letterSpacing:"2px", color:"#FFD700", fontWeight:"bold", marginLeft:"5px" }}>NEW</span>}</div>
              
            </div>
          ) : (
            <div style={{ textAlign:"center" }}>
              <div onClick={() => fileRef.current.click()} title={`Upload: ${label}`} style={{
                width, height, background:bg, border:`1px dashed ${accent}`,
                display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                cursor:"pointer",
              }}>
                <div style={{ fontSize:"18px", color:accent, lineHeight:1 }}>+</div>
              </div>
              <div style={{ fontSize:"11px", color:"#666", marginTop:"4px", maxWidth:width, textAlign:"center", lineHeight:"1.3", wordBreak:"break-word" }}>{label}</div>
              
            </div>
          )}
          <input ref={fileRef} type="file" accept="image/*" style={{ display:"none" }}
            onChange={e => { if (e.target.files[0]) onUpload(e.target.files[0]); e.target.value = ""; }} />
        </div>
      );
    }

    function DisplayCell({ c, img, hoverImg, ri, onEdit, isEditing, tier = "silver", dark = false, isMobilePublic = false, isWishlist = false }) {
      const [hovered, setHovered] = useState(false);
      const [showHover, setShowHover] = useState(false);
      const timerRef = useRef(null);
      const crossfadeRef = useRef(null);
      const hasCrossfade = tierHasCrossfade(tier);
      const tierInfo = TIERS[tier] || TIERS.silver;

      const triggerOpen = () => {
        if (!img) return;
        setHovered(true);
        setShowHover(false);
        if (hasCrossfade && hoverImg) {
          crossfadeRef.current = setTimeout(() => setShowHover(true), 200);
        }
      };
      const triggerClose = () => {
        clearTimeout(crossfadeRef.current);
        setHovered(false);
        setShowHover(false);
      };
      const handleMouseEnter = () => { if (isMobilePublic || !img) return; timerRef.current = setTimeout(triggerOpen, 500); };
      const handleMouseLeave = () => { if (isMobilePublic) return; clearTimeout(timerRef.current); triggerClose(); };
      const handleTap = (e) => { if (!isMobilePublic) return; e.stopPropagation(); hovered ? triggerClose() : triggerOpen(); };

      useEffect(() => {
        return () => {
          clearTimeout(timerRef.current);
          clearTimeout(crossfadeRef.current);
        };
      }, []);

      return (
        <div
          onClick={ADMIN_MODE ? onEdit : undefined}
          style={{ width:"160px", cursor: ADMIN_MODE ? "pointer" : "default", perspective:"800px", paddingTop:"4px" }}>
          <div style={{ position:"relative", transformStyle:"preserve-3d", transform:"rotateX(2deg)" }}>
            {/* Top face of acrylic case */}
            <div style={{
              position:"absolute", top:0, left:0, width:"160px", height:"12px",
              background: dark
                ? "linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%)"
                : "linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.4) 100%)",
              transform:"rotateX(70deg)", transformOrigin:"top center",
              borderTop: dark ? "1px solid rgba(255,255,255,0.12)" : "1px solid rgba(255,255,255,0.8)",
              borderLeft: dark ? "1px solid rgba(255,255,255,0.06)" : "1px solid rgba(255,255,255,0.5)",
              borderRight: dark ? "1px solid rgba(255,255,255,0.06)" : "1px solid rgba(255,255,255,0.5)",
              pointerEvents:"none", zIndex:2,
            }} />
            {/* Front face */}
            <div
              onMouseEnter={handleMouseEnter}
              onMouseLeave={handleMouseLeave}
              onClick={handleTap}
              style={{
                width:"160px", height:"100px",
                background: c.empty ? (dark ? "#2a2a2a" : "#f5f5f5") : img ? (dark ? "#1a1a1a" : "#ffffff") : c.bg,
                border: isEditing ? "2px solid #f4a261"
                  : isWishlist ? "1px dashed #e63946"
                  : dark ? "1px solid rgba(255,255,255,0.1)" : "1px solid rgba(0,0,0,0.08)",
                borderBottom: dark ? "2px solid rgba(255,255,255,0.06)" : "2px solid rgba(0,0,0,0.1)",
                display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                padding: img ? "0" : "6px", textAlign:"center",
                overflow:"hidden", position:"relative",
                cursor: isMobilePublic && img ? "pointer" : undefined,
                boxShadow: dark
                  ? "0 4px 12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05)"
                  : "0 4px 12px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.8)",
              }}>
              {/* Acrylic reflection highlight */}
              <div style={{
                position:"absolute", top:0, left:0, width:"100%", height:"100%",
                background: dark
                  ? "linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 40%, transparent 60%, rgba(255,255,255,0.02) 100%)"
                  : "linear-gradient(135deg, rgba(255,255,255,0.6) 0%, transparent 40%, transparent 60%, rgba(255,255,255,0.15) 100%)",
                pointerEvents:"none", zIndex:1,
              }} />
            {c.empty
              ? <span style={{color: dark ? "#555" : "#ddd",fontSize:"18px"}}>·</span>
              : img
                  ? <img src={img} alt={c.colorway} style={{ width:"100%", height:"100%", objectFit:"cover", objectPosition:"bottom", display:"block" }} />
                  : <>
                      <div style={{fontSize:"11px",letterSpacing:"2px",color:c.accent,fontWeight:"bold"}}>{c.label}</div>
                    </>
            }
          </div>
          </div>
          {hovered && img && ReactDOM.createPortal(
              <div onClick={triggerClose} style={{
                position:"fixed", top:0, left:0, width:"100vw", height:"100vh",
                background:"rgba(0,0,0,0.85)", display:"flex", flexDirection:"column",
                alignItems:"center", justifyContent:"center", zIndex:9999, pointerEvents: isMobilePublic ? "auto" : "none",
              }}>
                <div style={{ position:"relative", maxWidth: isMobilePublic ? "90vw" : "60vw", maxHeight: isMobilePublic ? "70vh" : "60vh" }}>
                  <img src={img} alt={c.colorway} style={{ maxWidth: isMobilePublic ? "90vw" : "60vw", maxHeight: isMobilePublic ? "70vh" : "60vh", objectFit:"contain", filter:"drop-shadow(0 0 8px rgba(255,255,255,0.6))", display:"block", opacity: (hasCrossfade && hoverImg && showHover) ? 0 : 1, transition:"opacity 3s ease-in-out" }} />
                  {hasCrossfade && hoverImg && (
                    <img src={hoverImg} alt={c.colorway} style={{ position:"absolute", top:0, left:0, maxWidth: isMobilePublic ? "90vw" : "60vw", maxHeight: isMobilePublic ? "70vh" : "60vh", objectFit:"contain", filter: tierInfo.glowRgba ? `drop-shadow(0 0 30px ${tierInfo.glowRgba}) drop-shadow(0 0 8px rgba(255,255,255,0.6))` : "drop-shadow(0 0 8px rgba(255,255,255,0.6))", opacity: showHover ? 1 : 0, transform: showHover ? "scale(1)" : "scale(0.95)", transition:"opacity 3s ease-in-out, transform 3s ease-in-out" }} />
                  )}
                </div>
                {tierInfo.label && <div style={{ marginTop:"12px", fontSize:"11px", letterSpacing:"6px", color: tierInfo.color }}>{tierInfo.label}</div>}
                <div style={{ marginTop: tierInfo.label ? "6px" : "16px", fontSize:"13px", letterSpacing:"3px", color: tierInfo.color || c.accent }}>{c.colorway}</div>
                {isMobilePublic && <div style={{ marginTop:"16px", fontSize:"10px", color:"#666", letterSpacing:"2px" }}>TAP TO CLOSE</div>}
              </div>,
          document.body)}
          {!c.empty && (
            <div style={{ textAlign:"center", marginTop:"4px" }}>
              <div style={{ fontSize:"8px", color: dark ? "#999" : "#666", letterSpacing:"0.5px", overflow:"hidden", whiteSpace:"nowrap", textOverflow:"ellipsis" }}>{c.colorway}</div>
            </div>
          )}
        </div>
      );
    }

    function GraveyardCard({ entryKey, entry, T, CT, dark, setColorways, setGraveyardMeta, isMobilePublic = false }) {
      const [hovered,    setHovered]    = useState(false);
      const [showHover,  setShowHover]  = useState(false);
      const [glowOn,     setGlowOn]     = useState(false);
      const timerRef     = useRef(null);
      const crossfadeRef = useRef(null);
      const glowRef      = useRef(null);

      const entryTier = entry.tier || (entry.isGrail ? "diamond" : entry.isBeater ? "bronze" : "silver");
      const tierInfo = TIERS[entryTier] || TIERS.silver;
      const hasCrossfade = tierHasCrossfade(entryTier);
      const glowColor  = tierInfo.glowRgba || "rgba(150,150,150,0.6)";
      const purchaseDate = entry.purchaseDate ? new Date(entry.purchaseDate+"T00:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}) : null;
      const retireDate   = entry.retireDate   ? new Date(entry.retireDate+"T00:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}) : null;

      const triggerOpen = () => {
        if (!entry.img) return;
        setHovered(true); setShowHover(false); setGlowOn(false);
        if (hasCrossfade && entry.hoverImg) {
          crossfadeRef.current = setTimeout(() => { setShowHover(true); }, 200);
          glowRef.current = setTimeout(() => setGlowOn(true), 1500);
        } else {
          glowRef.current = setTimeout(() => setGlowOn(true), 1500);
        }
      };
      const triggerClose = () => {
        clearTimeout(crossfadeRef.current); clearTimeout(glowRef.current);
        setHovered(false); setShowHover(false); setGlowOn(false);
      };
      const handleMouseEnter = () => { if (isMobilePublic) return; if (!entry.img) return; timerRef.current = setTimeout(triggerOpen, 500); };
      const handleMouseLeave = () => { if (isMobilePublic) return; clearTimeout(timerRef.current); triggerClose(); };
      const handleTap = (e) => { if (!isMobilePublic) return; e.stopPropagation(); hovered ? triggerClose() : triggerOpen(); };

      useEffect(() => {
        return () => {
          clearTimeout(timerRef.current);
          clearTimeout(crossfadeRef.current);
          clearTimeout(glowRef.current);
        };
      }, []);

      const cardW = isMobilePublic ? "140px" : "200px";
      const imgW = isMobilePublic ? "108px" : "168px";
      const imgH = isMobilePublic ? "68px" : "105px";
      const ghostFilter = "grayscale(0.4) sepia(0.6) hue-rotate(170deg) saturate(1.5) brightness(1.3)";
      const normalFilter = "grayscale(0) sepia(0) hue-rotate(0deg) saturate(1) brightness(1)";
      const ghostGlow = "drop-shadow(0 0 25px rgba(120,160,220,0.5)) drop-shadow(0 0 60px rgba(100,140,200,0.3))";
      const normalGlow = "drop-shadow(0 0 8px rgba(255,255,255,0.4)) drop-shadow(0 0 0px rgba(100,140,200,0))";

      return (
        <div style={{ background: dark ? T.cardBg : "#f9f9f9", border:`1px solid ${T.border}`, padding:"16px", width: cardW, flex:"0 0 auto" }}>
          {/* Image */}
          <div style={{ position:"relative", width: imgW, height: imgH, marginBottom:"10px" }}>
            {entry.img ? (
              <>
                <img src={entry.img} alt={entry.colorway} onMouseEnter={handleMouseEnter} onMouseLeave={handleMouseLeave} onClick={handleTap}
                  style={{ width: imgW, height: imgH, objectFit:"cover", display:"block", cursor: isMobilePublic ? "pointer" : "zoom-in",
                    filter: glowOn ? `drop-shadow(0 0 20px ${glowColor})` : "none",
                    opacity: hasCrossfade && entry.hoverImg && showHover ? 0 : 1,
                    transition:"opacity 3s ease-in-out, filter 3s ease-in-out" }} />
                {hasCrossfade && entry.hoverImg && (
                  <img src={entry.hoverImg} alt={entry.colorway} onMouseEnter={handleMouseEnter} onMouseLeave={handleMouseLeave} onClick={handleTap}
                    style={{ position:"absolute", top:0, left:0, width: imgW, height: imgH, objectFit:"cover",
                      filter:`drop-shadow(0 0 20px ${glowColor})`,
                      opacity: showHover ? 1 : 0, transform: showHover ? "scale(1)" : "scale(0.95)",
                      transition:"opacity 3s ease-in-out, transform 3s ease-in-out" }} />
                )}
              </>
            ) : (
              <div style={{ width: imgW, height: imgH, background:T.bg3, display:"flex", alignItems:"center", justifyContent:"center" }}>
                <span style={{ fontSize:"32px" }}>🪦</span>
              </div>
            )}
            {/* Hover overlay */}
            {hovered && entry.img && (
              <div onClick={triggerClose} style={{ position:"fixed", top:0, left:0, width:"100vw", height:"100vh", background:"rgba(0,0,0,0.85)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", zIndex:9999, pointerEvents: isMobilePublic ? "auto" : "none" }}>
                <div style={{ position:"relative", width: isMobilePublic ? "90vw" : "50vw", maxWidth:"600px", display:"flex", flexDirection:"column", alignItems:"center" }}>
                  <div style={{ position:"relative", width:"100%", display:"flex", justifyContent:"center" }}>
                    <img src={entry.img} alt={entry.colorway} style={{ maxWidth: isMobilePublic ? "90vw" : "50vw", maxHeight:"40vh", objectFit:"contain", filter: glowOn ? `${ghostFilter} ${ghostGlow}` : `${normalFilter} ${normalGlow}`, display:"block", opacity: hasCrossfade && entry.hoverImg && showHover ? 0 : 1, transition:"filter 5s ease-in-out, opacity 5s ease-in-out" }} />
                    {hasCrossfade && entry.hoverImg && (
                      <img src={entry.hoverImg} alt={entry.colorway} style={{ position:"absolute", top:0, left:"50%", transform: showHover ? "translateX(-50%) scale(1)" : "translateX(-50%) scale(0.95)", maxWidth: isMobilePublic ? "90vw" : "50vw", maxHeight:"40vh", objectFit:"contain", filter: `${ghostFilter} ${ghostGlow}`, opacity: showHover ? 1 : 0, transition:"opacity 5s ease-in-out, transform 5s ease-in-out" }} />
                    )}
                  </div>
                  <div style={{ width:"100%", marginTop:"16px", textAlign:"center" }}>
                    {tierInfo.ripLabel && <div style={{ fontSize:"11px", letterSpacing:"6px", color: tierInfo.color, marginBottom:"6px", opacity: glowOn ? 1 : 0, transition:"opacity 3s ease-in-out" }}>{tierInfo.ripLabel}</div>}
                    <div style={{ fontSize:"13px", letterSpacing:"3px", color: tierInfo.color && glowOn ? tierInfo.color : "#fff", transition:"color 3s ease-in-out" }}>{entry.shoeName} — {entry.colorway}</div>
                    {(purchaseDate || retireDate) && (
                      <div style={{ marginTop:"8px", fontSize:"10px", color:"#aaa", letterSpacing:"1px" }}>
                        🪦 {purchaseDate || "?"} — {retireDate || "?"} 🪦
                      </div>
                    )}
                    {entry.story && (
                      <div style={{ marginTop:"12px", fontSize:"13px", color:"#fff", lineHeight:"1.8", letterSpacing:"0.5px" }}>{entry.story}</div>
                    )}
                    {isMobilePublic && <div style={{ marginTop:"16px", fontSize:"10px", color:"#666", letterSpacing:"2px" }}>TAP TO CLOSE</div>}
                  </div>
                </div>
              </div>
            )}
          </div>
          <div style={{ fontSize:"11px", fontWeight:"bold", color: CT.text, marginBottom:"2px", textAlign:"center" }}>{entry.shoeName}</div>
          <div style={{ fontSize:"10px", color: CT.text4, textAlign:"center" }}>{entry.colorway}</div>
          {ADMIN_MODE && <button onClick={() => { if (window.confirm(`Restore ${entry.shoeName} — ${entry.colorway} to your collection?`)) {
            setColorways(cws => ({ ...cws, [entry.shortName]: [...(cws[entry.shortName]||[]), entry.colorway] }));
            setGraveyardMeta(g => { const n={...g}; delete n[entryKey]; return n; });
          }}} style={{ marginTop:"10px", background:"transparent", border:`1px solid ${T.border2}`, color:T.text5, padding:"3px 8px", cursor:"pointer", fontSize:"8px", letterSpacing:"2px", fontFamily:"'Aptos','Segoe UI',sans-serif" }}>RESTORE</button>}
        </div>
      );
    }

    function MetaEditForm({ editingMeta, metaForm, setMetaForm, setColorwayMeta, setEditingMeta, tierMeta, setTierMeta, setGlowMeta, glowMeta, setImages, images, handleImageUpload, setRetiringMeta, setRetireForm, IS, CT, T, dark, isWishlist = false, colorwayWishlist = {}, setColorwayWishlist = null }) {

                  {hover2Val

                    : <div style={{ width:"80px", height:"50px", background: dark ? "#2a2a2a" : "#f0f0f0", border:"1px dashed #b8f0ff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"18px", color:"#b8f0ff", cursor:"pointer" }}
                        onClick={() => hover2InputEl && hover2InputEl.click()}>+</div>

                  <div style={{ display:"flex", flexDirection:"column", gap:"6px" }}>
                    <button onClick={() => hover2InputEl && hover2InputEl.click()}
                      style={{ background:"transparent", border:"1px solid #b8f0ff", color:"#b8f0ff", padding:"4px 10px", cursor:"pointer", fontSize:"9px", letterSpacing:"2px", fontFamily:"'Aptos','Segoe UI',sans-serif" }}>
                      {hover2Val ? "REPLACE" : "UPLOAD"}
                    </button>
                    {hover2Val && (
                      <button onClick={() => setImages(imgs => { const n={...imgs}; delete n[hover2Key]; return n; })}
                        style={{ background:"transparent", border:"1px solid #bbb", color:CT.text7, padding:"4px 10px", cursor:"pointer", fontSize:"9px", letterSpacing:"2px", fontFamily:"'Aptos','Segoe UI',sans-serif" }}>
                        REMOVE
                      </button>

                  </div>
                </div>
                <div style={{ fontSize:"8px", color: CT.text6, marginTop:"4px", letterSpacing:"1px" }}>Appears alongside img 1 & 2 when story reveals</div>
                <input ref={el => hover2InputEl = el} type="file" accept="image/*" style={{ display:"none" }}
                  onChange={e => {
                    const file = e.target.files[0];
                    if (!file) return;
                    handleImageUpload(editingMeta.shoeId, editingMeta.colorway, file, "hover2");
                    e.target.value = "";
                  }} />
              </div>
            );
          })()}
          {/* Fields */}
          {isWishlist ? (
            <div style={{ display:"flex", gap:"8px", flexWrap:"wrap", alignItems:"flex-end" }}>
              {[["DATE","date","purchaseDate"],["PRICE","text","purchasePrice"],["RETAILER","text","retailer"],["SIZE","text","size"],["NOTES","text","notes"]].map(([label,type,field]) => (
                <div key={field} style={{ flex:"1 1 80px" }}>
                  <div style={{ fontSize:"9px", letterSpacing:"2px", color:T.text5, marginBottom:"4px" }}>{label}</div>
                  <input type={type} value={metaForm[field]} onChange={e => setMetaForm(f => ({...f,[field]:e.target.value}))} style={{...IS, fontSize:"11px", padding:"5px"}} />
                </div>
              ))}
            </div>
          ) : (
            <>
              <div style={{ display:"flex", gap:"8px", flexWrap:"wrap", alignItems:"flex-end" }}>
                <div style={{ flex:"0 0 130px" }}>
                  <div style={{ fontSize:"9px", letterSpacing:"2px", color:CT.text5, marginBottom:"4px" }}>PURCHASE DATE</div>
                  <input type="date" value={metaForm.purchaseDate} onChange={e => setMetaForm(f => ({...f, purchaseDate:e.target.value}))} style={{...IS, fontSize:"11px", padding:"5px"}} />
                </div>
                <div style={{ flex:"0 0 100px" }}>
                  <div style={{ fontSize:"9px", letterSpacing:"2px", color:CT.text5, marginBottom:"4px" }}>PRICE</div>
                  <input type="text" placeholder="$0.00" value={metaForm.purchasePrice} onChange={e => setMetaForm(f => ({...f, purchasePrice:e.target.value}))} style={{...IS, fontSize:"11px", padding:"5px"}} />
                </div>
                <div style={{ flex:"1 1 140px" }}>
                  <div style={{ fontSize:"9px", letterSpacing:"2px", color:CT.text5, marginBottom:"4px" }}>RETAILER</div>
                  <input type="text" placeholder="e.g. SNKRS, GOAT" value={metaForm.retailer} onChange={e => setMetaForm(f => ({...f, retailer:e.target.value}))} style={{...IS, fontSize:"11px", padding:"5px"}} />
                </div>
                <div style={{ flex:"0 0 65px" }}>
                  <div style={{ fontSize:"9px", letterSpacing:"2px", color:CT.text5, marginBottom:"4px" }}>SIZE</div>
                  <input type="text" placeholder="12.5" value={metaForm.size} onChange={e => setMetaForm(f => ({...f, size:e.target.value}))} style={{...IS, fontSize:"11px", padding:"5px"}} />
                </div>
                <div style={{ flex:"0 0 65px" }}>
                  <div style={{ fontSize:"9px", letterSpacing:"2px", color:CT.text5, marginBottom:"4px" }}>OG YEAR</div>
                  <input type="text" placeholder="1995" value={metaForm.ogYear} onChange={e => setMetaForm(f => ({...f, ogYear:e.target.value}))} style={{...IS, fontSize:"11px", padding:"5px"}} />
                </div>
                <div style={{ flex:"1 1 160px" }}>
                  <div style={{ fontSize:"9px", letterSpacing:"2px", color:CT.text5, marginBottom:"4px" }}>NOTES</div>
                  <input type="text" placeholder="Any notes..." value={metaForm.notes} onChange={e => setMetaForm(f => ({...f, notes:e.target.value}))} style={{...IS, fontSize:"11px", padding:"5px"}} />
                </div>
              </div>
              <div style={{ marginTop:"10px" }}>
                <div style={{ fontSize:"9px", letterSpacing:"2px", color:CT.text5, marginBottom:"4px" }}>STORY</div>
                <textarea placeholder="Tell the story of this shoe..." value={metaForm.story} onChange={e => setMetaForm(f => ({...f, story:e.target.value}))}
                  style={{...IS, fontSize:"11px", padding:"5px", minHeight:"80px", resize:"vertical", width:"100%"}} />
              </div>
            </>
          )}
          {/* Sale date/time — wishlist only */}
          {isWishlist && (
            <div style={{ display:"flex", gap:"8px", flexWrap:"wrap", alignItems:"flex-end", marginTop:"8px" }}>
              <div style={{ flex:"1 1 120px" }}>
                <div style={{ fontSize:"9px", letterSpacing:"2px", color:"#e63946", marginBottom:"4px" }}>🛒 SALE DATE</div>
                <input type="date" value={metaForm.saleDate} onChange={e => setMetaForm(f => ({...f, saleDate:e.target.value}))} style={{...IS, fontSize:"11px", padding:"5px"}} />
              </div>
              <div style={{ flex:"1 1 100px" }}>
                <div style={{ fontSize:"9px", letterSpacing:"2px", color:"#e63946", marginBottom:"4px" }}>🛒 SALE TIME</div>
                <input type="time" value={metaForm.saleTime} onChange={e => setMetaForm(f => ({...f, saleTime:e.target.value}))} style={{...IS, fontSize:"11px", padding:"5px"}} />
              </div>
            </div>
          )}
          {/* Action buttons */}
          <div style={{ display:"flex", gap:"8px", marginTop:"10px", flexWrap:"wrap" }}>
            <button onClick={() => {
              setColorwayMeta(m => ({ ...m, [key]: { ...metaForm } }));
              setEditingMeta(null);
            }} style={{ background:"#e63946", color:"#fff", border:"none", padding:"6px 14px", cursor:"pointer", fontSize:"10px", letterSpacing:"2px", fontFamily:"'Aptos','Segoe UI',sans-serif", whiteSpace:"nowrap" }}>SAVE</button>
            <button onClick={() => setEditingMeta(null)} style={btnStyle}>CANCEL</button>
            {images[key] && (
              <button onClick={() => {
                setImages(imgs => { const n={...imgs}; delete n[key]; return n; });
                setEditingMeta(null);
              }} style={btnStyle}>REMOVE PHOTO</button>
            )}
            {!isWishlist && setColorwayWishlist && (() => {
              const isOnWishlist = !!colorwayWishlist[key];
              return (
                <button onClick={() => {
                  setColorwayWishlist(w => { const n={...w}; if (isOnWishlist) delete n[key]; else n[key]=true; return n; });
                  setEditingMeta(null);
                }} style={{ background:"transparent", border:"1px solid #4cc9f0", color:"#4cc9f0", padding:"6px 14px", cursor:"pointer", fontSize:"10px", letterSpacing:"2px", fontFamily:"'Aptos','Segoe UI',sans-serif", whiteSpace:"nowrap" }}>
                  {isOnWishlist ? "↩ MOVE TO COLLECTION" : "★ MOVE TO WISHLIST"}
                </button>
              );
            })()}
            {!isWishlist && (
              <button onClick={() => {
                setRetiringMeta({ shoeId: editingMeta.shoeId, colorway: editingMeta.colorway });
                setRetireForm({ reason:"Sold", dateRetired: localDateStr(), story:"" });
                setEditingMeta(null);
              }} style={{ background:"transparent", border:"1px solid #888", color:"#888", padding:"6px 14px", cursor:"pointer", fontSize:"10px", letterSpacing:"2px", fontFamily:"'Aptos','Segoe UI',sans-serif", whiteSpace:"nowrap" }}>🪦 RETIRE</button>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const isMobile = useIsMobile();
      const isMobilePublic = !ADMIN_MODE && isMobile;
      const [dark, setDark] = useDarkMode(ADMIN_MODE);
      const T = dark ? DARK : LIGHT;
      // CT = card text colors (always dark on light cards, light on dark cards)
      const CT = dark ? T : { text:"#111", text2:"#333", text3:"#555", text4:"#666", text5:"#888", text6:"#aaa", text7:"#bbb", text8:"#ddd", border:`1px solid #e0e0e0`, border2:"#ccc" };
      // ── Public data loading ──────────────────────────────────────────────
      const [publicData, setPublicData] = useState(null);
      const [publicLoading, setPublicLoading] = useState(!ADMIN_MODE);
      const [publicError, setPublicError] = useState(null);

      useEffect(() => {
        if (ADMIN_MODE) return;
        fetch("vault-data.json")
          .then(r => { if (!r.ok) throw new Error("Could not load vault-data.json"); return r.json(); })
          .then(d => { setPublicData(d); setPublicLoading(false); })
          .catch(e => { setPublicError(e.message); setPublicLoading(false); });
      }, []);

      const [inventory,    setInventory]    = useState(() => ADMIN_MODE ? load("vault_inventory", []) : []);
      const importRef = useRef();
      const [importMsg, setImportMsg] = useState(null);
      const [wearLog,        setWearLog]        = useState(() => ADMIN_MODE ? load("vault_wearlog_v3", {}) : {});
      const [images,         setImages]         = useState(() => ADMIN_MODE ? load("vault_images", {}) : {});
      const [colorwayMeta,   setColorwayMeta]   = useState(() => ADMIN_MODE ? load("vault_colorway_meta", {}) : {});
      const [tierMeta,       setTierMeta]       = useState(() => {
        if (!ADMIN_MODE) return {};
        const existing = load("vault_tier_meta", null);
        if (existing) return existing;
        // One-time migration from grailMeta/beaterMeta
        const inv = load("vault_inventory", []);
        const cws = load("vault_colorways", {});
        const gm = load("vault_grail_meta", {});
        const bm = load("vault_beater_meta", {});
        const migrated = migrateTiers(inv, cws, gm, bm);
        try {
          localStorage.setItem("vault_tier_meta", JSON.stringify(migrated));
          localStorage.removeItem("vault_grail_meta");
          localStorage.removeItem("vault_beater_meta");
        } catch {}
        return migrated;
      });
      const [glowMeta,       setGlowMeta]       = useState(() => ADMIN_MODE ? load("vault_glow_meta", {}) : {});
      const [graveyardMeta,  setGraveyardMeta]  = useState(() => ADMIN_MODE ? load("vault_graveyard_meta", {}) : {});
      const [colorways,      setColorways]      = useState(() => ADMIN_MODE ? load("vault_colorways", {}) : {});
      const [colorwayWishlist, setColorwayWishlist] = useState(() => ADMIN_MODE ? load("vault_colorway_wishlist", {}) : {});
      const [displayLayout,  setDisplayLayout]  = useState(() => ADMIN_MODE ? load("vault_display_layout", []) : []);
      const [dreamLayout,    setDreamLayout]    = useState(() => { if (ADMIN_MODE) { const stored = load("vault_dream_layout", null); if (stored && stored.length) return stored; } return Array.from({length:8}, () => Array.from({length:5}, () => ({code:"",colorway:""}))); });
      const [displayMode,    setDisplayMode]    = useState("my");
      const [editingCell,    setEditingCell]    = useState(null);
      const [editShoe,       setEditShoe]       = useState("");
      const [editCw,         setEditCw]         = useState("");
      const [view,           setView]           = useState("collection");
      const [showForm,       setShowForm]       = useState(false);
      const [quickLog,       setQuickLog]       = useState(false);
      const [quickShoeId,    setQuickShoeId]    = useState("");
      const [quickColorway,  setQuickColorway]  = useState("");
      const [quickDate,      setQuickDate]      = useState(() => localDateStr());
      const [editId,         setEditId]         = useState(null);
      const [newShoe,        setNewShoe]        = useState({ name:"", shortName:"", category:"Jordan", quantity:1, wishlist:false });
      const [editColorways,  setEditColorways]  = useState([]);
      const [newColorway,    setNewColorway]    = useState("");
      const [renamingColorwayIdx, setRenamingColorwayIdx] = useState(null);
      const [retiringMeta, setRetiringMeta] = useState(null); // { shoeId, colorway }
      const [retireForm, setRetireForm] = useState({ reason:"Sold", dateRetired:"", story:"" });
      const [loggingId,      setLoggingId]      = useState(null);
      const [wearDate,       setWearDate]       = useState(() => localDateStr());
      const [wearColorway,   setWearColorway]   = useState("");
      const [sortCol,        setSortCol]        = useState("date");
      const [sortDir,        setSortDir]        = useState("desc");
      const [histFilterShoe, setHistFilterShoe] = useState("");
      const [histFilterCw,   setHistFilterCw]   = useState("");
      const [histDatePreset, setHistDatePreset] = useState("all");
      const [histDateFrom,   setHistDateFrom]   = useState("");
      const [histDateTo,     setHistDateTo]     = useState("");
      const [editingMeta,    setEditingMeta]    = useState(null);
      const [metaForm,       setMetaForm]       = useState({ purchaseDate:"", purchasePrice:"", retailer:"", size:"", notes:"", ogYear:"", story:"", saleDate:"", saleTime:"" });
      const [newsDismissed, setNewsDismissed] = useState(false);
      const [bannerShowUpNext, setBannerShowUpNext] = useState(true);
      const [newsIdx, setNewsIdx] = useState(0);
      const [collectionFilter, setCollectionFilter] = useState("all");
      const [top10Filter, setTop10Filter] = useState("worn");

      useEffect(() => {
        const interval = setInterval(() => setBannerShowUpNext(v => !v), 8000);
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        const interval = setInterval(() => setNewsIdx(i => i + 1), 5000);
        return () => clearInterval(interval);
      }, []);

      // Apply public data once loaded
      useEffect(() => {
        if (ADMIN_MODE || !publicData) return;
        setInventory(publicData.inventory || []);
        setWearLog(publicData.wearLog || {});
        setImages(publicData.images || {});
        setColorwayMeta(publicData.colorwayMeta || {});
        setTierMeta(publicData.tierMeta || {});
        setGlowMeta(publicData.glowMeta || {});
        setGraveyardMeta(publicData.graveyardMeta || {});
        setColorways(publicData.colorways || {});
        setColorwayWishlist(publicData.colorwayWishlist || {});
        setDisplayLayout(publicData.displayLayout || []);
        setDreamLayout(publicData.dreamLayout || []);
      }, [publicData]);

      // Admin: persist to localStorage
      useEffect(() => save("vault_inventory",      inventory),    [inventory]);
      useEffect(() => save("vault_wearlog_v3",     wearLog),      [wearLog]);
      useEffect(() => save("vault_images",         images),       [images]);
      useEffect(() => save("vault_colorway_meta",  colorwayMeta), [colorwayMeta]);
      useEffect(() => save("vault_tier_meta",      tierMeta),     [tierMeta]);
      useEffect(() => save("vault_glow_meta",      glowMeta),     [glowMeta]);
      useEffect(() => save("vault_graveyard_meta", graveyardMeta),[graveyardMeta]);
      useEffect(() => save("vault_colorways",      colorways),    [colorways]);
      useEffect(() => save("vault_colorway_wishlist", colorwayWishlist), [colorwayWishlist]);
      useEffect(() => save("vault_display_layout",  displayLayout),[displayLayout]);
      useEffect(() => save("vault_dream_layout",    dreamLayout),  [dreamLayout]);

      useEffect(() => {
        if (!ADMIN_MODE) return;
        const handler = (e) => {
          if (e.key !== "Escape") return;
          if (showForm)      { setShowForm(false); setEditId(null); setNewShoe({name:"",shortName:"",category:"Jordan",quantity:1,wishlist:false}); setEditColorways([]); setNewColorway(""); }
          if (quickLog)      { setQuickLog(false); }
          if (loggingId)     { setLoggingId(null); }
          if (editingMeta)   { setEditingMeta(null); }
          if (editingCell)   { setEditingCell(null); }
          if (importMsg)     { setImportMsg(null); }
        };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, [showForm, quickLog, loggingId, editingMeta, editingCell, importMsg]);

      // Loading / error screens (public only)
      if (!ADMIN_MODE && publicLoading) return (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", flexDirection:"column", gap:"16px" }}>
          <div style={{ fontSize:"11px", letterSpacing:"4px", color:"#e63946" }}>LOADING THE VAULT...</div>
        </div>
      );
      if (!ADMIN_MODE && publicError) return (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", flexDirection:"column", gap:"16px" }}>
          <div style={{ fontSize:"11px", letterSpacing:"4px", color:"#e63946" }}>VAULT UNAVAILABLE</div>
          <div style={{ fontSize:"10px", color:"#aaa" }}>{publicError}</div>
        </div>
      );

      const owned    = inventory.filter(s => !s.wishlist);
      const wishlist = inventory.filter(s => s.wishlist);
      const total    = owned.reduce((n, s) => n + s.quantity, 0);
      const filledCells = displayLayout.flat().filter(c => c.code && c.code !== "").length;
      const empty    = 40 - filledCells;

      // Build a flat list of { shoe, colorway, lastWorn } for every owned colorway
      const allColorwayEntries = owned.flatMap(shoe => {
        const shoeColorways = colorways[shoe.shortName] || [];
        return shoeColorways
          .filter(cw => !colorwayWishlist[`${shoe.id}_${cw}`])
          .filter(cw => !tierExcludedFromRotation(tierOf(tierMeta, `${shoe.id}_${cw}`)))
          .filter(cw => {
            const meta = colorwayMeta[`${shoe.id}_${cw}`] || {};
            return !isNewPickupCheck(meta.purchaseDate);
          })
          .map(cw => {
            const entries = (wearLog[shoe.id] || []).filter(e => e.colorway === cw);
            const lastWorn = entries.length ? [...entries].sort((a,b) => a.date < b.date ? 1 : -1)[0].date : null;
            return { shoe, colorway: cw, lastWorn };
          });
      });

      const longestUnwornEntry = allColorwayEntries.reduce((pick, entry) => {
        if (!pick) return entry;
        if (!pick.lastWorn && !entry.lastWorn) return pick;
        if (!entry.lastWorn) return entry;
        if (!pick.lastWorn) return pick;
        return entry.lastWorn < pick.lastWorn ? entry : pick;
      }, null);

      const longestUnworn = longestUnwornEntry?.shoe || null;
      const longestUnwornColorway = longestUnwornEntry?.colorway || null;
      const longestUnwornLastDate = longestUnwornEntry?.lastWorn || null;

      // Most recently worn
      const mostRecentEntry = allColorwayEntries
        .filter(e => e.lastWorn)
        .reduce((pick, entry) => {
          if (!pick) return entry;
          return entry.lastWorn > pick.lastWorn ? entry : pick;
        }, null);
      const lastWornShoe = mostRecentEntry?.shoe || null;
      const lastWornColorway = mostRecentEntry?.colorway || null;
      const lastWornDate = mostRecentEntry?.lastWorn || null;

      // Anniversary computation — find colorways purchased on today's month/day in past years
      const todayStr = localDateStr(); // YYYY-MM-DD
      const todayMD = todayStr.slice(5); // MM-DD
      const anniversaries = [];
      Object.entries(colorwayMeta).forEach(([key, meta]) => {
        if (!meta.purchaseDate) return;
        const pd = meta.purchaseDate;
        if (pd.slice(5) !== todayMD) return;
        const purchaseYear = parseInt(pd.slice(0, 4));
        const todayYear = parseInt(todayStr.slice(0, 4));
        const years = todayYear - purchaseYear;
        if (years <= 0) return;
        // Find shoe name from key (shoeId_colorway)
        const underIdx = key.indexOf("_");
        const shoeId = parseInt(key.slice(0, underIdx));
        const colorway = key.slice(underIdx + 1);
        const shoe = inventory.find(s => s.id === shoeId);
        if (!shoe) return;
        anniversaries.push({ shoe, colorway, years });
      });

      // Sale alerts — wishlist colorways with a sale within the next 24 hours, or past sale still on sale day
      const nowMs = Date.now();
      const todayDateStr = localDateStr();
      const saleAlerts = [];
      const saleGlowKeys = new Set(); // colorway keys with sale within 7 days
      const gotEmQuestions = []; // sale passed today, shoe still on wishlist
      const gotEmCelebrations = []; // sale passed today, shoe now in collection with today's purchase date
      wishlist.forEach(shoe => {
        const shoeColorways = colorways[shoe.shortName] || [];
        shoeColorways.forEach(cw => {
          const meta = colorwayMeta[`${shoe.id}_${cw}`] || {};
          if (!meta.saleDate) return;
          const saleDateTime = new Date(`${meta.saleDate}T${meta.saleTime || "00:00"}`).getTime();
          const hoursUntil = (saleDateTime - nowMs) / (1000 * 60 * 60);
          if (hoursUntil >= 0 && hoursUntil <= 168) { // 7 days
            saleGlowKeys.add(`${shoe.id}_${cw}`);
          }
          if (hoursUntil >= 0 && hoursUntil <= 24) {
            const img = images[`${shoe.id}_${cw}`] || null;
            saleAlerts.push({ shoe, colorway: cw, saleDateTime, hoursUntil, img });
          } else if (hoursUntil < 0 && meta.saleDate === todayDateStr) {
            // Sale has passed but still on sale day — shoe still on wishlist
            const img = images[`${shoe.id}_${cw}`] || null;
            gotEmQuestions.push({ shoe, colorway: cw, img });
          }
        });
      });
      // Check owned shoes for "GOT 'EM!" — purchased within last 7 days
      owned.forEach(shoe => {
        const shoeColorways = colorways[shoe.shortName] || [];
        shoeColorways.filter(cw => !colorwayWishlist[`${shoe.id}_${cw}`]).forEach(cw => {
          const meta = colorwayMeta[`${shoe.id}_${cw}`] || {};
          if (!meta.purchaseDate) return;
          if (isNewPickupCheck(meta.purchaseDate)) {
            const img = images[`${shoe.id}_${cw}`] || null;
            gotEmCelebrations.push({ shoe, colorway: cw, img });
          }
        });
      });
      const wishlistHasSale = saleGlowKeys.size > 0;

      const openLogForm = (shoe) => {
        setLoggingId(shoe.id);
        setWearDate(localDateStr());
        const cw = colorways[shoe.shortName];
        setWearColorway(cw ? cw[0] : "");
      };

      const logWear = () => {
        if (!wearColorway || wearColorway === "__custom") return;
        const entry = { date: wearDate, colorway: wearColorway };
        setWearLog(log => ({ ...log, [loggingId]: [...(log[loggingId] || []), entry] }));
        setLoggingId(null);
      };

      const handleSaveColorways = (shortName) => {
        setColorways(cws => ({ ...cws, [shortName]: editColorways }));
      };

      const handleImageUpload = (shoeId, colorway, file, kind = "main") => {
        const key = `${shoeId}_${colorway}`;
        const storageKey = kind === "hover" ? `${key}_hover` : kind === "hover2" ? `${key}_hover2` : key;
        file.arrayBuffer().then(buffer => {
          fetch(`/upload?key=${encodeURIComponent(key)}&type=${kind}`, {
            method: "POST",
            headers: { "Content-Type": file.type || "image/png" },
            body: buffer,
          })
          .then(r => r.json())
          .then(data => {
            if (data.path) {
              setImages(imgs => ({ ...imgs, [storageKey]: data.path }));
            }
          })
          .catch(() => {
            // Fallback to base64 if server not available
            const reader = new FileReader();
            reader.onload = (e) => setImages(imgs => ({ ...imgs, [storageKey]: e.target.result }));
            reader.readAsDataURL(file);
          });
        });
      };

      const handleAdd = () => {
        if (!newShoe.name || !newShoe.shortName) return;
        if (editId !== null) {
          setInventory(inv => inv.map(s => s.id === editId ? { ...s, ...newShoe } : s));
          setEditId(null);
        } else {
          setInventory(inv => [...inv, { ...newShoe, id: Date.now() }]);
        }
        handleSaveColorways(newShoe.shortName);
        setNewShoe({ name:"", shortName:"", category:"Jordan", quantity:1, wishlist:false });
        setEditColorways([]);
        setNewColorway("");
        setShowForm(false);
      };

      const reorderShoe = (id, dir) => {
        setInventory(inv => {
          const idx = inv.findIndex(s => s.id === id);
          const newIdx = idx + dir;
          if (newIdx < 0 || newIdx >= inv.length) return inv;
          const n = [...inv];
          [n[idx], n[newIdx]] = [n[newIdx], n[idx]];
          return n;
        });
      };

      const handleEdit = (shoe) => {
        setNewShoe({ name:shoe.name, shortName:shoe.shortName, category:shoe.category, quantity:shoe.quantity, wishlist:shoe.wishlist });
        setEditColorways([...(colorways[shoe.shortName] || [])]);
        setNewColorway("");
        setEditId(shoe.id);
        setShowForm(true);
      };

      const handleDeleteColorway = (shoe, cw) => {
        const key = `${shoe.id}_${cw}`;
        const hasWear = (wearLog[shoe.id] || []).some(e => e.colorway === cw);
        const hasImage = !!images[key];
        const hasMeta = !!colorwayMeta[key];
        const hasTier = !!tierMeta[key];
        const hasGlow = !!glowMeta[key];
        const hasHoverImg = !!images[`${key}_hover`];
        if (hasWear || hasImage || hasMeta || hasTier || hasGlow || hasHoverImg) {
          const msg = [hasWear && "wear history", (hasImage || hasHoverImg) && "image(s)", hasMeta && "details"].filter(Boolean).join(", ");
          if (!window.confirm(`"${cw}" has ${msg} attached. Deleting it will remove all of that data. Are you sure?`)) return;
          if (hasWear) setWearLog(log => ({ ...log, [shoe.id]: (log[shoe.id] || []).filter(e => e.colorway !== cw) }));
          if (hasImage || hasHoverImg) setImages(imgs => { const n = {...imgs}; delete n[key]; delete n[`${key}_hover`]; return n; });
          if (hasMeta) setColorwayMeta(m => { const n = {...m}; delete n[key]; return n; });
          if (hasTier) setTierMeta(tm => { const n = {...tm}; delete n[key]; return n; });
          if (hasGlow) setGlowMeta(g => { const n = {...g}; delete n[key]; return n; });
        }
        setEditColorways(cws => cws.filter(c => c !== cw));
      };

      const exportJSON = () => {
        const data = { inventory, wearLog, images, colorwayMeta, tierMeta, glowMeta, graveyardMeta, colorways, colorwayWishlist, displayLayout, dreamLayout, exportedAt: new Date().toISOString() };
        const json = JSON.stringify(data, null, 2);
        if (ADMIN_MODE) {
          // Save via server — backs up old vault-data.json, writes new one
          fetch("/backup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: json,
          })
          .then(r => r.json())
          .then(result => {
            if (result.success) {
              setImportMsg({ type:"success", text: result.message || "Backup saved!" });
            } else {
              setImportMsg({ type:"error", text: result.error || "Backup failed." });
            }
            setTimeout(() => setImportMsg(null), 4000);
          })
          .catch(() => {
            // Fallback to browser download if server unavailable
            const blob = new Blob([json], { type:"application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = `sneaker-vault-backup-${localDateStr()}.json`;
            a.click(); URL.revokeObjectURL(url);
          });
        } else {
          const blob = new Blob([json], { type:"application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url; a.download = `sneaker-vault-backup-${localDateStr()}.json`;
          a.click(); URL.revokeObjectURL(url);
        }
      };

      const importJSON = (file) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            if (data.inventory)     { setInventory(data.inventory);         save("vault_inventory",       data.inventory); }
            if (data.wearLog)       { setWearLog(data.wearLog);             save("vault_wearlog_v3",      data.wearLog); }
            if (data.images)        { setImages(data.images);               save("vault_images",          data.images); }
            if (data.colorwayMeta)  { setColorwayMeta(data.colorwayMeta);   save("vault_colorway_meta",   data.colorwayMeta); }
            if (data.tierMeta)      { setTierMeta(data.tierMeta);           save("vault_tier_meta",       data.tierMeta); }
            else if (data.grailMeta || data.beaterMeta) {
              // Legacy backup — migrate on import
              const migrated = migrateTiers(data.inventory || [], data.colorways || {}, data.grailMeta || {}, data.beaterMeta || {});
              setTierMeta(migrated); save("vault_tier_meta", migrated);
            }
            if (data.glowMeta)      { setGlowMeta(data.glowMeta);           save("vault_glow_meta",       data.glowMeta); }
            if (data.graveyardMeta) { setGraveyardMeta(data.graveyardMeta); save("vault_graveyard_meta",  data.graveyardMeta); }
            if (data.colorways)     { setColorways(data.colorways);         save("vault_colorways",       data.colorways); }
            if (data.colorwayWishlist) { setColorwayWishlist(data.colorwayWishlist); save("vault_colorway_wishlist", data.colorwayWishlist); }
            if (data.displayLayout) { setDisplayLayout(data.displayLayout); save("vault_display_layout",  data.displayLayout); }
            if (data.dreamLayout)   { setDreamLayout(data.dreamLayout);     save("vault_dream_layout",    data.dreamLayout); }
            setImportMsg({ type:"success", text:"Backup restored successfully!" });
          } catch {
            setImportMsg({ type:"error", text:"Invalid backup file. Please use a Vault JSON backup." });
          }
          setTimeout(() => setImportMsg(null), 4000);
        };
        reader.readAsText(file);
      };

      const IS = { background: T.inputBg, border:`1px solid ${T.inputBorder}`, color: T.inputText, padding:"8px", fontFamily:"'Aptos','Segoe UI',sans-serif", fontSize:"13px", width:"100%" };

        const col = CAT[inventory.find(s => s.shortName === cell.code)?.category] || CAT.Jordan;
        return { bg: col.bg, accent: col.accent, label: cell.code, colorway: cell.colorway };

      const Btn = ({ label, onClick, color, solid }) => (
        <button onClick={onClick} style={{

                <button onClick={() => importRef.current.click()} style={{ background:"transparent", color:"#e63946", border:"1px solid #4cc9f0", padding:"8px 16px", cursor:"pointer", fontSize:"10px", letterSpacing:"2px", fontFamily:"'Aptos','Segoe UI',sans-serif", whiteSpace:"nowrap" }}>⬆ RESTORE</button>

                <input ref={importRef} type="file" accept=".json" style={{ display:"none" }}

              </div>
            </div>}

          {ADMIN_MODE && importMsg && (

          <div style={{ display:"flex", borderBottom: isMobilePublic ? `1px solid ${T.border}` : "none", background: T.navBg, alignItems:"center" }}>
            {(ADMIN_MODE ? ["collection","display","wishlist","graveyard","history","stats","about"] : ["collection", ...(!isMobile ? ["display"] : []), "wishlist", ...(Object.keys(graveyardMeta).length > 0 ? ["graveyard"] : []), "stats", "about"]).map(v => (
              <button key={v} onClick={() => setView(v)} style={{
                padding: isMobilePublic ? "12px 0" : "14px 28px",

                {(ADMIN_MODE ? [["PAIRS",total],["OPEN BOXES",empty],["WISHLIST",wishlist.length]] : [["PAIRS",total],["WISHLIST",wishlist.length]]).map(([label,val]) => (

            </div>}

          {/* Desktop: border below nav (after stats) */}
          {!isMobilePublic && <div style={{ borderBottom:`1px solid ${T.border}` }} />}

          {isMobilePublic && (
            <div style={{ display:"flex", justifyContent:"center", alignItems:"center", gap:"20px", padding:"8px 16px", background: T.navBg, borderBottom:`1px solid ${T.border}` }}>
              {[["PAIRS",total],["WISHLIST",wishlist.length]].map(([label,val]) => (
                <div key={label} style={{ display:"flex", alignItems:"center", gap:"5px" }}>
                  <span style={{ fontSize:"12px", fontWeight:"bold", color:"#e63946" }}>{val}</span>
                  <span style={{ fontSize:"8px", letterSpacing:"2px", color: T.text5 }}>{label}</span>
                </div>
              ))}
              <button onClick={() => setDark(d => !d)} style={{ background:"transparent", border:"none", color: T.text4, cursor:"pointer", fontSize:"14px", padding:"0", lineHeight:1 }} title={dark ? "Switch to light mode" : "Switch to dark mode"}>{dark ? "☀" : "☾"}</button>
            </div>
          )}

          <div style={{ padding: isMobilePublic ? "16px" : "32px" }}>

            {/* ── COLLECTION ── */}
            {view === "collection" && (
              <div>
                {/* News Banner — unified cycling banner for all notifications */}
                {!newsDismissed && (() => {
                  // Build news items in priority order: GOT 'EM! > Anniversary > Sale Alert > GOT 'EM?
                  const newsItems = [];
                  gotEmCelebrations.forEach(item => {
                    newsItems.push({ type:"gotem", label:"✦ GOT 'EM! ✦", shoe: item.shoe, colorway: item.colorway, img: item.img, subtitle:"Welcome to The Vault" });
                  });
                  anniversaries.forEach(a => {
                    const aImg = images[`${a.shoe.id}_${a.colorway}`] || null;
                    const aHoverImg = images[`${a.shoe.id}_${a.colorway}_hover`] || null;
                    newsItems.push({ type:"anniversary", label:"✦ PURCHASE ANNIVERSARY ✦", shoe: a.shoe, colorway: a.colorway, img: aImg, hoverImg: aHoverImg, subtitle:`${a.years} ${a.years === 1 ? "year" : "years"} ago today` });
                  });
                  saleAlerts.forEach(item => {
                    const sub = item.hoursUntil < 1
                      ? `Sale starts in ${Math.round(item.hoursUntil * 60)} minutes`
                      : `Sale starts in ${Math.round(item.hoursUntil)} hours`;
                    newsItems.push({ type:"sale", label:"🛒 SALE ALERT", shoe: item.shoe, colorway: item.colorway, img: item.img, subtitle: sub });
                  });
                  gotEmQuestions.forEach(item => {
                    newsItems.push({ type:"gotemq", label:"✦ GOT 'EM? ✦", shoe: item.shoe, colorway: item.colorway, img: item.img, subtitle:"Sale was today" });
                  });
                  // Shoe of the Day — random spotlight when no other news
                  if (newsItems.length === 0) {
                    const allOwned = owned.flatMap(shoe =>
                      (colorways[shoe.shortName] || []).filter(cw => !colorwayWishlist[`${shoe.id}_${cw}`]).map(cw => ({ shoe, colorway: cw }))
                    );
                    if (allOwned.length > 0) {
                      // Date-seeded random — consistent throughout the day, changes daily

                      const purchaseLine = pickMeta.purchaseDate ? `Purchased ${formatDate(pickMeta.purchaseDate)}` : null;
                      const wearLine = `Worn ${pickWears} ${pickWears === 1 ? "time" : "times"}`;

                      newsItems.push({ type:"spotlight", label:"✦ SHOE OF THE DAY ✦", shoe: pick.shoe, colorway: pick.colorway, img: pickImg, subtitle: sub });

                              <div>
                                <div style={{ fontSize:"9px", letterSpacing:"4px", color:"#e6b800", marginBottom:"4px" }}>{item.label}</div>
                                <div style={{ fontSize:"15px", fontWeight:"bold", color: T.text }}>{item.shoe.name} — {item.colorway}</div>

                          </div>

                      </div>
                      {newsItems.length > 1 && (
                        <div style={{ display:"flex", justifyContent:"center", gap:"6px", marginTop:"10px" }}>
                          {newsItems.map((_, i) => (
                            <div key={i} style={{ width:"6px", height:"6px", borderRadius:"50%", background: i === safeIdx ? "#e6b800" : (dark ? "#555" : "#ccc"), transition:"background 0.3s" }} />
                          ))}
                        </div>

                    </div>
