                })()}

                {/* Rotation Banner */}
                {longestUnworn && (() => {
                  // UP NEXT data
                  const rotationTier = longestUnwornColorway ? tierOf(tierMeta, `${longestUnworn.id}_${longestUnwornColorway}`) : "silver";
                  const rotationTierInfo = TIERS[rotationTier] || TIERS.silver;
                  const isRotationPremium = rotationTier === "diamond" || rotationTier === "platinum";
                  const isRotationOnIce = longestUnwornColorway ? (wearLog[longestUnworn.id] || []).filter(e => e.colorway === longestUnwornColorway).length === 0 : false;
                  const rotationImgKey = `${longestUnworn.id}_${longestUnwornColorway}`;
                  const rotationImg = images[rotationImgKey] || null;
                  const rotationHoverImg = isRotationPremium ? (images[`${rotationImgKey}_hover`] || null) : null;

                  // LAST WORN data
                  const lastWornTier = lastWornColorway ? tierOf(tierMeta, `${lastWornShoe?.id}_${lastWornColorway}`) : "silver";
                  const lastWornTierInfo = TIERS[lastWornTier] || TIERS.silver;
                  const isLastWornPremium = lastWornTier === "diamond" || lastWornTier === "platinum";
                  const lastWornImg = lastWornShoe ? images[`${lastWornShoe.id}_${lastWornColorway}`] || null : null;

                  const bannerBg = rotationTier === "diamond"
                    ? dark ? "linear-gradient(90deg,#1a1a2a,#111122)" : "linear-gradient(90deg,#f0f8ff,#e8f4ff)"

                  // Next 4 in queue (after the first)

                  const upcomingQueue = sortedQueue.slice(1, 5);

                          {presetBtn("7d", "7 DAYS")}

                        {histDatePreset === "custom" && (

                            <span style={{ fontSize:"9px", color:T.text5, letterSpacing:"2px" }}>TO</span>
                            <input type="date" value={histDateTo} onChange={e => setHistDateTo(e.target.value)} style={{ ...IS, width:"140px", fontSize:"11px", padding:"5px" }} />

                      {hasActiveFilter && (

                          style={{ background:"transparent", border:`1px solid ${T.border2}`, color:T.text5, padding:"4px 10px", cursor:"pointer", fontSize:"9px", letterSpacing:"2px", fontFamily:"'Aptos','Segoe UI',sans-serif", alignSelf:"flex-end" }}>CLEAR</button>
                      )}
                    </div>
                  </div>
                  <div style={{ overflowX:"auto" }}>
                    <table style={{ width:"100%", borderCollapse:"collapse", fontSize:"12px" }}>
                      <thead>
                        <tr style={{ borderBottom:`1px solid ${T.border}` }}>
                          {[["date","DATE"],["shoe","SHOE"],["colorway","COLORWAY"],["category","CATEGORY"]].map(([col,label]) => (
                            <th key={col} style={colStyle(col)} onClick={() => handleSort(col)}>{label}{arrow(col)}</th>
                          ))}
                          <th style={{ padding:"10px 16px", width:"40px", fontSize:"10px", letterSpacing:"3px", color:T.text4, textAlign:"center" }}>DEL</th>
                        </tr>
                      </thead>
                      <tbody>
                        {sorted.map((entry, i) => {
                          const col = CAT[entry.category] || CAT.Jordan;
                          return (
                            <tr key={i} style={{ borderBottom:`1px solid ${T.border}`, background: i%2===0 ? T.bg2 : T.cardBg }}>
                              <td style={{ padding:"10px 16px", color:T.text3, whiteSpace:"nowrap" }}>{entry.date}</td>
                              <td style={{ padding:"10px 16px", color:T.text, fontWeight:"bold" }}>{entry.shoe}</td>
                              <td style={{ padding:"10px 16px", color:col.accent }}>{entry.colorway}</td>
                              <td style={{ padding:"10px 16px" }}>
                                <span style={{ fontSize:"9px", letterSpacing:"2px", color:col.accent, border:`1px solid ${col.accent}`, padding:"2px 6px" }}>{entry.category.toUpperCase()}</span>
                              </td>
                              <td style={{ padding:"6px 16px", textAlign:"center" }}>
                                <button onClick={() => {
                                  if (window.confirm(`Delete this wear entry?\n${entry.shoe} · ${entry.colorway} · ${entry.date}`)) {
                                    setWearLog(log => ({ ...log, [entry.shoeId]: (log[entry.shoeId] || []).filter((_, j) => j !== entry.idx) }));
                                  }
                                }} style={{ background:"transparent", border:"none", color:T.text7, cursor:"pointer", fontSize:"12px", padding:"2px 4px" }}>✕</button>
                              </td>
                            </tr>
                          );
                        })}
                        {sorted.length === 0 && (
                          <tr><td colSpan="5" style={{ padding:"32px", textAlign:"center", color:T.text2, letterSpacing:"3px", fontSize:"11px" }}>{hasActiveFilter ? "NO MATCHING WEARS" : "NO WEARS LOGGED YET"}</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              );
            })()}

            {/* ── STATS ── */}
            {view === "stats" && (() => {
              // Build wear counts per colorway
              const wearCounts = {};
              owned.forEach(shoe => {
                const entries = wearLog[shoe.id] || [];
                entries.forEach(entry => {
                  const key = `${shoe.id}_${entry.colorway}`;
                  if (tierExcludedFromRotation(tierOf(tierMeta, key))) return;
                  if (!wearCounts[key]) wearCounts[key] = { shoe, colorway: entry.colorway, count: 0, lastWorn: entry.date };
                  wearCounts[key].count++;
                  if (entry.date > wearCounts[key].lastWorn) wearCounts[key].lastWorn = entry.date;
                });
              });
              const wornRanked = Object.values(wearCounts)
                .sort((a, b) => {
                  if (b.count !== a.count) return b.count - a.count;
                  return a.lastWorn < b.lastWorn ? -1 : a.lastWorn > b.lastWorn ? 1 : 0;
                })
                .slice(0, 10);

              // Build price ranking per colorway
              const priceEntries = [];
              owned.forEach(shoe => {
                (colorways[shoe.shortName] || []).filter(cw => !colorwayWishlist[`${shoe.id}_${cw}`]).forEach(cw => {
                  if (tierExcludedFromRotation(tierOf(tierMeta, `${shoe.id}_${cw}`))) return;
                  const meta = colorwayMeta[`${shoe.id}_${cw}`] || {};
                  if (!meta.purchasePrice) return;
                  const priceStr = meta.purchasePrice.replace(/[^0-9.]/g, "");
                  const price = parseFloat(priceStr);
                  if (isNaN(price) || price <= 0) return;
                  priceEntries.push({ shoe, colorway: cw, price, purchaseDate: meta.purchaseDate || "" });
                });
              });
              const priceRanked = priceEntries
                .sort((a, b) => {
                  if (b.price !== a.price) return b.price - a.price;
                  return a.purchaseDate < b.purchaseDate ? -1 : a.purchaseDate > b.purchaseDate ? 1 : 0;
                })
                .slice(0, 10);

              // Build best value ranking — wears per dollar (needs both wear data and price)
              const valueEntries = [];
              owned.forEach(shoe => {
                (colorways[shoe.shortName] || []).filter(cw => !colorwayWishlist[`${shoe.id}_${cw}`]).forEach(cw => {
                  if (tierExcludedFromRotation(tierOf(tierMeta, `${shoe.id}_${cw}`))) return;
                  const meta = colorwayMeta[`${shoe.id}_${cw}`] || {};
                  if (!meta.purchasePrice) return;
                  const priceStr = meta.purchasePrice.replace(/[^0-9.]/g, "");
                  const price = parseFloat(priceStr);
                  if (isNaN(price) || price <= 0) return;
                  const wears = (wearLog[shoe.id] || []).filter(e => e.colorway === cw).length;
                  if (wears === 0) return;
                  const costPerWear = price / wears;
                  valueEntries.push({ shoe, colorway: cw, price, wears, costPerWear });
                });
              });
              const valueRanked = valueEntries
                .sort((a, b) => {
                  if (a.costPerWear !== b.costPerWear) return a.costPerWear - b.costPerWear;
                  // Tiebreaker: more wears ranks higher
                  return b.wears - a.wears;
                })
                .slice(0, 10);

              // Build longest on ice ranking — days between purchase date and first wear
              const iceEntries = [];
              owned.forEach(shoe => {
                (colorways[shoe.shortName] || []).filter(cw => !colorwayWishlist[`${shoe.id}_${cw}`]).forEach(cw => {
                  if (tierExcludedFromRotation(tierOf(tierMeta, `${shoe.id}_${cw}`))) return;
                  const meta = colorwayMeta[`${shoe.id}_${cw}`] || {};
                  if (!meta.purchaseDate) return;
                  const wears = (wearLog[shoe.id] || []).filter(e => e.colorway === cw);
                  if (wears.length === 0) return;
                  const firstWorn = [...wears].sort((a, b) => a.date < b.date ? -1 : 1)[0].date;
                  const purchaseMs = new Date(meta.purchaseDate + "T00:00:00").getTime();
                  const firstWornMs = new Date(firstWorn + "T00:00:00").getTime();
                  const daysOnIce = Math.round((firstWornMs - purchaseMs) / 86400000);
                  if (daysOnIce < 0) return;
                  iceEntries.push({ shoe, colorway: cw, daysOnIce, purchaseDate: meta.purchaseDate, firstWorn });
                });
              });
              const iceRanked = iceEntries
                .sort((a, b) => {
                  if (b.daysOnIce !== a.daysOnIce) return b.daysOnIce - a.daysOnIce;
                  // Tiebreaker: earlier purchase date ranks higher
                  return a.purchaseDate < b.purchaseDate ? -1 : 1;
                })
                .slice(0, 10);

              const ranked = top10Filter === "worn" ? wornRanked : top10Filter === "price" ? priceRanked : top10Filter === "value" ? valueRanked : iceRanked;
              const podium = ranked.slice(0, 3);
              const rest = ranked.slice(3);
              const podiumOrder = [podium[1], podium[0], podium[2]];
              const podiumHeights = [80, 110, 55];
              const podiumColors = ["#C0C0C0", "#FFD700", "#CD7F32"];
              const podiumLabels = ["2", "1", "3"];
              const imgW = isMobilePublic ? 72 : 120;
              const imgH = Math.round(imgW * 0.625);

              const subtitle = (entry) => {
                if (top10Filter === "worn") return `Worn ${entry.count} ${entry.count === 1 ? "Time" : "Times"}`;
                if (top10Filter === "price" && ADMIN_MODE) return `$${entry.price.toFixed(2)}`;
                if (top10Filter === "value") return ADMIN_MODE ? `$${entry.costPerWear.toFixed(2)}/wear (${entry.wears} wears · $${entry.price.toFixed(2)})` : `Worn ${entry.wears} ${entry.wears === 1 ? "Time" : "Times"}`;
                if (top10Filter === "ice") return `${entry.daysOnIce} ${entry.daysOnIce === 1 ? "day" : "days"} on ice`;
                return null;
              };

              return (
                <div style={{ maxWidth:"800px" }}>
                  {/* Toggle buttons (desktop) / Dropdown (mobile) */}
                  {isMobilePublic ? (
                    <div style={{ marginBottom:"24px" }}>
                      <select value={top10Filter} onChange={e => setTop10Filter(e.target.value)} style={{
                        background: T.inputBg, border:`1px solid ${T.inputBorder}`, color: T.inputText,
                        padding:"8px 12px", fontSize:"10px", letterSpacing:"3px",
                        fontFamily:"'Aptos','Segoe UI',sans-serif", width:"100%",
                      }}>
                        {[["worn","MOST WORN"],["price","MOST EXPENSIVE"],["value","BEST VALUE"],["ice","LONGEST ON ICE"]].map(([id, label]) => (
                          <option key={id} value={id}>{label}</option>
                        ))}
                      </select>
                    </div>
                  ) : (
                    <div style={{ display:"flex", gap:"16px", marginBottom:"24px", flexWrap:"wrap" }}>
                      {[["worn","MOST WORN"],["price","MOST EXPENSIVE"], ["value","BEST VALUE"], ["ice","LONGEST ON ICE"]].map(([id, label]) => (
                        <button key={id} onClick={() => setTop10Filter(id)} style={{
                          background:"transparent", border:"none", cursor:"pointer",
                          fontSize:"9px", letterSpacing:"3px", fontFamily:"'Aptos','Segoe UI',sans-serif",
                          color: top10Filter === id ? "#e63946" : T.text5,
                          borderBottom: top10Filter === id ? "1px solid #e63946" : "1px solid transparent",
                          padding:"4px 0",
                        }}>{label}</button>
                      ))}
                    </div>
                  )}
                  {/* Podium */}
                  {podium.length >= 3 && (
                    <div style={{ display:"flex", alignItems:"flex-end", justifyContent:"center", gap: isMobilePublic ? "8px" : "12px", marginBottom:"32px" }}>
                      {podiumOrder.map((entry, pi) => {
                        if (!entry) return null;
                        const metaKey = `${entry.shoe.id}_${entry.colorway}`;
                        const podiumImg = images[`${metaKey}_hover`] || images[metaKey] || null;
                        const entryTier = tierOf(tierMeta, metaKey); const entryTierInfo = TIERS[entryTier] || TIERS.silver;
                        const color = podiumColors[pi];
                        const h = isMobilePublic ? Math.round(podiumHeights[pi] * 0.7) : podiumHeights[pi];
                        const sub = subtitle(entry);
                        return (
                          <div key={metaKey} style={{ display:"flex", flexDirection:"column", alignItems:"center", flex:"1 1 0", maxWidth:"250px" }}>
                            <div style={{ background:T.cardBg, border:`1px solid ${color}`, padding: isMobilePublic ? "10px" : "16px", width:"100%", textAlign:"center", marginBottom:0 }}>
                              <div style={{ fontSize: isMobilePublic ? "16px" : "22px", fontWeight:"bold", color, marginBottom:"8px" }}>{podiumLabels[pi]}</div>
                              {podiumImg ? (
                                <div style={{ width: isMobilePublic ? "96px" : "180px", height: isMobilePublic ? "60px" : "113px", overflow:"hidden", background: dark ? "#222222" : "#ffffff", margin:"0 auto" }}>
                                  <img src={podiumImg} alt={entry.colorway} style={{ width: isMobilePublic ? "96px" : "180px", height: isMobilePublic ? "60px" : "113px", objectFit:"contain", display:"block" }} />
                                </div>
                              ) : (
                                <div style={{ width: isMobilePublic ? "96px" : "180px", height: isMobilePublic ? "60px" : "113px", background:T.bg3, display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto" }}>
                                  <span style={{ fontSize:"9px", color:T.text6 }}>NO IMG</span>
                                </div>
                              )}
                              <div style={{ fontSize: isMobilePublic ? "10px" : "12px", fontWeight:"bold", color: T.text, marginTop:"10px", lineHeight:"1.3" }}>{entry.shoe.name}</div>
                              <div style={{ fontSize: isMobilePublic ? "9px" : "11px", color: T.text3, marginTop:"2px" }}>{entry.colorway}</div>
                              {sub && <div style={{ fontSize: isMobilePublic ? "8px" : "9px", color:T.text5, marginTop:"6px", letterSpacing:"1px" }}>{sub}</div>}
                            </div>
                            <div style={{ width:"100%", height: isMobilePublic ? Math.round(h * 0.5) : h, background: `linear-gradient(180deg, ${color}33, ${color}11)`, borderLeft:`1px solid ${color}`, borderRight:`1px solid ${color}`, borderBottom:`1px solid ${color}` }} />
                          </div>
                        );
                      })}
                    </div>
                  )}
                  {/* Podium fallback for < 3 entries */}
                  {podium.length > 0 && podium.length < 3 && (
                    <div style={{ display:"grid", gridTemplateColumns: isMobilePublic ? "1fr" : "1fr 1fr", gap:"12px", marginBottom:"24px" }}>
                      {podium.map((entry, i) => {
                        const metaKey = `${entry.shoe.id}_${entry.colorway}`;
                        const img = images[metaKey] || null;
                        const entryTier = tierOf(tierMeta, metaKey); const entryTierInfo = TIERS[entryTier] || TIERS.silver;
                        const color = i === 0 ? "#FFD700" : i === 1 ? "#C0C0C0" : "#CD7F32";
                        const sub = subtitle(entry);
                        return (
                          <div key={metaKey} style={{ background:T.cardBg, border:`1px solid ${color}`, padding:"16px" }}>
                            <div style={{ display:"flex", alignItems:"center", gap:"16px", marginBottom:"10px" }}>
                              <div style={{ fontSize:"24px", fontWeight:"bold", color, minWidth:"36px", textAlign:"center", flexShrink:0 }}>{i + 1}</div>

                                <div style={{ width:imgW, height:imgH, overflow:"hidden", background: dark ? "#222222" : "#ffffff", flexShrink:0 }}>

                                <div style={{ width:imgW, height:imgH, background:T.bg3, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                                  <span style={{ fontSize:"11px", color:T.text6, letterSpacing:"2px" }}>NO IMG</span>
                                </div>

                            </div>
                            <div style={{ paddingLeft:"52px" }}>
                              <div style={{ fontSize:"14px", fontWeight:"bold", color: T.text }}>{entry.shoe.name} — {entry.colorway}</div>
                              {sub && <div style={{ fontSize:"10px", color:T.text4, marginTop:"4px", letterSpacing:"1px" }}>{sub}</div>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                  {/* #4 — standalone */}
                  {rest.length > 0 && (() => {
                    const entry = rest[0];
                    const metaKey = `${entry.shoe.id}_${entry.colorway}`;
                    const img = images[metaKey] || null;
                    const fourImgW = isMobilePublic ? 80 : 144;
                    const fourImgH = Math.round(fourImgW * 0.625);
                    const sub = subtitle(entry);
                    return (
                      <div style={{ background:T.cardBg, border:`1px solid ${T.border}`, padding: isMobilePublic ? "12px" : "16px", marginBottom:"12px" }}>
                        <div style={{ display:"flex", alignItems:"center", gap: isMobilePublic ? "10px" : "14px" }}>
                          <div style={{ fontSize: isMobilePublic ? "18px" : "22px", fontWeight:"bold", color:T.text5, minWidth: isMobilePublic ? "28px" : "36px", textAlign:"center", flexShrink:0 }}>4</div>
                          {img ? (
                            <div style={{ width:fourImgW, height:fourImgH, overflow:"hidden", background: dark ? "#222222" : "#ffffff", flexShrink:0 }}>
                              <img src={img} alt={entry.colorway} style={{ width:fourImgW, height:fourImgH, objectFit:"contain", display:"block" }} />
                            </div>
                          ) : (
                            <div style={{ width:fourImgW, height:fourImgH, background:T.bg3, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                              <span style={{ fontSize:"9px", color:T.text6 }}>NO IMG</span>
                            </div>
                          )}
                          <div style={{ minWidth:0 }}>
                            <div style={{ fontSize: isMobilePublic ? "12px" : "14px", fontWeight:"bold", color: T.text }}>{entry.shoe.name} — {entry.colorway}</div>
                            {sub && <div style={{ fontSize: isMobilePublic ? "9px" : "10px", color:T.text4, marginTop:"4px", letterSpacing:"1px" }}>{sub}</div>}
                          </div>
                        </div>
                      </div>
                    );
                  })()}
                  {/* 5-7 three-wide */}
                  {rest.slice(1, 4).length > 0 && (
                    <div style={{ display:"grid", gridTemplateColumns: isMobilePublic ? "1fr" : "1fr 1fr 1fr", gap:"12px", marginBottom:"12px" }}>
                      {rest.slice(1, 4).map((entry, i) => {
                        const metaKey = `${entry.shoe.id}_${entry.colorway}`;
                        const img = images[metaKey] || null;
                        const rank = i + 5;
                        const sub = subtitle(entry);
                        return (
                          <div key={metaKey} style={{ background:T.cardBg, border:`1px solid ${T.border}`, padding: isMobilePublic ? "10px" : "14px", textAlign:"center" }}>
                            <div style={{ fontSize: isMobilePublic ? "14px" : "16px", fontWeight:"bold", color:T.text5, marginBottom:"8px" }}>{rank}</div>
                            {img ? (
                              <div style={{ width: isMobilePublic ? "60px" : "80px", height: isMobilePublic ? "38px" : "50px", overflow:"hidden", background: dark ? "#222222" : "#ffffff", margin:"0 auto" }}>
                                <img src={img} alt={entry.colorway} style={{ width: isMobilePublic ? "60px" : "80px", height: isMobilePublic ? "38px" : "50px", objectFit:"contain", display:"block" }} />
                              </div>
                            ) : (
                              <div style={{ width: isMobilePublic ? "60px" : "80px", height: isMobilePublic ? "38px" : "50px", background:T.bg3, display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto" }}>
                                <span style={{ fontSize:"8px", color:T.text6 }}>NO IMG</span>
                              </div>
                            )}
                            <div style={{ fontSize: isMobilePublic ? "10px" : "11px", fontWeight:"bold", color: T.text, marginTop:"8px" }}>{entry.shoe.name} — {entry.colorway}</div>
                            {sub && <div style={{ fontSize: isMobilePublic ? "8px" : "9px", color:T.text4, marginTop:"4px", letterSpacing:"1px" }}>{sub}</div>}
                          </div>
                        );
                      })}
                    </div>
                  )}
                  {/* 8-10 three-wide */}
                  {rest.slice(4).length > 0 && (
                    <div style={{ display:"grid", gridTemplateColumns: isMobilePublic ? "1fr" : "1fr 1fr 1fr", gap:"12px" }}>
                      {rest.slice(4).map((entry, i) => {
                        const metaKey = `${entry.shoe.id}_${entry.colorway}`;
                        const img = images[metaKey] || null;
                        const rank = i + 8;
                        const compactImgW = isMobilePublic ? 48 : 64;
                        const compactImgH = Math.round(compactImgW * 0.625);
                        const sub = subtitle(entry);
                        return (
                          <div key={metaKey} style={{ background:T.cardBg, border:`1px solid ${T.border}`, padding: isMobilePublic ? "10px" : "12px", textAlign:"center" }}>
                            <div style={{ fontSize: isMobilePublic ? "12px" : "14px", fontWeight:"bold", color:T.text5, marginBottom:"6px" }}>{rank}</div>
                            {img ? (
                              <div style={{ width:compactImgW, height:compactImgH, overflow:"hidden", background: dark ? "#222222" : "#ffffff", margin:"0 auto" }}>
                                <img src={img} alt={entry.colorway} style={{ width:compactImgW, height:compactImgH, objectFit:"contain", display:"block" }} />
                              </div>
                            ) : (
                              <div style={{ width:compactImgW, height:compactImgH, background:T.bg3, display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto" }}>
                                <span style={{ fontSize:"8px", color:T.text6 }}>NO IMG</span>
                              </div>
                            )}
                            <div style={{ fontSize: isMobilePublic ? "9px" : "10px", fontWeight:"bold", color: T.text, marginTop:"6px" }}>{entry.shoe.name} — {entry.colorway}</div>
                            {sub && <div style={{ fontSize: isMobilePublic ? "7px" : "8px", color:T.text4, marginTop:"4px", letterSpacing:"1px" }}>{sub}</div>}
                          </div>
                        );
                      })}
                    </div>
                  )}
                  {ranked.length === 0 && (
                    <div style={{ fontSize:"11px", letterSpacing:"4px", color:T.text5 }}>{top10Filter === "worn" ? "NO WEARS LOGGED YET" : top10Filter === "price" ? "NO PRICES ENTERED YET" : top10Filter === "value" ? "NO WORN SHOES WITH PRICES YET" : "NO WORN SHOES WITH PURCHASE DATES YET"}</div>
                  )}
                  {/* Subtitle */}
                  {top10Filter === "price" && ranked.length > 0 && <div style={{ fontSize:"10px", color:T.text5, letterSpacing:"1px", marginTop:"20px" }}>Ranked by purchase price</div>}
                  {top10Filter === "value" && ranked.length > 0 && <div style={{ fontSize:"10px", color:T.text5, letterSpacing:"1px", marginTop:"20px" }}>Purchase price ÷ number of times worn</div>}
                  {top10Filter === "ice" && ranked.length > 0 && <div style={{ fontSize:"10px", color:T.text5, letterSpacing:"1px", marginTop:"20px" }}>Days between purchase date and first wear</div>}
                </div>
              );
            })()}

            {/* ── ABOUT ── */}
            {view === "about" && (
              <div style={{ maxWidth:"640px", margin:"0 auto", padding:"16px 0" }}>
                <div style={{ fontSize:"11px", letterSpacing:"4px", color:"#e63946", marginBottom:"32px" }}>ABOUT THE VAULT</div>
                <p style={{ fontSize:"15px", color:T.text2, lineHeight:"2", marginBottom:"24px", fontStyle:"italic" }}>
                  The first time I saw the Air Jordan 4 sitting in the window of my local shoe store, I was hooked. Every trip to the mall meant one thing: making my way to Foot Locker and staring at the shoes worn by my favorite athletes — Michael Jordan, Andre Agassi, and Bo Jackson. I'd stand there daydreaming about the day I could own all of them.
                </p>
                <p style={{ fontSize:"15px", color:T.text2, lineHeight:"2", marginBottom:"24px", fontStyle:"italic" }}>
                  In 2023, I decided to make that childhood dream a reality.
                </p>
                <p style={{ fontSize:"15px", color:T.text2, lineHeight:"2", fontStyle:"italic" }}>
                  This collection is for that 10 year old boy who never stopped looking through the glass.
                </p>

                <div style={{ fontSize:"11px", letterSpacing:"4px", color:"#e63946", margin:"48px 0 24px" }}>THE TIER SYSTEM</div>
                {[
                  { tier: "diamond",  label: "✦ DIAMOND ✦",  color: dark ? "#b8f0ff" : "#0099bb", desc: "The sneakers that 10-year-old me dreamed about" },
                  { tier: "platinum", label: "✦ PLATINUM ✦", color: "#C0C0C0", desc: "Original colorways of my favorite sneakers" },
                  { tier: "gold",     label: "✦ GOLD ✦",     color: "#FFD700", desc: "Sneakers I'm glad are in my collection" },
                  { tier: "silver",   label: "⬥ SILVER ⬥",   color: T.text4,   desc: "Maybe I shouldn't have bought these" },
                  { tier: "bronze",   label: "💀 BRONZE 💀", color: "#CD7F32", desc: "Beaters" },
                ].map(t => (
                  <div key={t.tier} style={{ display:"flex", alignItems:"baseline", gap:"12px", marginBottom:"12px" }}>
                    <span style={{ fontSize:"10px", letterSpacing:"3px", color:t.color, whiteSpace:"nowrap", minWidth:"120px" }}>{t.label}</span>
                    <span style={{ fontSize:"14px", color:T.text3, fontStyle:"italic" }}>{t.desc}</span>
                  </div>
                ))}
              </div>
            )}

            {/* ── GRAVEYARD ── */}
            {view === "graveyard" && (() => {
              const entries = Object.entries(graveyardMeta);
              const getTier = (e) => e.tier || (e.isGrail ? "diamond" : e.isBeater ? "bronze" : "silver");
              const diamonds  = entries.filter(([,e]) => getTier(e) === "diamond");
              const platinums = entries.filter(([,e]) => getTier(e) === "platinum");
              const golds     = entries.filter(([,e]) => getTier(e) === "gold");
              const silvers   = entries.filter(([,e]) => getTier(e) === "silver");
              const bronzes   = entries.filter(([,e]) => getTier(e) === "bronze");
              const SectionHeader = ({ label, color }) => (
                <div style={{ fontSize:"10px", letterSpacing:"4px", color, marginBottom:"16px", marginTop:"8px" }}>{label}</div>
              );
              const renderSection = (items, label, color) => items.length > 0 && (
                <div style={{ marginBottom:"32px" }}>
                  <SectionHeader label={label} color={color} />
                  <div style={{ display:"flex", flexWrap:"wrap", gap:"12px" }}>
                    {items.map(([k,e]) => <GraveyardCard key={k} entryKey={k} entry={e} T={T} CT={CT} dark={dark} setColorways={setColorways} setGraveyardMeta={setGraveyardMeta} isMobilePublic={isMobilePublic} />)}
                  </div>
                </div>
              );
              return (
                <div>
                  {entries.length === 0 ? (
                    <div style={{ fontSize:"11px", letterSpacing:"4px", color:T.text5 }}>🪦 THE GRAVEYARD IS EMPTY</div>
                  ) : (
                    <>
                      {renderSection(diamonds, "✦ RETIRED DIAMOND ✦", "#b8f0ff")}
                      {renderSection(platinums, "✦ RETIRED PLATINUM ✦", "#C0C0C0")}
                      {renderSection(golds, "✦ RETIRED GOLD ✦", "#FFD700")}
                      {renderSection(silvers, "🪦 RETIRED", T.text4)}
                      {renderSection(bronzes, "💀 RETIRED BRONZE 💀", "#CD7F32")}
                    </>
                  )}
                </div>
              );
            })()}

          </div>

          {ADMIN_MODE && <><button onClick={() => {
            setQuickLog(true);
            setQuickDate(localDateStr());
            const firstOwned = owned[0];
            if (firstOwned) {
              setQuickShoeId(String(firstOwned.id));
              setQuickColorway(colorways[firstOwned.shortName]?.[0] || "");
            }
          }} style={{
            position:"fixed", bottom:"28px", right:"28px", zIndex:8888,
            background:"#e63946", color:"#fff", border:"none", borderRadius:"50%",
            width:"56px", height:"56px", fontSize:"22px", cursor:"pointer",
            boxShadow:"0 4px 16px rgba(0,0,0,0.3)", display:"flex", alignItems:"center", justifyContent:"center",
            fontFamily:"'Aptos','Segoe UI',sans-serif",
          }} title="Log a wear">👟</button>

          {/* Quick Log Modal */}
          {quickLog && (() => {
            const qShoe = owned.find(s => String(s.id) === String(quickShoeId));
            const qColorways = qShoe ? (colorways[qShoe.shortName] || []) : [];
            return (
              <div onClick={() => setQuickLog(false)} style={{
                position:"fixed", top:0, left:0, width:"100vw", height:"100vh",
                background:"rgba(0,0,0,0.6)", zIndex:9000, display:"flex", alignItems:"center", justifyContent:"center",
              }}>
                <div onClick={e => e.stopPropagation()} style={{
                  background: T.bg, border:`1px solid ${T.border}`, padding:"28px", minWidth:"320px", maxWidth:"440px", width:"90vw",
                }}>
                  <div style={{ fontSize:"11px", letterSpacing:"4px", color:"#e63946", marginBottom:"20px" }}>LOG A WEAR</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:"12px" }}>
                    <div>
                      <div style={{ fontSize:"9px", letterSpacing:"2px", color: T.text5, marginBottom:"6px" }}>SHOE</div>
                      <select value={quickShoeId} onChange={e => {
                        setQuickShoeId(e.target.value);
                        const s = owned.find(sh => String(sh.id) === e.target.value);
                        setQuickColorway(s ? (colorways[s.shortName]?.[0] || "") : "");
                      }} style={{ ...IS, width:"100%" }}>
                        {owned.map(s => <option key={s.id} value={String(s.id)}>{s.name}</option>)}
                      </select>
                    </div>
                    {qColorways.length > 0 && (
                      <div>
                        <div style={{ fontSize:"9px", letterSpacing:"2px", color: T.text5, marginBottom:"6px" }}>COLORWAY</div>
                        <select value={quickColorway} onChange={e => setQuickColorway(e.target.value)} style={{ ...IS, width:"100%" }}>
                          {qColorways.map(cw => <option key={cw} value={cw}>{cw}</option>)}
                        </select>
                      </div>
                    )}
                    <div>
                      <div style={{ fontSize:"9px", letterSpacing:"2px", color: T.text5, marginBottom:"6px" }}>DATE</div>
                      <input type="date" value={quickDate} onChange={e => setQuickDate(e.target.value)} style={{ ...IS, width:"100%" }} />
                    </div>
                    <div style={{ display:"flex", gap:"8px", marginTop:"8px" }}>
                      <button onClick={() => {
                        if (!quickShoeId || !quickColorway) return;
                        const entry = { date: quickDate, colorway: quickColorway };
                        setWearLog(log => ({ ...log, [quickShoeId]: [...(log[quickShoeId] || []), entry] }));
                        setQuickLog(false);
                      }} style={{ background:"#e63946", color:"#fff", border:"none", padding:"10px 20px", cursor:"pointer", fontSize:"10px", letterSpacing:"2px", fontFamily:"'Aptos','Segoe UI',sans-serif", flex:1 }}>CONFIRM</button>
                      <button onClick={() => setQuickLog(false)} style={{ background:"transparent", border:`1px solid ${T.border}`, color: T.text4, padding:"10px 20px", cursor:"pointer", fontSize:"10px", letterSpacing:"2px", fontFamily:"'Aptos','Segoe UI',sans-serif" }}>CANCEL</button>
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}</>}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
